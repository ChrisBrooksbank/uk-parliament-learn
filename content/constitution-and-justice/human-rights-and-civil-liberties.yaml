quizzes:
  child:
    - question: "What does the Human Rights Act protect?"
      type: multiple_choice
      options:
        - "People's basic rights, like the right to be treated fairly and to say what they think"
        - "The right to free sweets"
        - "The right to never go to school"
      correct_answer: "People's basic rights, like the right to be treated fairly and to say what they think"
      explanation: "The Human Rights Act protects important rights like the right to a fair trial, freedom of speech, and the right not to be hurt or treated badly. These rights belong to everyone."
    - question: "True or false: The Equality Act means that people cannot be treated unfairly because of their race, sex, or disability."
      type: true_false
      correct_answer: "True"
      explanation: "The Equality Act 2010 protects people from being discriminated against because of nine different characteristics, including race, sex, and disability. It applies in areas like work, schools, and services."
    - question: "Why are human rights important?"
      type: multiple_choice
      options:
        - "They make sure everyone is treated with dignity and fairness, even by the government"
        - "They let people do whatever they want"
        - "They are only for important people"
      correct_answer: "They make sure everyone is treated with dignity and fairness, even by the government"
      explanation: "Human rights protect everyone, especially people who might not have much power. They make sure that the government and other powerful people must follow the rules and treat everyone fairly."
  teenager:
    - question: "What is a declaration of incompatibility, and what happens when a court makes one?"
      type: multiple_choice
      options:
        - "A court declares that a law conflicts with human rights, but the law stays in force until Parliament decides to change it"
        - "A court strikes down a law for being unconstitutional"
        - "A court orders the government to pay compensation to the affected person"
        - "A court sends the case to the European Court of Human Rights"
      correct_answer: "A court declares that a law conflicts with human rights, but the law stays in force until Parliament decides to change it"
      explanation: "A declaration of incompatibility is a formal finding that a UK law conflicts with Convention rights. It does not invalidate the law -- Parliament remains sovereign -- but it sends a strong signal. In practice, Parliament has almost always responded by changing the law."
    - question: "What is the difference between the European Convention on Human Rights and the Human Rights Act 1998?"
      type: short_answer
      correct_answer: "The ECHR is an international treaty setting out fundamental rights, enforceable through the Strasbourg Court. The Human Rights Act 1998 is the UK law that incorporates the ECHR into domestic law, allowing Convention rights to be enforced in UK courts."
      explanation: "The ECHR was signed in 1950 and created an international framework for rights protection. Before the HRA, UK citizens had to go to Strasbourg to enforce their Convention rights. The HRA brought those rights 'home' by making them enforceable in UK courts."
    - question: "True or false: Human rights are always absolute and can never be limited."
      type: true_false
      correct_answer: "False"
      explanation: "Some rights, like the prohibition of torture, are absolute and can never be limited. But most Convention rights are qualified -- they can be restricted if the restriction pursues a legitimate aim (like public safety) and is proportionate. For example, freedom of expression can be limited to prevent incitement to violence."
  adult:
    - question: "How does the Section 3 interpretive obligation under the HRA work, and what are its limits?"
      type: short_answer
      correct_answer: "Section 3 requires courts to interpret legislation compatibly with Convention rights 'so far as it is possible to do so.' This is a strong duty that allows courts to depart from the apparent meaning of legislation, but it cannot be used to adopt interpretations inconsistent with a fundamental feature of the legislative scheme -- at that point, courts must resort to a Section 4 declaration."
      explanation: "The boundary between Section 3 interpretation and Section 4 declaration reflects the HRA's attempt to balance rights protection with parliamentary sovereignty. Ghaidan v Godin-Mendoza showed how far Section 3 can stretch statutory language, while Re S (Minors) established that there are limits to interpretive creativity."
    - question: "What is the margin of appreciation, and why has it been a source of controversy in the UK?"
      type: short_answer
      correct_answer: "The margin of appreciation is a doctrine allowing states discretion in how they apply Convention rights. It has been controversial in the UK because critics argue that the Strasbourg Court sometimes narrows the margin too much, interfering with domestic democratic decisions -- as in the Hirst prisoner voting case -- while supporters see it as essential to the universality of rights protection."
      explanation: "The margin of appreciation reflects the tension between universal human rights standards and national democratic autonomy. The UK government promoted the Brighton Declaration (2012) and Protocol 15 to strengthen the principle of subsidiarity and widen the margin, arguing that national courts are better placed to assess the necessity of restrictions in their domestic context."
    - question: "How does the Equality Act 2010's public sector equality duty operate in practice?"
      type: multiple_choice
      options:
        - "Public bodies must have 'due regard' to eliminating discrimination, advancing equality, and fostering good relations when making decisions"
        - "Public bodies must achieve equal outcomes for all protected groups"
        - "Public bodies must employ equal numbers of men and women"
        - "Public bodies must seek approval from the Equality and Human Rights Commission before making any policy changes"
      correct_answer: "Public bodies must have 'due regard' to eliminating discrimination, advancing equality, and fostering good relations when making decisions"
      explanation: "The public sector equality duty (Section 149) is a process duty: it requires public bodies to consider equality implications when exercising their functions. It does not mandate specific outcomes but requires that equality considerations are consciously addressed and documented. Courts have developed a structured approach to assessing compliance."
  researcher:
    - question: "Evaluate the HRA's dialogic model of rights protection. Does the declaration of incompatibility mechanism provide an effective substitute for judicial strike-down powers, and what does Parliament's high compliance rate tell us about the relationship between judicial and legislative authority?"
      type: essay
      correct_answer: "The high compliance rate suggests that declarations function as de facto strike-down powers, supported by political norms rather than legal compulsion. However, the mechanism's effectiveness depends on contingent political conditions: a government determined to resist a declaration faces no legal barrier to doing so. The model's strength is its preservation of democratic legitimacy; its weakness is the absence of guaranteed individual remedies."
      explanation: "This question engages with the extensive scholarly debate between 'optimists' (Kavanagh, Gardbaum) who see the dialogic model as a successful innovation, and 'sceptics' (Ewing, Gearty) who argue that it provides inadequate protection. The empirical evidence of compliance must be weighed against the structural vulnerability of a system that depends on political norms rather than legal guarantees."
    - question: "Assess the relationship between the common law principle of legality and the HRA's statutory rights framework. Are common law rights and Convention rights complementary, overlapping, or potentially divergent?"
      type: essay
      correct_answer: "Common law rights and Convention rights are substantially overlapping but not identical. The principle of legality (Simms) and the development of common law constitutional rights (UNISON) demonstrate that the common law can protect fundamental rights independently of the HRA. Potential divergence exists where common law rights evolve beyond Convention standards or where the Convention protects rights (such as positive obligations) that the common law's negative liberty tradition does not recognise."
      explanation: "This question addresses an important and developing area of UK constitutional law. If common law rights can provide protection equivalent to or exceeding Convention rights, this has implications for the debate about repealing or replacing the HRA: removing the statutory framework would not leave individuals without any rights protection, though the scope and enforceability of common law rights remain subjects of scholarly debate."
    - question: "Critically examine the proposals for a British Bill of Rights as a replacement for the Human Rights Act 1998. What are the constitutional, political, and practical implications of such a reform?"
      type: essay
      correct_answer: "A British Bill of Rights could take many forms, from a minimal rebranding of the HRA to a substantive recalibration of the rights framework. Key issues include: the relationship with the ECHR (whether the UK would remain a party), the implications for the Belfast Agreement (which references the ECHR), the effect on judicial review and the declaration mechanism, and whether a domestic instrument would strengthen or weaken rights protection in practice. The political motivation -- often driven by opposition to specific Strasbourg judgments -- must be distinguished from principled constitutional reform."
      explanation: "The British Bill of Rights debate illuminates fundamental questions about the constitutional status of rights in a system based on parliamentary sovereignty. Comparative analysis with other jurisdictions that have adopted domestic bills of rights while remaining parties to international human rights instruments provides useful context. The Belfast Agreement dimension adds a layer of complexity that is often underappreciated in public debate."
