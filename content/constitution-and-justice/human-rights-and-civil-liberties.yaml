glossary:
  - term: "Human Rights Act 1998"
    definition_simple: "A UK law that protects people's basic rights, like the right to a fair trial and freedom of speech, by bringing the European Convention on Human Rights into UK law."
    definition_full: "An Act of Parliament that incorporates the rights and freedoms guaranteed by the European Convention on Human Rights into UK domestic law. Its principal mechanisms are: Section 3 (an obligation on courts to interpret legislation compatibly with Convention rights so far as possible), Section 6 (making it unlawful for public authorities to act incompatibly with Convention rights), and Section 4 (enabling higher courts to issue declarations of incompatibility where primary legislation cannot be read compatibly). The HRA preserves parliamentary sovereignty by not giving courts the power to strike down legislation."
  - term: "European Convention on Human Rights"
    definition_simple: "An international agreement that sets out the basic rights and freedoms that everyone in the member countries of the Council of Europe should have, like the right to life and freedom from torture."
    definition_full: "An international treaty adopted in 1950 under the auspices of the Council of Europe, establishing a catalogue of fundamental rights and freedoms enforceable through individual petition to the European Court of Human Rights in Strasbourg. The Convention protects rights including the right to life (Article 2), the prohibition of torture (Article 3), the right to a fair trial (Article 6), respect for private and family life (Article 8), freedom of expression (Article 10), and the prohibition of discrimination (Article 14). The Convention has been supplemented by additional protocols extending and clarifying the rights protected."
  - term: "Declaration of Incompatibility"
    definition_simple: "A formal statement by a court saying that a UK law does not match up with people's human rights, telling Parliament it should think about changing the law."
    definition_full: "Under Section 4 of the Human Rights Act 1998, a declaration issued by a higher court when it determines that a provision of primary legislation is incompatible with a Convention right and cannot be interpreted compatibly under Section 3. A declaration does not affect the validity, continuing operation, or enforcement of the legislation, preserving parliamentary sovereignty. However, it creates significant political pressure for legislative amendment; Parliament has responded to the vast majority of final declarations by changing the law."
  - term: "Civil Liberties"
    definition_simple: "The freedoms that people have from government interference, like freedom of speech, freedom of religion, and the right to privacy."
    definition_full: "Individual freedoms that protect against undue interference by the state, encompassing liberties such as freedom of expression, freedom of assembly and association, freedom of religion, the right to privacy, and freedom from arbitrary detention. In the UK, civil liberties have developed through a combination of common law, statute (including the HRA and the Equality Act), and constitutional convention. Unlike positive rights (entitlements to services or resources), civil liberties are primarily negative rights that constrain state action."
  - term: "Margin of Appreciation"
    definition_simple: "The idea that each country should have some room to decide for itself how to apply human rights rules, because different countries may have different views on certain issues."
    definition_full: "A doctrine developed by the European Court of Human Rights that accords states a degree of discretion in how they implement and apply the rights guaranteed by the Convention, recognising that national authorities may be better placed to assess the necessity of restrictions on qualified rights in their specific democratic context. The width of the margin varies depending on the nature of the right, the seriousness of the interference, the existence of a European consensus, and whether the case concerns a particularly sensitive area such as national security or morality."
  - term: "Equality Act 2010"
    definition_simple: "A UK law that says people must not be treated unfairly because of things like their race, sex, disability, age, or religion."
    definition_full: "An Act of Parliament that consolidated and replaced previous anti-discrimination legislation, providing a comprehensive framework for the protection of individuals from discrimination, harassment, and victimisation. The Act identifies nine protected characteristics (age, disability, gender reassignment, marriage and civil partnership, pregnancy and maternity, race, religion or belief, sex, and sexual orientation) and prohibits direct and indirect discrimination in employment, services, education, and other areas. The public sector equality duty (Section 149) requires public bodies to have due regard to equality considerations."
  - term: "Proportionality"
    definition_simple: "The idea that when the government limits someone's rights, it should only do so as much as is truly necessary and not go further than it needs to."
    definition_full: "A legal principle requiring that any restriction on a Convention right must be rationally connected to a legitimate aim, no more restrictive than necessary to achieve that aim, and must strike a fair balance between the individual's rights and the wider public interest. Proportionality has replaced the traditional Wednesbury reasonableness test in human rights cases in the UK, providing a more structured and intensive standard of judicial review. The test is applied when assessing the compatibility of legislation or executive action with qualified Convention rights."

did_you_know:
  - fact: "The European Convention on Human Rights was drafted in 1950, and a British lawyer named Sir David Maxwell Fyfe played a leading role in writing it."
    level: [child, teenager]
  - fact: "Before the Human Rights Act 1998 came into force in 2000, people in the UK who wanted to enforce their Convention rights had to take their case to the European Court of Human Rights in Strasbourg, France -- a process that could take many years."
    level: [teenager, adult]
  - fact: "The Equality Act 2010 protects people from discrimination on the basis of nine different characteristics, including age, disability, race, sex, and religion."
    level: [child, teenager]
  - fact: "Parliament has responded to the vast majority of final declarations of incompatibility by changing the law, even though it is not legally required to do so, demonstrating the political force of the mechanism."
    level: [adult, researcher]
  - fact: "The European Court of Human Rights is part of the Council of Europe, not the European Union. The UK remains a member of the Council of Europe and subject to the ECHR despite having left the EU."
    level: [teenager, adult, researcher]

key_dates:
  - year: 1950
    event: "The European Convention on Human Rights is signed in Rome"
    significance: "Established a catalogue of fundamental rights enforceable through an international court. The UK was among the original signatories and the Convention later formed the basis of the Human Rights Act 1998."
    levels: [teenager, adult, researcher]
  - year: 1998
    event: "The Human Rights Act receives Royal Assent"
    significance: "Incorporated ECHR rights into UK domestic law, enabling individuals to bring human rights claims in UK courts. The Act came fully into force on 2 October 2000 and fundamentally reshaped the relationship between the individual, the state, and the judiciary."
    levels: [child, teenager, adult, researcher]
  - year: 2010
    event: "The Equality Act consolidates anti-discrimination law"
    significance: "Replaced nine previous pieces of anti-discrimination legislation with a single comprehensive framework, identifying nine protected characteristics and establishing the public sector equality duty. It remains the principal statutory instrument for combating discrimination in the UK."
    levels: [teenager, adult, researcher]
  - year: 2004
    event: "Ghaidan v Godin-Mendoza is decided by the House of Lords"
    significance: "A landmark case that demonstrated the transformative potential of Section 3 of the HRA, with the House of Lords interpreting the Rent Act 1977 to include same-sex partners. The decision established the breadth of the interpretive obligation while preserving the distinction between interpretation and judicial legislation."
    levels: [adult, researcher]
  - year: 2005
    event: "Hirst v United Kingdom (No. 2) decided by the European Court of Human Rights"
    significance: "The Grand Chamber ruled that a blanket ban on prisoner voting violated Article 3 of Protocol 1 to the ECHR. The UK's prolonged non-compliance with this judgment became a focal point of political debate about the relationship between Strasbourg and Westminster, and contributed to calls for reform of the HRA."
    levels: [adult, researcher]

key_figures:
  - name: "Sir David Maxwell Fyfe"
    role: "British lawyer and politician"
    description: "Sir David Maxwell Fyfe (1900-1967) chaired the legal committee of the Council of Europe's Consultative Assembly and was instrumental in drafting the European Convention on Human Rights. His involvement demonstrates the significant British contribution to the post-war European human rights framework, a point often overlooked in contemporary debates about the ECHR."
    levels: [teenager, adult, researcher]
  - name: "Lord Lester of Herne Hill"
    role: "Barrister and human rights advocate"
    description: "Anthony Lester (1936-2020) was one of the most influential figures in the development of UK human rights and equality law. He played a leading role in the campaign for incorporation of the ECHR into domestic law, which culminated in the Human Rights Act 1998, and was instrumental in shaping the Race Relations Act 1976, the Sex Discrimination Act 1975, and the Equality Act 2010."
    levels: [adult, researcher]
  - name: "Baroness Hale of Richmond"
    role: "President of the Supreme Court"
    description: "Brenda Hale (born 1945) became the first female President of the UK Supreme Court in 2017. A leading authority on equality and human rights law, she delivered significant judgments on the scope of the HRA, the Equality Act, and the relationship between human rights and parliamentary sovereignty, including the landmark prorogation case R (Miller) v The Prime Minister [2019]."
    levels: [teenager, adult, researcher]
  - name: "Keir Starmer (as Director of Public Prosecutions)"
    role: "Director of Public Prosecutions, 2008-2013"
    description: "Before entering politics, Keir Starmer served as a human rights barrister and was involved in cases before the European Court of Human Rights. As Director of Public Prosecutions, he oversaw the application of human rights principles within the criminal justice system. His legal career illustrates the practical impact of the HRA on the administration of justice."
    levels: [adult, researcher]

