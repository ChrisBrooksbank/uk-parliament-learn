quizzes:
  child:
    - question: "Does the United Kingdom have one single document that sets out all the rules for running the country?"
      type: multiple_choice
      options:
        - "Yes, it is called the British Constitution"
        - "No, the rules come from many different places"
        - "Yes, it is kept in the Tower of London"
      correct_answer: "No, the rules come from many different places"
      explanation: "The UK does not have a single written constitution. Instead, the rules come from laws passed by Parliament, traditions, court decisions, and other sources."
    - question: "True or false: The Magna Carta was signed over 800 years ago."
      type: true_false
      correct_answer: "True"
      explanation: "The Magna Carta was sealed in 1215, making it over 800 years old. It is one of the oldest and most famous documents in the history of the UK's constitution."
    - question: "What is a convention?"
      type: multiple_choice
      options:
        - "A big meeting where politicians give speeches"
        - "A tradition or rule that everyone follows even though it is not a law"
        - "A type of law passed by Parliament"
      correct_answer: "A tradition or rule that everyone follows even though it is not a law"
      explanation: "A constitutional convention is an unwritten rule that everyone agrees to follow. For example, the rule that the Monarch always follows the Prime Minister's advice is a convention, not a law."
  teenager:
    - question: "What are the five main sources of the UK constitution?"
      type: short_answer
      correct_answer: "Statute law (Acts of Parliament), constitutional conventions, common law, royal prerogative, and authoritative works."
      explanation: "The UK constitution is drawn from these five sources rather than being contained in a single document. Each source contributes different types of rules and principles."
    - question: "Why is the UK constitution described as 'uncodified' rather than 'unwritten'?"
      type: multiple_choice
      options:
        - "Because it is written in code"
        - "Because much of it is written down, but it is not collected in a single document"
        - "Because it has never been translated from Latin"
      correct_answer: "Because much of it is written down, but it is not collected in a single document"
      explanation: "The term 'unwritten' is misleading because many constitutional rules are written down in Acts of Parliament, court judgments, and other documents. 'Uncodified' is more accurate because it means the rules have not been brought together in one single constitutional text."
    - question: "True or false: Constitutional conventions can be enforced by the courts."
      type: true_false
      correct_answer: "False"
      explanation: "Conventions are politically binding but not legally enforceable. The Supreme Court confirmed this in the Miller case (2017), ruling that the Sewel Convention could not be judicially enforced even though it had been recognised in statute."
  adult:
    - question: "What did Laws LJ establish in Thoburn v Sunderland City Council (2002) regarding constitutional statutes?"
      type: short_answer
      correct_answer: "Laws LJ identified a category of 'constitutional statutes' -- including the Magna Carta, the Bill of Rights 1689, and the European Communities Act 1972 -- that cannot be impliedly repealed by later legislation but can be expressly repealed by Parliament."
      explanation: "This distinction introduced a hierarchy within statute law, recognising that certain statutes have a special constitutional status that protects them from inadvertent repeal while preserving parliamentary sovereignty to repeal them expressly."
    - question: "How does the principle of legality operate as a de facto constraint on parliamentary sovereignty?"
      type: short_answer
      correct_answer: "The principle of legality, as articulated by Lord Hoffmann in ex parte Simms (2000), holds that Parliament is presumed not to intend to override fundamental rights unless it does so in express and unambiguous terms. This creates an interpretive presumption that constrains the practical effect of legislation without formally challenging parliamentary sovereignty."
      explanation: "The principle operates through statutory interpretation rather than judicial review of legislation. Courts will read statutes as compatible with fundamental rights unless Parliament has clearly and expressly provided otherwise, creating a practical protection for rights within the framework of parliamentary sovereignty."
    - question: "What are the main arguments for and against codifying the UK constitution?"
      type: multiple_choice
      options:
        - "For: greater clarity, rights protection, accessibility. Against: loss of flexibility, difficulty of consensus, adequacy of existing arrangements"
        - "For: it would make the UK more like France. Against: it would make the UK less like France"
        - "For: it would reduce the power of the courts. Against: it would increase the power of the courts"
      correct_answer: "For: greater clarity, rights protection, accessibility. Against: loss of flexibility, difficulty of consensus, adequacy of existing arrangements"
      explanation: "The codification debate balances the values of clarity, entrenchment, and public understanding against the virtues of constitutional flexibility, the difficulty of achieving political consensus on a constitutional text, and the argument that the existing uncodified arrangements have proved adaptable and resilient."
  researcher:
    - question: "Critically evaluate the extent to which the doctrine of parliamentary sovereignty, as formulated by Dicey, accurately describes the contemporary UK constitutional order."
      type: essay
      correct_answer: "Dicey's formulation faces multiple challenges: EU membership (now ended but precedent-setting) demonstrated that Parliament could bind itself to external legal orders; the devolution settlements have created politically entrenched sub-national legislatures; the Human Rights Act requires courts to interpret legislation compatibly with Convention rights; and judicial dicta in Jackson suggested that sovereignty might not be absolute. However, Parliament retains the formal legal power to repeal any statute, and the UK's exit from the EU affirmed the practical reality of parliamentary sovereignty. The doctrine remains the foundational principle but operates in a constitutional landscape significantly more complex than Dicey envisaged."
      explanation: "The essay should engage with Dicey's original formulation, Jennings' critique, the impact of EU membership and withdrawal, the devolution settlements, the Human Rights Act, Jackson v Attorney General, and contemporary scholarly debate (Bogdanor, King, Allan) to assess whether Dicey's theory remains descriptively accurate."
    - question: "Analyse the significance of the Miller/Cherry prorogation case (2019) for the relationship between the courts, the executive, and the royal prerogative in the UK constitution."
      type: essay
      correct_answer: "Miller/Cherry expanded judicial review into the previously non-justiciable area of prorogation, holding that the PM's advice to the Queen was unlawful because it frustrated Parliament's constitutional role. The judgment raised fundamental questions about the proper role of the courts in policing constitutional boundaries, the scope of the prerogative, and the balance between legal and political accountability. Critics argued the court entered political territory; supporters contended it upheld the rule of law against executive overreach."
      explanation: "The analysis should consider the legal reasoning (the principle that prorogation cannot be used to frustrate Parliament's ability to perform its constitutional functions), the distinction between legality and convention, the implications for the scope of judicial review, and the broader constitutional context of the Brexit crisis."
