glossary:
  - term: "Uncodified Constitution"
    definition_simple: "A set of rules for running a country that are not written down in one single document but come from many different places like laws, traditions, and court decisions."
    definition_full: "A constitutional order in which the fundamental rules and principles governing the state are not consolidated in a single authoritative document but are derived from multiple sources including statute law, constitutional conventions, common law, royal prerogative, and authoritative works. The UK, Israel, and New Zealand are the principal examples among modern democracies."
  - term: "Constitutional Convention"
    definition_simple: "An unwritten rule about how the government should behave that everyone agrees to follow, even though it is not an actual law."
    definition_full: "A non-legal rule of constitutional practice that is regarded as binding by those to whom it applies, but which is not enforceable by the courts. Conventions regulate the exercise of legal powers; their breach provokes political rather than legal consequences. Key examples include the Monarch acting on ministerial advice, collective Cabinet responsibility, and the Sewel Convention on devolution."
  - term: "Common Law"
    definition_simple: "Rules and principles that have been developed by judges through their decisions over hundreds of years, rather than being written down in Acts of Parliament."
    definition_full: "The body of law developed by the courts through judicial decisions, as distinct from statute law enacted by Parliament. In constitutional terms, common law has established principles including the rule of law, the presumption of legality, natural justice, and aspects of the royal prerogative. Common law constitutional principles serve as interpretive guides and, through the principle of legality, as de facto constraints on legislative power."
  - term: "Statute Law"
    definition_simple: "Laws that have been officially made by Parliament, also called Acts of Parliament."
    definition_full: "Law enacted by Parliament through Acts (primary legislation) or by ministers under powers delegated by Parliament (secondary legislation). Statute law is the supreme source of the UK constitution, as parliamentary sovereignty means that an Act of Parliament can override any other source of law. Constitutional statutes -- such as the Bill of Rights 1689, the Parliament Acts, and the Human Rights Act 1998 -- establish fundamental principles but are not formally entrenched."
  - term: "Royal Prerogative"
    definition_simple: "Special powers that originally belonged to the King or Queen but are now mostly used by the Prime Minister and ministers on their behalf."
    definition_full: "The residue of discretionary powers legally vested in the Crown, exercised almost entirely on the advice of ministers. Prerogative powers include the conduct of foreign affairs, the deployment of armed forces, the granting of honours, and (following the Dissolution and Calling of Parliament Act 2022) the dissolution of Parliament. The scope of the prerogative has been progressively limited by statute and judicial review."
  - term: "Constitutional Reform"
    definition_simple: "Changes made to the rules about how the country is governed, like creating a new court or changing how the government works."
    definition_full: "The process of altering the UK's constitutional arrangements through legislation, institutional change, or evolving conventions. Major recent reforms include devolution (1998-), the Human Rights Act 1998, the creation of the Supreme Court (Constitutional Reform Act 2005), and the reform of the House of Lords. The UK's uncodified constitution allows reform through ordinary legislation, without the special amendment procedures required in codified systems."
  - term: "Authoritative Works"
    definition_simple: "Important books written by experts that help explain how the UK constitution works, even though the books are not laws themselves."
    definition_full: "Scholarly works on constitutional law and practice that serve as guides to the understanding and interpretation of the UK constitution. While they have no legal force, they are cited by courts, parliamentarians, and officials. Key works include Bagehot's 'The English Constitution' (1867), Dicey's 'Introduction to the Study of the Law of the Constitution' (1885), Jennings' 'The Law and the Constitution' (1933), and Erskine May's 'Parliamentary Practice.'"

did_you_know:
  - fact: "The UK is one of only three democracies in the world that does not have a single written constitution -- the others are Israel and New Zealand!"
    level: [child, teenager]
  - fact: "The Magna Carta, sealed in 1215, is over 800 years old and is one of the earliest documents in the UK's constitutional history. Only four original copies survive."
    level: [child, teenager, adult]
  - fact: "The UK constitution can be changed by a simple Act of Parliament -- unlike the US Constitution, which requires approval by two-thirds of Congress and three-quarters of state legislatures."
    level: [teenager, adult]
  - fact: "In the 2019 prorogation case, the Supreme Court ruled unanimously that Boris Johnson's advice to the Queen to prorogue Parliament was unlawful -- the first time the courts had ever struck down a prorogation."
    level: [teenager, adult, researcher]
  - fact: "A.V. Dicey, whose work on parliamentary sovereignty published in 1885 remains foundational, was also a fierce opponent of Irish Home Rule and women's suffrage, illustrating how constitutional scholarship is shaped by its political context."
    level: [adult, researcher]

key_dates:
  - year: 1215
    event: "Magna Carta sealed at Runnymede"
    significance: "Established the principle that the King was subject to law and could not levy taxes without the consent of his barons. Though most of its provisions have been repealed, it remains a foundational symbol of constitutional government and the rule of law."
    levels: [child, teenager, adult, researcher]
  - year: 1689
    event: "Bill of Rights enacted"
    significance: "Established parliamentary supremacy over the Crown following the Glorious Revolution, guaranteeing free speech in Parliament, prohibiting the Crown from suspending laws without parliamentary consent, and setting the constitutional foundation for modern parliamentary democracy."
    levels: [teenager, adult, researcher]
  - year: 1885
    event: "Dicey publishes Introduction to the Study of the Law of the Constitution"
    significance: "Articulated the doctrines of parliamentary sovereignty and the rule of law that have shaped constitutional understanding for over a century, establishing the analytical framework within which the UK constitution is still debated."
    levels: [adult, researcher]
  - year: 1998
    event: "Human Rights Act passed"
    significance: "Incorporated the European Convention on Human Rights into UK domestic law, enabling individuals to enforce Convention rights in UK courts and requiring courts to interpret legislation compatibly with Convention rights where possible."
    levels: [teenager, adult, researcher]
  - year: 2005
    event: "Constitutional Reform Act passed"
    significance: "Created the Supreme Court as a separate institution from the House of Lords, reformed the office of Lord Chancellor, and established the Judicial Appointments Commission, representing the most significant structural constitutional reform in a generation."
    levels: [teenager, adult, researcher]

key_figures:
  - name: "A.V. Dicey"
    role: "Constitutional scholar (1835-1922)"
    description: "Vinerian Professor of English Law at Oxford, whose 'Introduction to the Study of the Law of the Constitution' (1885) established the doctrines of parliamentary sovereignty and the rule of law as the twin pillars of the UK constitution. His framework remains foundational, though it has been extensively critiqued and qualified."
    levels: [teenager, adult, researcher]
  - name: "Walter Bagehot"
    role: "Journalist and constitutional commentator (1826-1877)"
    description: "Author of 'The English Constitution' (1867), which distinguished between the 'dignified' parts of the constitution (the Monarchy and the Lords) that command public reverence and the 'efficient' parts (the Cabinet and the Commons) that actually govern. His analysis remains widely cited."
    levels: [adult, researcher]
  - name: "Sir Ivor Jennings"
    role: "Constitutional scholar (1903-1965)"
    description: "Author of 'The Law and the Constitution' (1933), which challenged Dicey's positivist approach and developed a more nuanced understanding of conventions, sovereignty, and the relationship between law and politics in the constitution."
    levels: [adult, researcher]
  - name: "Vernon Bogdanor"
    role: "Constitutional scholar and Professor of Government"
    description: "One of the leading contemporary scholars of the British constitution, whose works including 'The New British Constitution' (2009) have analysed the transformation of the constitutional order through devolution, human rights legislation, and institutional reform."
    levels: [researcher]

