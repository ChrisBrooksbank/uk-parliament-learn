key_dates:
  - year: 1997
    event: "Referendums in Scotland and Wales approve devolution"
    significance: "The Scottish referendum saw 74.3% vote in favour of a Scottish Parliament, while the Welsh referendum passed by a narrow margin of 50.3%. These results provided the democratic mandate for the devolution legislation that followed."
    levels: [teenager, adult, researcher]
  - year: 1998
    event: "The Scotland Act, Government of Wales Act, and Northern Ireland Act receive Royal Assent"
    significance: "These three Acts of Parliament established the constitutional framework for devolution, creating the Scottish Parliament, the National Assembly for Wales, and the Northern Ireland Assembly respectively. The Northern Ireland Act implemented the Belfast (Good Friday) Agreement."
    levels: [child, teenager, adult, researcher]
  - year: 1999
    event: "The Scottish Parliament and National Assembly for Wales hold their first sessions"
    significance: "Marked the beginning of devolved governance in Scotland and Wales, with elected representatives taking their seats for the first time. The Scottish Parliament met for the first time on 12 May 1999."
    levels: [child, teenager, adult]
  - year: 2016
    event: "The Scotland Act 2016 receives Royal Assent"
    significance: "Implemented the Smith Commission recommendations following the 2014 independence referendum, devolving significant fiscal powers including income tax rates and bands. It also gave statutory recognition to the Sewel Convention and placed the Scottish Parliament on a statutory permanent footing."
    levels: [adult, researcher]
  - year: 2017
    event: "The Wales Act 2017 receives Royal Assent"
    significance: "Moved Wales from a conferred powers model to a reserved powers model aligned with Scotland, giving the Senedd primary legislative competence over all matters not explicitly reserved to Westminster and devolving some tax powers."
    levels: [adult, researcher]

key_figures:
  - name: "Donald Dewar"
    role: "First First Minister of Scotland"
    description: "Donald Dewar (1937-2000) served as Secretary of State for Scotland and was the principal architect of Scottish devolution. He steered the Scotland Act 1998 through Parliament and became the first First Minister of Scotland when the Scottish Parliament was established in 1999. He is often referred to as the 'Father of the Nation' in the context of Scottish devolution."
    levels: [teenager, adult, researcher]
  - name: "Ron Davies"
    role: "Secretary of State for Wales"
    description: "Ron Davies served as Secretary of State for Wales and was instrumental in delivering the Welsh devolution referendum in 1997 and the Government of Wales Act 1998. He famously described devolution as 'a process, not an event,' a phrase that has come to define the evolving nature of the Welsh settlement."
    levels: [adult, researcher]
  - name: "Joel Barnett"
    role: "Chief Secretary to the Treasury"
    description: "Joel Barnett (1923-2014) devised the Barnett Formula in 1978 as a mechanism for allocating public expenditure to Scotland, Wales, and Northern Ireland. Originally intended as a temporary measure, the formula remains in use today. Barnett himself later called the formula 'unfair' and advocated for a needs-based replacement."
    levels: [adult, researcher]
  - name: "Vernon Bogdanor"
    role: "Constitutional scholar"
    description: "Vernon Bogdanor is a leading authority on the UK constitution and devolution. His book 'Devolution in the United Kingdom' (1999) provided the foundational scholarly analysis of the devolution settlements and their constitutional implications. He has argued that devolution has transformed the UK into a 'quasi-federal' state."
    levels: [researcher]

quizzes:
  child:
    - question: "What does devolution mean?"
      type: multiple_choice
      options:
        - "Giving some powers to Scotland, Wales, and Northern Ireland so they can make their own decisions"
        - "Taking all power away from the UK Parliament"
        - "Joining the UK with another country"
      correct_answer: "Giving some powers to Scotland, Wales, and Northern Ireland so they can make their own decisions"
      explanation: "Devolution means that the UK Parliament has given some of its powers to parliaments and assemblies in Scotland, Wales, and Northern Ireland. They can now make their own laws about things like schools and hospitals, but the UK Parliament still decides on things like defence."
    - question: "True or false: The Scottish Parliament can make decisions about defence and the armed forces."
      type: true_false
      correct_answer: "False"
      explanation: "Defence is a reserved power, which means only the UK Parliament in London can make decisions about it. The Scottish Parliament makes decisions about devolved matters like health, education, and the environment."
    - question: "Where does the Scottish Parliament meet?"
      type: multiple_choice
      options:
        - "London"
        - "Edinburgh"
        - "Cardiff"
      correct_answer: "Edinburgh"
      explanation: "The Scottish Parliament is based at Holyrood in Edinburgh. The Welsh Senedd meets in Cardiff, and the Northern Ireland Assembly is at Stormont in Belfast."
  teenager:
    - question: "What is the Sewel Convention?"
      type: multiple_choice
      options:
        - "A rule that the UK Parliament will not normally legislate on devolved matters without the consent of the relevant devolved legislature"
        - "A treaty between Scotland and England"
        - "A formula for calculating how much money devolved governments receive"
        - "A requirement that all UK laws must be approved by the Scottish Parliament"
      correct_answer: "A rule that the UK Parliament will not normally legislate on devolved matters without the consent of the relevant devolved legislature"
      explanation: "The Sewel Convention holds that Westminster will 'not normally' legislate on devolved matters without consent. It was given statutory recognition in 2016, but the Supreme Court ruled that it remains a political convention, not a legally enforceable rule."
    - question: "What is the difference between reserved powers and devolved powers?"
      type: short_answer
      correct_answer: "Reserved powers are kept by the UK Parliament (like defence and foreign affairs), while devolved powers are transferred to the Scottish Parliament, Welsh Senedd, or Northern Ireland Assembly (like health and education)."
      explanation: "The distinction between reserved and devolved powers is central to how devolution works. In Scotland and Wales, a reserved powers model is used: matters listed in the relevant Acts are reserved to Westminster, and everything else is devolved."
    - question: "True or false: The Welsh Senedd had the same powers as the Scottish Parliament from the very beginning of devolution."
      type: true_false
      correct_answer: "False"
      explanation: "The Welsh settlement initially gave the National Assembly only secondary legislative powers. It took several Acts of Parliament -- the Government of Wales Act 2006, a referendum in 2011, and the Wales Act 2017 -- before Wales moved to a reserved powers model broadly aligned with Scotland."
  adult:
    - question: "How does the Barnett Formula work, and what are its main criticisms?"
      type: short_answer
      correct_answer: "The Barnett Formula calculates changes to devolved block grants based on population-proportionate shares of changes in comparable English departmental spending. It is criticised for not reflecting relative need, lacking statutory authority, and producing convergence in per capita spending over time."
      explanation: "The Barnett Formula was designed as a simple, administratively convenient mechanism, but its longevity has exposed significant shortcomings. The Holtham Commission found that Wales was underfunded relative to a needs-based assessment. The formula also lacks transparency and democratic accountability, having never been put on a statutory footing."
    - question: "What did the Supreme Court decide about the Sewel Convention in the Miller case (2017)?"
      type: short_answer
      correct_answer: "The Supreme Court held that the Sewel Convention, despite its statutory recognition in the Scotland Act 2016, is a political convention rather than a justiciable legal rule, meaning courts cannot enforce it."
      explanation: "This ruling confirmed that Westminster's legal sovereignty remains unqualified. While the convention creates a strong political expectation that consent will be sought, the devolved legislatures have no legal veto over Westminster legislation in devolved areas. This distinction became practically significant when several major pieces of legislation proceeded without devolved consent."
    - question: "Why is UK devolution described as 'asymmetric'?"
      type: multiple_choice
      options:
        - "Because each devolved legislature has different powers, structures, and electoral systems"
        - "Because England has the largest population"
        - "Because devolution can be reversed at any time"
        - "Because the devolved bodies meet at different times of the year"
      correct_answer: "Because each devolved legislature has different powers, structures, and electoral systems"
      explanation: "Asymmetry is a defining feature of UK devolution. Scotland has the broadest legislative competence and fiscal powers. Wales was initially given only secondary legislative powers but has since been granted primary legislative competence. Northern Ireland operates under a consociational model with power-sharing requirements. England has no devolved legislature at all."
  researcher:
    - question: "Assess the constitutional significance of the Supreme Court's treatment of the Sewel Convention in Miller (2017). Does the distinction between a political convention and a justiciable legal rule provide an adequate framework for managing the relationship between Westminster and the devolved legislatures?"
      type: essay
      correct_answer: "The Miller ruling preserved Westminster's unqualified legal sovereignty while acknowledging the political importance of the Sewel Convention. The distinction is analytically clear but practically problematic: it means that the convention's force depends entirely on political will, with no legal mechanism to prevent Westminster from legislating in devolved areas without consent. The passage of the UK Internal Market Act 2020 without devolved consent demonstrated the convention's fragility."
      explanation: "This question engages with a central tension in UK devolution: the gap between legal form and constitutional practice. The convention creates a legitimate expectation of consent, but its non-justiciable status means that the devolved legislatures depend on political norms rather than legal protections. Scholars such as Tierney and McHarg have argued that this arrangement is unsustainable in a context of increasing intergovernmental disagreement, and that a more formal, legally binding framework is needed."
    - question: "Evaluate the Barnett Formula as a mechanism for fiscal governance in a devolved United Kingdom. What are the implications of its non-statutory status, and what alternatives have been proposed?"
      type: essay
      correct_answer: "The Barnett Formula's non-statutory status means it operates without parliamentary scrutiny, democratic accountability, or needs-based justification. Alternatives include needs-based allocation (recommended by the Holtham Commission for Wales), full fiscal autonomy, and formal fiscal federalism. The fiscal frameworks negotiated alongside the Scotland Act 2016 and Wales Act 2017 introduced partial adjustments but did not replace the formula itself."
      explanation: "The Barnett Formula illustrates the broader problem of governing devolution through informal mechanisms. Its simplicity is both a strength (administrative convenience) and a weakness (lack of responsiveness to need). The formula's persistence despite near-universal criticism reflects the political difficulty of reform: any needs-based alternative would produce winners and losers among the devolved nations."
    - question: "How do the consociational requirements of the Northern Ireland Assembly affect the stability and effectiveness of devolution in Northern Ireland, and what lessons does the Northern Ireland experience offer for the broader UK devolution framework?"
      type: essay
      correct_answer: "The consociational model requires cross-community power-sharing, which provides inclusivity and legitimacy in a divided society but creates institutional fragility: either community can effectively veto governance by withdrawing from the Executive. Repeated suspensions demonstrate that consociational arrangements are vulnerable to breakdowns in trust between communities. The Northern Ireland experience highlights the tension between institutional design for divided societies and effective governance."
      explanation: "Northern Ireland's devolution settlement is unique in the UK context because it emerged from a peace process rather than a general programme of constitutional reform. The consociational model, drawing on Lijphart's theoretical framework, prioritises inclusion over efficiency. The repeated suspensions of the Assembly suggest that while consociationalism can manage conflict, it cannot resolve the underlying divisions, and the institution's stability depends on continuing commitment from all parties to power-sharing."
