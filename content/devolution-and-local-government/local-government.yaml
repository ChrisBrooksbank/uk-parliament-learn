glossary:
  - term: "Unitary Authority"
    definition_simple: "A single council that does everything for its area, instead of having two separate councils (a county council and a district council)."
    definition_full: "A local authority that combines the functions of both county and district councils, exercising the full range of local government responsibilities within its area. Unitary authorities were introduced from the 1990s onwards as an alternative to the two-tier system, and are found in many urban areas and some rural counties. They are responsible for all local services including education, social care, housing, planning, waste collection, and highways."
  - term: "Combined Authority"
    definition_simple: "A group of councils that have joined together to work on big issues like transport, jobs, and housing across a wider area, often led by an elected mayor."
    definition_full: "A legal body established under the Local Democracy, Economic Development and Construction Act 2009, comprising two or more local authorities that agree to exercise certain functions jointly across a wider area. Combined authorities typically focus on transport, economic development, strategic planning, and skills. Where a devolution deal has been agreed with central government, a combined authority may be led by a directly elected mayor with additional devolved powers."
  - term: "Elected Mayor"
    definition_simple: "A person chosen by local voters to lead a council or a group of councils, making important decisions about how the area is run."
    definition_full: "A directly elected individual who serves as the political leader of either a single local authority (under the Local Government Act 2000) or a combined authority (under the Cities and Local Government Devolution Act 2016). Elected mayors hold executive powers and provide visible, accountable leadership. Combined authority mayors -- sometimes called metro mayors -- typically have additional powers over transport, strategic planning, and economic development devolved through deals with central government."
  - term: "Council Tax"
    definition_simple: "A payment that people who own or rent a home make to their local council, which the council uses to pay for local services like schools, bin collection, and parks."
    definition_full: "A property-based local tax on domestic dwellings, introduced in 1993 by the Local Government Finance Act 1992 to replace the community charge (poll tax). Properties are assigned to one of eight valuation bands (A to H) based on their estimated value as at 1 April 1991. Councils set the annual rate, subject to central government controls including referendum requirements for increases above a specified threshold. Council tax is the principal source of locally raised revenue for English local authorities."
  - term: "Devolution Deal"
    definition_simple: "An agreement between the national government and a group of local councils that gives the local area more power to make decisions about things like transport and jobs."
    definition_full: "A bespoke agreement negotiated bilaterally between central government and a combined authority (or, in some cases, a single local authority) setting out the specific powers, functions, and funding to be devolved. Devolution deals vary significantly in scope and ambition: some transfer powers over transport, adult education, and housing, while others include control over specific funding streams or business rate retention. The deal-based model has been criticised for its opacity, inconsistency, and lack of a clear statutory framework."

did_you_know:
  - fact: "There are over 20,000 elected councillors in England, making them the largest group of elected representatives in the country."
    level: [child, teenager]
  - fact: "Council tax valuations in England are still based on property values from 1 April 1991 -- over 35 years ago -- and have never been updated."
    level: [teenager, adult, researcher]
  - fact: "Birmingham City Council, the largest local authority in Europe, issued a Section 114 notice in 2023, effectively declaring itself unable to balance its budget."
    level: [adult, researcher]
  - fact: "Turnout in local elections in England is usually only about 30-35%, compared with 60-70% in general elections, meaning that many councillors are elected by a small fraction of the eligible voters in their area."
    level: [teenager, adult]
  - fact: "The Greater London Council and the six metropolitan county councils were abolished in 1986. London did not have a city-wide government again until the Greater London Authority was created in 2000."
    level: [teenager, adult, researcher]

key_dates:
  - year: 1972
    event: "The Local Government Act 1972 reorganises English local government"
    significance: "Established the modern two-tier framework of county and district councils in England and Wales, replacing a complex patchwork of arrangements dating from the nineteenth century. The new structure came into effect on 1 April 1974."
    levels: [adult, researcher]
  - year: 1986
    event: "The Greater London Council and metropolitan county councils are abolished"
    significance: "The Conservative government abolished the GLC and six metropolitan county councils, transferring their functions to London boroughs and metropolitan boroughs respectively. This left London without a city-wide strategic government until the creation of the Greater London Authority in 2000."
    levels: [teenager, adult, researcher]
  - year: 1993
    event: "Council tax replaces the community charge (poll tax)"
    significance: "Following widespread public opposition to the community charge, the government introduced council tax as a property-based alternative. Council tax has remained the principal local tax in England since its introduction, though its valuation bands have never been updated from their 1991 base."
    levels: [teenager, adult, researcher]
  - year: 2000
    event: "The Greater London Authority is established with a directly elected Mayor of London"
    significance: "The Greater London Authority Act 1999 created a new model of metropolitan governance, with a directly elected mayor and a 25-member London Assembly. The first Mayor of London, Ken Livingstone, took office in 2000. The London model influenced the development of elected mayors for combined authorities."
    levels: [teenager, adult, researcher]
  - year: 2016
    event: "The Cities and Local Government Devolution Act enables combined authorities with elected mayors"
    significance: "Provided the statutory framework for creating combined authorities led by directly elected mayors, enabling the negotiation of devolution deals that transfer powers from central government to groups of local authorities. This marked the most significant structural reform to English sub-national governance in decades."
    levels: [adult, researcher]

key_figures:
  - name: "Ken Livingstone"
    role: "First Mayor of London"
    description: "Ken Livingstone became the first directly elected Mayor of London in 2000, establishing the model of metropolitan mayoral governance that would later be extended through combined authorities. His introduction of the congestion charge for central London in 2003 demonstrated the potential for mayors to take bold policy decisions."
    levels: [teenager, adult, researcher]
  - name: "Andy Burnham"
    role: "Mayor of Greater Manchester"
    description: "Andy Burnham was elected as the first Mayor of Greater Manchester in 2017, heading the Greater Manchester Combined Authority. The Greater Manchester devolution deal served as the template for subsequent combined authority arrangements across England, and Burnham's high-profile leadership helped establish the metro mayor model in the public consciousness."
    levels: [teenager, adult, researcher]
  - name: "Michael Heseltine"
    role: "Deputy Prime Minister and advocate of local governance reform"
    description: "Michael Heseltine was a long-standing advocate of strengthening local and regional governance in England. His 2012 report 'No Stone Unturned' argued for significant decentralisation of economic powers to local areas and influenced the government's subsequent devolution deal programme. He also played a key role in urban regeneration initiatives during the 1980s and 1990s."
    levels: [adult, researcher]

