explanations:
  child:
    summary: "Local government is about the councils and mayors that look after your local area -- things like rubbish collection, schools, parks, and roads."
    body: |
      Have you ever wondered who makes sure the bins are collected, the roads are fixed, and your local park is looked after? That is the job of local government.

      In England, local government is run by councils. A council is a group of people who are elected by the people who live in the area. Just like Members of Parliament are voted for by the public, councillors are voted for too. They meet to make decisions about how their local area is run.

      There are different types of council. Some areas have two layers -- a county council that looks after the big things like roads and schools, and a district council that handles smaller things like rubbish collection and planning. Other areas have just one council, called a unitary authority, that does everything.

      Big cities sometimes have an elected mayor. A mayor is one person who leads the council and makes important decisions for the city. Cities like London, Manchester, and Birmingham all have elected mayors.

      Councils get their money from a few different places. One of the main ones is council tax, which is a payment made by people who own or rent a home. The government also gives councils money to help pay for services.

      Local government makes a big difference to everyday life. It is responsible for things you see and use every day, from the library to the street lights to the local swimming pool.
    reading_age: 8
  teenager:
    summary: "Local government in England consists of elected councils and mayors that deliver public services, manage local planning, and represent communities, funded through a combination of council tax, business rates, and central government grants."
    body: |
      Local government is the level of government closest to people's daily lives. While Parliament and the national government make decisions about big issues like defence and the economy, local councils handle the services and decisions that affect your neighbourhood directly.

      England has a complicated patchwork of local government structures. In some areas, there is a two-tier system with county councils and district councils. County councils cover a larger area and handle services like education, social care, roads, and libraries. District councils cover smaller areas within the county and deal with housing, rubbish collection, local planning, and leisure facilities. In other areas, unitary authorities combine both roles into a single council. Metropolitan boroughs serve major urban areas, while London has its own system with 32 London boroughs plus the City of London Corporation.

      Since 2014, the government has pursued a policy of creating combined authorities and devolution deals. A combined authority brings together several councils in a region to work on issues like transport, economic development, and housing. Many combined authorities are led by an elected mayor -- sometimes called a metro mayor. The Greater Manchester Combined Authority, led by its elected mayor, was one of the first examples, and similar arrangements have been established across England.

      At the most local level, parish and town councils operate in many rural and semi-rural areas. These are the smallest tier of local government and deal with issues like maintaining village greens, running community centres, and providing local grants.

      Local government is funded through several sources. Council tax is paid by residents and is based on the value of their property. Business rates are paid by commercial properties. Councils also receive grants from central government, though these have been significantly reduced since 2010. Many councils have faced financial pressures as a result, with some being forced to cut back on services.

      Local elections take place regularly, with councillors typically serving four-year terms. Voter turnout in local elections is usually much lower than in general elections, often around 30-35%, which raises questions about the democratic mandate of local representatives.
    reading_age: 14
  adult:
    summary: "Local government in England comprises a multi-layered system of elected councils, combined authorities, and elected mayors responsible for delivering public services, spatial planning, and community representation, operating within a framework of statutory powers conferred by central government."
    body: |
      Local government in England constitutes the primary mechanism through which public services are delivered at the community level, yet it operates without constitutional protection and is subject to the legislative authority of the UK Parliament. Unlike devolved institutions in Scotland, Wales, and Northern Ireland, English local authorities derive their powers entirely from statute and can be created, restructured, or abolished by central government.

      The structural landscape of English local government is characterised by considerable complexity and variation. The two-tier system, comprising county councils and district councils, operates in predominantly rural areas: county councils are responsible for strategic services including education, social care, highways, and waste disposal, while district councils handle housing, environmental health, local planning, and waste collection. Unitary authorities, which combine both tiers into a single body, exist in many urban and some rural areas. Metropolitan boroughs serve the major conurbations outside London. London's governance is distinct, with 32 London boroughs, the City of London Corporation, and the Greater London Authority headed by the directly elected Mayor of London -- a model established by the Greater London Authority Act 1999.

      The creation of combined authorities represents the most significant structural reform to English local government in recent decades. Enabled by the Cities and Local Government Devolution Act 2016, combined authorities bring together groups of councils to exercise functions across a wider area, typically covering transport, strategic planning, economic development, and skills. Most combined authorities are led by a directly elected mayor with specific devolved powers. The Greater Manchester Combined Authority, established in 2011 and led by an elected mayor from 2017, served as the template. By 2026, combined authorities with elected mayors cover a significant proportion of the English population, though the powers and budgets devolved to each vary considerably depending on the terms of their devolution deal with central government.

      Parish and town councils represent the most local tier of governance. There are approximately 10,000 parish councils in England, serving predominantly rural and semi-rural communities. They exercise limited functions -- maintaining open spaces, providing allotments, managing community facilities, and commenting on planning applications -- but play an important role in community representation. The power to create new parish councils rests with the principal authority for the area.

      Local government finance has been a persistent source of tension. Councils are funded through a combination of council tax (a property-based tax on domestic dwellings, introduced in 1993 to replace the community charge), retained business rates, fees and charges, and grants from central government. The proportion of local government funding derived from central grants has fallen significantly since the austerity programme initiated in 2010, placing increasing reliance on council tax and business rates. Several councils have issued Section 114 notices -- effectively declarations of financial unsustainability -- in recent years, including Northamptonshire (2018), Croydon (2020), Thurrock (2022), and Birmingham (2023).

      The democratic legitimacy of local government is shaped by electoral participation. Local elections in England use the first-past-the-post system, with councillors elected to represent individual wards. Turnout is typically between 30% and 40%, substantially lower than at general elections. The Local Government Act 2000 introduced the option of directly elected mayors for individual councils, though relatively few authorities adopted this model before the combined authority programme accelerated mayoral governance at the regional level.

      The relationship between central and local government in England has been characterised by scholars as one of significant centralisation relative to comparable democracies. Local authorities in England exercise only those powers conferred by statute -- a principle known as ultra vires -- and have historically had limited fiscal autonomy. The Localism Act 2011 introduced a general power of competence, enabling councils to do anything that an individual could lawfully do, but this power remains subject to statutory restrictions and does not extend to raising new taxes.
    reading_age: 18
  researcher:
    summary: "A scholarly analysis of English local government examining its constitutional status, structural evolution, fiscal architecture, democratic accountability, and the implications of the combined authority and devolution deal model for sub-national governance."
    body: |
      English local government occupies a distinctive and constitutionally precarious position within the UK's territorial governance framework. Unlike the devolved legislatures of Scotland, Wales, and Northern Ireland, which enjoy statutory protection and, in some cases, provisions against abolition without a referendum, English local authorities possess no constitutional entrenchment. Their existence, structure, powers, and funding are determined entirely by Acts of Parliament and secondary legislation, making them, in constitutional terms, creatures of statute subject to the sovereign will of the Westminster Parliament.

      The structural evolution of English local government reflects successive waves of central government reorganisation. The Local Government Act 1972 established the modern two-tier framework of county and district councils, replacing a patchwork of arrangements dating to the nineteenth century. The 1980s and 1990s saw the abolition of the metropolitan county councils (1986) and the Greater London Council (1986), followed by a partial move toward unitary authorities in the 1990s. The Greater London Authority Act 1999 created a unique governance model for the capital, with a directly elected Mayor and a 25-member London Assembly exercising scrutiny functions. The London model influenced subsequent reforms, particularly the development of combined authorities with elected mayors.

      The combined authority model, enabled by the Local Democracy, Economic Development and Construction Act 2009 and substantially expanded by the Cities and Local Government Devolution Act 2016, represents an attempt to create a framework for sub-national governance in England that mirrors, in limited respects, the devolution settlements elsewhere in the UK. Combined authorities bring together constituent councils to exercise joint functions, typically including transport, strategic planning, economic development, adult education, and housing. Where a combined authority has an elected mayor, additional powers may be devolved through bespoke devolution deals negotiated bilaterally between the combined authority and central government.

      The devolution deal model has attracted both support and criticism. Supporters argue that it enables tailored arrangements that reflect the specific needs and opportunities of different regions, and that elected mayors provide visible, accountable leadership. Critics point to the opacity and inconsistency of the negotiation process, the limited fiscal powers actually devolved (most combined authority mayors control only a fraction of public spending in their area), and the lack of a clear statutory framework governing the distribution of powers. Sandford (2020) has argued that the deal-based approach produces an "ad hoc and asymmetric" landscape that lacks coherent constitutional underpinning. The absence of a statutory framework for English devolution comparable to the Scotland Act or Wales Act means that combined authority powers can be expanded or constrained at ministerial discretion.

      Parish and town councils, numbering approximately 10,000 in England, constitute the most local tier of democratic governance. Their functions are modest -- maintaining open spaces, managing community halls, providing allotments, and acting as a statutory consultee on planning applications -- but they serve an important representational function in rural and semi-rural communities. The National Association of Local Councils has advocated for enhanced powers and funding, while academic research (Pearce and Ellwood, 2002) has highlighted the democratic deficit created by the absence of parish-level governance in many urban areas.

      The fiscal architecture of English local government is a defining feature of its constitutional character. The ultra vires doctrine historically confined councils to activities specifically authorised by statute, though the Localism Act 2011's general power of competence partially liberalised this constraint. Fiscal autonomy remains severely limited: council tax, the principal local tax, generates only a minority share of local authority revenue, and its base, rate-setting discretion, and collection are all subject to central government controls including referendum requirements for excessive increases. Business rates have been partially localised since the Local Government Finance Act 2012, with authorities retaining a proportion of locally collected rates, but the system is complex and subject to periodic resets. Central government grants, which once constituted the majority of local funding, have been substantially reduced since the austerity programme initiated in 2010, with the Institute for Fiscal Studies estimating a real-terms reduction of approximately 40% in central government funding to English local authorities between 2009-10 and 2019-20.

      The financial pressures on local government have manifested in a series of institutional crises. Section 114 notices -- issued under the Local Government Finance Act 1988 when a council's chief financial officer determines that expenditure will exceed available resources -- have been issued by several authorities, including Northamptonshire County Council (2018), the London Borough of Croydon (2020), Slough Borough Council (2021), Thurrock Council (2022), and Birmingham City Council (2023). These cases have raised fundamental questions about the sustainability of the current funding model, the adequacy of central government oversight, and the capacity of local government to meet its statutory obligations.

      The democratic accountability of local government is complicated by low electoral participation. Turnout in English local elections typically ranges between 30% and 40%, compared with 60-70% at general elections. The first-past-the-post electoral system, combined with the ward-based election of councillors, can produce councils whose political composition does not proportionally reflect local voting patterns. The introduction of directly elected mayors -- both for individual authorities (Local Government Act 2000) and for combined authorities -- was intended to enhance democratic visibility and accountability, though the evidence on whether mayoral governance increases public engagement with local democracy is mixed.

      The central-local relationship in England has been the subject of extensive scholarly analysis, with most commentators characterising the UK as one of the most centralised states in the developed world. Loughlin (1996) identified a fundamental asymmetry: central government possesses both the legal authority and the fiscal leverage to determine the parameters within which local government operates. The Layfield Committee (1976) recommended a clear allocation of financial responsibility between central and local government, but its recommendations were not implemented. Subsequent reform initiatives, from the Localism Act 2011 to the Levelling Up and Regeneration Act 2023, have sought to recalibrate this relationship, but the structural centralisation of the English system remains largely intact.
