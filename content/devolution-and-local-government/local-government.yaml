quizzes:
  child:
    - question: "What is a council responsible for?"
      type: multiple_choice
      options:
        - "Looking after local things like schools, parks, roads, and rubbish collection"
        - "Deciding whether the country goes to war"
        - "Choosing who becomes King or Queen"
      correct_answer: "Looking after local things like schools, parks, roads, and rubbish collection"
      explanation: "Councils look after the services that you see and use in your local area every day. The big national decisions are made by the UK Parliament and the government."
    - question: "True or false: Everyone in England has the same type of council."
      type: true_false
      correct_answer: "False"
      explanation: "England has different types of councils. Some areas have two layers (a county council and a district council), while others have a single unitary authority that does everything. Big cities may also have an elected mayor."
    - question: "What is council tax?"
      type: multiple_choice
      options:
        - "A payment homeowners and renters make to help pay for local services"
        - "A tax on sweets and fizzy drinks"
        - "A fee for visiting your local library"
      correct_answer: "A payment homeowners and renters make to help pay for local services"
      explanation: "Council tax is one of the main ways councils get money to pay for services like schools, bin collection, and parks. The amount depends on the value of your home."
  teenager:
    - question: "What is a combined authority, and how does it differ from a traditional local council?"
      type: short_answer
      correct_answer: "A combined authority is a group of councils that have joined together to exercise joint functions across a wider area, often led by an elected mayor. Unlike a single council, it covers a larger region and focuses on strategic issues like transport and economic development."
      explanation: "Combined authorities were created to address the fact that many challenges -- transport networks, housing markets, economic development -- do not respect council boundaries. By working together, councils can tackle these issues at a more appropriate scale."
    - question: "What is the difference between a county council and a district council?"
      type: multiple_choice
      options:
        - "County councils handle strategic services like education and roads; district councils handle local services like housing and rubbish collection"
        - "County councils are more powerful than district councils"
        - "District councils cover larger areas than county councils"
        - "There is no difference; they are the same thing"
      correct_answer: "County councils handle strategic services like education and roads; district councils handle local services like housing and rubbish collection"
      explanation: "In the two-tier system, county councils and district councils divide local government functions between them. County councils cover a larger area and handle strategic services, while district councils serve smaller areas within the county and deal with more local matters."
    - question: "True or false: The Mayor of London and a metro mayor of a combined authority have exactly the same powers."
      type: true_false
      correct_answer: "False"
      explanation: "While both are directly elected, their powers differ. The Mayor of London operates under the Greater London Authority Act 1999 with specific powers over transport, policing, and strategic planning. Combined authority mayors have powers set out in their individual devolution deals, which vary from one authority to another."
  adult:
    - question: "What is a Section 114 notice, and what does it signify about the financial health of a local authority?"
      type: short_answer
      correct_answer: "A Section 114 notice is issued by a council's chief financial officer under the Local Government Finance Act 1988 when expenditure is likely to exceed available resources. It effectively means the council cannot balance its budget and must take emergency action to reduce spending."
      explanation: "Section 114 notices have become a barometer of local government financial distress. The issuing of notices by several councils in recent years -- including Northamptonshire, Croydon, Thurrock, and Birmingham -- has raised fundamental questions about the sustainability of local government funding and the impact of reductions in central government grants."
    - question: "How has the balance of local government funding shifted since 2010, and what are the implications?"
      type: short_answer
      correct_answer: "Central government grants have been significantly reduced since 2010, with the IFS estimating a real-terms cut of approximately 40%. This has increased councils' reliance on council tax and business rates, reduced their capacity to deliver services, and contributed to financial crises in several authorities."
      explanation: "The shift in local government funding reflects the broader austerity programme and has had uneven effects. Councils in more deprived areas, which historically relied more heavily on central grants, have been disproportionately affected. The resulting service reductions have raised concerns about the equitable provision of public services across England."
    - question: "What is the general power of competence introduced by the Localism Act 2011, and how does it differ from the previous ultra vires framework?"
      type: multiple_choice
      options:
        - "It allows councils to do anything a private individual could lawfully do, rather than being restricted to specifically authorised activities"
        - "It gives councils the power to override national laws"
        - "It enables councils to raise any taxes they choose"
        - "It allows councils to merge with neighbouring authorities without central government approval"
      correct_answer: "It allows councils to do anything a private individual could lawfully do, rather than being restricted to specifically authorised activities"
      explanation: "The general power of competence represented a significant liberalisation of local authority legal capacity. Under the previous ultra vires doctrine, councils could only exercise powers specifically conferred by statute. The general power of competence reversed this presumption, though it remains subject to statutory restrictions and does not extend to fiscal autonomy."
  researcher:
    - question: "Critically evaluate the devolution deal model as a framework for English sub-national governance. Does the bilateral, bespoke approach produce effective and accountable governance, or does it create an ad hoc system lacking constitutional coherence?"
      type: essay
      correct_answer: "The devolution deal model offers flexibility and allows tailored arrangements, but its bilateral, non-statutory character creates an asymmetric and opaque system. The absence of a clear legislative framework means that powers are devolved at ministerial discretion, with limited parliamentary scrutiny. Accountability is complicated by overlapping jurisdictions between combined authorities and constituent councils. A more systematic approach, comparable to the statutory frameworks governing Scottish and Welsh devolution, would provide greater transparency and consistency."
      explanation: "This question engages with a fundamental tension in English governance: the desire for locally tailored solutions versus the need for constitutional clarity and democratic accountability. Sandford and others have argued that the deal-based model produces a patchwork that is difficult for citizens to navigate and that lacks the institutional stability of statutory devolution. The counter-argument is that England's diversity makes a one-size-fits-all model impractical."
    - question: "Assess the relationship between fiscal centralisation and democratic accountability in English local government. To what extent does the current funding model undermine the democratic purpose of local elections?"
      type: essay
      correct_answer: "The high degree of fiscal centralisation in England means that local authorities have limited control over their revenue, with most funding determined by central government decisions. This weakens the link between local taxation, spending, and democratic accountability: voters cannot easily hold councils responsible for outcomes when councils have limited fiscal autonomy. Low turnout in local elections both reflects and reinforces this problem."
      explanation: "The fiscal centralisation thesis draws on a substantial body of comparative research demonstrating that the UK is an outlier among developed democracies in the degree of central control over local finances. The Layfield Committee (1976) identified this as a fundamental problem and recommended clearer fiscal responsibility, but its recommendations were not implemented. The result is a system where local elections provide a democratic mandate but limited fiscal control, undermining both accountability and citizen engagement."
