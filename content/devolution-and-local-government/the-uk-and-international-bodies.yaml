key_dates:
    - year: 1945
      event: 'The United Nations is founded'
      significance: 'Established in the aftermath of the Second World War, the UN was created to maintain international peace and security. The UK became one of five permanent members of the Security Council, a position it has held ever since.'
      levels: [child, teenager, adult, researcher]
    - year: 1949
      event: 'NATO is established by the North Atlantic Treaty'
      significance: 'The North Atlantic Treaty Organisation was founded as a collective defence alliance in response to the growing threat from the Soviet Union. The UK was a founding member, and NATO has remained the cornerstone of UK defence policy.'
      levels: [teenager, adult, researcher]
    - year: 1950
      event: 'The European Convention on Human Rights is signed'
      significance: 'Drafted under the auspices of the Council of Europe, the ECHR established a framework of fundamental rights enforceable through the European Court of Human Rights. The UK was among the original signatories and the Convention was later incorporated into UK domestic law by the Human Rights Act 1998.'
      levels: [teenager, adult, researcher]
    - year: 2020
      event: 'The UK formally leaves the European Union'
      significance: "Following the 2016 referendum, the UK's withdrawal from the EU was completed on 31 January 2020. The transition period ended on 31 December 2020, and the post-Brexit relationship was governed by the Trade and Cooperation Agreement from 1 January 2021."
      levels: [child, teenager, adult, researcher]
    - year: 2010
      event: 'The Constitutional Reform and Governance Act introduces parliamentary scrutiny of treaties'
      significance: 'The CRaG Act placed the parliamentary scrutiny of treaties on a statutory footing for the first time, requiring the government to lay treaties before Parliament for 21 sitting days before ratification. This replaced the informal Ponsonby Rule that had operated since 1924.'
      levels: [adult, researcher]

key_figures:
    - name: 'Sir David Maxwell Fyfe'
      role: 'British lawyer and politician'
      description: "Sir David Maxwell Fyfe (1900-1967) chaired the legal committee of the Council of Europe's Consultative Assembly and played a leading role in drafting the European Convention on Human Rights in 1950. His involvement demonstrates the significant British contribution to the post-war European human rights framework."
      levels: [adult, researcher]
    - name: 'Lord Ponsonby of Shulbrede'
      role: 'Parliamentary Under-Secretary of State for Foreign Affairs'
      description: 'Arthur Ponsonby (1871-1946) established the Ponsonby Rule in 1924, an informal convention requiring the government to lay treaties before Parliament for 21 days before ratification. This convention, though non-binding, established the principle of parliamentary scrutiny of treaties and was later given statutory force by the CRaG Act 2010.'
      levels: [researcher]
    - name: 'Lord Ismay'
      role: 'First Secretary General of NATO'
      description: "Hastings Ismay (1887-1965) served as the first Secretary General of NATO from 1952 to 1957. A British military officer and diplomat, he is often credited with describing NATO's purpose as being 'to keep the Soviet Union out, the Americans in, and the Germans down,' a phrase that captured the alliance's Cold War rationale."
      levels: [teenager, adult, researcher]

