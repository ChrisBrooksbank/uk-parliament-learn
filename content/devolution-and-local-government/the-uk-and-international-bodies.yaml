glossary:
    - term: 'Treaty'
      definition_simple: 'A formal agreement between countries, setting out rules they agree to follow on things like trade, defence, or human rights.'
      definition_full: "A binding agreement under international law between two or more states (or between states and international organisations). In the UK's dualist legal system, treaties do not automatically become part of domestic law; they require implementing legislation to create rights and obligations enforceable in UK courts. The negotiation and ratification of treaties is a prerogative power exercised by the Crown, subject to parliamentary scrutiny under the Constitutional Reform and Governance Act 2010."
    - term: 'Council of Europe'
      definition_simple: 'An international organisation of 46 countries that works to protect human rights, democracy, and the rule of law in Europe. It is separate from the European Union.'
      definition_full: 'An intergovernmental organisation founded in 1949, comprising 46 member states, with a mandate to uphold human rights, democracy, and the rule of law. The Council of Europe oversees the European Convention on Human Rights and the European Court of Human Rights. It is distinct from the European Union: membership is broader, and its focus is on human rights and legal standards rather than economic integration.'
    - term: 'NATO'
      definition_simple: 'The North Atlantic Treaty Organisation -- a group of countries that have agreed to defend each other if any member is attacked.'
      definition_full: 'The North Atlantic Treaty Organisation, a military alliance established by the North Atlantic Treaty of 1949. Its core principle is collective defence under Article 5: an armed attack against one member is considered an attack against all. NATO has 32 member states (following the accession of Finland in 2023 and Sweden in 2024) and provides the framework for collective defence planning, joint military exercises, and crisis management operations.'
    - term: 'Commonwealth'
      definition_simple: 'A group of 56 countries, mostly with historical ties to the British Empire, that choose to work together on things like trade, education, and human rights.'
      definition_full: 'A voluntary association of 56 sovereign states, the majority of which have historical connections to the British Empire. The Commonwealth promotes democracy, human rights, good governance, and sustainable development through the Harare Declaration principles (1991, updated at Kigali 2022). It operates by consensus and has no binding authority over members, though membership can be suspended for serious violations of core principles. The monarch of the United Kingdom serves as the Head of the Commonwealth.'
    - term: 'Trade and Cooperation Agreement'
      definition_simple: 'The agreement between the UK and the European Union that sets the rules for trade, travel, and other matters after Brexit.'
      definition_full: 'The Trade and Cooperation Agreement (TCA) between the United Kingdom and the European Union, provisionally applied from 1 January 2021 and formally ratified in April 2021. The TCA establishes zero-tariff, zero-quota trade in goods (subject to rules of origin), provisions on services trade, fisheries access, law enforcement cooperation, and level playing field commitments. It is governed by a Partnership Council and includes dispute resolution mechanisms with binding arbitration.'
    - term: 'CRaG Act'
      definition_simple: 'A law that gives Parliament the chance to look at and raise objections to treaties before the government officially agrees to them.'
      definition_full: 'The Constitutional Reform and Governance Act 2010 (CRaG), Part 2 of which established a statutory framework for parliamentary scrutiny of treaties. Under CRaG, the government must lay a treaty before Parliament for 21 sitting days before ratification. If the House of Commons resolves against ratification, the government cannot proceed for a further 21 sitting days, and this cycle can be repeated. The House of Lords may debate but cannot block ratification. The Act replaced the informal Ponsonby Rule that had operated since 1924.'

