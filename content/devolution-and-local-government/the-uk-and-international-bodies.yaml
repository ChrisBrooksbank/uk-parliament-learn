quizzes:
    child:
        - question: 'What is NATO?'
          type: multiple_choice
          options:
              - 'A group of countries that have agreed to defend each other'
              - 'A type of government'
              - 'A country in Europe'
          correct_answer: 'A group of countries that have agreed to defend each other'
          explanation: 'NATO stands for the North Atlantic Treaty Organisation. Its members have agreed that if one of them is attacked, the others will help to defend it. The UK is a founding member of NATO.'
        - question: 'True or false: The UK is still a member of the European Union.'
          type: true_false
          correct_answer: 'False'
          explanation: 'The UK left the European Union on 31 January 2020. This is often called Brexit. The UK and the EU now have a special agreement called the Trade and Cooperation Agreement that sets the rules for how they trade and work together.'
        - question: 'What is the Commonwealth?'
          type: multiple_choice
          options:
              - 'A group of 56 countries that choose to work together on things like trade and education'
              - 'A European country'
              - 'The name of the UK Parliament'
          correct_answer: 'A group of 56 countries that choose to work together on things like trade and education'
          explanation: 'The Commonwealth is a voluntary group of 56 countries, many of which have historical ties to Britain. They work together on trade, education, human rights, and other areas, and they hold the Commonwealth Games every four years.'
    teenager:
        - question: 'What is the CRaG Act, and why is it important?'
          type: short_answer
          correct_answer: "The Constitutional Reform and Governance Act 2010 requires the government to lay treaties before Parliament for 21 sitting days before ratification, giving MPs the opportunity to raise objections. It is important because it gives Parliament a formal role in scrutinising the UK's international commitments."
          explanation: 'Before the CRaG Act, parliamentary scrutiny of treaties relied on an informal convention (the Ponsonby Rule). The CRaG Act gave this process a statutory basis, though critics argue that it still does not give Parliament enough power, since Parliament cannot amend treaties and there is no guarantee of a debate.'
        - question: 'What is the difference between the Council of Europe and the European Union?'
          type: multiple_choice
          options:
              - 'The Council of Europe focuses on human rights and has 46 members; the EU focuses on economic integration and has 27 members'
              - 'They are the same organisation'
              - 'The Council of Europe is part of the EU'
              - 'The EU focuses on human rights and the Council of Europe focuses on trade'
          correct_answer: 'The Council of Europe focuses on human rights and has 46 members; the EU focuses on economic integration and has 27 members'
          explanation: 'The Council of Europe and the European Union are completely separate organisations. The Council of Europe was founded in 1949 and focuses on human rights, democracy, and the rule of law. The UK left the EU in 2020 but remains a member of the Council of Europe.'
        - question: 'What does Article 5 of the North Atlantic Treaty say?'
          type: multiple_choice
          options:
              - 'That an attack on one NATO member is considered an attack on all members'
              - 'That NATO members must spend 5% of GDP on defence'
              - 'That NATO members cannot trade with non-NATO countries'
          correct_answer: 'That an attack on one NATO member is considered an attack on all members'
          explanation: 'Article 5 is the collective defence clause at the heart of NATO. It means that if one member state is attacked, all the other members will come to its defence. This principle of mutual protection has been the foundation of Western collective security since 1949.'
    adult:
        - question: "How does the Trade and Cooperation Agreement differ from the UK's previous relationship with the EU as a member state?"
          type: short_answer
          correct_answer: 'The TCA provides zero-tariff, zero-quota trade in goods (subject to rules of origin) but does not replicate single market access. Services trade is more limited (no passporting), the UK is no longer subject to EU law or the Court of Justice, and level playing field provisions replace direct regulatory harmonisation.'
          explanation: 'The TCA represents a significantly thinner form of economic integration than EU membership. The loss of passporting rights for financial services, the introduction of customs procedures and rules of origin requirements, and the end of free movement of people have all had substantial practical implications for businesses and individuals.'
        - question: 'What are the main criticisms of the CRaG Act as a mechanism for parliamentary scrutiny of treaties?'
          type: short_answer
          correct_answer: 'Critics argue that Parliament cannot amend treaties, there is no guarantee of a debate or vote, the 21-day period is too short for complex agreements, the House of Lords can only express disapproval without blocking ratification, and the procedure does not cover political commitments or memoranda of understanding.'
          explanation: "The CRaG Act was designed to formalise parliamentary scrutiny without fundamentally altering the executive's treaty-making prerogative. In the post-Brexit context, where the UK negotiates its own trade agreements, the limitations of the CRaG procedure have been more acutely felt, as trade agreements can have significant implications for domestic regulation, consumer standards, and economic policy."
        - question: "Why is the UK's permanent seat on the UN Security Council considered significant?"
          type: multiple_choice
          options:
              - 'It gives the UK veto power over Security Council resolutions, providing outsized influence over international peace and security'
              - 'It requires the UK to contribute the largest share of the UN budget'
              - 'It gives the UK control over UN peacekeeping forces'
              - 'It allows the UK to appoint the UN Secretary-General'
          correct_answer: 'It gives the UK veto power over Security Council resolutions, providing outsized influence over international peace and security'
          explanation: 'Permanent membership of the Security Council, held by five states since 1945, confers the power to veto any substantive resolution. This gives the UK -- along with the US, France, Russia, and China -- a degree of influence over international affairs that is disproportionate to its population or economic size. The legitimacy and composition of the permanent membership has been widely debated.'
    researcher:
        - question: "Assess the adequacy of the CRaG Act 2010 as a constitutional mechanism for democratic oversight of the UK's treaty-making activity, particularly in the post-Brexit context. What reforms might strengthen parliamentary scrutiny without unduly constraining executive flexibility?"
          type: essay
          correct_answer: 'The CRaG Act provides a minimal framework that falls short of meaningful democratic oversight. Its limitations -- no amendment power, no guaranteed debate, short scrutiny period, and limited Lords role -- are particularly problematic in the post-Brexit context where the UK negotiates complex trade agreements independently. Reforms could include mandatory debates on significant treaties, enhanced committee scrutiny powers, earlier parliamentary engagement in negotiations, and statutory requirements for impact assessments.'
          explanation: "This question engages with the broader constitutional question of how treaty-making power should be distributed between the executive and legislature. Comparative analysis with other Westminster systems (Australia's Joint Standing Committee on Treaties) and with the US Senate's advice and consent role provides useful benchmarks. The tension between democratic accountability and negotiating confidentiality is real but need not be resolved entirely in favour of executive discretion."
        - question: "Evaluate the UK's post-Brexit institutional position in the international order. To what extent has departure from the EU enhanced or diminished the UK's capacity to influence international norms and governance?"
          type: essay
          correct_answer: "EU departure has given the UK greater formal autonomy in trade, regulation, and foreign policy, but has diminished its influence within the EU's substantial regulatory and diplomatic apparatus. The UK retains significant structural advantages (P5 membership, NATO, Commonwealth, G7) but has lost the amplification effect of acting through the EU bloc on trade, climate, and regulatory matters. The net impact depends on whether the UK can leverage its bilateral relationships and multilateral memberships to compensate for the loss of EU-mediated influence."
          explanation: "This question requires engagement with the extensive literature on middle power diplomacy, regulatory influence, and the concept of 'normative power Europe.' The UK's post-Brexit strategy of emphasising bilateral trade agreements and 'Global Britain' positioning must be assessed against the reality that many areas of international governance -- from climate change to digital regulation -- are increasingly shaped by large blocs (the EU, US, China) rather than individual middle powers."
        - question: "Analyse the constitutional and political significance of the UK's membership of the Council of Europe and the ECHR framework. What are the implications of proposals to withdraw from the ECHR or replace the Human Rights Act?"
          type: essay
          correct_answer: 'ECHR membership and the Human Rights Act together create a multilayered rights protection framework that integrates international obligations with domestic law. Withdrawal from the ECHR would be constitutionally unprecedented for a major Western democracy, would remove individual petition rights to Strasbourg, and could trigger political consequences including potential exclusion from the Council of Europe. Replacing the HRA with a domestic Bill of Rights could preserve ECHR membership while altering the domestic judicial application of Convention rights, but the practical and symbolic implications depend on the specific terms of any replacement.'
          explanation: "This question requires careful distinction between the institutional framework (Council of Europe, ECHR, Strasbourg Court) and the domestic legislation (HRA). Withdrawal from the ECHR would have implications not only for human rights protection but also for the Belfast/Good Friday Agreement (which references the ECHR), the UK's international reputation, and the stability of the Council of Europe system. Scholarly analysis by Ewing and Tham, among others, provides important perspectives on the constitutional implications."
