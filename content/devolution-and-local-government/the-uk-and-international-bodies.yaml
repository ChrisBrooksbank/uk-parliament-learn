explanations:
    child:
        summary: 'The UK works with other countries through international organisations to help keep peace, protect rights, and trade with one another.'
        body: |
            Countries do not just work on their own. They work together with other countries to solve problems, keep the peace, and help each other. The United Kingdom is part of several important international organisations.

            One of the most well-known is the United Nations, or UN. The UN was set up after the Second World War to try to stop wars from happening again. Almost every country in the world is a member. The UK is one of five permanent members of the UN Security Council, which is the part of the UN that deals with keeping peace and security around the world.

            The UK is also a member of NATO, which stands for the North Atlantic Treaty Organisation. NATO is a group of countries that have agreed to protect each other. If one NATO country is attacked, the others will help defend it.

            The Commonwealth is a group of 56 countries, many of which were once part of the British Empire. These countries choose to work together on things like trade, education, and sport. The Commonwealth Games, held every four years, bring athletes from these countries together.

            The UK used to be a member of the European Union, but it left in 2020. This is often called Brexit. Even though the UK is no longer in the EU, it still has agreements with the EU about trade and other matters.

            The UK is also part of the Council of Europe, which is a separate organisation from the EU. The Council of Europe focuses on protecting human rights across its 46 member countries.

            By working with other countries, the UK can tackle problems that are too big for any one country to solve alone, like climate change, terrorism, and poverty.
        reading_age: 8
    teenager:
        summary: 'The UK participates in a range of international organisations -- including the United Nations, NATO, the Commonwealth, the Council of Europe, and the G7 -- and maintains a post-Brexit trade relationship with the EU through the Trade and Cooperation Agreement.'
        body: |
            The United Kingdom's place in the world is shaped by its membership of several major international organisations and its relationships with other countries through treaties and agreements. These memberships and relationships affect everything from trade and defence to human rights and the environment.

            The United Nations (UN) was founded in 1945 to maintain international peace and security. The UK is one of five permanent members of the UN Security Council, alongside the United States, France, Russia, and China. Permanent members have the power to veto -- block -- any Security Council resolution, giving them significant influence over international affairs.

            NATO (the North Atlantic Treaty Organisation) is a military alliance formed in 1949. Its core principle is collective defence: an attack on one member is treated as an attack on all members, under Article 5 of the North Atlantic Treaty. The UK is a founding member and one of NATO's largest contributors in terms of military spending and capability.

            The Commonwealth of Nations is a voluntary association of 56 countries, most of which have historical ties to the British Empire. It promotes democracy, human rights, and economic development. While it has no binding authority over its members, it provides a forum for cooperation and dialogue.

            The Council of Europe, founded in 1949, is a separate organisation from the European Union. Its primary purpose is to uphold human rights, democracy, and the rule of law across its 46 member states. The Council of Europe oversees the European Convention on Human Rights (ECHR) and the European Court of Human Rights, which hears cases brought by individuals who believe their Convention rights have been violated.

            The UK left the European Union on 31 January 2020, following the 2016 referendum. The post-Brexit relationship is governed by the Trade and Cooperation Agreement (TCA), which came into effect on 1 January 2021. The TCA covers trade in goods and services, fisheries, law enforcement, and other areas, but it does not replicate the full single market access that the UK had as an EU member. The UK is no longer subject to EU law or the jurisdiction of the Court of Justice of the European Union.

            The UK is also a member of the G7 (a group of seven major advanced economies) and the G20 (a broader group of twenty major economies), which hold annual summits to discuss global economic policy, climate change, and other international issues.

            When the UK enters into international treaties, Parliament has a role in scrutinising them. The Constitutional Reform and Governance Act 2010 (CRaG Act) requires the government to lay treaties before Parliament for 21 sitting days before ratification, giving MPs the opportunity to raise objections.
        reading_age: 14
    adult:
        summary: "The UK's international engagement encompasses membership of the United Nations, NATO, the Commonwealth, and the Council of Europe, a post-Brexit relationship with the EU governed by the Trade and Cooperation Agreement, and parliamentary scrutiny of treaty-making under the Constitutional Reform and Governance Act 2010."
        body: |
            The United Kingdom's role in the international order is defined by its membership of multilateral organisations, its bilateral relationships, and the constitutional framework through which international commitments are made and scrutinised. As a permanent member of the UN Security Council, a nuclear-armed NATO ally, and a leading member of the Commonwealth, the UK occupies a position of significant international influence, though the nature and extent of that influence have been reshaped by its departure from the European Union.

            The United Nations remains the centrepiece of the rules-based international order. The UK's permanent seat on the Security Council, held since the UN's founding in 1945, confers veto power over substantive resolutions, placing the UK among the five states with the greatest formal influence over international peace and security. The UK also contributes to UN peacekeeping operations, development programmes, and specialised agencies, and is a signatory to numerous UN conventions covering human rights, the law of the sea, and climate change.

            NATO, established by the North Atlantic Treaty of 1949, provides the framework for the UK's collective defence commitments. Article 5 of the Treaty -- the collective defence clause -- has been invoked only once, following the 11 September 2001 attacks on the United States. The UK is one of a small number of NATO members that meet the alliance's guideline of spending at least 2% of GDP on defence. NATO's strategic significance has been reinforced by the security challenges arising from Russia's invasion of Ukraine in 2022, which prompted renewed emphasis on collective defence and led to the accession of Finland and Sweden as new members.

            The Commonwealth of Nations, comprising 56 member states with a combined population of approximately 2.5 billion people, is a voluntary association that promotes democracy, good governance, human rights, and economic development. The Commonwealth operates through consensus and has no binding authority over its members. It provides a platform for diplomatic engagement between developed and developing nations, and its significance is partly symbolic and partly practical, with programmes in areas such as trade facilitation, education, and technical assistance. The monarch of the United Kingdom serves as the Head of the Commonwealth, a role that is not hereditary and was confirmed for King Charles III at the 2018 Commonwealth Heads of Government Meeting.

            The Council of Europe, founded in 1949, is a distinct institution from the European Union with a specific mandate to uphold human rights, democracy, and the rule of law. Its 46 member states are parties to the European Convention on Human Rights (ECHR), which establishes a catalogue of fundamental rights enforceable through the European Court of Human Rights in Strasbourg. The UK was among the original signatories of the ECHR and played a significant role in its drafting. The relationship between the ECHR, the Human Rights Act 1998, and UK domestic law is a subject of ongoing political and legal debate, with periodic proposals to reform or replace the Human Rights Act.

            The UK's departure from the European Union -- formalised on 31 January 2020 following the 2016 referendum -- represented the most significant change to the UK's international position in the post-war period. The post-Brexit relationship is governed by the Trade and Cooperation Agreement (TCA), provisionally applied from 1 January 2021 and formally ratified in April 2021. The TCA establishes zero-tariff, zero-quota trade in goods (subject to rules of origin requirements), provisions on services trade (though without the passport rights enjoyed under EU membership), arrangements for fisheries access, cooperation on law enforcement and judicial cooperation in criminal matters, and provisions on the level playing field (ensuring that neither party gains a competitive advantage through lowering environmental, labour, or subsidy standards). The TCA is overseen by a Partnership Council and various specialised committees. Notably, it does not cover foreign policy, defence, or security cooperation, which are addressed through separate bilateral arrangements.

            The UK also participates in the G7 (alongside Canada, France, Germany, Italy, Japan, and the United States, plus the EU) and the G20 (a broader forum including major emerging economies such as China, India, and Brazil). These forums coordinate on macroeconomic policy, financial regulation, climate change, and global health.

            The constitutional framework for the UK's international commitments centres on the treaty-making power. Under the UK constitution, the power to negotiate and ratify treaties is a prerogative power exercised by the Crown (in practice, by government ministers) and does not, in general, require prior parliamentary approval. However, the Constitutional Reform and Governance Act 2010 (CRaG Act) introduced a statutory scrutiny mechanism: the government must lay a treaty before Parliament for 21 sitting days before ratification. If the House of Commons resolves against ratification, the government cannot ratify the treaty for a further 21 sitting days, and this process can be repeated indefinitely. The House of Lords can express disapproval but cannot block ratification. Critics have argued that the CRaG procedure provides insufficient scrutiny, particularly for major trade agreements, as Parliament can only approve or reject a treaty but cannot amend it, and the process does not guarantee a debate or vote.
        reading_age: 18
    researcher:
        summary: "A scholarly analysis of the UK's participation in international organisations and treaty frameworks, examining the constitutional, strategic, and political dimensions of the UK's multilateral engagements, post-Brexit EU relationship, and parliamentary scrutiny of international commitments."
        body: |
            The United Kingdom's international posture is shaped by a distinctive combination of permanent UN Security Council membership, NATO alliance commitments, Commonwealth leadership, post-Brexit EU engagement, and a constitutional framework for treaty-making that balances executive prerogative with parliamentary scrutiny. The interaction between these multilateral commitments and domestic constitutional principles -- particularly parliamentary sovereignty and the dualist approach to international law -- creates a complex governance landscape.

            The UK's permanent membership of the UN Security Council, acquired at the organisation's founding in 1945, reflects the post-war settlement and continues to confer significant formal influence over international peace and security. The veto power, shared with the United States, France, Russia, and China, gives each permanent member the capacity to block substantive resolutions, a prerogative that has been exercised with varying frequency and has been the subject of sustained criticism and reform proposals. The UK has generally supported a rules-based international order and has been an advocate for UN reform, including expansion of the Security Council, though concrete progress has been limited by the structural difficulty of amending the UN Charter (which itself requires the consent of all five permanent members). The UK is also party to the core UN human rights instruments, including the International Covenants on Civil and Political Rights and on Economic, Social and Cultural Rights, and participates in the Universal Periodic Review process.

            NATO's significance to UK security policy has been consistently affirmed across governments. The North Atlantic Treaty's Article 5 collective defence commitment provides the cornerstone of UK defence planning, and the UK's nuclear deterrent (the Trident submarine-launched ballistic missile system) is assigned to NATO. The alliance's post-Cold War evolution -- from territorial defence to expeditionary operations (the Balkans, Afghanistan, Libya) and back to territorial defence following Russia's annexation of Crimea in 2014 and full-scale invasion of Ukraine in 2022 -- has required continuous adaptation. The UK has maintained defence spending at or above the NATO guideline of 2% of GDP and has been among the most active contributors to NATO operations and the Enhanced Forward Presence in the Baltic states and Poland.

            The Commonwealth of Nations presents a distinctive model of multilateral association, combining symbolic and historical significance with practical cooperation. Comprising 56 member states spanning six continents, the Commonwealth operates by consensus through the Harare Declaration principles (1991, updated at Kigali in 2022), which commit members to democracy, human rights, good governance, and the rule of law. The Commonwealth's enforcement mechanisms are limited: membership can be suspended (as in the cases of Nigeria, Pakistan, Zimbabwe, and Fiji) but the organisation lacks binding authority. The Commonwealth's relevance in the post-Brexit era has been the subject of debate, with the UK government positioning it as a vehicle for trade and diplomatic engagement, while critics note the asymmetries of power and historical legacy that complicate the association.

            The Council of Europe and its associated European Convention on Human Rights (ECHR) framework occupy a unique position in the UK's international commitments. The ECHR was drafted in 1950 with significant British involvement -- notably that of Sir David Maxwell Fyfe, who chaired the legal committee of the Council of Europe's Consultative Assembly. The Convention established a catalogue of fundamental rights enforceable through individual petition to the European Court of Human Rights in Strasbourg. The UK incorporated the Convention into domestic law through the Human Rights Act 1998, enabling individuals to bring Convention rights claims in UK courts. The relationship between the UK, the ECHR, and the Strasbourg Court has been periodically contested: debates about the margin of appreciation, prisoner voting rights (Hirst v United Kingdom (No. 2) [2005] ECHR 681), and proposals to replace the Human Rights Act with a British Bill of Rights have highlighted the tension between international human rights obligations and domestic political preferences.

            The UK's post-Brexit relationship with the European Union is governed primarily by two instruments: the Withdrawal Agreement (including the Protocol on Ireland/Northern Ireland, subsequently modified by the Windsor Framework of 2023) and the Trade and Cooperation Agreement (TCA). The TCA, provisionally applied from 1 January 2021, establishes zero-tariff, zero-quota trade in goods subject to rules of origin, limited provisions for services (without passporting rights), cooperation on law enforcement, and level playing field commitments on environmental, labour, and subsidy standards. The agreement is institutionally complex, governed by a Partnership Council with dispute resolution mechanisms including binding arbitration. The TCA is subject to periodic review and contains provisions for rebalancing measures if either party's regulatory divergence is deemed to create unfair competitive conditions. Scholarly analysis (Armstrong, 2021) has characterised the TCA as reflecting a "thin" free trade agreement model rather than the deep integration of the single market, with significant implications for services trade, regulatory alignment, and cross-border cooperation.

            The constitutional framework for treaty-making in the UK rests on the interaction between the royal prerogative and parliamentary sovereignty. The negotiation and ratification of treaties is a prerogative power exercised by the Crown (in practice, by government ministers), reflecting the dualist principle that international treaties do not create rights or obligations in domestic law until implemented by legislation. The Constitutional Reform and Governance Act 2010 (CRaG Act) introduced a statutory framework for parliamentary scrutiny, replacing the informal Ponsonby Rule (1924). Under CRaG, the government must lay a treaty before Parliament for 21 sitting days before ratification; if the House of Commons resolves against ratification, the government cannot proceed for a further 21 sitting days, and this cycle can be repeated indefinitely. The House of Lords may debate and express disapproval but cannot block ratification.

            The CRaG procedure has been subject to significant scholarly and parliamentary criticism. The House of Lords Constitution Committee (2019) and the House of Commons International Trade Committee (2018) both identified shortcomings, including the absence of any requirement for a debate or vote, the inability of Parliament to amend treaty terms, the limited time for scrutiny of complex agreements, and the procedure's inapplicability to political commitments and memoranda of understanding that do not take treaty form. The post-Brexit expansion of UK treaty-making activity -- with the UK negotiating its own trade agreements for the first time in nearly five decades -- has amplified these concerns, as Parliament's ability to scrutinise and influence trade agreements has significant implications for regulatory policy, consumer protection, and democratic accountability.
