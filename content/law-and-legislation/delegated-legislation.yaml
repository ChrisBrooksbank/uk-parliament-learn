quizzes:
  child:
    - question: "What is a Statutory Instrument?"
      type: multiple_choice
      options:
        - "A musical instrument played in Parliament"
        - "A detailed rule made by a minister using powers from an Act of Parliament"
        - "A tool used to measure how long a debate lasts"
      correct_answer: "A detailed rule made by a minister using powers from an Act of Parliament"
      explanation: "A Statutory Instrument is a type of law that a Government minister can make without needing a full debate and vote in Parliament, using powers given by an Act of Parliament."
    - question: "True or false: Parliament makes about 3,000 Acts of Parliament every year."
      type: true_false
      correct_answer: "False"
      explanation: "Parliament only passes about 25 to 35 Acts each year. But ministers make around 3,000 Statutory Instruments, which is why delegated legislation is so important."
    - question: "What does the affirmative procedure mean?"
      type: multiple_choice
      options:
        - "The rule becomes law automatically unless someone objects"
        - "The rule needs Parliament to vote yes before it becomes law"
        - "The rule is sent back to the minister to try again"
      correct_answer: "The rule needs Parliament to vote yes before it becomes law"
      explanation: "Under the affirmative procedure, a Statutory Instrument does not become law until Parliament votes to approve it."
  teenager:
    - question: "Why are Henry VIII powers considered controversial?"
      type: short_answer
      correct_answer: "Because they allow Government ministers to change or remove parts of existing Acts of Parliament through Statutory Instruments, without needing a full parliamentary debate and vote on a new Bill. This effectively transfers law-making power from Parliament to the executive."
      explanation: "Henry VIII powers are controversial because Acts of Parliament are the highest form of UK law, and the power to change them by SI -- with limited scrutiny -- raises serious questions about parliamentary sovereignty."
    - question: "What is the difference between the affirmative and negative procedures?"
      type: multiple_choice
      options:
        - "Affirmative requires a vote to approve; negative becomes law unless Parliament objects"
        - "Affirmative applies to the Commons; negative applies to the Lords"
        - "Affirmative is for important laws; negative is for unimportant laws"
        - "There is no real difference between them"
      correct_answer: "Affirmative requires a vote to approve; negative becomes law unless Parliament objects"
      explanation: "Under the affirmative procedure, Parliament must actively vote to approve an SI. Under the negative procedure, the SI automatically becomes law unless Parliament objects within 40 sitting days."
    - question: "True or false: Parliament can amend the wording of a Statutory Instrument during the scrutiny process."
      type: true_false
      correct_answer: "False"
      explanation: "Parliament cannot amend SIs -- it can only approve or reject them in their entirety. This is a major limitation on parliamentary scrutiny of delegated legislation."
  adult:
    - question: "What is the role of the Delegated Powers and Regulatory Reform Committee?"
      type: short_answer
      correct_answer: "The Committee examines Bills before Parliament and assesses whether the delegated powers they seek are appropriate. It advises the House of Lords on whether powers are too broad, whether the proposed scrutiny procedure is adequate, and whether Henry VIII powers are justified."
      explanation: "The DPRRC operates upstream in the legislative process, scrutinising delegated powers at the Bill stage rather than examining individual SIs after they are made."
    - question: "What is a skeleton Bill, and why has this practice been criticised?"
      type: short_answer
      correct_answer: "A skeleton Bill is primary legislation that sets out only a broad framework, leaving almost all substantive policy detail to be determined through delegated legislation. It has been criticised because Parliament is effectively approving laws without knowing what they will actually say, transferring effective legislative power to the executive."
      explanation: "The DPRRC's 2021 report 'Democracy Denied?' described skeleton Bills as representing a 'fundamental shift of power from Parliament to the executive.'"
    - question: "How do Orders in Council differ from ordinary Statutory Instruments?"
      type: multiple_choice
      options:
        - "Orders in Council are made by the Sovereign on the advice of the Privy Council, rather than by individual ministers"
        - "Orders in Council are always subject to the affirmative procedure"
        - "Orders in Council can only deal with foreign affairs"
        - "There is no difference -- they are the same thing"
      correct_answer: "Orders in Council are made by the Sovereign on the advice of the Privy Council, rather than by individual ministers"
      explanation: "Orders in Council are a distinct form of delegated legislation made by the Sovereign at a Privy Council meeting. Some are made under statutory authority, while others are made under the royal prerogative."
  researcher:
    - question: "Critically assess the argument made in the DPRRC's 'Democracy Denied?' report that skeleton Bills represent a fundamental shift of power from Parliament to the executive, with reference to the constitutional principles of parliamentary sovereignty and the rule of law."
      type: essay
      correct_answer: "The DPRRC's argument rests on the proposition that parliamentary sovereignty requires Parliament to know what it is legislating. When a skeleton Bill leaves substantive policy to delegated legislation, Parliament approves a framework without knowing the resulting law's content. This undermines both parliamentary sovereignty (Parliament is formally consenting to law it has not seen) and the rule of law (citizens cannot anticipate their legal obligations from the parent Act alone). Barber and Young's analysis supports this critique, arguing that delegation becomes constitutionally objectionable when it transfers effective legislative choice rather than merely technical detail. However, defenders of skeleton legislation invoke practical necessity: modern regulatory complexity requires flexibility that primary legislation cannot provide, and the scrutiny committees provide some oversight of the resulting SIs."
      explanation: "This question requires engagement with both the parliamentary and academic critiques of skeleton legislation and the practical arguments for executive flexibility in a complex regulatory state."
    - question: "Evaluate the effectiveness of the Joint Committee on Statutory Instruments and the Secondary Legislation Scrutiny Committee as mechanisms for parliamentary oversight of delegated legislation."
      type: essay
      correct_answer: "The JCSI provides valuable technical scrutiny, identifying SIs that are defectively drafted, that exceed the scope of the parent Act, or that impose unexpected charges. However, its remit is limited to legal and technical questions; it cannot consider policy merits. The SLSC fills this gap for the Lords but faces capacity constraints given the volume of SIs. Both committees suffer from the fundamental limitation that Parliament cannot amend SIs, and their reports may come too late to affect instruments already in force under the negative procedure. Fox and Blackwell's (2014) analysis concluded that the scrutiny system is structurally inadequate to the scale and significance of modern delegated legislation, a view reinforced by the Hansard Society's ongoing monitoring."
      explanation: "This question requires detailed knowledge of the scrutiny committees' remits, powers, and limitations, and an assessment of whether institutional reform could meaningfully enhance parliamentary oversight."
    - question: "Analyse the constitutional significance of R (Public Law Project) v Lord Chancellor [2016] in relation to the judicial review of Henry VIII powers."
      type: short_answer
      correct_answer: "In this case, the Supreme Court struck down a ministerial order that would have restricted access to legal aid for judicial review cases, holding that the order exceeded the scope of the parent Act. The case is significant because it demonstrates the courts' role as a constitutional check on the exercise of Henry VIII powers, applying the ultra vires doctrine to prevent ministers from using delegated powers beyond their intended scope. However, the high threshold for judicial review means the courts can only catch exercises of power that clearly exceed statutory authority, not those that are merely unwise or controversial."
      explanation: "The case illustrates both the potential and the limits of judicial scrutiny of delegated legislation, highlighting the courts' role as a backstop rather than a substitute for effective parliamentary oversight."
