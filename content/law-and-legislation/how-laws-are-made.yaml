key_dates:
  - year: 1689
    event: "Bill of Rights established parliamentary supremacy over the Crown"
    significance: "Confirmed that the Crown could not suspend laws or levy taxes without Parliament's consent, laying the constitutional foundation for the modern legislative process."
    levels: [adult, researcher]

  - year: 1708
    event: "Queen Anne withheld Royal Assent from the Scottish Militia Bill"
    significance: "The last time a British monarch refused to approve a Bill passed by Parliament. Royal Assent has been considered a formality ever since."
    levels: [teenager, adult, researcher]

  - year: 1911
    event: "Parliament Act 1911 curtailed the House of Lords' veto power"
    significance: "Replaced the Lords' absolute veto over legislation with a two-year delaying power (later reduced to one year by the 1949 Act), and removed their power to block Money Bills entirely."
    levels: [teenager, adult, researcher]

  - year: 1949
    event: "Parliament Act 1949 reduced the Lords' delaying power"
    significance: "Shortened the period the Lords could delay a Bill from two years over three sessions to one year over two sessions, further strengthening the primacy of the elected House of Commons."
    levels: [adult, researcher]

  - year: 1967
    event: "Royal Assent Act modernised the assent procedure"
    significance: "Allowed Royal Assent to be signified by Letters Patent rather than requiring the Sovereign to attend Parliament in person or use Norman French declarations."
    levels: [adult, researcher]

  - year: 2005
    event: "R (Jackson) v Attorney General upheld the validity of the Parliament Act 1949"
    significance: "The House of Lords (judicial) confirmed that the 1949 Act was validly enacted using the 1911 Act procedure, while offering significant commentary on the nature and limits of parliamentary sovereignty."
    levels: [researcher]

