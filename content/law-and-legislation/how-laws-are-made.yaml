quizzes:
  child:
    - question: "What is a Bill?"
      type: multiple_choice
      options:
        - "A law that everyone must follow"
        - "A plan for a new law that Parliament discusses"
        - "A letter from the King"
        - "A type of tax"
      correct_answer: "A plan for a new law that Parliament discusses"
      explanation: "A Bill is like a rough draft of a new law. It has to be discussed and approved by Parliament before it becomes a real law."

    - question: "True or false: A Bill must be approved by both the House of Commons and the House of Lords before it can become a law."
      type: true_false
      correct_answer: "True"
      explanation: "Both parts of Parliament need to agree on a Bill before it can be sent to the King for Royal Assent and become a law."

    - question: "What is Royal Assent?"
      type: multiple_choice
      options:
        - "When MPs vote on a Bill"
        - "When the King approves a Bill and it becomes law"
        - "When a Bill is first introduced"
        - "When the House of Lords debates a Bill"
      correct_answer: "When the King approves a Bill and it becomes law"
      explanation: "Royal Assent is the final step. When the King gives approval, the Bill officially becomes an Act of Parliament -- a real law."

  teenager:
    - question: "Which of the following is NOT a stage that a Bill goes through in Parliament?"
      type: multiple_choice
      options:
        - "First Reading"
        - "Committee Stage"
        - "Royal Debate"
        - "Third Reading"
      correct_answer: "Royal Debate"
      explanation: "The five stages are First Reading, Second Reading, Committee Stage, Report Stage, and Third Reading. There is no stage called 'Royal Debate.'"

    - question: "What is 'ping-pong' in the context of Parliament?"
      type: short_answer
      correct_answer: "The process where a Bill is sent back and forth between the House of Commons and the House of Lords until both Houses agree on the same text."
      explanation: "When one House makes amendments to a Bill, it must go back to the other House for approval. This back-and-forth continues until both Houses agree on identical wording."

    - question: "True or false: The last time Royal Assent was refused was in 1952."
      type: true_false
      correct_answer: "False"
      explanation: "The last refusal was in 1708, when Queen Anne withheld Royal Assent from the Scottish Militia Bill. No monarch has refused since."

  adult:
    - question: "Under the Parliament Act 1949, how long can the House of Lords delay a Public Bill that originated in the Commons?"
      type: multiple_choice
      options:
        - "Six months over one session"
        - "One year over two sessions"
        - "Two years over three sessions"
        - "The Lords cannot delay any Bill"
      correct_answer: "One year over two sessions"
      explanation: "The Parliament Act 1949 reduced the delaying power from two years over three sessions (as set by the 1911 Act) to one year over two sessions."

    - question: "What is the difference between the affirmative and negative procedures for Statutory Instruments?"
      type: short_answer
      correct_answer: "Under the affirmative procedure, a Statutory Instrument must be actively approved by a vote in Parliament before it can come into force. Under the negative procedure, the instrument becomes law automatically unless Parliament passes a motion to annul it within a set period."
      explanation: "The affirmative procedure provides stronger parliamentary oversight because it requires a positive vote. The negative procedure places the burden on Parliament to object, meaning most SIs subject to it pass without debate."

    - question: "What is the Salisbury Convention?"
      type: short_answer
      correct_answer: "A convention established in 1945 that the House of Lords will not vote down at Second Reading any Government Bill that was in the governing party's election manifesto."
      explanation: "The Salisbury-Addison Convention reflects the democratic primacy of the elected House of Commons. It ensures that a Government's manifesto commitments cannot be blocked outright by the unelected Lords."

  researcher:
    - question: "In R (Jackson) v Attorney General [2005], what was the central constitutional question, and what did the Law Lords conclude?"
      type: essay
      correct_answer: "The central question was whether the Parliament Act 1949, which was itself enacted using the procedure set out in the Parliament Act 1911, was valid primary legislation. The Law Lords unanimously held that it was valid, reasoning that the 1911 Act created a new, alternative procedure for enacting legislation and that the 1949 Act fell within the scope of that procedure. However, several Law Lords offered significant obiter dicta suggesting that there might be limits to the use of the Parliament Act procedure, for example to extend the life of Parliament or to abolish the House of Lords."
      explanation: "Jackson is a landmark constitutional case because it addressed the relationship between parliamentary sovereignty and the rule of law, with some Law Lords (notably Baroness Hale and Lord Steyn) suggesting that parliamentary sovereignty might not be absolute."

    - question: "Critically assess the constitutional implications of the growth of delegated legislation and 'Henry VIII powers' in the UK."
      type: essay
      correct_answer: "The proliferation of delegated legislation raises fundamental questions about democratic accountability and the separation of powers. Henry VIII powers, which allow ministers to amend or repeal primary legislation by Statutory Instrument, effectively transfer legislative authority from Parliament to the executive. The negative procedure provides minimal scrutiny, and Parliament cannot amend SIs. The Delegated Powers and Regulatory Reform Committee and the Secondary Legislation Scrutiny Committee have repeatedly expressed concern about the breadth of powers sought. The European Union (Withdrawal) Act 2018 and the Retained EU Law (Revocation and Reform) Act 2023 represent particularly expansive grants of delegated power. Constitutional scholars argue this trend undermines parliamentary sovereignty in practice, even as it remains formally intact."
      explanation: "This question requires engagement with the tension between legislative efficiency and parliamentary accountability, drawing on reports from the Hansard Society, the House of Lords Constitution Committee, and academic commentary."

    - question: "How does the classification of a Bill as Hybrid rather than Public affect its parliamentary passage?"
      type: short_answer
      correct_answer: "A Hybrid Bill follows the Public Bill procedure but with an additional petitioning stage that allows individuals or bodies who are specially and directly affected to present petitions against the Bill and have them heard by a select committee. This quasi-judicial process, governed by Standing Orders, can significantly extend the time required for the Bill's passage."
      explanation: "The Hybrid Bill procedure reflects the need to balance public legislation with the rights of those disproportionately affected, combining elements of the Public and Private Bill processes."
