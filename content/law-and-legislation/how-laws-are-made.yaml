glossary:
  - term: "Bill"
    definition_simple: "A written plan for a new law that Parliament discusses and votes on before it can become a real law."
    definition_full: "A formal proposal for legislation introduced in either House of Parliament. A Bill must pass through prescribed stages in both Houses and receive Royal Assent before it becomes an Act of Parliament."

  - term: "Act of Parliament"
    definition_simple: "A Bill that has been approved by Parliament and the King, so it is now an official law that everyone must follow."
    definition_full: "Primary legislation that has completed all parliamentary stages and received Royal Assent. Acts of Parliament are the highest form of domestic law in the UK and can only be repealed or amended by another Act (or, in limited circumstances, by delegated legislation exercising Henry VIII powers)."

  - term: "Amendment"
    definition_simple: "A change suggested to a Bill while Parliament is discussing it, like editing a piece of writing."
    definition_full: "A proposed alteration to the text of a Bill during its passage through Parliament. Amendments may be tabled at Committee Stage, Report Stage, and (in the Lords) Third Reading. They must be selected by the Speaker or Lord Speaker and are subject to rules of admissibility."

  - term: "Royal Assent"
    definition_simple: "The King's approval that turns a Bill into a law. This has not been refused since 1708."
    definition_full: "The formal approval by the Sovereign that converts a Bill into an Act of Parliament. Governed by the Royal Assent Act 1967, it is now normally signified by Letters Patent. It has not been withheld since Queen Anne refused the Scottish Militia Bill in 1708 and is regarded as a constitutional formality."

  - term: "Delegated Legislation"
    definition_simple: "Rules made by Government ministers using powers given to them by an Act of Parliament, without needing a whole new law."
    definition_full: "Secondary legislation made by ministers or other bodies under powers conferred by an Act of Parliament (the 'parent' or 'enabling' Act). The most common form is the Statutory Instrument. Delegated legislation is subject to parliamentary scrutiny through affirmative or negative procedures but cannot be amended by Parliament."

  - term: "White Paper"
    definition_simple: "A document where the Government explains its plans for a new law and invites people to give their opinions."
    definition_full: "A Government policy document that sets out firm proposals for legislation. White Papers typically follow a period of consultation and precede the introduction of a Bill. They are distinct from Green Papers, which present ideas at an earlier, more open-ended stage of policy development."

  - term: "Green Paper"
    definition_simple: "A document where the Government shares early ideas and asks people what they think before making a plan for a new law."
    definition_full: "A Government consultation document that sets out proposals at a preliminary stage, inviting responses from interested parties and the public. Green Papers are used to test opinion and gather evidence before the Government commits to a policy position, which may then be set out in a White Paper."

