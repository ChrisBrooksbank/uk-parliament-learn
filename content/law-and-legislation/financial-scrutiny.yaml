key_figures:
  - name: "William Ewart Gladstone"
    role: "Chancellor of the Exchequer and Prime Minister"
    description: "Gladstone (1809-1898) served as Chancellor four times and as Prime Minister four times. He established the Public Accounts Committee in 1861 and the Exchequer and Audit Departments Act 1866, creating the institutional foundations of modern financial scrutiny. His principle that Government should be accountable for every pound of public money remains central to the UK's fiscal framework."
    levels: [teenager, adult, researcher]
  - name: "Sir Amyas Morse"
    role: "Comptroller and Auditor General (2009-2019)"
    description: "Sir Amyas Morse headed the NAO during a period of significant austerity and public spending reform. Under his leadership, the NAO published high-profile value-for-money reports on Universal Credit, major infrastructure projects, and the privatisation of Royal Mail, demonstrating the institution's role as a check on executive spending decisions."
    levels: [researcher]
  - name: "Margaret Hodge"
    role: "Chair of the Public Accounts Committee (2010-2015)"
    description: "Dame Margaret Hodge chaired the PAC during a period of high public interest in Government spending, conducting prominent inquiries into tax avoidance by multinational corporations, the rollout of Universal Credit, and spending on the London 2012 Olympics. Her combative questioning style raised the PAC's public profile significantly."
    levels: [adult, researcher]
  - name: "Robert Chote"
    role: "First Chair of the OBR (2010-2020)"
    description: "Robert Chote, formerly director of the Institute for Fiscal Studies, served as the first permanent chair of the OBR's Budget Responsibility Committee. He established the OBR's reputation for independence and rigorous analysis, setting institutional norms that have proved durable."
    levels: [adult, researcher]

