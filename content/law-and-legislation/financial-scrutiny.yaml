    - question: "True or false: The National Audit Office checks whether the Government has spent money wisely."
      type: true_false
      correct_answer: "True"
      explanation: "The NAO checks the Government's accounts and investigates whether public money has been spent economically, efficiently, and effectively."
    - question: "What does the Office for Budget Responsibility do?"
      type: multiple_choice
      options:
        - "It collects taxes from people"
        - "It checks whether the Government's money plans add up"
        - "It decides how much money to give to schools"
      correct_answer: "It checks whether the Government's money plans add up"
      explanation: "The OBR is a group of independent experts who check the Government's plans for taxes and spending to make sure the numbers are honest and realistic."
  teenager:
    - question: "Why was the Office for Budget Responsibility created in 2010?"
      type: multiple_choice
      options:
        - "To replace the Chancellor of the Exchequer"
        - "To provide independent economic forecasts instead of relying on Treasury projections"
        - "To set tax rates for the Government"
        - "To audit Government departments' accounts"
      correct_answer: "To provide independent economic forecasts instead of relying on Treasury projections"
      explanation: "Before the OBR, the Treasury produced its own forecasts, which were sometimes criticised as overly optimistic. The OBR was created to provide independent, credible fiscal projections."
    - question: "True or false: The House of Lords has the same power as the House of Commons over the Government's financial plans."
      type: true_false
      correct_answer: "False"
      explanation: "The House of Commons has exclusive financial privilege. Money Bills can only be delayed by the Lords for one month, and the Lords cannot amend them."
    - question: "What is the role of the Public Accounts Committee?"
      type: short_answer
      correct_answer: "The PAC examines how the Government spends public money, using NAO reports to hold senior civil servants to account for whether money has been spent economically, efficiently, and effectively."
      explanation: "The PAC is the oldest select committee, traditionally chaired by an opposition MP. It calls Accounting Officers to explain departmental spending and publishes reports recommending improvements."
  adult:
    - question: "What is the relationship between the Consolidated Fund and the Estimates process?"
      type: short_answer
      correct_answer: "The Consolidated Fund is the Government's principal bank account at the Bank of England. The Estimates system authorises departments to draw money from the Consolidated Fund for specific purposes. Spending is authorised through Supply resolutions and given legal effect by Consolidated Fund Bills and the annual Appropriation Act."
      explanation: "The Consolidated Fund provides the constitutional link between parliamentary authorisation and Government spending, ensuring that no public money is spent without parliamentary approval."
    - question: "How does the Provisional Collection of Taxes Act 1968 affect the Budget process?"
      type: short_answer
      correct_answer: "The Act allows tax changes announced in the Budget to take immediate provisional effect through resolutions of the House of Commons, before the Finance Bill has completed its parliamentary passage. This ensures that tax changes cannot be forestalled by delay."
