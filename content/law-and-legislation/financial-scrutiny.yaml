glossary:
  - term: "Budget"
    definition_simple: "The Government's big plan for how it will collect money through taxes and spend it on things like schools, hospitals, and roads."
    definition_full: "The Chancellor of the Exchequer's annual fiscal statement to the House of Commons, setting out the Government's tax proposals, spending plans, borrowing forecasts, and economic strategy. Tax changes take provisional effect immediately under the Provisional Collection of Taxes Act 1968 and are subsequently enacted through the Finance Bill."
  - term: "Estimates"
    definition_simple: "The detailed plans that Government departments send to Parliament showing how much money they need to spend."
    definition_full: "The formal mechanism by which the House of Commons authorises Government spending. Departments submit Main Estimates (for the coming financial year), Supplementary Estimates (for in-year adjustments), and Excess Votes (for expenditure exceeding previous authorisation). Estimates are approved through Supply resolutions and given statutory effect by Consolidated Fund Bills and the Appropriation Act."
  - term: "Office for Budget Responsibility"
    definition_simple: "A group of independent experts who check the Government's plans for taxes and spending to make sure the numbers add up."
    definition_full: "An independent fiscal institution established by the Budget Responsibility and National Audit Act 2011. The OBR produces economic and fiscal forecasts, assesses the Government's performance against its fiscal rules, and analyses the long-term sustainability of the public finances. Its independence from the Treasury is designed to ensure credible and unbiased fiscal projections."
  - term: "National Audit Office"
    definition_simple: "An independent organisation that checks the Government's accounts to make sure public money has been spent properly and wisely."
    definition_full: "The UK's supreme audit institution, headed by the Comptroller and Auditor General, an Officer of the House of Commons. The NAO conducts financial audits of Government accounts and value-for-money examinations of how public money has been spent. Its reports provide the evidence base for the Public Accounts Committee's inquiries."
  - term: "Public Accounts Committee"
    definition_simple: "A group of MPs whose job is to check that the Government has not wasted public money."
    definition_full: "The House of Commons select committee responsible for examining the economy, efficiency, and effectiveness of Government expenditure. Established in 1861 and conventionally chaired by a member of the official opposition, the PAC uses NAO reports to hold Accounting Officers (usually Permanent Secretaries) to account for departmental spending."
  - term: "Supply Day"
    definition_simple: "A day when the House of Commons can discuss and vote on how much money the Government should be allowed to spend."
    definition_full: "A day allocated in the parliamentary calendar for the House of Commons to debate the Government's spending Estimates. Formally known as Estimates Days, they allow the House to scrutinise and vote on departmental spending plans. In practice, Supply Days are also used by opposition parties for debates on subjects of their choosing."

did_you_know:
  - fact: "The Chancellor of the Exchequer traditionally holds up a red briefcase, called the Budget Box, outside 11 Downing Street before heading to Parliament to deliver the Budget speech. The original red box, made by Gladstone in 1860, was used until 2010."
    level: [child, teenager]
  - fact: "The National Audit Office publishes around 60 value-for-money reports each year, investigating everything from the cost of major defence projects to how efficiently the NHS is using its funding."
    level: [teenager, adult]
  - fact: "The Public Accounts Committee is the oldest select committee in the House of Commons, established in 1861 by William Ewart Gladstone when he was Chancellor of the Exchequer."
    level: [teenager, adult, researcher]
  - fact: "When the Truss Government announced its 'mini-Budget' in September 2022 without an OBR forecast, the resulting market turmoil -- including a spike in Government borrowing costs and emergency Bank of England intervention -- dramatically demonstrated the importance of independent fiscal scrutiny."
    level: [adult, researcher]
  - fact: "Parliament passes around 25 to 35 Acts per year, but the Government spends over one trillion pounds of public money annually -- yet many Estimates pass through the House of Commons without any debate at all."
    level: [adult, researcher]

