    role: "Chair of the Joint Committee on Human Rights (2017-2020)"
    description: "Led the JCHR's scrutiny of the human rights implications of government legislation including the EU Withdrawal Bill, demonstrating the role of joint committees in constitutional scrutiny."
    levels: [adult, researcher]

quizzes:
  child:
    - question: "What is the main job of a select committee?"
      type: multiple_choice
      options: ["To write new laws", "To check that the government is doing its job properly", "To choose the Prime Minister", "To organise parties in Parliament"]
      answer: "To check that the government is doing its job properly"
      explanation: "Select committees investigate what the government is doing, ask questions, and write reports with suggestions for how things could be done better."
    - question: "True or false: All the members of a select committee come from the same political party."
      type: true_false
      answer: false
      explanation: "Select committees are cross-party, which means they have members from different political parties so they can look at issues from different points of view."
    - question: "How is the chair of a select committee chosen?"
      type: multiple_choice
      options: ["The Prime Minister picks them", "They are chosen by a secret vote of all MPs", "The oldest MP gets the job", "They volunteer"]
      answer: "They are chosen by a secret vote of all MPs"
      explanation: "Since 2010, select committee chairs have been elected by all MPs in a secret ballot, which makes them more independent."
  teenager:
    - question: "In which year was the modern departmental select committee system established?"
      type: multiple_choice
      options: ["1861", "1945", "1979", "2010"]
      answer: "1979"
      explanation: "Norman St John-Stevas proposed the creation of departmental select committees in 1979, establishing the system that shadows each government department."
    - question: "True or false: The government is legally required to implement all select committee recommendations."
      type: true_false
      answer: false
      explanation: "While the government must respond to committee reports within 60 days, it is not legally obliged to accept the recommendations. However, committee reports carry significant political weight and influence."
    - question: "What was the main recommendation of the Wright Committee in 2009?"
      type: short_answer
      answer: "The Wright Committee recommended that select committee chairs should be elected by the whole House of Commons through a secret ballot, rather than being effectively appointed by party whips. This was implemented from 2010 and strengthened committee independence."
      explanation: "The Wright Committee's reforms were a response to concerns that the whips had too much control over committee membership, undermining their ability to scrutinise the government independently."
  adult:
    - question: "Explain the difference between departmental select committees and cross-cutting committees, giving an example of each."
      type: short_answer
      answer: "Departmental select committees shadow specific government departments, examining their expenditure, administration, and policy (e.g., the Health and Social Care Committee scrutinises the Department of Health and Social Care). Cross-cutting committees examine issues that span multiple departments, such as the Environmental Audit Committee, which assesses the environmental impact of policies across the whole of government, or the Public Accounts Committee, which examines value for money across all departments."
      explanation: "This distinction reflects the fact that many important policy issues, such as environmental protection or financial management, do not fit neatly within a single departmental boundary."
    - question: "What formal powers do select committees possess to compel witnesses and evidence?"
      type: short_answer
      answer: "Select committees have the power to send for persons, papers, and records under Standing Order No. 152. This means they can formally summon witnesses to give oral evidence and require the production of documents. These powers derive from the House's inherent parliamentary privileges. However, enforcement against private individuals and corporations has proved practically difficult, as the mechanisms for punishing contempt are underdeveloped."
      explanation: "The gap between formal powers and practical enforcement has been exposed in cases involving private corporations that have resisted committee requests for evidence."
    - question: "Which committee is traditionally chaired by a member of the opposition party?"
      type: multiple_choice
      options: ["The Liaison Committee", "The Public Accounts Committee", "The Environmental Audit Committee", "The Backbench Business Committee"]
      answer: "The Public Accounts Committee"
      explanation: "By convention, the Public Accounts Committee is chaired by a member of the Official Opposition, reflecting the principle that scrutiny of government spending should be led by someone independent of the governing party."
  researcher:
    - question: "Critically evaluate the impact of the Wright Committee reforms on the independence and effectiveness of select committees, drawing on empirical evidence from academic literature."
      type: essay
      answer: "A strong answer would discuss: the pre-2010 system of whip-influenced appointment; the Wright Committee's democratic rationale for elected chairs; Benton and Russell's (2013) empirical analysis of recommendation acceptance rates; evidence of more assertive chair behaviour post-2010; the mediating role of individual personality and political context; comparisons with pre-reform committee performance; the continued influence of party discipline on committee members; resource constraints as a limitation on effectiveness; and the distinction between formal independence (election method) and substantive independence (willingness to challenge government)."
      explanation: "This question requires engagement with both the institutional design of the reforms and empirical evidence about their practical effects."
    - question: "Assess the extent to which the power to 'send for persons, papers, and records' provides select committees with effective investigative authority, with reference to high-profile cases where this power has been tested."
      type: essay
      answer: "A comprehensive response should address: the constitutional basis of the power in parliamentary privilege; Standing Order No. 152; the distinction between the power's formal scope and practical enforcement; the phone-hacking inquiry and the Culture, Media and Sport Committee's interactions with News International; the DCMS Committee's efforts to compel testimony from social media executives; the Clerk of the House's advice on contempt proceedings; the absence of modern precedent for committing private individuals for contempt; comparisons with investigative powers in other legislatures (e.g., US Congressional subpoena power); and proposals for statutory reform of committee powers."
      explanation: "This question examines the gap between theoretical parliamentary authority and practical enforcement capacity in the modern context of powerful private interests."
    - question: "Analyse the role of the Public Accounts Committee within the broader ecosystem of financial scrutiny in Parliament, considering its relationship with the National Audit Office and the Treasury Minute system."
      type: essay
      answer: "An excellent answer would discuss: the PAC's historical origins in 1861; its relationship with the Comptroller and Auditor General and the NAO; the process by which NAO value-for-money reports inform PAC inquiries; the Treasury Minute system through which the government formally responds to PAC recommendations; the convention of opposition chairmanship; empirical evidence of PAC influence on departmental behaviour; the concept of anticipated reaction in financial management; the PAC's role in major financial scandals; and limitations including the retrospective nature of much financial scrutiny and resource asymmetries between the PAC and the departments it examines."
      explanation: "This question requires understanding of the institutional ecosystem connecting audit, parliamentary scrutiny, and executive financial management."
