glossary:
  - term: "Departmental Select Committee"
    definition_simple: "A group of MPs from different parties who check on a specific government department, like Health or Education."
    definition_full: "A cross-party committee of the House of Commons established to examine the expenditure, administration, and policy of a specific government department and its associated public bodies. Each departmental committee typically has 11 members and its chair is elected by the whole House by secret ballot."
  - term: "Evidence Session"
    definition_simple: "A meeting where a committee invites people to come and answer questions about an important topic."
    definition_full: "A formal hearing in which a select committee takes oral testimony from witnesses, who may include ministers, civil servants, experts, or members of the public. Evidence sessions are usually held in public and broadcast on Parliament TV. Written evidence is also gathered and published alongside oral testimony."
  - term: "Committee Chair"
    definition_simple: "The person in charge of a committee who decides how it runs and leads its meetings."
    definition_full: "The elected presiding officer of a select committee, responsible for setting the committee's agenda, chairing evidence sessions, and representing the committee publicly. Since 2010, most departmental committee chairs have been elected by the whole House of Commons by secret ballot using the alternative vote."
  - term: "Joint Committee"
    definition_simple: "A committee made up of members from both the House of Commons and the House of Lords working together."
    definition_full: "A committee comprising members of both Houses of Parliament, typically appointed for a specific purpose such as pre-legislative scrutiny of draft Bills. The Joint Committee on Human Rights and joint committees on draft legislation are prominent examples."
  - term: "Committee Report"
    definition_simple: "A document written by a committee that explains what they found out and what they think the government should do."
    definition_full: "The published output of a select committee inquiry, containing findings, conclusions, and recommendations directed at the government. Reports are agreed on a cross-party basis, though dissenting opinions may be appended. The government is expected to respond to committee reports within 60 days."

did_you_know:
  - fact: "Select committee chairs are elected by all MPs in a secret ballot, which means even the Prime Minister and party leaders cannot control who gets the job!"
    level: [child, teenager]
  - fact: "The Public Accounts Committee has been scrutinising government spending since 1861, making it over 160 years old. It is traditionally chaired by a member of the opposition, not the governing party."
    level: [teenager, adult]
  - fact: "Select committees have the formal power to 'send for persons, papers, and records', a power inherited from the historical privileges of Parliament. In theory, anyone summoned by a committee must attend."
    level: [teenager, adult, researcher]
  - fact: "The government accepts or partially accepts roughly 40% of select committee recommendations, according to academic research analysing hundreds of committee reports."
    level: [adult, researcher]
  - fact: "During the phone-hacking scandal, the Culture, Media and Sport Committee famously questioned Rupert Murdoch and described the day as 'the most humble day of my career'. The inquiry demonstrated both the reach and the limitations of committee powers over private corporations."
    level: [teenager, adult, researcher]

key_dates:
  - year: 1861
    event: "Public Accounts Committee established"
    significance: "The creation of the PAC established the principle of systematic parliamentary scrutiny of government expenditure, a function that has continued for over 160 years and remains central to financial accountability."
    levels: [teenager, adult, researcher]
  - year: 1979
    event: "Modern departmental select committee system created"
    significance: "Norman St John-Stevas successfully proposed a comprehensive system of departmental select committees shadowing government departments, creating the institutional framework for systematic parliamentary scrutiny that persists today."
    levels: [teenager, adult, researcher]
  - year: 2009
    event: "Wright Committee publishes 'Rebuilding the House'"
    significance: "The Select Committee on Reform of the House of Commons recommended elected committee chairs and members, fundamentally strengthening the independence and democratic legitimacy of the select committee system."
    levels: [adult, researcher]
  - year: 2010
    event: "First elections for select committee chairs"
    significance: "For the first time, select committee chairs were elected by the whole House of Commons by secret ballot using the alternative vote, giving them a personal mandate independent of party whips."
    levels: [teenager, adult, researcher]
  - year: 2011
    event: "Phone-hacking inquiry by Culture, Media and Sport Committee"
    significance: "The committee's investigation into phone hacking at News International demonstrated the potential of select committees to hold powerful private interests to account, while also exposing the difficulties of enforcing committee powers against corporations."
    levels: [adult, researcher]

