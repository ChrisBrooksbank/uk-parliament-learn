    role: "Leader of the House of Commons (1979-1981)"
    description: "As Leader of the House, he successfully proposed the motion on 25 June 1979 to establish the modern system of departmental select committees, creating the institutional framework for parliamentary scrutiny that remains in place today."
    levels: [adult, researcher]
  - name: "Tony Wright"
    role: "Chair of the Select Committee on Reform of the House of Commons (2009)"
    description: "Chaired the Wright Committee which recommended electing select committee chairs by secret ballot and members by their parliamentary parties, reforms that fundamentally strengthened committee independence from party control."
