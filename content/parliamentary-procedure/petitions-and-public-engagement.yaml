quizzes:
    child:
        - question: 'How many signatures does an e-petition need to get a debate in Parliament?'
          type: multiple_choice
          options:
              - '1,000'
              - '10,000'
              - '100,000'
          correct_answer: '100,000'
          explanation: 'If an e-petition gets 100,000 signatures, it is considered for a debate in Parliament. At 10,000 signatures, the government must write a response, but a debate requires the higher number.'
        - question: 'True or false: You have to pay money to visit the public gallery and watch a debate in Parliament.'
          type: true_false
          correct_answer: 'False'
          explanation: 'Visiting the public galleries in the House of Commons and House of Lords is completely free. Anyone can go and watch MPs and Lords debating, as long as there are seats available.'
        - question: 'What is the Petitions Committee?'
          type: multiple_choice
          options:
              - 'A group of judges who decide which petitions are legal'
              - 'A group of MPs who look after the petitions system and investigate the issues people raise'
              - 'A group of citizens who write petitions for other people'
          correct_answer: 'A group of MPs who look after the petitions system and investigate the issues people raise'
          explanation: 'The Petitions Committee is a group of MPs in the House of Commons. They check that petitions follow the rules, decide which ones should be debated, and sometimes hold hearings to learn more about the issues petitioners care about.'
    teenager:
        - question: 'What is the difference between the 10,000-signature threshold and the 100,000-signature threshold in the e-petitions system?'
          type: short_answer
          correct_answer: 'At 10,000 signatures, the government must provide a written response to the petition. At 100,000 signatures, the petition is considered for a debate in Westminster Hall.'
          explanation: 'The dual-threshold system is designed to ensure proportionate responses. The lower threshold guarantees that the government engages with the issue, while the higher threshold triggers the possibility of parliamentary debate, giving the issue greater visibility and scrutiny.'
        - question: "Why might someone argue that e-petitions create an 'illusion of influence'?"
          type: multiple_choice
          options:
              - 'Because petitions are always ignored by the government'
              - 'Because reaching the signature threshold does not guarantee that the law will change'
              - 'Because only MPs can create e-petitions'
              - 'Because e-petitions are not real petitions'
          correct_answer: 'Because reaching the signature threshold does not guarantee that the law will change'
          explanation: 'Even when an e-petition reaches 100,000 signatures and is debated, there is no obligation on the government or Parliament to change the law. Critics argue this can leave petitioners feeling that their participation made no difference. Supporters counter that the debate itself has democratic value, even without legislative change.'
        - question: 'True or false: Select committees only accept evidence from professional organisations and experts, not from ordinary members of the public.'
          type: true_false
          correct_answer: 'False'
          explanation: 'Select committees issue open calls for evidence, and any individual or organisation can submit written evidence. However, research has shown that in practice, professional organisations and repeat contributors tend to dominate submissions, which is why committees have been encouraged to actively reach out to underrepresented groups.'
    adult:
        - question: "How does the Petitions Committee's status as a select committee enhance the democratic effectiveness of the petitions system compared to earlier petition arrangements?"
          type: short_answer
          correct_answer: 'As a select committee, the Petitions Committee has formal powers to summon witnesses, take sworn evidence, commission research, and publish reports. This gives it the capacity to investigate issues raised by petitions substantively, challenge the adequacy of government responses, and create a feedback loop with petitioners -- functions that were not available under previous petition arrangements.'
          explanation: "Before 2015, petitions presented to the House of Commons were acknowledged but had no dedicated institutional mechanism for follow-up or investigation. The Petitions Committee's select committee status transformed the process from a symbolic act of presentation into a substantive channel for parliamentary scrutiny and public engagement."
        - question: 'What are the main barriers to achieving genuinely representative public participation in select committee consultations?'
          type: short_answer
          correct_answer: 'Key barriers include the dominance of London-based professional organisations among respondents, low public awareness of consultation opportunities, digital exclusion affecting older, lower-income, and rural populations, the technical language of calls for evidence, and the time and expertise required to prepare a written submission.'
          explanation: 'While select committee consultations are formally open to all, structural inequalities in participation mean that the voices heard are not representative of the population. The Liaison Committee has recommended proactive outreach to underrepresented communities, but achieving genuinely inclusive participation remains a significant challenge.'
        - question: 'In what ways did the COVID-19 pandemic accelerate the digital transformation of parliamentary engagement?'
          type: short_answer
          correct_answer: 'The pandemic necessitated virtual evidence sessions for select committees, expanded the use of online consultation platforms, enabled remote participation in committee inquiries, and demonstrated that digital tools could broaden geographic and demographic participation. It also highlighted the challenge of digital exclusion.'
          explanation: 'The shift to virtual proceedings, initially an emergency measure, has had lasting effects on parliamentary engagement. Many digital innovations adopted during the pandemic have been retained, creating a hybrid model that combines in-person and online participation. However, the experience also underscored the need to address digital exclusion to ensure that the benefits of online engagement do not come at the cost of further marginalising those without reliable internet access.'
    researcher:
        - question: 'Evaluate the democratic effectiveness of the UK e-petitions system. To what extent does the threshold-based model achieve meaningful public participation in the parliamentary process, and what are its principal limitations?'
          type: essay
          correct_answer: "The threshold model succeeds in lowering barriers to political expression, performing an agenda-setting function, and forcing government to engage publicly with citizen concerns. Its limitations include the absence of a guarantee of legislative outcomes, the risk of 'clicktivism' (superficial engagement), the skewed demographic profile of petition signatories, and the expectations gap between public assumptions and institutional reality. The Petitions Committee's proactive role has partially addressed some limitations but cannot resolve the structural tension between participatory expectations and representative governance."
          explanation: "Assessment of the e-petitions system requires distinguishing between different conceptions of democratic effectiveness. If effectiveness is measured by legislative outcomes, the system's record is modest. If measured by agenda-setting, government accountability, and civic education, its contribution is more significant. The scholarly literature (Wright 2016, Miller 2009, Fox 2009) suggests that the system's value lies primarily in its communicative and educative functions rather than its legislative impact."
        - question: 'Critically assess the relationship between parliamentary select committee consultations and the principle of democratic representation. Do open calls for evidence produce genuinely representative input, or do they systematically privilege certain voices?'
          type: essay
          correct_answer: 'Open calls for evidence are formally inclusive but substantively skewed. Research demonstrates that professional organisations, think tanks, and repeat contributors dominate submissions, while individual citizens, marginalised communities, and geographically remote populations are underrepresented. This pattern reflects structural inequalities in political resources (time, expertise, confidence, networks) rather than formal barriers. Proactive outreach and digital tools can partially address this, but the fundamental tension between open access and representative participation is not easily resolved.'
          explanation: "This question engages with a central problem in participatory democracy theory: the gap between formal equality of access and substantive equality of participation. The evidence base, including Berry and Kippin (2014) and the Liaison Committee's reports, demonstrates that self-selection mechanisms tend to reproduce existing power imbalances. Effective solutions require not merely removing barriers but actively building the capacity and confidence of underrepresented groups to participate."
        - question: 'Analyse the historical evolution of public petitioning from the medieval period to the digital age. How has the changing form of petitions reflected broader shifts in the relationship between citizens and Parliament?'
          type: essay
          correct_answer: "Medieval petitions were primarily requests from subjects to the Crown for redress of individual grievances, functioning within a hierarchical relationship of supplication. The Chartist mass petitions of the 1830s-1840s transformed petitioning into a tool of collective political mobilisation, asserting popular sovereignty. The modern e-petitions system reflects the digital age's emphasis on accessibility, speed, and scale, but also raises questions about the depth of democratic engagement and the relationship between quantitative participation (signature counts) and qualitative deliberation."
          explanation: 'The evolution of petitioning illuminates changing conceptions of the citizen-Parliament relationship. From medieval supplication through Chartist collective action to digital clicktivism, the form of petitioning has mirrored broader shifts in democratic theory, technology, and political culture. Scholarly analysis must account for both the democratising potential of each innovation and its limitations.'
