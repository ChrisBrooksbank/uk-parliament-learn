glossary:
    - term: 'E-petition'
      definition_simple: 'An online petition on the UK Parliament website where people can ask the government or Parliament to take action on an issue. If enough people sign, the government must respond or Parliament may debate it.'
      definition_full: 'A digital petition submitted through the UK Government and Parliament e-petitions platform (petition.parliament.uk), available to British citizens and UK residents aged 16 and over. The system operates on a threshold model: petitions reaching 10,000 signatures receive a mandatory written government response; those reaching 100,000 signatures are considered for debate in Westminster Hall. The platform is jointly administered by the House of Commons Petitions Committee and the relevant government department.'
    - term: 'Petitions Committee'
      definition_simple: 'A group of MPs in the House of Commons who look after the petitions system, decide which petitions should be debated, and investigate the issues people raise.'
      definition_full: 'A departmental select committee of the House of Commons, established by Standing Order on 30 March 2015, with responsibility for overseeing the e-petitions system. The Committee checks petitions for eligibility, determines which qualifying petitions should be scheduled for debate, takes oral and written evidence, commissions research, publishes reports, and corresponds with petitioners. It has the full powers of a select committee, including the ability to summon witnesses and compel the production of documents.'
    - term: 'Public Gallery'
      definition_simple: 'Special seating areas in the House of Commons and House of Lords where members of the public can sit and watch debates and other proceedings for free.'
      definition_full: 'Designated seating areas within the chambers of the House of Commons and House of Lords from which members of the public may observe parliamentary proceedings. Access is free of charge and available whenever the relevant House is sitting, subject to security screening and the availability of seats. The public galleries serve a dual constitutional function: facilitating public scrutiny of parliamentary conduct and reinforcing the transparency of the legislative process.'
    - term: 'Parliamentary Outreach'
      definition_simple: 'The work Parliament does to help people across the UK understand how Parliament works, including school visits, workshops, and events.'
      definition_full: "The programmes and activities delivered by Parliament's Education and Engagement Service to promote public understanding of and participation in parliamentary democracy. Outreach encompasses school workshops (both on the parliamentary estate and through visits to schools across the UK), teacher training, community events, the UK Youth Parliament, UK Parliament Week, and digital engagement initiatives. The programme aims to build political literacy and lower barriers to democratic participation, particularly among underrepresented communities."
    - term: 'Public Consultation'
      definition_simple: 'When a parliamentary committee asks members of the public, organisations, and experts to share their views and knowledge about an issue the committee is looking into.'
      definition_full: "A formal process through which select committees invite written and oral evidence from individuals, organisations, and experts as part of a parliamentary inquiry. Consultations typically begin with the publication of terms of reference and an open call for evidence. Submissions are assessed on their merits and may inform the committee's findings and recommendations. The process is a key mechanism for incorporating public knowledge, professional expertise, and lived experience into parliamentary scrutiny and policy development."

did_you_know:
    - fact: 'The right to petition Parliament goes back to the 13th century, making it one of the oldest ways for ordinary people to have their say in how the country is run.'
      level: [child, teenager]
    - fact: 'If an e-petition reaches 100,000 signatures, it is considered for a debate in Parliament. The most popular e-petition ever received over 6 million signatures -- it called for a second referendum on EU membership in 2016.'
      level: [child, teenager, adult]
    - fact: 'The UK Youth Parliament holds an annual debate in the actual House of Commons chamber, broadcast live on BBC Parliament. Members are aged 11 to 18 and are elected by young people across the UK.'
      level: [child, teenager]
    - fact: 'The Chartists presented a petition to Parliament in 1842 bearing over 3.3 million signatures -- at a time when the UK population was about 27 million. The petition was so large it could not fit through the doors of the House of Commons.'
      level: [teenager, adult, researcher]
    - fact: 'Select committees receive thousands of written submissions from members of the public each year, but research has shown that the majority of evidence comes from London-based professional organisations rather than individual citizens.'
      level: [adult, researcher]

key_dates:
    - year: 1842
      event: 'The Chartists present their second petition to Parliament with over 3.3 million signatures'
      significance: "Demonstrated the power of mass petitioning as a tool of popular political expression. Although the Chartists' demands were rejected, their use of petitions helped establish public petitioning as a legitimate form of democratic participation and influenced later reform movements."
      levels: [teenager, adult, researcher]
    - year: 1999
      event: 'The UK Youth Parliament is established'
      significance: 'Created a national platform for young people aged 11-18 to engage in democratic debate and campaigning. The UK Youth Parliament has since held annual sittings in the House of Commons chamber and provided a structured route for youth political participation.'
      levels: [teenager, adult]
    - year: 2011
      event: 'UK Parliament Week is launched'
      significance: 'Established an annual festival of events across the UK designed to connect people with the work of Parliament and promote democratic engagement. The programme has grown to involve thousands of organisations and events each year.'
      levels: [adult, researcher]
    - year: 2015
      event: 'The House of Commons Petitions Committee is established and the new e-petitions system launches'
      significance: 'Created a dedicated select committee to oversee public petitions and introduced the dual-threshold e-petitions system (10,000 signatures for a government response, 100,000 for consideration of a debate). This institutional innovation gave the petitions process formal parliamentary oversight and investigative capacity for the first time.'
      levels: [teenager, adult, researcher]
    - year: 2020
      event: 'Parliament introduces virtual participation and digital engagement during the COVID-19 pandemic'
      significance: 'Accelerated the digital transformation of parliamentary engagement, with select committees holding virtual evidence sessions and expanding the use of online consultation tools. These innovations broadened geographic and demographic participation but also highlighted issues of digital exclusion.'
      levels: [adult, researcher]

key_figures:
