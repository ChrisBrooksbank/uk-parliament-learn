      role: 'First Chair of the Petitions Committee (2015-2017)'
      description: "As the inaugural chair of the House of Commons Petitions Committee, Helen Jones MP established the Committee's working practices and set the template for its proactive approach to public engagement. Under her leadership, the Committee developed its role beyond petition administration, launching substantive inquiries and corresponding directly with petitioners."
      levels: [adult, researcher]
    - name: "Feargus O'Connor"
      role: 'Chartist leader'
      description: "Feargus O'Connor (1796-1855) was the most prominent leader of the Chartist movement, which used mass petitioning as its primary political strategy. He presented the 1842 petition bearing over 3.3 million signatures to the House of Commons, demonstrating the power of collective public expression in the democratic process."
      levels: [teenager, adult, researcher]
    - name: 'Catherine McKinnell'
      role: 'Chair of the Petitions Committee (2020-2024)'
      description: "Catherine McKinnell MP chaired the Petitions Committee during a period of significant digital transformation, overseeing the Committee's adaptation to virtual proceedings during the COVID-19 pandemic and expanding its use of digital engagement tools to broaden public participation in the petitions process."
      levels: [adult, researcher]

