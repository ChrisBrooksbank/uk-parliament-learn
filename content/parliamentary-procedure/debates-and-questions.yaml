glossary:
  - term: "Prime Minister's Questions (PMQs)"
    definition_simple: "A time every Wednesday when MPs ask the Prime Minister questions about what the government is doing."
    definition_full: "A weekly session held each Wednesday at noon in the House of Commons Chamber, lasting at least 30 minutes, in which the Prime Minister answers questions from Members of Parliament. The format centres on open engagements questions that permit supplementary questions on any topic."
  - term: "Adjournment Debate"
    definition_simple: "A short debate at the end of the day where one MP can talk about an issue that matters to them or their local area."
    definition_full: "A debate held at the close of each sitting day under Standing Order No. 9(7), lasting approximately 30 minutes, in which a single backbench Member raises a specific topic and a minister responds. Adjournment debates are a mechanism for raising constituency and policy concerns directly with government."
  - term: "Urgent Question"
    definition_simple: "A special question that forces a minister to come to Parliament and answer questions about something important that has just happened."
    definition_full: "A question granted at the Speaker's discretion that requires a government minister to attend the House of Commons and answer questions on a matter of urgent public importance. Formerly known as Private Notice Questions, their use has increased substantially since 2009."
  - term: "Opposition Day"
    definition_simple: "A day when the parties that are not in government get to choose what Parliament talks about."
    definition_full: "One of 20 days per parliamentary session allocated under Standing Order No. 13 for debates on subjects chosen by opposition parties. The Official Opposition receives 17 days and the third largest party receives 3. Motions passed on Opposition Days are not legally binding but carry significant political weight."
  - term: "Written Question"
    definition_simple: "A question that an MP writes down and sends to a government minister, who must write back with an answer."
    definition_full: "A parliamentary question submitted in writing to a government department, to which a minister must provide a written response. Ordinary written questions should be answered within seven sitting days; named day questions specify a particular date for reply. Answers are published in Hansard."

did_you_know:
  - fact: "During Prime Minister's Questions, the first question is always the same: asking the PM to list their engagements for the day. This clever trick means the follow-up question can be about absolutely anything!"
    level: [child, teenager]
  - fact: "Speaker John Bercow became famous for shouting 'Order! Order!' during heated debates. He granted more urgent questions during his time as Speaker than all his recent predecessors combined."
    level: [child, teenager, adult]
  - fact: "Over 40,000 written parliamentary questions are tabled each session, making them the most prolific form of scrutiny in the House of Commons. Every answer becomes part of the permanent public record in Hansard."
    level: [adult, researcher]
  - fact: "Westminster Hall debates have been held since 1999 in a room with a horseshoe seating arrangement, deliberately designed to encourage less confrontational discussion than the adversarial layout of the main Chamber."
    level: [teenager, adult, researcher]
  - fact: "The tradition of PMQs only dates back to 1961. Before that, the Prime Minister answered questions on an ad hoc basis alongside other ministers, with no dedicated slot."
    level: [teenager, adult, researcher]

key_dates:
  - year: 1961
    event: "Introduction of dedicated Prime Minister's Questions"
    significance: "The Prime Minister was given a regular dedicated slot for oral questions, initially twice weekly on Tuesdays and Thursdays for approximately 15 minutes each, formalising the practice of direct prime ministerial accountability."
    levels: [teenager, adult, researcher]
  - year: 1997
    event: "PMQs consolidated into a single weekly session"
    significance: "Tony Blair replaced the twice-weekly 15-minute sessions with a single 30-minute session every Wednesday at noon, a format that has remained in place and increased the theatrical intensity of the occasion."
    levels: [teenager, adult, researcher]
  - year: 1999
    event: "Introduction of Westminster Hall sittings"
    significance: "A parallel debating chamber was established in the Grand Committee Room off Westminster Hall, providing additional time for backbench debates, e-petition discussions, and select committee report debates."
    levels: [adult, researcher]
  - year: 2009
    event: "Speaker Bercow begins expanding urgent questions"
    significance: "John Bercow's election as Speaker marked a dramatic increase in the granting of urgent questions, transforming them from a rarely used device into a regular tool of parliamentary accountability."
    levels: [adult, researcher]
  - year: 2010
    event: "Backbench Business Committee established"
    significance: "Following the Wright Committee recommendations, the Backbench Business Committee was created to give backbenchers greater control over the parliamentary agenda, including the allocation of debate time in the Chamber and Westminster Hall."
    levels: [teenager, adult, researcher]

key_figures:
  - name: "John Bercow"
    role: "Speaker of the House of Commons (2009-2019)"
    description: "Transformed the role of Speaker by dramatically expanding the use of urgent questions and championing the rights of backbenchers to hold the government to account. His tenure saw the number of urgent questions rise from a handful to over 100 per year in some sessions."
    levels: [teenager, adult, researcher]
  - name: "Tony Blair"
    role: "Prime Minister (1997-2007)"
    description: "Consolidated Prime Minister's Questions from two 15-minute sessions per week into a single 30-minute weekly session on Wednesdays, the format still used today. This change fundamentally altered the dynamics and media profile of PMQs."
    levels: [teenager, adult, researcher]
  - name: "Natascha Engel"
    role: "First Chair of the Backbench Business Committee (2010-2015)"
    description: "Led the newly created Backbench Business Committee from its inception, establishing its role in allocating debate time and giving backbenchers a meaningful voice in setting the parliamentary agenda."
    levels: [adult, researcher]
  - name: "Sir Lindsay Hoyle"
    role: "Speaker of the House of Commons (2019-present)"
    description: "Continued the practice of granting urgent questions to ensure government accountability and maintained the expanded role of the Speaker in facilitating scrutiny of the executive."
    levels: [child, teenager, adult]

quizzes:
  child:
    - question: "When does Prime Minister's Questions happen?"
      type: multiple_choice
      options: ["Every Monday morning", "Every Wednesday at lunchtime", "Every Friday afternoon", "Once a month"]
      answer: "Every Wednesday at lunchtime"
      explanation: "PMQs takes place every Wednesday at noon (lunchtime) and lasts at least 30 minutes."
    - question: "True or false: An MP can only ask the Prime Minister questions about one specific topic during PMQs."
      type: true_false
      answer: false
      explanation: "Because PMQs starts with an open question about the PM's engagements, MPs can ask follow-up questions about absolutely anything!"
    - question: "What is a written question?"
      type: multiple_choice
      options: ["A question written on the wall of Parliament", "A question an MP writes down and sends to a minister who must reply", "A question on a school test", "A question the Speaker writes for the PM"]
      answer: "A question an MP writes down and sends to a minister who must reply"
      explanation: "MPs can write questions to government ministers, who have to write back with an answer. These answers become part of the official record."
  teenager:
    - question: "How many Opposition Days are allocated per parliamentary session?"
      type: multiple_choice
      options: ["10", "15", "20", "25"]
      answer: "20"
      explanation: "There are 20 Opposition Days per session: 17 for the Official Opposition and 3 for the third largest party. These days allow opposition parties to choose the topic of debate."
    - question: "True or false: Motions passed on Opposition Day debates are legally binding on the government."
      type: true_false
      answer: false
      explanation: "Opposition Day motions are not legally binding, but they carry significant political weight, especially if the government loses the vote."
    - question: "What change did Speaker Bercow make to the use of urgent questions after 2009?"
      type: short_answer
      answer: "He dramatically increased the number of urgent questions granted, from a handful per session to over 100 per year in some sessions, making them a regular tool for holding the government to account."
      explanation: "Before Bercow, urgent questions (then called Private Notice Questions) were rarely granted. His willingness to grant them transformed parliamentary scrutiny of the government."
  adult:
    - question: "Explain the procedural significance of the 'open engagements question' in the format of Prime Minister's Questions."
      type: short_answer
      answer: "The open engagements question asks the Prime Minister to list their official engagements for the day. This procedural device is significant because it allows the supplementary question to be on any topic whatsoever, preventing the PM from preparing a specific answer in advance and ensuring genuine accountability across the full range of government activity."
      explanation: "Without this device, the PM would know the exact topic in advance and could prepare a detailed scripted response, reducing the scrutiny value of the session."
    - question: "What role does the Backbench Business Committee play in parliamentary debates?"
      type: short_answer
      answer: "The Backbench Business Committee, established in 2010 following the Wright Committee recommendations, allocates time for backbench debates in both the main Chamber and Westminster Hall. It gives backbenchers greater control over the parliamentary agenda by allowing them to propose and schedule debates on topics of their choosing, independent of government or opposition party control."
      explanation: "Before the Committee's creation, almost all debate time was controlled by the government or opposition frontbenches, leaving backbenchers with little influence over the agenda."
    - question: "Which of the following is NOT a type of parliamentary question in the House of Commons?"
      type: multiple_choice
      options: ["Oral question", "Written question", "Named day question", "Ministerial directive question"]
      answer: "Ministerial directive question"
      explanation: "The main types are oral questions (asked in the Chamber), ordinary written questions (answered within seven sitting days), and named day questions (specifying a date for reply). There is no such thing as a ministerial directive question."
  researcher:
    - question: "Critically assess the extent to which the expansion of urgent questions under Speakers Bercow and Hoyle has shifted the balance of power between the legislature and the executive in the House of Commons."
      type: essay
      answer: "A strong answer would analyse: the historical rarity of Private Notice Questions before 2009; the quantitative increase under Bercow (from single digits to over 100 per year); the procedural basis for the Speaker's discretion; the impact on government departments' preparedness and responsiveness; the political dynamics of ministers being summoned to the House at short notice; comparison with other scrutiny mechanisms; the argument that UQs represent a strengthening of backbench and opposition power; counterarguments regarding the theatrical nature of some UQs; and the sustainability of this practice under future Speakers."
      explanation: "This question requires analysis of the institutional dynamics between Speaker, backbenchers, and the executive, drawing on evidence from recent parliamentary practice."
    - question: "Evaluate the effectiveness of written parliamentary questions as a mechanism for transparency and government accountability, with reference to the Procedure Committee's findings on the quality and timeliness of government responses."
      type: essay
      answer: "A comprehensive response should address: the volume of written questions (over 40,000 per session); the distinction between ordinary and named day questions; the ministerial code obligation to provide accurate information; the Procedure Committee's findings on late and evasive answers; the role of written answers in creating a public record via Hansard; the use of written questions by both backbenchers and frontbenchers for different purposes; comparison with Freedom of Information requests as an alternative transparency mechanism; and proposals for reform including penalties for late or inadequate responses."
      explanation: "This question assesses understanding of the practical operation of written questions as a scrutiny tool and the institutional challenges of ensuring meaningful government responses."
    - question: "Analyse the constitutional and practical significance of Opposition Day debates, drawing on examples from the 2017-19 Parliament to illustrate their impact on government policy."
      type: essay
      answer: "An excellent answer would discuss: the allocation of Opposition Days under Standing Order No. 13; the non-binding nature of Opposition Day motions; the political significance of government defeats; specific examples from 2017-19 including defeats on Brexit motions; the argument that Opposition Days serve as a political barometer; the government's attempts to downplay the significance of defeats; the role of Opposition Days in agenda-setting and media coverage; and the broader question of whether non-binding votes can effectively constrain executive action."
      explanation: "This question examines the gap between formal constitutional status and practical political impact of Opposition Day debates."
