quizzes:
  child:
    - question: "Why do MPs have special protection to speak freely in Parliament?"
      type: multiple_choice
      options:
        - "So they can say anything they like anywhere without consequences"
        - "So they can speak honestly about important issues without being taken to court"
        - "So they never have to follow any rules"
      correct_answer: "So they can speak honestly about important issues without being taken to court"
      explanation: "Parliamentary privilege exists so that MPs can discuss important and sometimes controversial matters openly. Without this protection, powerful people could use the threat of legal action to stop MPs from speaking up."
    - question: "True or false: Parliamentary privilege means MPs can never get in trouble for anything they say, even outside Parliament."
      type: true_false
      correct_answer: "False"
      explanation: "Parliamentary privilege only protects what MPs say during official parliamentary proceedings, like debates and committee hearings. If an MP says something defamatory in a newspaper interview or on social media, they can be sued just like anyone else."
    - question: "What is the name of the 1689 law that protects MPs' freedom of speech in Parliament?"
      type: multiple_choice
      options:
        - "The Magna Carta"
        - "The Bill of Rights"
        - "The Human Rights Act"
      correct_answer: "The Bill of Rights"
      explanation: "The Bill of Rights 1689 includes Article 9, which says that freedom of speech in Parliament cannot be questioned in any court. This law is still in force today."
  teenager:
    - question: "What does Article 9 of the Bill of Rights 1689 protect?"
      type: multiple_choice
      options:
        - "The right of citizens to protest outside Parliament"
        - "The freedom of speech and debates in parliamentary proceedings from being questioned in court"
        - "The right of MPs to ignore court orders"
        - "The monarch's right to dissolve Parliament"
      correct_answer: "The freedom of speech and debates in parliamentary proceedings from being questioned in court"
      explanation: "Article 9 states that 'the freedom of speech and debates or proceedings in Parliament ought not to be impeached or questioned in any court or place out of Parliament.' This creates an absolute legal immunity for statements made during parliamentary proceedings."
    - question: "What does 'exclusive cognisance' mean?"
      type: short_answer
      correct_answer: "Parliament's right to control and manage its own internal affairs without interference from the courts."
      explanation: "Exclusive cognisance means that Parliament decides its own rules of procedure, disciplines its own members, and manages its own estate. The courts recognise this jurisdiction and generally will not interfere with how Parliament conducts its business."
    - question: "True or false: The sub judice rule is a law that legally prevents MPs from discussing active court cases in Parliament."
      type: true_false
      correct_answer: "False"
      explanation: "The sub judice rule is a parliamentary convention, not a law. It is a self-imposed restraint that requires MPs to avoid discussing matters that are before the courts, to prevent parliamentary debate from affecting ongoing legal cases. The Speaker can relax the rule in exceptional circumstances."
  adult:
    - question: "How did the Supreme Court's decision in R v Chaytor [2010] affect the scope of parliamentary privilege?"
      type: short_answer
      correct_answer: "The Court held that submitting parliamentary expense claims was not a 'proceeding in Parliament' within the meaning of Article 9, meaning MPs could not use privilege as a defence against criminal charges of false accounting. This established that privilege protects Parliament's core legislative and scrutiny functions, not administrative acts incidental to membership."
      explanation: "R v Chaytor was a landmark case because it demonstrated that the courts would apply a purposive interpretation to define the boundaries of Article 9. The decision rejected the argument that any activity taking place within the parliamentary context was automatically protected, instead requiring a connection to Parliament's core constitutional functions."
    - question: "Why does the distinction between 'proceedings in Parliament' and other parliamentary activities matter for the operation of privilege?"
      type: short_answer
      correct_answer: "Only 'proceedings in Parliament' are protected by Article 9's absolute immunity. Activities that are merely incidental to parliamentary membership -- such as constituency correspondence, media appearances, or administrative tasks like expense claims -- fall outside the protection. This distinction determines whether a member can be held legally accountable for a particular act."
      explanation: "The boundary of 'proceedings in Parliament' is the critical line between legal immunity and legal accountability. If the concept is drawn too broadly, privilege becomes a shield against legitimate legal claims. If drawn too narrowly, members may be deterred from speaking freely in the discharge of their parliamentary duties."
    - question: "What tension arises when an MP uses parliamentary privilege to disclose information that is subject to a court injunction?"
      type: short_answer
      correct_answer: "It creates a conflict between parliamentary free speech (Article 9 of the Bill of Rights) and the authority of the courts to control the disclosure of information through injunctions. The court order cannot be enforced against parliamentary speech, but the use of privilege to circumvent court orders raises questions about whether the privilege is being exercised for its intended constitutional purpose."
      explanation: "This tension was illustrated by the Hemming/Giggs case in 2011. Article 9 provides an absolute protection, so courts cannot prevent or punish disclosure made in proceedings. However, critics argue that using privilege to defeat court orders undermines the rule of law, while defenders argue that Parliament must retain the ability to discuss any matter of public concern."
  researcher:
    - question: "Critically assess the proposition that parliamentary privilege should be codified in statute. What are the arguments for and against replacing the current mixture of Article 9, case law, and parliamentary practice with a comprehensive statutory framework?"
      type: essay
      correct_answer: "Arguments for codification include legal certainty, democratic legitimacy, and the opportunity to incorporate human rights safeguards into the privilege framework. Arguments against include the risk that statutory definition would be subject to judicial interpretation and could narrow the scope of protection, the loss of flexibility inherent in the current evolutionary approach, and the constitutional principle that Parliament's privileges belong to Parliament and should not be defined by an external authority."
      explanation: "The Joint Committee on Parliamentary Privilege recommended in 2013 that 'proceedings in Parliament' should be defined in statute, but this has not been enacted. The codification debate engages fundamental questions about the relationship between parliamentary sovereignty, judicial review, and constitutional reform. Comparative analysis of jurisdictions with codified privilege (such as Australia's Parliamentary Privileges Act 1987) provides evidence on the practical consequences of codification."
    - question: "Analyse the European Court of Human Rights' reasoning in A v United Kingdom (2002) on the compatibility of parliamentary immunity with Article 6 ECHR. Does the proportionality analysis adequately address the rights of individuals affected by privileged speech?"
      type: essay
      correct_answer: "The Strasbourg Court held that parliamentary immunity pursued the legitimate aim of protecting free speech and the separation of powers, and fell within the state's margin of appreciation. The Court applied a proportionality test, considering whether the immunity was limited to its proper purpose. However, the absolute nature of Article 9 immunity -- which provides no mechanism for individuals to seek a remedy for harm caused by privileged speech -- raises questions about whether proportionality is genuinely satisfied in cases of deliberate misuse."
      explanation: "A v United Kingdom established that parliamentary privilege is in principle compatible with ECHR rights, but the reasoning leaves open questions about extreme cases. The absence of any avenue for redress when privilege is used to make deliberately false or damaging statements about private individuals represents a significant gap in rights protection. The tension between absolute parliamentary immunity and individual rights remains a live issue in comparative constitutional scholarship."
    - question: "Evaluate the constitutional significance of R v Chaytor [2010] for the relationship between the courts and Parliament. Did the Supreme Court's purposive interpretation of 'proceedings in Parliament' represent a legitimate exercise of judicial function or an encroachment on exclusive cognisance?"
      type: essay
      correct_answer: "The Supreme Court argued that determining the scope of Article 9 was a question of law for the courts, not a matter of exclusive cognisance. The purposive approach -- linking privilege to Parliament's core functions -- provided a principled basis for the decision. However, the ruling can be seen as an assertion of judicial authority over the boundaries of parliamentary autonomy, potentially opening the door to further judicial definition of privilege's scope in future cases."
      explanation: "R v Chaytor is constitutionally significant because it affirmed that the courts have jurisdiction to determine the boundaries of parliamentary privilege, even though they cannot question proceedings within those boundaries. This represents a subtle but important shift: the scope of the immunity is defined by judges, while the content within that scope remains Parliament's domain. Scholars remain divided on whether this jurisdictional claim is inherent in the judicial function or represents an encroachment on the constitutional autonomy of Parliament."
