    event: "The Haxey Case: Thomas Haxey is convicted of treason for introducing a bill criticising the royal household"
    significance: "One of the earliest recorded cases involving parliamentary free speech. The conviction was later reversed, establishing an early precedent that members should not be punished for matters raised in Parliament."
    levels: [adult, researcher]
  - year: 1629
    event: "Sir John Eliot imprisoned in the Tower of London for speeches in Parliament"
    significance: "Eliot's imprisonment and death in custody demonstrated the danger of allowing the Crown to punish parliamentary speech, and became a powerful argument for the statutory protection later enacted in the Bill of Rights 1689."
    levels: [teenager, adult, researcher]
  - year: 1689
    event: "The Bill of Rights receives Royal Assent, including Article 9 protecting parliamentary free speech"
    significance: "Established the statutory foundation of modern parliamentary privilege by declaring that 'the freedom of speech and debates or proceedings in Parliament ought not to be impeached or questioned in any court or place out of Parliament.' This remains the principal legal basis of parliamentary privilege."
    levels: [child, teenager, adult, researcher]
  - year: 2010
    event: "The Supreme Court decides R v Chaytor, limiting the scope of parliamentary privilege"
    significance: "The Court held that submitting parliamentary expense claims was not a 'proceeding in Parliament' and that MPs charged with false accounting could not rely on privilege as a defence. The decision clarified that privilege protects Parliament's core functions, not administrative acts incidental to membership."
    levels: [adult, researcher]
  - year: 2013
    event: "Joint Committee on Parliamentary Privilege publishes its report"
    significance: "Recommended that the scope of 'proceedings in Parliament' should be defined in statute to improve legal certainty. The report also recommended against extending privilege to cover communications between members and constituents, and proposed reforms to Parliament's contempt jurisdiction."
    levels: [researcher]

