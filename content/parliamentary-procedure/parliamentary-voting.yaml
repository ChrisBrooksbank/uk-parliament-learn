glossary:
    - term: 'Division'
      definition_simple: 'The process where MPs vote by walking through corridors called lobbies, so their votes can be counted.'
      definition_full: 'The formal voting procedure of the House of Commons in which Members physically walk through the Aye or No division lobbies to have their votes recorded by clerks and counted by tellers. A division is called when the result of a voice vote is challenged.'
    - term: 'Division Lobby'
      definition_simple: 'One of two special corridors next to the House of Commons Chamber that MPs walk through to cast their vote.'
      definition_full: "One of two corridors flanking the House of Commons Chamber through which Members pass during a division. The Aye Lobby is to the right of the Speaker's chair and the No Lobby to the left. Members' names are recorded as they pass through, and they are counted by tellers at the exit."
    - term: 'Teller'
      definition_simple: 'One of four people who count the MPs as they walk through the voting lobbies.'
      definition_full: "One of four Members appointed to count votes during a division, two from each side. Tellers are typically drawn from the whips' offices. They stand at the exits of the division lobbies, count the Members passing through, and report the result to the Speaker."
    - term: 'Casting Vote'
      definition_simple: 'The special vote the Speaker uses to break a tie, following a tradition of keeping things the way they are.'
      definition_full: "The vote exercised by the Speaker of the House of Commons when the numbers in a division are equal. By convention, the casting vote is exercised according to Denison's Rule, which directs the Speaker to vote in favour of further discussion and against introducing new measures, preserving the status quo."
    - term: 'Deferred Division'
      definition_simple: 'A type of vote where MPs fill in a ballot paper on Wednesday instead of walking through the lobbies straight away.'
      definition_full: 'A voting procedure introduced by Standing Order No. 41A in 2000, applicable to certain less contentious matters such as statutory instruments. Instead of a physical division in the Chamber, Members mark a ballot paper in the division lobby during a set period on the following Wednesday.'

did_you_know:
    - fact: 'When a division is called, bells ring all around Parliament for eight minutes. MPs have been known to run from the gym, the canteen, or even the bar to make it to the lobbies in time!'
      level: [child, teenager]
    - fact: 'The House of Commons does not have enough seats for all 650 MPs. During major divisions, the Chamber and lobbies can become extremely crowded, with MPs queuing to pass through the narrow lobby exits.'
      level: [child, teenager, adult]
    - fact: "During the Brexit debates of 2019, Speaker Bercow had to use his casting vote on several occasions, always following Denison's Rule to maintain the status quo rather than deciding the issue himself."
      level: [teenager, adult, researcher]
    - fact: 'In September 2019, 21 Conservative MPs had the whip withdrawn for voting against the government on a Brexit Bill, the largest mass withdrawal of the whip in modern parliamentary history. Most had it restored within months.'
      level: [teenager, adult, researcher]
    - fact: 'During the COVID-19 pandemic in 2020, MPs voted electronically for the first time in parliamentary history using an app on their phones. The House later voted to return to the traditional lobby system.'
      level: [teenager, adult, researcher]

key_dates:
    - year: 1867
      event: 'Speaker Denison articulates the casting vote convention'
      significance: "Speaker John Evelyn Denison set out the principles governing the Speaker's casting vote, establishing the convention that the Speaker votes to maintain the status quo and avoid deciding substantive questions, a rule still followed today."
      levels: [adult, researcher]
    - year: 1994
      event: 'Eight Conservative MPs have the whip withdrawn over Maastricht'
      significance: 'Eight Conservative rebels lost the whip for voting against the government on the European Communities (Finance) Bill, demonstrating both the severity of whip withdrawal as a disciplinary tool and the limits of party discipline on deeply divisive issues.'
      levels: [adult, researcher]
    - year: 2000
      event: 'Deferred divisions introduced'
      significance: 'Standing Order No. 41A established deferred divisions, allowing certain routine votes to be held by ballot paper on Wednesdays, reducing disruption to Chamber business and modernising voting procedures for less contentious matters.'
      levels: [teenager, adult, researcher]
    - year: 2019
      event: '21 Conservative MPs have the whip withdrawn over Brexit'
      significance: 'The largest mass withdrawal of the whip in modern parliamentary history occurred when 21 Conservative MPs voted against the government to prevent a no-deal Brexit, highlighting the tensions between party discipline and individual conscience on constitutional matters.'
      levels: [teenager, adult, researcher]
    - year: 2020
      event: 'First electronic voting in the House of Commons'
      significance: 'The COVID-19 pandemic forced the House to adopt remote electronic voting for the first time, using the MemberHub platform. Though temporary, the experiment prompted significant debate about permanently modernising voting procedures.'
      levels: [teenager, adult, researcher]

key_figures:
    - name: 'John Evelyn Denison'
      role: 'Speaker of the House of Commons (1857-1872)'
      description: "Articulated the convention governing the Speaker's casting vote in 1867, establishing principles that direct the Speaker to maintain the status quo and avoid deciding substantive questions. Denison's Rule remains the governing convention for casting votes today."
      levels: [adult, researcher]
    - name: 'Mark Spencer'
      role: 'Government Chief Whip (2019-2022)'
      description: 'Served as Government Chief Whip during a period of significant parliamentary turbulence including the COVID-19 pandemic and its impact on voting procedures. Managed the transition between remote voting and the return to physical divisions.'
      levels: [adult, researcher]
    - name: 'John Bercow'
      role: 'Speaker of the House of Commons (2009-2019)'
      description: "Exercised the casting vote on multiple occasions during the Brexit-related proceedings of 2019, applying Denison's Rule in novel procedural circumstances. His decisions demonstrated the continuing relevance and application of the casting vote convention."
      levels: [teenager, adult, researcher]

