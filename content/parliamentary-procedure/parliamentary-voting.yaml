quizzes:
    child:
        - question: 'How do MPs vote in the House of Commons?'
          type: multiple_choice
          options:
              [
                  'By pressing a button on their desk',
                  'By putting up their hand',
                  'By walking through a special corridor called a lobby',
                  'By shouting the loudest',
              ]
          answer: 'By walking through a special corridor called a lobby'
          explanation: 'MPs vote by walking through one of two division lobbies: the Aye Lobby if they want to vote yes, or the No Lobby if they want to vote no.'
        - question: 'True or false: When there is a tied vote, the Speaker can vote for whichever side they personally agree with.'
          type: true_false
          answer: false
          explanation: "The Speaker must follow Denison's Rule, which means they vote to keep things the way they are rather than choosing based on their own opinion."
        - question: 'What are tellers?'
          type: multiple_choice
          options:
              [
                  'People who tell MPs what to vote',
                  'People who count MPs as they walk through the lobbies',
                  'People who ring the division bells',
                  'People who write down the debates',
              ]
          answer: 'People who count MPs as they walk through the lobbies'
          explanation: 'Four tellers (two for each side) stand at the exits of the voting lobbies and count the MPs as they walk through.'
    teenager:
        - question: 'What is a three-line whip?'
          type: multiple_choice
          options:
              [
                  'An instruction underlined three times indicating the most important votes where attendance and loyalty are mandatory',
                  'A rule that allows MPs three chances to vote',
                  'A whip document sent out three days before a vote',
                  'An instruction that applies only to three senior MPs',
              ]
          answer: 'An instruction underlined three times indicating the most important votes where attendance and loyalty are mandatory'
          explanation: 'The weekly whip document uses underlining to indicate vote importance. A three-line whip is the strongest instruction, and defying it can result in having the whip withdrawn.'
        - question: 'True or false: During the COVID-19 pandemic, the House of Commons used electronic voting for the first time in its history.'
          type: true_false
          answer: true
          explanation: 'In April 2020, MPs voted electronically using the MemberHub app for the first time. The House later returned to traditional lobby divisions.'
        - question: 'What happens when a vote in the House of Commons is tied?'
          type: short_answer
          answer: "When a vote is tied, the Speaker exercises the casting vote according to Denison's Rule. This convention directs the Speaker to vote to maintain the status quo, rather than deciding the substantive question. This means voting against introducing new measures and in favour of further discussion."
          explanation: "Denison's Rule ensures that the Speaker does not determine policy on a casting vote, preserving the principle that decisions should be made by the elected Members."
    adult:
        - question: 'Explain the difference between a free vote and a whipped vote, and give examples of when each might be used.'
          type: short_answer
          answer: 'A whipped vote is one where the party issues a formal instruction to MPs on how to vote, with the strength of the instruction indicated by the number of lines under the item in the weekly whip document (one-line through three-line). Whipped votes are the norm for government legislation and confidence matters. A free vote occurs when parties do not issue a voting instruction, allowing MPs to vote according to personal conscience. Free votes are conventionally applied to matters of personal morality such as assisted dying, abortion, and hunting. However, even on free votes, informal pressures from colleagues, constituency parties, and media can influence voting behaviour.'
          explanation: 'The distinction between free and whipped votes reveals the tension between individual conscience and collective party discipline that pervades parliamentary democracy.'
        - question: 'What was the significance of the withdrawal of the whip from 21 Conservative MPs in September 2019?'
          type: short_answer
          answer: "In September 2019, 21 Conservative MPs voted against the government to prevent a no-deal Brexit by supporting a motion to take control of the parliamentary timetable. The government withdrew the whip from all 21, the largest mass withdrawal in modern parliamentary history. The episode highlighted the limits of party discipline on deeply divisive constitutional matters and included senior figures such as former Chancellor Philip Hammond and Winston Churchill's grandson Nicholas Soames. Most had the whip restored within months."
          explanation: 'This event illustrated the extreme tensions between executive authority and parliamentary sovereignty during the Brexit crisis.'
        - question: "Which of the following is NOT a principle of Speaker Denison's Rule?"
          type: multiple_choice
          options:
              [
                  'Vote to maintain the status quo',
                  'Vote in favour of further discussion',
                  "Vote according to the Speaker's personal political beliefs",
                  'Avoid deciding substantive questions on a casting vote',
              ]
          answer: "Vote according to the Speaker's personal political beliefs"
          explanation: "Denison's Rule specifically requires the Speaker to set aside personal views and vote to preserve the status quo, ensure further discussion, and avoid determining substantive policy on a casting vote."
    researcher:
        - question: 'Critically evaluate the arguments for and against replacing the physical division lobby system with electronic voting in the House of Commons, drawing on the experience of the COVID-19 pandemic and comparative evidence from other legislatures.'
          type: essay
          answer: "A strong answer would discuss: the historical and functional rationale for physical divisions (tradition, informal communication between members and ministers, the 'pairing' system); the practical drawbacks (time consumed, accessibility for disabled members, disruption to debate); the COVID-19 experience with remote electronic voting via MemberHub and subsequent physical queuing; the Procedure Committee's examination of permanent alternatives; comparative evidence from legislatures using electronic voting (e.g., European Parliament, Scottish Parliament, Welsh Senedd); arguments about the democratic significance of physical presence; the role of divisions in facilitating lobbying by whips; and the 2021 vote to restore traditional procedures."
          explanation: 'This question requires balanced analysis of institutional design, practical considerations, and constitutional principles.'
        - question: "Analyse the constitutional significance of Denison's Rule and its application during the Brexit-related proceedings of 2019, assessing whether the convention remains fit for purpose in the context of highly polarised parliamentary politics."
          type: essay
          answer: "A comprehensive response should address: the historical origins of the rule in Speaker Denison's statement of 1867; its codification in Erskine May; the principles underlying the convention (status quo preservation, avoidance of substantive decisions on a casting vote, encouragement of further discussion); Speaker Bercow's application of the rule during Brexit proceedings; specific instances where the casting vote was exercised and the procedural context; criticism that the rule's application was politically motivated; the counterargument that the rule was applied consistently with its historical principles; and the broader question of whether conventions designed for a less polarised era can withstand the pressures of modern constitutional crises."
          explanation: 'This question examines the resilience of parliamentary conventions under extreme political pressure.'
        - question: "Assess the effectiveness of the whipping system as a mechanism for maintaining party discipline in the House of Commons, with reference to major rebellions and the concept of 'anticipated reaction'."
          type: essay
          answer: "An excellent answer would discuss: the institutional structure of the whips' offices; the graduated system of one-line, two-line, and three-line whips; the sanctions available (withdrawal of the whip, deselection); empirical evidence on rebellion rates (Cowley 2005, Cowley and Stuart 2004); major rebellions including Maastricht (1992-93), Iraq War (2003), and Brexit (2017-19); the concept of anticipated reaction whereby the whipping system's effectiveness lies partly in its deterrent effect; the distinction between loyalty and acquiescence; the role of patronage and career incentives in maintaining discipline; the limitations of the whipping system when conscience or constituency pressure overrides party loyalty; and the special dynamics of free votes."
          explanation: 'This question requires analysis of both the formal and informal mechanisms of party discipline and their effectiveness in practice.'
