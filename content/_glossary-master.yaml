schema_version: '1.0'
description: 'Aggregated glossary of all terms from UK Parliament Learn topic files'
last_updated: 2026-03-09

terms:
    - term: 'Act of Parliament'
      definition_simple: 'A Bill that has been approved by Parliament and the King, so it is now an official law that everyone must follow.'
      definition_full: 'Primary legislation that has completed all parliamentary stages and received Royal Assent. Acts of Parliament are the highest form of domestic law in the UK and can only be repealed or amended by another Act (or, in limited circumstances, by delegated legislation exercising Henry VIII powers).'
      source_topics:
          - how-laws-are-made
          - what-is-parliament

    - term: 'Additional Member System'
      definition_simple: 'A voting system where you get two votes -- one for a local candidate and one for a party -- so that the overall result is fairer to smaller parties.'
      definition_full: 'A mixed electoral system combining single-member constituency seats (elected by FPTP) with regional list seats allocated proportionally to compensate for disproportionality in constituency results. Known internationally as Mixed-Member Proportional (MMP). Used for elections to the Scottish Parliament and the Senedd Cymru.'
      source_topics:
          - electoral-systems-and-reform

    - term: 'Adjournment Debate'
      definition_simple: 'A short debate at the end of the day where one MP can talk about an issue that matters to them or their local area.'
      definition_full: 'A debate held at the close of each sitting day under Standing Order No. 9(7), lasting approximately 30 minutes, in which a single backbench Member raises a specific topic and a minister responds. Adjournment debates are a mechanism for raising constituency and policy concerns directly with government.'
      source_topics:
          - debates-and-questions

    - term: 'Affirmative Procedure'
      definition_simple: 'A rule that says a Statutory Instrument can only become law if Parliament votes to approve it.'
      definition_full: 'A parliamentary procedure requiring that a Statutory Instrument be actively approved by resolution of each House (or the Commons alone for financial instruments) before it can come into force or remain in force. Used for more significant or controversial measures, the affirmative procedure provides stronger parliamentary scrutiny than the negative procedure.'
      source_topics:
          - delegated-legislation

    - term: 'All-Party Parliamentary Group'
      definition_simple: 'An informal group of MPs and Lords from different political parties who share an interest in a particular subject, like sport, health, or a country.'
      definition_full: 'An informal cross-party group of parliamentarians registered with the Parliamentary Commissioner for Standards. APPGs have no official parliamentary status or legislative power but serve as forums for discussion, inquiry, and awareness-raising on specific policy areas. They must declare external funding and benefits in kind.'
      source_topics:
          - lobbying-and-interest-groups

    - term: 'Alternative Vote'
      definition_simple: "A voting system where you rank candidates in order, and if no one gets more than half the votes, the person with the fewest votes is knocked out and their supporters' second choices are counted."
      definition_full: 'A preferential voting system used in single-member constituencies in which voters rank candidates. If no candidate achieves an absolute majority of first preferences, the lowest-polling candidate is eliminated and their votes redistributed according to second preferences. The process repeats until a candidate crosses the 50 per cent threshold. Rejected by UK voters in the 2011 referendum.'
      source_topics:
          - electoral-systems-and-reform

    - term: 'Amendment'
      definition_simple: 'A change suggested to a Bill while Parliament is discussing it, like editing a piece of writing.'
      definition_full: 'A proposed alteration to the text of a Bill during its passage through Parliament. Amendments may be tabled at Committee Stage, Report Stage, and (in the Lords) Third Reading. They must be selected by the Speaker or Lord Speaker and are subject to rules of admissibility.'
      source_topics:
          - how-laws-are-made

    - term: 'Article 9 (Bill of Rights 1689)'
      definition_simple: "A rule from 1689 that says anything MPs or Lords say during Parliament's official work cannot be challenged or punished by any court."
      definition_full: "The provision of the Bill of Rights 1689 that declares 'the freedom of speech and debates or proceedings in Parliament ought not to be impeached or questioned in any court or place out of Parliament.' Article 9 creates an absolute legal immunity for statements made in the course of parliamentary proceedings, forming the statutory foundation of parliamentary free speech. Its scope has been refined by case law, most notably in R v Chaytor [2010], which limited its application to the core legislative and scrutiny functions of Parliament."
      source_topics:
          - parliamentary-privilege

    - term: 'Authoritarianism'
      definition_simple: 'A way of running a country where one person or a small group has all the power and does not let people have a real say.'
      definition_full: 'A system of government characterised by concentrated power in a leader or small elite not constitutionally accountable to the populace, limited political pluralism, suppression of opposition, constrained civil liberties, and the absence of free and fair elections. Distinguished from totalitarianism by its tolerance of limited social pluralism and its reliance on political demobilisation rather than mass mobilisation.'
      source_topics:
          - what-is-authoritarianism

    - term: 'Authoritative Works'
      definition_simple: 'Important books written by experts that help explain how the UK constitution works, even though the books are not laws themselves.'
      definition_full: "Scholarly works on constitutional law and practice that serve as guides to the understanding and interpretation of the UK constitution. While they have no legal force, they are cited by courts, parliamentarians, and officials. Key works include Bagehot's 'The English Constitution' (1867), Dicey's 'Introduction to the Study of the Law of the Constitution' (1885), Jennings' 'The Law and the Constitution' (1933), and Erskine May's 'Parliamentary Practice.'"
      source_topics:
          - the-uk-constitution

    - term: 'Autocratisation'
      definition_simple: 'When a country gradually becomes less democratic and its leaders take more and more power for themselves.'
      definition_full: 'The process by which a political regime becomes substantially less democratic, whether through the erosion of democratic institutions in a democracy (democratic backsliding) or the deepening of authoritarian practices in an already non-democratic state. Measured by V-Dem as a statistically significant decline in democratic indices over a sustained period.'
      source_topics:
          - what-is-authoritarianism

    - term: 'Ballot Paper'
      definition_simple: 'The piece of paper you get at a polling station that lists the candidates. You put a cross next to the person you want to vote for.'
      definition_full: "The official paper issued to voters at a polling station listing the candidates standing in that constituency, along with their party names and emblems. Voters mark a single cross against their preferred candidate. Spoilt ballot papers (those incorrectly marked or left blank) are counted but excluded from candidates' totals."
      source_topics:
          - elections-and-voting

    - term: 'Barnett Formula'
      definition_simple: 'A method used to work out how much money Scotland, Wales, and Northern Ireland get from the UK government, based on how much is spent on similar things in England.'
      definition_full: 'A non-statutory mechanism, devised in 1978 by Chief Secretary to the Treasury Joel Barnett, for calculating changes to the block grants allocated to the devolved governments of Scotland, Wales, and Northern Ireland. The formula applies population-proportionate shares of changes in comparable English departmental spending. It has been criticised for not reflecting relative need and for lacking statutory authority or transparency.'
      source_topics:
          - devolution

    - term: 'Bicameral'
      definition_simple: 'A word meaning that Parliament has two separate groups, or chambers, that work together to make laws.'
      definition_full: 'A legislative system consisting of two separate chambers or houses. In the UK, the bicameral Parliament comprises the elected House of Commons (the lower house) and the appointed House of Lords (the upper house), each with distinct roles in the legislative process.'
      source_topics:
          - what-is-parliament

    - term: 'Bill'
      definition_simple: 'A written plan for a new law that Parliament discusses and votes on before it can become a real law.'
      definition_full: 'A formal proposal for legislation introduced in either House of Parliament. A Bill must pass through prescribed stages in both Houses and receive Royal Assent before it becomes an Act of Parliament.'
      source_topics:
          - how-laws-are-made

    - term: 'Budget'
      definition_simple: "The Government's big plan for how it will collect money through taxes and spend it on things like schools, hospitals, and roads."
      definition_full: "The Chancellor of the Exchequer's annual fiscal statement to the House of Commons, setting out the Government's tax proposals, spending plans, borrowing forecasts, and economic strategy. Tax changes take provisional effect immediately under the Provisional Collection of Taxes Act 1968 and are subsequently enacted through the Finance Bill."
      source_topics:
          - financial-scrutiny

    - term: 'By-election'
      definition_simple: 'A special election held in one area when its MP can no longer do the job, for example if they have died or decided to leave.'
      definition_full: 'An election held in a single constituency between general elections to fill a vacancy caused by the death, disqualification, or effective resignation of a sitting MP (via appointment to an office of profit under the Crown) or by a successful recall petition under the Recall of MPs Act 2015.'
      source_topics:
          - elections-and-voting

    - term: 'Cabinet Committee'
      definition_simple: 'A smaller group of ministers that meets to make decisions on a particular topic, so the full Cabinet does not have to discuss everything.'
      definition_full: 'A formally constituted sub-group of the Cabinet established by the Prime Minister to consider specific policy areas or issues. Cabinet committees may be standing or ad hoc. Their decisions carry the same authority as full Cabinet decisions and are subject to collective responsibility.'
      source_topics:
          - prime-minister-and-cabinet

    - term: 'Casting Vote'
      definition_simple: 'The special vote the Speaker uses to break a tie, following a tradition of keeping things the way they are.'
      definition_full: "The vote exercised by the Speaker of the House of Commons when the numbers in a division are equal. By convention, the casting vote is exercised according to Denison's Rule, which directs the Speaker to vote in favour of further discussion and against introducing new measures, preserving the status quo."
      source_topics:
          - parliamentary-voting

    - term: 'Centrism'
      definition_simple: 'A political position in the middle, where people take some ideas from the left and some from the right.'
      definition_full: 'A political orientation occupying the middle ground of the left-right spectrum, characterised by pragmatism, moderation, and a willingness to draw on ideas from both left and right. Centrists typically favour incremental reform over radical change and seek balanced, evidence-based approaches to policy.'
      source_topics:
          - political-spectrum

    - term: "Citizens' Assembly"
      definition_simple: 'A group of ordinary people chosen at random who come together to learn about and discuss an important issue, then suggest what should be done.'
      definition_full: "A deliberative democratic forum in which a randomly selected, demographically representative group of citizens is convened to learn about, discuss, and make recommendations on a specific policy issue. Citizens' assemblies draw on the theoretical work of James Fishkin and others and have been used in the UK (e.g., Climate Assembly UK, 2020), Ireland, and elsewhere."
      source_topics:
          - citizen-engagement-beyond-voting
          - direct-vs-representative-democracy

    - term: 'Civic Participation'
      definition_simple: 'All the different ways people get involved in their community and help shape how things are run, from volunteering to campaigning.'
      definition_full: 'The broad range of activities through which citizens engage with public life and democratic governance beyond the act of voting. Civic participation encompasses contacting elected representatives, campaigning, protesting, volunteering, serving on juries, participating in deliberative forums, and contributing to community organisations.'
      source_topics:
          - citizen-engagement-beyond-voting

    - term: 'Civil Liberties'
      definition_simple: 'The freedoms that people have from government interference, like freedom of speech, freedom of religion, and the right to privacy.'
      definition_full: 'Individual freedoms that protect against undue interference by the state, encompassing liberties such as freedom of expression, freedom of assembly and association, freedom of religion, the right to privacy, and freedom from arbitrary detention. In the UK, civil liberties have developed through a combination of common law, statute (including the HRA and the Equality Act), and constitutional convention. Unlike positive rights (entitlements to services or resources), civil liberties are primarily negative rights that constrain state action.'
      source_topics:
          - human-rights-and-civil-liberties

    - term: 'Civil Service'
      definition_simple: 'The team of people who work for the government but are not politicians -- they stay in their jobs even when the government changes after an election.'
      definition_full: 'The permanent, politically neutral body of officials employed by the Crown to administer central government. Civil servants serve the government of the day regardless of its political complexion, operating under the values of integrity, honesty, objectivity, and impartiality as set out in the Civil Service Code and enshrined in the Constitutional Reform and Governance Act 2010.'
      source_topics:
          - the-civil-service

    - term: 'Civil Service Code'
      definition_simple: 'A set of rules that tells civil servants how to behave, including being honest, fair, and not favouring any political party.'
      definition_full: 'The document setting out the core values and standards of behaviour required of civil servants: integrity, honesty, objectivity, and impartiality. Given statutory force by the Constitutional Reform and Governance Act 2010, the Code includes a right of appeal for civil servants who believe they are being asked to act in breach of its provisions.'
      source_topics:
          - the-civil-service

    - term: 'Class struggle'
      definition_simple: 'The idea that throughout history, there has been a fight between rich people who own things and workers who do not.'
      definition_full: 'A central concept in Marxist theory referring to the conflict between social classes with opposing economic interests -- principally the bourgeoisie (owners of the means of production) and the proletariat (workers who sell their labour). Marx argued that class struggle is the driving force of historical change.'
      source_topics:
          - what-is-communism

    - term: 'Co-optation'
      definition_simple: 'When a leader gives money, jobs, or special treatment to powerful people to keep them loyal and stop them from causing trouble.'
      definition_full: 'A strategy of authoritarian governance whereby the ruling elite selectively distributes material benefits, privileges, and access to resources to potential rivals, key supporters, and strategic social groups in exchange for their political loyalty, thereby reducing the likelihood of elite defection or organised opposition.'
      source_topics:
          - what-is-authoritarianism

    - term: 'Coalition Agreement'
      definition_simple: 'A written plan that parties in a coalition agree to follow, setting out what policies they will work on together.'
      definition_full: 'A political document negotiated between coalition partners setting out their agreed programme for government, the allocation of ministerial portfolios, and the mechanisms for managing the relationship. Coalition agreements are politically binding but have no legal enforceability; their effectiveness depends on trust, institutional structures, and political incentives.'
      source_topics:
          - coalition-and-minority-government

    - term: 'Coalition Government'
      definition_simple: 'When two or more political parties join together to run the country because no single party won enough seats on its own.'
      definition_full: "A government formed by two or more political parties that agree to share executive power, typically following a general election in which no single party has won an overall majority. Coalition governments are governed by a coalition agreement and by the convention of collective Cabinet responsibility, though the latter may be modified by agreed 'agreements to differ' on specific issues."
      source_topics:
          - coalition-and-minority-government

    - term: 'Collective Responsibility'
      definition_simple: 'The rule that all members of the Cabinet must agree in public with every decision the group makes, even if they disagreed in private.'
      definition_full: 'The constitutional convention requiring that all members of the Government publicly support Cabinet decisions. It has three elements: unanimity (all ministers defend agreed policy), confidence (the Government must retain the confidence of the House of Commons), and confidentiality (Cabinet deliberations remain secret). Ministers who cannot support a policy are expected to resign.'
      source_topics:
          - prime-minister-and-cabinet

    - term: 'Combined Authority'
      definition_simple: 'A group of councils that have joined together to work on big issues like transport, jobs, and housing across a wider area, often led by an elected mayor.'
      definition_full: 'A legal body established under the Local Democracy, Economic Development and Construction Act 2009, comprising two or more local authorities that agree to exercise certain functions jointly across a wider area. Combined authorities typically focus on transport, economic development, strategic planning, and skills. Where a devolution deal has been agreed with central government, a combined authority may be led by a directly elected mayor with additional devolved powers.'
      source_topics:
          - local-government

    - term: 'Command economy'
      definition_simple: 'A system where the government decides what to make, how much of it to make, and what price to charge, instead of letting people and businesses decide for themselves.'
      definition_full: "An economic system in which the central government, rather than market forces of supply and demand, determines what goods are produced, in what quantities, and at what prices. Command economies were a defining feature of Marxist-Leninist states, implemented through centralised planning mechanisms such as the Soviet Union's Gosplan and its five-year plans."
      source_topics:
          - what-is-communism

    - term: 'Committee Chair'
      definition_simple: 'The person in charge of a committee who decides how it runs and leads its meetings.'
      definition_full: "The elected presiding officer of a select committee, responsible for setting the committee's agenda, chairing evidence sessions, and representing the committee publicly. Since 2010, most departmental committee chairs have been elected by the whole House of Commons by secret ballot using the alternative vote."
      source_topics:
          - select-committees

    - term: 'Committee Report'
      definition_simple: 'A document written by a committee that explains what they found out and what they think the government should do.'
      definition_full: 'The published output of a select committee inquiry, containing findings, conclusions, and recommendations directed at the government. Reports are agreed on a cross-party basis, though dissenting opinions may be appended. The government is expected to respond to committee reports within 60 days.'
      source_topics:
          - select-committees

    - term: 'Common Law'
      definition_simple: 'Rules and principles that have been developed by judges through their decisions over hundreds of years, rather than being written down in Acts of Parliament.'
      definition_full: 'The body of law developed by the courts through judicial decisions, as distinct from statute law enacted by Parliament. In constitutional terms, common law has established principles including the rule of law, the presumption of legality, natural justice, and aspects of the royal prerogative. Common law constitutional principles serve as interpretive guides and, through the principle of legality, as de facto constraints on legislative power.'
      source_topics:
          - the-uk-constitution

    - term: 'Commonwealth'
      definition_simple: 'A group of 56 countries, mostly with historical ties to the British Empire, that choose to work together on things like trade, education, and human rights.'
      definition_full: 'A voluntary association of 56 sovereign states, the majority of which have historical connections to the British Empire. The Commonwealth promotes democracy, human rights, good governance, and sustainable development through the Harare Declaration principles (1991, updated at Kigali 2022). It operates by consensus and has no binding authority over members, though membership can be suspended for serious violations of core principles. The monarch of the United Kingdom serves as the Head of the Commonwealth.'
      source_topics:
          - the-uk-and-international-bodies

    - term: 'Communism'
      definition_simple: 'The idea that everything in a country -- like factories, farms, and land -- should be owned and shared by everyone equally, with no rich or poor people.'
      definition_full: 'A political and economic ideology originating in the work of Karl Marx and Friedrich Engels, advocating for the collective ownership of the means of production, the abolition of private property, and the establishment of a classless, stateless society. In practice, communist states have been characterised by one-party rule, centralised economic planning, and state ownership of productive resources.'
      source_topics:
          - what-is-communism

    - term: 'Competitive Authoritarianism'
      definition_simple: 'A system where elections happen but are unfair because the people in power cheat and use dirty tricks to make sure they win.'
      definition_full: 'A hybrid regime type, defined by Levitsky and Way, in which formal democratic institutions exist and are widely regarded as the principal means of gaining power, but incumbent abuse of the state -- through media control, harassment of opposition, abuse of state resources, and limited fraud -- tilts the playing field so severely that the regime fails to meet minimum democratic standards, even as genuine competition persists.'
      source_topics:
          - what-is-authoritarianism

    - term: 'Confidence and Supply'
      definition_simple: 'When a smaller party agrees to support the government on important votes like the budget without actually joining the government.'
      definition_full: 'An arrangement whereby a party outside government agrees to support the government on votes of confidence (which determine whether the government remains in office) and supply (the budget and financial legislation), while retaining freedom to vote independently on other matters. Unlike a coalition, the supporting party does not receive ministerial positions.'
      source_topics:
          - coalition-and-minority-government

    - term: 'Constituency'
      definition_simple: 'An area of the country that chooses one person to be its MP in Parliament.'
      definition_full: "A geographically defined electoral district returning one Member of Parliament to the House of Commons. The UK's 650 constituencies are periodically redrawn by the Boundary Commissions to maintain roughly equal electorates, currently within 5 per cent of the electoral quota."
      source_topics:
          - elections-and-voting
          - house-of-commons
          - what-is-parliament

    - term: 'Constitutional Convention'
      definition_simple: 'An unwritten rule about how the government should behave that everyone agrees to follow, even though it is not an actual law.'
      definition_full: 'A non-legal rule of constitutional practice that is regarded as binding by those to whom it applies, but which is not enforceable by the courts. Conventions regulate the exercise of legal powers; their breach provokes political rather than legal consequences. Key examples include the Monarch acting on ministerial advice, collective Cabinet responsibility, and the Sewel Convention on devolution.'
      source_topics:
          - the-uk-constitution
          - prime-minister-and-cabinet

    - term: 'Constitutional Monarchy'
      definition_simple: 'A system where a country has a King or Queen, but their powers are limited by rules and laws. The real power belongs to Parliament and the government.'
      definition_full: 'A form of government in which a hereditary monarch serves as head of state within a framework of laws, conventions, and constitutional constraints that vest substantive governing power in elected institutions. In the UK, the monarch reigns but does not rule, exercising formal powers only on ministerial advice.'
      source_topics:
          - the-monarchy

    - term: 'Constitutional Reform'
      definition_simple: 'Changes made to the rules about how the country is governed, like creating a new court or changing how the government works.'
      definition_full: "The process of altering the UK's constitutional arrangements through legislation, institutional change, or evolving conventions. Major recent reforms include devolution (1998-), the Human Rights Act 1998, the creation of the Supreme Court (Constitutional Reform Act 2005), and the reform of the House of Lords. The UK's uncodified constitution allows reform through ordinary legislation, without the special amendment procedures required in codified systems."
      source_topics:
          - the-uk-constitution

    - term: 'Constitutional Reform Act 2005'
      definition_simple: "The law that created the Supreme Court as a separate court, changed the Lord Chancellor's job, and set up a new system for choosing judges."
      definition_full: 'The Act of Parliament that created the Supreme Court, reformed the office of Lord Chancellor (removing the requirement to be a lawyer and a peer, and transferring the headship of the judiciary to the Lord Chief Justice), established the Judicial Appointments Commission, and imposed a statutory duty on ministers to uphold judicial independence. It represents the most significant structural reform of the judiciary in modern British history.'
      source_topics:
          - the-supreme-court

    - term: 'Contempt of Parliament'
      definition_simple: 'When someone does something that gets in the way of Parliament doing its work, such as lying to a committee or threatening an MP.'
      definition_full: 'Any act or omission that obstructs or impedes either House of Parliament in the performance of its functions, or that obstructs or impedes any member or officer of such House in the discharge of their duty. Contempt encompasses a wide range of conduct including giving false evidence to a committee, attempting to intimidate witnesses or members, and breaching parliamentary orders. Parliament retains the theoretical power to fine or imprison for contempt, though the penal jurisdiction has not been exercised by the Commons since 1880.'
      source_topics:
          - parliamentary-privilege

    - term: 'Council of Europe'
      definition_simple: 'An international organisation of 46 countries that works to protect human rights, democracy, and the rule of law in Europe. It is separate from the European Union.'
      definition_full: 'An intergovernmental organisation founded in 1949, comprising 46 member states, with a mandate to uphold human rights, democracy, and the rule of law. The Council of Europe oversees the European Convention on Human Rights and the European Court of Human Rights. It is distinct from the European Union: membership is broader, and its focus is on human rights and legal standards rather than economic integration.'
      source_topics:
          - the-uk-and-international-bodies

    - term: 'Council Tax'
      definition_simple: 'A payment that people who own or rent a home make to their local council, which the council uses to pay for local services like schools, bin collection, and parks.'
      definition_full: 'A property-based local tax on domestic dwellings, introduced in 1993 by the Local Government Finance Act 1992 to replace the community charge (poll tax). Properties are assigned to one of eight valuation bands (A to H) based on their estimated value as at 1 April 1991. Councils set the annual rate, subject to central government controls including referendum requirements for increases above a specified threshold. Council tax is the principal source of locally raised revenue for English local authorities.'
      source_topics:
          - local-government

    - term: 'Court Hierarchy'
      definition_simple: 'The system of courts arranged from lowest to highest, with more important or difficult cases being heard in higher courts and the Supreme Court at the very top.'
      definition_full: "The structured arrangement of courts in England and Wales, from magistrates' courts and county courts at the base, through the Crown Court and High Court, to the Court of Appeal and the Supreme Court at the apex. The hierarchy determines which courts hear which types of case and the routes of appeal. Scotland and Northern Ireland have separate court structures that feed into the Supreme Court for final appeals."
      source_topics:
          - the-supreme-court

    - term: 'CRaG Act'
      definition_simple: 'A law that gives Parliament the chance to look at and raise objections to treaties before the government officially agrees to them.'
      definition_full: 'The Constitutional Reform and Governance Act 2010 (CRaG), Part 2 of which established a statutory framework for parliamentary scrutiny of treaties. Under CRaG, the government must lay a treaty before Parliament for 21 sitting days before ratification. If the House of Commons resolves against ratification, the government cannot proceed for a further 21 sitting days, and this cycle can be repeated. The House of Lords may debate but cannot block ratification. The Act replaced the informal Ponsonby Rule that had operated since 1924.'
      source_topics:
          - the-uk-and-international-bodies

    - term: 'Crossbencher'
      definition_simple: 'A member of the House of Lords who does not belong to any political party.'
      definition_full: 'An independent member of the House of Lords who sits on the crossbenches, affiliated with no political party. Crossbench peers are often appointed on the recommendation of the House of Lords Appointments Commission.'
      source_topics:
          - house-of-lords

    - term: 'Declaration of Incompatibility'
      definition_simple: "A formal statement by a court saying that a UK law does not match up with people's human rights, telling Parliament it should think about changing the law."
      definition_full: 'Under Section 4 of the Human Rights Act 1998, a declaration issued by a higher court when it determines that a provision of primary legislation is incompatible with a Convention right and cannot be interpreted compatibly under Section 3. A declaration does not affect the validity, continuing operation, or enforcement of the legislation, preserving parliamentary sovereignty. However, it creates significant political pressure for legislative amendment; Parliament has responded to the vast majority of final declarations by changing the law.'
      source_topics:
          - human-rights-and-civil-liberties
          - democratic-safeguards

    - term: 'Deferred Division'
      definition_simple: 'A type of vote where MPs fill in a ballot paper on Wednesday instead of walking through the lobbies straight away.'
      definition_full: 'A voting procedure introduced by Standing Order No. 41A in 2000, applicable to certain less contentious matters such as statutory instruments. Instead of a physical division in the Chamber, Members mark a ballot paper in the division lobby during a set period on the following Wednesday.'
      source_topics:
          - parliamentary-voting

    - term: 'Delegated Legislation'
      definition_simple: 'Rules made by Government ministers using powers given to them by an Act of Parliament, without needing a whole new law.'
      definition_full: "Secondary legislation made by ministers or other bodies under powers conferred by an Act of Parliament (the 'parent' or 'enabling' Act). The most common form is the Statutory Instrument. Delegated legislation is subject to parliamentary scrutiny through affirmative or negative procedures but cannot be amended by Parliament."
      source_topics:
          - how-laws-are-made

    - term: 'Deliberative Democracy'
      definition_simple: 'A way of making decisions where people carefully discuss and think about an issue together before making up their minds.'
      definition_full: "A normative model of democracy emphasising the role of reasoned public deliberation in producing legitimate and epistemically sound collective decisions. Drawing on Habermas's discourse theory and developed practically through Fishkin's Deliberative Polling, it holds that democratic legitimacy derives from the quality of public reasoning among free and equal citizens, not merely from the aggregation of pre-formed preferences through voting."
      source_topics:
          - direct-vs-representative-democracy

    - term: 'Democracy'
      definition_simple: 'A way of running a country where the people choose their leaders by voting and everyone has a say.'
      definition_full: 'A system of government in which sovereign authority is vested in the people and exercised directly or through elected representatives, characterised by free and fair elections, the rule of law, the protection of fundamental rights and civil liberties, and political equality among citizens.'
      source_topics:
          - what-is-democracy

    - term: 'Departmental Select Committee'
      definition_simple: 'A group of MPs from different parties who check on a specific government department, like Health or Education.'
      definition_full: 'A cross-party committee of the House of Commons established to examine the expenditure, administration, and policy of a specific government department and its associated public bodies. Each departmental committee typically has 11 members and its chair is elected by the whole House by secret ballot.'
      source_topics:
          - select-committees

    - term: 'Devolution'
      definition_simple: 'When the UK Parliament gives some of its powers to parliaments or assemblies in Scotland, Wales, and Northern Ireland, so they can make their own decisions about certain things.'
      definition_full: 'The statutory delegation of legislative and executive competences from the UK Parliament at Westminster to sub-state institutions -- the Scottish Parliament, the Senedd Cymru, and the Northern Ireland Assembly. Devolution differs from federalism in that the devolved powers are granted by and can, in principle, be withdrawn by the sovereign Westminster Parliament, though political convention and statutory provisions make this practically very difficult.'
      source_topics:
          - devolution

    - term: 'Devolution Deal'
      definition_simple: 'An agreement between the national government and a group of local councils that gives the local area more power to make decisions about things like transport and jobs.'
      definition_full: 'A bespoke agreement negotiated bilaterally between central government and a combined authority (or, in some cases, a single local authority) setting out the specific powers, functions, and funding to be devolved. Devolution deals vary significantly in scope and ambition: some transfer powers over transport, adult education, and housing, while others include control over specific funding streams or business rate retention. The deal-based model has been criticised for its opacity, inconsistency, and lack of a clear statutory framework.'
      source_topics:
          - local-government

    - term: 'Devolved Powers'
      definition_simple: 'The areas that the Scottish Parliament, Welsh Senedd, or Northern Ireland Assembly are allowed to make laws about, like health, education, and the environment.'
      definition_full: "Policy areas over which legislative and executive competence has been transferred from the UK Parliament to the devolved legislatures. The scope of devolved powers varies between the three settlements: Scotland has the broadest range, including some tax-varying powers, while Northern Ireland's transferred matters are subject to a consociational governance model requiring cross-community consent."
      source_topics:
          - devolution

    - term: 'Direct Democracy'
      definition_simple: 'A type of democracy where people vote on decisions themselves, instead of choosing someone else to decide for them.'
      definition_full: "A form of democracy in which citizens exercise legislative power directly through personal participation in deliberation and voting on policy and legislation, rather than delegating authority to elected representatives. Historical examples include the Athenian Ecclesia; modern examples include Swiss referendums and citizens' initiatives."
      source_topics:
          - direct-vs-representative-democracy
          - what-is-democracy

    - term: 'Dissolution'
      definition_simple: 'The formal ending of a whole Parliament, which triggers a general election so that the people can choose new MPs.'
      definition_full: 'The formal termination of a Parliament, triggering a general election. Following the repeal of the Fixed-term Parliaments Act 2011 by the Dissolution and Calling of Parliament Act 2022, the power to dissolve Parliament was restored to the Crown, exercised on the advice of the Prime Minister. Dissolution ends the Parliament entirely (as distinct from prorogation, which ends only the current session), and all seats in the House of Commons are vacated. The 2022 Act includes an ouster clause intended to prevent judicial review of the dissolution decision.'
      source_topics:
          - standing-orders-and-sessions

    - term: 'Division'
      definition_simple: 'The process where MPs vote by walking through corridors called lobbies, so their votes can be counted.'
      definition_full: 'The formal voting procedure of the House of Commons in which Members physically walk through the Aye or No division lobbies to have their votes recorded by clerks and counted by tellers. A division is called when the result of a voice vote is challenged.'
      source_topics:
          - parliamentary-voting

    - term: 'Division Lobby'
      definition_simple: 'One of two special corridors next to the House of Commons Chamber that MPs walk through to cast their vote.'
      definition_full: "One of two corridors flanking the House of Commons Chamber through which Members pass during a division. The Aye Lobby is to the right of the Speaker's chair and the No Lobby to the left. Members' names are recorded as they pass through, and they are counted by tellers at the exit."
      source_topics:
          - parliamentary-voting

    - term: 'E-petition'
      definition_simple: 'An online petition on the UK Parliament website where people can ask the government or Parliament to take action on an issue. If enough people sign, the government must respond or Parliament may debate it.'
      definition_full: 'A digital petition submitted through the UK Government and Parliament e-petitions platform (petition.parliament.uk), available to British citizens and UK residents aged 16 and over. The system operates on a threshold model: petitions reaching 10,000 signatures receive a mandatory written government response; those reaching 100,000 signatures are considered for debate in Westminster Hall. The platform is jointly administered by the House of Commons Petitions Committee and the relevant government department.'
      source_topics:
          - petitions-and-public-engagement

    - term: 'Elected Mayor'
      definition_simple: 'A person chosen by local voters to lead a council or a group of councils, making important decisions about how the area is run.'
      definition_full: 'A directly elected individual who serves as the political leader of either a single local authority (under the Local Government Act 2000) or a combined authority (under the Cities and Local Government Devolution Act 2016). Elected mayors hold executive powers and provide visible, accountable leadership. Combined authority mayors -- sometimes called metro mayors -- typically have additional powers over transport, strategic planning, and economic development devolved through deals with central government.'
      source_topics:
          - local-government

    - term: 'Electoral Commission'
      definition_simple: 'An independent organisation that makes sure elections in the UK are run fairly and that political parties follow the rules about money.'
      definition_full: 'The independent regulatory body established by the Political Parties, Elections and Referendums Act 2000, responsible for overseeing elections, regulating political finance (including party registration, donation transparency, and campaign spending limits), providing guidance to electoral administrators, and directly administering referendums.'
      source_topics:
          - elections-and-voting

    - term: 'Equality Act 2010'
      definition_simple: 'A UK law that says people must not be treated unfairly because of things like their race, sex, disability, age, or religion.'
      definition_full: 'An Act of Parliament that consolidated and replaced previous anti-discrimination legislation, providing a comprehensive framework for the protection of individuals from discrimination, harassment, and victimisation. The Act identifies nine protected characteristics (age, disability, gender reassignment, marriage and civil partnership, pregnancy and maternity, race, religion or belief, sex, and sexual orientation) and prohibits direct and indirect discrimination in employment, services, education, and other areas. The public sector equality duty (Section 149) requires public bodies to have due regard to equality considerations.'
      source_topics:
          - human-rights-and-civil-liberties

    - term: 'Estimates'
      definition_simple: 'The detailed plans that Government departments send to Parliament showing how much money they need to spend.'
      definition_full: 'The formal mechanism by which the House of Commons authorises Government spending. Departments submit Main Estimates (for the coming financial year), Supplementary Estimates (for in-year adjustments), and Excess Votes (for expenditure exceeding previous authorisation). Estimates are approved through Supply resolutions and given statutory effect by Consolidated Fund Bills and the Appropriation Act.'
      source_topics:
          - financial-scrutiny

    - term: 'European Convention on Human Rights'
      definition_simple: 'An international agreement that sets out the basic rights and freedoms that everyone in the member countries of the Council of Europe should have, like the right to life and freedom from torture.'
      definition_full: 'An international treaty adopted in 1950 under the auspices of the Council of Europe, establishing a catalogue of fundamental rights and freedoms enforceable through individual petition to the European Court of Human Rights in Strasbourg. The Convention protects rights including the right to life (Article 2), the prohibition of torture (Article 3), the right to a fair trial (Article 6), respect for private and family life (Article 8), freedom of expression (Article 10), and the prohibition of discrimination (Article 14). The Convention has been supplemented by additional protocols extending and clarifying the rights protected.'
      source_topics:
          - human-rights-and-civil-liberties

    - term: 'Evidence Session'
      definition_simple: 'A meeting where a committee invites people to come and answer questions about an important topic.'
      definition_full: 'A formal hearing in which a select committee takes oral testimony from witnesses, who may include ministers, civil servants, experts, or members of the public. Evidence sessions are usually held in public and broadcast on Parliament TV. Written evidence is also gathered and published alongside oral testimony.'
      source_topics:
          - select-committees

    - term: 'Exclusive Cognisance'
      definition_simple: "Parliament's right to manage its own business and make its own rules without the courts getting involved."
      definition_full: "The principle that each House of Parliament has sole jurisdiction over its own proceedings, procedures, and internal affairs, free from interference by the courts. Exclusive cognisance encompasses Parliament's power to determine its own procedure through Standing Orders, to discipline members, to punish contempts, and to control the parliamentary estate. The courts recognise this jurisdiction but have increasingly defined its boundaries, as demonstrated in R v Chaytor [2010]."
      source_topics:
          - parliamentary-privilege

    - term: 'Fascism'
      definition_simple: "A type of government where one powerful leader takes total control of a country, stops people having a say, and often blames certain groups for the country's problems."
      definition_full: "A far-right, authoritarian, ultranationalist political ideology and system of government characterised by dictatorial power, the forcible suppression of opposition, rigid social regimentation, and the subordination of individual interests to the perceived needs of the nation or race. The term originates from the Italian 'fascio littorio,' the bundle of rods symbolising authority in ancient Rome."
      source_topics:
          - what-is-fascism

    - term: 'First Lord of the Treasury'
      definition_simple: 'An old title that has always gone with the job of Prime Minister since the very first PM.'
      definition_full: 'A historic office of state held concurrently by the Prime Minister since Robert Walpole. The title is displayed on the door of 10 Downing Street and is the formal basis upon which the PM occupies the residence, which was granted to the office of First Lord of the Treasury in 1735.'
      source_topics:
          - prime-minister-and-cabinet

    - term: 'First Past the Post'
      definition_simple: 'A way of choosing a winner where the person with the most votes wins, even if they do not get more than half of all the votes.'
      definition_full: 'A plurality-based electoral system in which the candidate receiving the largest number of votes in a single-member constituency is elected, without any requirement to achieve an absolute majority. Also known as single-member plurality (SMP).'
      source_topics:
          - elections-and-voting
          - house-of-commons

    - term: 'Freedom of Assembly'
      definition_simple: 'The right of people to gather together peacefully, for example to protest or march about something they care about.'
      definition_full: 'The fundamental democratic right of individuals to gather peacefully for the purposes of protest, demonstration, or collective expression. Protected by Article 11 of the European Convention on Human Rights and incorporated into UK law through the Human Rights Act 1998, freedom of assembly is subject to proportionate restrictions in the interests of public safety or the prevention of disorder.'
      source_topics:
          - citizen-engagement-beyond-voting

    - term: 'Glorious Revolution'
      definition_simple: 'When King James II was replaced by William and Mary in 1688, which made Parliament more powerful than the King.'
      definition_full: 'The events of 1688-1689 in which King James II was deposed and replaced by William III and Mary II. The subsequent Bill of Rights 1689 and the constitutional settlement it embodied established parliamentary sovereignty, prohibited the Crown from suspending laws or levying taxes without parliamentary consent, and guaranteed free elections and freedom of speech in Parliament.'
      source_topics:
          - history-of-parliament

    - term: 'Government Department'
      definition_simple: 'A large team of people who work for the government on one big topic, like health, defence, or education.'
      definition_full: 'An organisational unit of central government headed by a Secretary of State or equivalent minister, staffed by civil servants, and responsible for developing and implementing policy in a defined area. Departments are created, merged, and abolished by the Prime Minister using prerogative powers, with functions transferred through Orders under the Ministers of the Crown Act 1975.'
      source_topics:
          - ministers-and-departments

    - term: 'Green Paper'
      definition_simple: 'A document where the Government shares early ideas and asks people what they think before making a plan for a new law.'
      definition_full: 'A Government consultation document that sets out proposals at a preliminary stage, inviting responses from interested parties and the public. Green Papers are used to test opinion and gather evidence before the Government commits to a policy position, which may then be set out in a White Paper.'
      source_topics:
          - how-laws-are-made

    - term: 'Hansard'
      definition_simple: 'The written record of everything that is said in Parliament.'
      definition_full: 'The official verbatim report of proceedings in both Houses of Parliament. Named after Thomas Curson Hansard, who published early editions, it provides a substantially verbatim account of debates, questions, and statements.'
      source_topics:
          - house-of-commons

    - term: 'Henry VIII Power'
      definition_simple: 'A special power that lets a Government minister change or remove parts of an existing law without Parliament having to pass a new Act.'
      definition_full: 'A provision in an Act of Parliament that authorises ministers to amend or repeal primary legislation through delegated legislation (typically a Statutory Instrument). Named after the Statute of Proclamations 1539, which gave Henry VIII the power to make proclamations with the force of statute. Henry VIII powers are constitutionally controversial because they allow the executive to alter Acts of Parliament without full parliamentary debate.'
      source_topics:
          - delegated-legislation

    - term: 'Hereditary peer'
      definition_simple: 'A Lord whose title was passed down from a parent. Most hereditary peers were removed from the Lords in 1999.'
      definition_full: 'A member of the peerage who inherits their title through descent. The House of Lords Act 1999 removed all but 92 hereditary peers from the chamber, and subsequent legislation aims to remove the remaining hereditary element entirely.'
      source_topics:
          - house-of-lords

    - term: 'Human Rights Act 1998'
      definition_simple: "A UK law that protects people's basic rights, like the right to a fair trial and freedom of speech, by bringing the European Convention on Human Rights into UK law."
      definition_full: 'An Act of Parliament that incorporates the rights and freedoms guaranteed by the European Convention on Human Rights into UK domestic law. Its principal mechanisms are: Section 3 (an obligation on courts to interpret legislation compatibly with Convention rights so far as possible), Section 6 (making it unlawful for public authorities to act incompatibly with Convention rights), and Section 4 (enabling higher courts to issue declarations of incompatibility where primary legislation cannot be read compatibly). The HRA preserves parliamentary sovereignty by not giving courts the power to strike down legislation.'
      source_topics:
          - human-rights-and-civil-liberties

    - term: 'Hung Parliament'
      definition_simple: 'When no single political party wins enough seats in a general election to have more than half the MPs in the House of Commons.'
      definition_full: 'A parliamentary situation in which no single party commands an overall majority of seats in the House of Commons (currently 326 of 650). A hung parliament requires political negotiation to determine the formation of government, whether through coalition, confidence-and-supply, or minority administration.'
      source_topics:
          - coalition-and-minority-government

    - term: 'Impartiality'
      definition_simple: 'Not taking sides or favouring one political party over another, which is a key rule for civil servants.'
      definition_full: 'The principle that civil servants must serve the government of the day with equal commitment regardless of its political complexion, and must not allow their personal political views to influence their work. Impartiality is one of the four core Civil Service values and is operationalised through restrictions on political activity that vary by grade.'
      source_topics:
          - the-civil-service

    - term: 'Institutional Forbearance'
      definition_simple: 'When leaders choose not to use all their powers to the limit, even when they legally could, because doing so would be unfair or damage democracy.'
      definition_full: 'A concept developed by Levitsky and Ziblatt referring to the exercise of restraint in deploying institutional prerogatives to their fullest legal extent. Institutional forbearance is an informal democratic norm: political actors voluntarily refrain from actions that, while technically legal, would undermine democratic competition or institutional balance. The erosion of forbearance -- using legal powers in unprecedented or maximalist ways -- is identified as a key mechanism of democratic backsliding.'
      source_topics:
          - democratic-safeguards

    - term: 'Joint Committee'
      definition_simple: 'A committee made up of members from both the House of Commons and the House of Lords working together.'
      definition_full: 'A committee comprising members of both Houses of Parliament, typically appointed for a specific purpose such as pre-legislative scrutiny of draft Bills. The Joint Committee on Human Rights and joint committees on draft legislation are prominent examples.'
      source_topics:
          - select-committees

    - term: 'Judicial Appointments Commission'
      definition_simple: 'The independent body that chooses who becomes a judge in England and Wales, to make sure judges are picked fairly based on their ability.'
      definition_full: 'An independent body established by the Constitutional Reform Act 2005 to select candidates for judicial appointment in England and Wales. The JAC selects on merit through fair and open competition, aiming to depoliticise the appointments process and encourage diversity. For Supreme Court appointments, a separate ad hoc selection commission is convened with UK-wide representation.'
      source_topics:
          - the-supreme-court

    - term: 'Judicial Independence'
      definition_simple: 'The principle that judges must be free to make their decisions based on the law alone, without being told what to decide by politicians or anyone else.'
      definition_full: 'The constitutional principle that the judiciary must be free from interference by the executive and legislature in the discharge of its judicial functions. In the UK, judicial independence is protected by security of tenure (senior judges can only be removed by an address of both Houses of Parliament), financial independence (salaries charged on the Consolidated Fund), and the statutory duty imposed on ministers by Section 3 of the Constitutional Reform Act 2005.'
      source_topics:
          - the-supreme-court

    - term: 'Judicial Review'
      definition_simple: 'The process by which courts check whether the government and public bodies have acted lawfully and fairly.'
      definition_full: 'The process by which the courts scrutinise the legality of decisions and actions of public bodies, including government ministers. The traditional grounds are illegality, irrationality, and procedural impropriety (Lord Diplock, GCHQ case, 1985), supplemented by proportionality in human rights cases. Judicial review does not examine the merits of a decision but whether it was made lawfully.'
      source_topics:
          - the-supreme-court
          - democratic-safeguards

    - term: "King's Consent"
      definition_simple: "Special permission the King must give before Parliament can discuss certain bills that affect the King's own powers or property."
      definition_full: "A parliamentary convention distinct from Royal Assent, requiring the monarch's consent to be signified before either House may debate a bill that would affect the royal prerogative or the personal property and interests of the Crown. Though treated as a formality, it has attracted scrutiny as a potentially opaque mechanism of monarchical influence over the legislative process."
      source_topics:
          - the-monarchy

    - term: "King's Speech"
      definition_simple: 'A speech the King reads out at the State Opening of Parliament, telling everyone what the government plans to do. The government writes the speech, not the King.'
      definition_full: "The address delivered by the monarch from the throne in the House of Lords at the State Opening of Parliament, setting out the government's legislative programme for the forthcoming session. Though read by the sovereign, the speech is drafted entirely by the government and represents its policy agenda, not the personal views of the monarch."
      source_topics:
          - the-monarchy

    - term: 'Left Wing'
      definition_simple: 'The side of politics that believes the government should do more to make sure everyone is treated fairly and equally.'
      definition_full: 'The portion of the political spectrum characterised by a commitment to reducing social and economic inequality through state intervention, redistribution of wealth, public ownership, and robust welfare provision. Left-wing ideologies include social democracy, democratic socialism, and communism.'
      source_topics:
          - political-spectrum

    - term: 'Legislative Competence'
      definition_simple: 'The legal authority that a parliament or assembly has to make laws about certain topics.'
      definition_full: 'The legal power of a legislature to enact primary legislation in specified subject areas. In the UK devolution context, legislative competence defines the boundaries of what the devolved legislatures may lawfully legislate on. Acts of the devolved legislatures that fall outside their legislative competence may be struck down by the courts. The boundaries of competence are defined by the relevant devolution statutes and interpreted by the UK Supreme Court.'
      source_topics:
          - devolution

    - term: 'Libertarianism'
      definition_simple: 'The belief that people should have as much personal freedom as possible and the government should not interfere too much in their lives.'
      definition_full: 'A political philosophy that prioritises individual liberty, personal autonomy, and minimal state interference in both economic and personal life. Libertarianism spans the economic spectrum: right-libertarians emphasise free markets and property rights, while left-libertarians combine individual freedom with egalitarian economic arrangements.'
      source_topics:
          - political-spectrum

    - term: 'Life peer'
      definition_simple: 'A person chosen to sit in the House of Lords for the rest of their life, but who cannot pass the title to their children.'
      definition_full: 'A member of the House of Lords appointed under the Life Peerages Act 1958, holding a barony for their lifetime only. Life peerages are created by the monarch on the advice of the Prime Minister.'
      source_topics:
          - house-of-lords

    - term: 'Lobbying'
      definition_simple: 'Trying to persuade MPs, Lords, or Government ministers to make decisions or laws that you agree with.'
      definition_full: 'The process by which individuals, organisations, or their representatives seek to influence the decisions of legislators, ministers, and public officials through direct communication, research, campaigning, or other means. In the UK, consultant lobbying of ministers and permanent secretaries is regulated by the Transparency of Lobbying Act 2014.'
      source_topics:
          - lobbying-and-interest-groups

    - term: 'Lords Spiritual'
      definition_simple: 'The 26 bishops from the Church of England who sit in the House of Lords.'
      definition_full: 'The 26 senior bishops of the Church of England who hold ex officio seats in the House of Lords, comprising the Archbishops of Canterbury and York, the Bishops of London, Durham, and Winchester, and the 21 next most senior diocesan bishops by date of appointment.'
      source_topics:
          - house-of-lords

    - term: 'Magna Carta'
      definition_simple: 'A very important document from 1215 that said even the King had to follow the law.'
      definition_full: 'A charter of liberties sealed by King John at Runnymede on 15 June 1215, under baronial coercion. Though many of its provisions addressed specific feudal grievances, its broader principles -- that the monarch was subject to law and that taxation required consent -- became foundational to the development of parliamentary authority and constitutional government.'
      source_topics:
          - history-of-parliament

    - term: 'Margin of Appreciation'
      definition_simple: 'The idea that each country should have some room to decide for itself how to apply human rights rules, because different countries may have different views on certain issues.'
      definition_full: 'A doctrine developed by the European Court of Human Rights that accords states a degree of discretion in how they implement and apply the rights guaranteed by the Convention, recognising that national authorities may be better placed to assess the necessity of restrictions on qualified rights in their specific democratic context. The width of the margin varies depending on the nature of the right, the seriousness of the interference, the existence of a European consensus, and whether the case concerns a particularly sensitive area such as national security or morality.'
      source_topics:
          - human-rights-and-civil-liberties

    - term: 'Means of production'
      definition_simple: 'The things needed to make goods -- like factories, machines, land, and raw materials.'
      definition_full: 'In Marxist theory, the physical and non-human inputs used to produce economic value, including factories, machinery, land, raw materials, and infrastructure. The question of who owns and controls the means of production is central to the distinction between capitalism (private ownership) and communism (collective ownership).'
      source_topics:
          - what-is-communism

    - term: 'Minister of State'
      definition_simple: 'A minister who works under a Secretary of State and helps run part of a government department.'
      definition_full: 'A middle-ranking minister within a government department who takes responsibility for a defined policy portfolio under the direction of the Secretary of State. Ministers of State are appointed by the Crown on the advice of the Prime Minister and are accountable to Parliament.'
      source_topics:
          - ministers-and-departments

    - term: 'Ministerial Code'
      definition_simple: 'A set of rules written by the Prime Minister that tells ministers how they should behave.'
      definition_full: 'A document issued by the Prime Minister setting out the rules and standards of conduct for ministers of the Crown. It has no statutory basis and is enforced solely by the PM. It covers duties including not misleading Parliament, managing conflicts of interest, and upholding collective responsibility.'
      source_topics:
          - prime-minister-and-cabinet

    - term: 'Ministerial Responsibility'
      definition_simple: 'The rule that ministers must answer to Parliament for what happens in their departments and take the blame if things go wrong.'
      definition_full: 'A constitutional convention with two dimensions: individual ministerial responsibility (each minister is personally accountable to Parliament for the policies, decisions, and administration of their department) and collective ministerial responsibility (all Government ministers must publicly support Cabinet decisions). Breaches are enforced politically rather than legally.'
      source_topics:
          - ministers-and-departments

    - term: 'Mixed-Member Proportional'
      definition_simple: 'Another name for the Additional Member System -- a way of voting where some seats go to local candidates and others go to party lists to make the result more proportional.'
      definition_full: 'The international term for the Additional Member System (AMS). A mixed electoral system that combines single-member constituency representation with proportional list seats, using the list allocation to correct for disproportionality generated by the constituency results. Used in Germany and New Zealand as well as in Scotland and Wales.'
      source_topics:
          - electoral-systems-and-reform

    - term: 'Model Parliament'
      definition_simple: 'A parliament called by King Edward I in 1295 that included ordinary people from towns as well as lords and bishops.'
      definition_full: "The Parliament summoned by Edward I in 1295, which included representatives from the clergy, nobility, knights of the shire, and burgesses from the boroughs. Later historians termed it the 'Model Parliament' because its broad composition set a template for future parliamentary assemblies, though the degree to which it directly influenced subsequent practice is debated."
      source_topics:
          - history-of-parliament

    - term: 'MP Surgery'
      definition_simple: 'A special meeting time when you can go and talk to your local MP about things that matter to you.'
      definition_full: 'A scheduled constituency session in which a Member of Parliament meets constituents in person to hear their concerns, provide advice, and take up individual cases. Surgeries are a key mechanism of direct representation, enabling citizens to engage with their elected representative on a face-to-face basis.'
      source_topics:
          - citizen-engagement-beyond-voting

    - term: 'National Audit Office'
      definition_simple: "An independent organisation that checks the Government's accounts to make sure public money has been spent properly and wisely."
      definition_full: "The UK's supreme audit institution, headed by the Comptroller and Auditor General, an Officer of the House of Commons. The NAO conducts financial audits of Government accounts and value-for-money examinations of how public money has been spent. Its reports provide the evidence base for the Public Accounts Committee's inquiries."
      source_topics:
          - financial-scrutiny

    - term: 'NATO'
      definition_simple: 'The North Atlantic Treaty Organisation -- a group of countries that have agreed to defend each other if any member is attacked.'
      definition_full: 'The North Atlantic Treaty Organisation, a military alliance established by the North Atlantic Treaty of 1949. Its core principle is collective defence under Article 5: an armed attack against one member is considered an attack against all. NATO has 32 member states (following the accession of Finland in 2023 and Sweden in 2024) and provides the framework for collective defence planning, joint military exercises, and crisis management operations.'
      source_topics:
          - the-uk-and-international-bodies

    - term: 'Negative Procedure'
      definition_simple: 'A rule that says a Statutory Instrument automatically becomes law unless Parliament votes to cancel it within a set number of days.'
      definition_full: 'A parliamentary procedure under which a Statutory Instrument is laid before Parliament and automatically comes into force unless either House passes a prayer for annulment within 40 sitting days. The majority of SIs are subject to the negative procedure, and most receive no parliamentary debate.'
      source_topics:
          - delegated-legislation

    - term: 'Nolan Principles'
      definition_simple: 'Seven rules for people in public life, including being honest, open, and putting the public first rather than their own interests.'
      definition_full: 'The Seven Principles of Public Life articulated by the Committee on Standards in Public Life (the Nolan Committee) in 1995: selflessness, integrity, objectivity, accountability, openness, honesty, and leadership. These principles apply to all holders of public office, including ministers, MPs, peers, civil servants, and local councillors, and provide the ethical framework for public conduct in the UK.'
      source_topics:
          - lobbying-and-interest-groups

    - term: 'Office for Budget Responsibility'
      definition_simple: "A group of independent experts who check the Government's plans for taxes and spending to make sure the numbers add up."
      definition_full: "An independent fiscal institution established by the Budget Responsibility and National Audit Act 2011. The OBR produces economic and fiscal forecasts, assesses the Government's performance against its fiscal rules, and analyses the long-term sustainability of the public finances. Its independence from the Treasury is designed to ensure credible and unbiased fiscal projections."
      source_topics:
          - financial-scrutiny

    - term: 'Official Opposition'
      definition_simple: 'The second-biggest party in the House of Commons, whose job it is to challenge the government and ask tough questions.'
      definition_full: "His Majesty's Most Loyal Opposition, formally recognised as the largest party in the House of Commons not in government. The Leader of the Opposition is a salaried office under the Ministerial and other Salaries Act 1975, and the Opposition maintains a Shadow Cabinet to scrutinise government departments."
      source_topics:
          - political-parties

    - term: 'Opposition Day'
      definition_simple: 'A day when the parties that are not in government get to choose what Parliament talks about.'
      definition_full: 'One of 20 days per parliamentary session allocated under Standing Order No. 13 for debates on subjects chosen by opposition parties. The Official Opposition receives 17 days and the third largest party receives 3. Motions passed on Opposition Days are not legally binding but carry significant political weight.'
      source_topics:
          - debates-and-questions

    - term: 'Order in Council'
      definition_simple: 'A special type of law made by the King on the advice of senior ministers, used for important matters like implementing international decisions.'
      definition_full: 'A form of legislation made by the Sovereign at a meeting of the Privy Council, on the advice of ministers. Orders in Council may be made under statutory authority (and subject to normal parliamentary scrutiny) or under the royal prerogative (and subject only to judicial review). They are used for purposes including implementing UN Security Council resolutions, extending legislation to Crown Dependencies, and transferring functions between departments.'
      source_topics:
          - delegated-legislation

    - term: 'Palingenesis'
      definition_simple: "The idea of a country being 'born again' or made completely new -- fascist leaders promised this kind of national rebirth."
      definition_full: "From the Greek 'palin' (again) and 'genesis' (birth), the concept of national rebirth or regeneration. In Roger Griffin's scholarly framework, palingenetic myth -- the narrative that a nation must undergo revolutionary transformation to be reborn from a period of perceived decadence -- constitutes the ideological core that distinguishes fascism from other forms of authoritarianism."
      source_topics:
          - what-is-fascism

    - term: 'Parliament Acts'
      definition_simple: 'Laws from 1911 and 1949 that stopped the House of Lords from blocking bills forever. Now the Lords can only delay a bill for one year.'
      definition_full: "The Parliament Acts of 1911 and 1949 are statutes that curtail the legislative power of the House of Lords. The 1911 Act replaced the Lords' absolute veto with a suspensory power of two years; the 1949 Act reduced this to one year. Money bills may be delayed for one month only."
      source_topics:
          - house-of-lords

    - term: 'Parliamentary Outreach'
      definition_simple: 'The work Parliament does to help people across the UK understand how Parliament works, including school visits, workshops, and events.'
      definition_full: "The programmes and activities delivered by Parliament's Education and Engagement Service to promote public understanding of and participation in parliamentary democracy. Outreach encompasses school workshops (both on the parliamentary estate and through visits to schools across the UK), teacher training, community events, the UK Youth Parliament, UK Parliament Week, and digital engagement initiatives. The programme aims to build political literacy and lower barriers to democratic participation, particularly among underrepresented communities."
      source_topics:
          - petitions-and-public-engagement

    - term: 'Parliamentary Privilege'
      definition_simple: 'Special rights and protections given to Members of Parliament and Lords so they can speak freely and do their job without being taken to court.'
      definition_full: "A body of law and custom conferring legal immunities and exclusive rights on the Houses of Parliament, their members, and officers. Parliamentary privilege has two principal components: freedom of speech in proceedings (protected by Article 9 of the Bill of Rights 1689) and exclusive cognisance (Parliament's right to manage its own internal affairs without interference from the courts). Its constitutional purpose is to ensure the independence of the legislature."
      source_topics:
          - parliamentary-privilege

    - term: 'Parliamentary Session'
      definition_simple: 'A period of time, usually about one year, during which Parliament meets to debate, make laws, and hold the government to account.'
      definition_full: 'The primary temporal unit of parliamentary activity, running from one State Opening to the next prorogation (or dissolution). Sessions typically last approximately one year, though their length can vary. The sessional structure has important procedural consequences: most unfinished business falls at the end of each session, and sessional Standing Orders expire at prorogation. The government manages its legislative programme within the sessional timetable, creating strategic incentives around the timing of prorogation.'
      source_topics:
          - standing-orders-and-sessions

    - term: 'Parliamentary Sovereignty'
      definition_simple: 'The idea that Parliament is the most powerful law-making body in the country and no one can overrule it.'
      definition_full: 'The constitutional doctrine, as articulated by A.V. Dicey, that Parliament possesses the supreme legal authority to make or unmake any law, that no Parliament may bind a future Parliament, and that no body -- including the courts -- may override or set aside an Act of Parliament.'
      source_topics:
          - what-is-parliament
          - democratic-safeguards

    - term: 'Permanent Secretary'
      definition_simple: 'The most senior civil servant in a government department who helps run it and stays in the job even when ministers change.'
      definition_full: 'The most senior civil servant in a ministerial department, serving as principal policy adviser to the Secretary of State, departmental manager, and accounting officer. As accounting officer, the Permanent Secretary is personally responsible for the propriety, regularity, value for money, and feasibility of departmental expenditure and may be called before the Public Accounts Committee.'
      source_topics:
          - the-civil-service

    - term: 'Petitions Committee'
      definition_simple: 'A group of MPs in the House of Commons who look after the petitions system, decide which petitions should be debated, and investigate the issues people raise.'
      definition_full: 'A departmental select committee of the House of Commons, established by Standing Order on 30 March 2015, with responsibility for overseeing the e-petitions system. The Committee checks petitions for eligibility, determines which qualifying petitions should be scheduled for debate, takes oral and written evidence, commissions research, publishes reports, and corresponds with petitioners. It has the full powers of a select committee, including the ability to summon witnesses and compel the production of documents.'
      source_topics:
          - petitions-and-public-engagement

    - term: 'Political Compass'
      definition_simple: 'A chart that maps political views on two lines: one for economic ideas (left to right) and one for social ideas (authoritarian to libertarian).'
      definition_full: 'A two-dimensional model of political ideology that plots positions on an economic axis (left-right) and a social axis (authoritarian-libertarian), producing four quadrants: authoritarian left, authoritarian right, libertarian left, and libertarian right. Popularised through its online test (launched 2001), it addresses the limitation of the one-dimensional spectrum by capturing both economic and social dimensions of political belief.'
      source_topics:
          - political-spectrum

    - term: 'Political Party'
      definition_simple: 'A group of people who share similar ideas about how the country should be run and work together to try to win elections.'
      definition_full: 'An organised group of individuals who share a broad set of political beliefs and policy goals, registered with the Electoral Commission under PPERA 2000, that selects candidates for public office, contests elections, and seeks to form or influence government.'
      source_topics:
          - political-parties

    - term: 'Prerogative Powers'
      definition_simple: "Special powers that belong to the King, though in practice they are used by the government on the King's behalf."
      definition_full: "Common-law powers, privileges, and immunities historically vested in the Crown, now largely exercised by ministers on the monarch's behalf. They include appointing the Prime Minister, summoning and proroguing Parliament, and granting Royal Assent. Their exercise is constrained by constitutional convention and, as established in R (Miller) v The Prime Minister [2019], by judicial review."
      source_topics:
          - the-monarchy

    - term: 'Pressure Group'
      definition_simple: "An organisation that campaigns to change something it cares about, like protecting the environment or improving workers' rights, without trying to win elections."
      definition_full: 'An organised group that seeks to influence public policy without contesting elections. Categorised as either sectional groups (representing the interests of a specific section of society, such as trade unions or professional associations) or cause groups (campaigning for a particular principle or policy objective, such as environmental protection or civil liberties).'
      source_topics:
          - lobbying-and-interest-groups

    - term: "Prime Minister's Questions (PMQs)"
      definition_simple: 'A time every Wednesday when MPs get to ask the Prime Minister questions in the House of Commons.'
      definition_full: 'A weekly session held each Wednesday at noon in which the Prime Minister answers questions from Members of Parliament for at least 30 minutes. The Leader of the Opposition is permitted up to six questions, and the format centres on open engagements questions allowing supplementary queries on any topic.'
      source_topics:
          - house-of-commons
          - debates-and-questions

    - term: 'Proletariat'
      definition_simple: 'The working people -- those who work in factories, shops, and fields, but do not own the businesses.'
      definition_full: 'In Marxist theory, the social class comprising those who do not own the means of production and must sell their labour power to survive. Marx identified the proletariat as the revolutionary class whose historical role was to overthrow capitalism and establish a classless society.'
      source_topics:
          - what-is-communism

    - term: 'Proportional Representation'
      definition_simple: 'A way of running elections so that the number of seats a party wins matches more closely the number of votes it gets.'
      definition_full: "A category of electoral systems designed to produce a close correspondence between parties' shares of the total vote and their shares of seats in the legislature. PR systems include list-based methods, the Single Transferable Vote, and mixed systems with proportional top-ups."
      source_topics:
          - electoral-systems-and-reform

    - term: 'Proportionality'
      definition_simple: "The idea that when the government limits someone's rights, it should only do so as much as is truly necessary and not go further than it needs to."
      definition_full: "A legal principle requiring that any restriction on a Convention right must be rationally connected to a legitimate aim, no more restrictive than necessary to achieve that aim, and must strike a fair balance between the individual's rights and the wider public interest. Proportionality has replaced the traditional Wednesbury reasonableness test in human rights cases in the UK, providing a more structured and intensive standard of judicial review. The test is applied when assessing the compatibility of legislation or executive action with qualified Convention rights."
      source_topics:
          - human-rights-and-civil-liberties

    - term: 'Prorogation'
      definition_simple: 'The formal ending of a parliamentary session by the monarch, on the advice of the Prime Minister. When Parliament is prorogued, most unfinished work is lost.'
      definition_full: "The formal act of ending a parliamentary session, effected by the Crown on the advice of the Prime Minister. Prorogation terminates the current session, causing most unfinished business (including bills that have not completed all their stages) to fall, unless a carry-over motion has been passed. The constitutional significance of prorogation was underscored by the Supreme Court's decision in R (Miller) v The Prime Minister [2019], which held that a prorogation that frustrated Parliament's ability to perform its constitutional functions was unlawful."
      source_topics:
          - standing-orders-and-sessions

    - term: 'Public Accounts Committee'
      definition_simple: 'A group of MPs whose job is to check that the Government has not wasted public money.'
      definition_full: 'The House of Commons select committee responsible for examining the economy, efficiency, and effectiveness of Government expenditure. Established in 1861 and conventionally chaired by a member of the official opposition, the PAC uses NAO reports to hold Accounting Officers (usually Permanent Secretaries) to account for departmental spending.'
      source_topics:
          - financial-scrutiny

    - term: 'Public Consultation'
      definition_simple: 'When a parliamentary committee asks members of the public, organisations, and experts to share their views and knowledge about an issue the committee is looking into.'
      definition_full: "A formal process through which select committees invite written and oral evidence from individuals, organisations, and experts as part of a parliamentary inquiry. Consultations typically begin with the publication of terms of reference and an open call for evidence. Submissions are assessed on their merits and may inform the committee's findings and recommendations. The process is a key mechanism for incorporating public knowledge, professional expertise, and lived experience into parliamentary scrutiny and policy development."
      source_topics:
          - petitions-and-public-engagement

    - term: 'Public Gallery'
      definition_simple: 'Special seating areas in the House of Commons and House of Lords where members of the public can sit and watch debates and other proceedings for free.'
      definition_full: 'Designated seating areas within the chambers of the House of Commons and House of Lords from which members of the public may observe parliamentary proceedings. Access is free of charge and available whenever the relevant House is sitting, subject to security screening and the availability of seats. The public galleries serve a dual constitutional function: facilitating public scrutiny of parliamentary conduct and reinforcing the transparency of the legislative process.'
      source_topics:
          - petitions-and-public-engagement

    - term: 'Referendum'
      definition_simple: 'A special vote where everyone in the country gets to decide on one important question, answering yes or no.'
      definition_full: 'A direct vote by the electorate on a specific political question or proposed piece of legislation. In the UK, referendums are not constitutionally required but may be called by Act of Parliament. They can be advisory or binding, though this distinction has been a source of constitutional debate, particularly following the 2016 EU referendum.'
      source_topics:
          - direct-vs-representative-democracy

    - term: 'Reform Act'
      definition_simple: 'A law that changed the rules about who was allowed to vote, letting more people have a say in elections.'
      definition_full: 'One of several Acts of Parliament in the 19th century (principally 1832, 1867, and 1884) that progressively extended the electoral franchise and reformed the distribution of parliamentary seats, eliminating rotten boroughs and enfranchising successively wider sections of the male population.'
      source_topics:
          - history-of-parliament

    - term: 'Register of Consultant Lobbyists'
      definition_simple: 'A public list of people and companies who are paid to lobby Government ministers on behalf of someone else.'
      definition_full: 'A statutory register established by the Transparency of Lobbying Act 2014, maintained by the Office of the Registrar of Consultant Lobbyists. Consultant lobbyists who make personal oral or written communications to ministers or permanent secretaries on behalf of third-party clients must register, disclose their clients, and update entries quarterly. The register does not cover in-house lobbyists or lobbying of other officials.'
      source_topics:
          - lobbying-and-interest-groups

    - term: 'Representative Democracy'
      definition_simple: 'A type of democracy where people vote for representatives, like MPs, who then make decisions on their behalf.'
      definition_full: 'A form of democracy in which citizens elect representatives to a legislature or executive office, delegating decision-making authority while retaining the power to hold those representatives accountable through periodic elections. It is the dominant form of democratic governance in modern nation-states, addressing the impracticality of direct participation at scale.'
      source_topics:
          - direct-vs-representative-democracy
          - what-is-democracy

    - term: 'Reserved Powers'
      definition_simple: 'The important areas that only the UK Parliament in London is allowed to make decisions about, like defence, foreign affairs, and immigration.'
      definition_full: 'Matters that remain within the exclusive legislative competence of the UK Parliament at Westminster and are not transferred to devolved legislatures. In the Scottish and (since 2017) Welsh models, reserved matters are enumerated in statute, with everything not listed being devolved. Key reserved areas include defence, foreign affairs, immigration, the constitution, and most macroeconomic policy.'
      source_topics:
          - devolution

    - term: 'Right Wing'
      definition_simple: 'The side of politics that believes people and businesses should have more freedom to make their own choices, with less government involvement.'
      definition_full: 'The portion of the political spectrum characterised by support for free markets, private enterprise, individual economic freedom, lower taxation, and limited government intervention. Right-wing ideologies include conservatism, classical liberalism, and neoliberalism. The right also tends to emphasise tradition, social order, and established institutions.'
      source_topics:
          - political-spectrum

    - term: 'Royal Assent'
      definition_simple: "The King's approval that turns a Bill into a law. This has not been refused since 1708."
      definition_full: 'The formal approval by the Sovereign that converts a Bill into an Act of Parliament. Governed by the Royal Assent Act 1967, it is now normally signified by Letters Patent. It has not been withheld since Queen Anne refused the Scottish Militia Bill in 1708 and is regarded as a constitutional formality.'
      source_topics:
          - how-laws-are-made
          - the-monarchy
          - what-is-parliament

    - term: 'Royal Prerogative'
      definition_simple: 'Special powers that originally belonged to the King or Queen but are now mostly used by the Prime Minister and ministers on their behalf.'
      definition_full: 'The residue of discretionary powers legally vested in the Crown, exercised almost entirely on the advice of ministers. Prerogative powers include the conduct of foreign affairs, the deployment of armed forces, the granting of honours, and (following the Dissolution and Calling of Parliament Act 2022) the dissolution of Parliament. The scope of the prerogative has been progressively limited by statute and judicial review.'
      source_topics:
          - the-uk-constitution
          - prime-minister-and-cabinet

    - term: 'Rule of Law'
      definition_simple: 'The principle that everyone, including the government and the most powerful people, must follow the same laws.'
      definition_full: 'A foundational constitutional principle holding that all persons and institutions, including the state itself, are accountable to laws that are publicly promulgated, equally enforced, and independently adjudicated. The rule of law requires that legal rules are clear, prospective, stable, and applied consistently, and that access to justice is available to all. In the UK, the rule of law is recognised as a constitutional principle in the Constitutional Reform Act 2005.'
      source_topics:
          - democratic-safeguards
          - what-is-democracy

    - term: 'Salisbury Convention'
      definition_simple: 'An agreement that the House of Lords will not vote down laws that the government promised in its election manifesto.'
      definition_full: 'A constitutional convention, also known as the Salisbury-Addison Convention, under which the House of Lords does not oppose at second or third reading any legislation implementing a manifesto commitment of the governing party. It originated in the post-1945 political settlement.'
      source_topics:
          - house-of-lords

    - term: 'Scapegoating'
      definition_simple: 'Unfairly blaming a particular group of people for problems they did not cause.'
      definition_full: 'The political strategy of directing popular frustration and hostility toward a targeted minority group, falsely attributing national problems to that group in order to deflect attention from structural causes and to build political support through manufactured grievance. Fascist regimes systematically scapegoated ethnic, religious, and political minorities.'
      source_topics:
          - what-is-fascism

    - term: 'Scottish Parliament'
      definition_simple: 'The parliament for Scotland, based in Edinburgh, which makes laws about things like schools, hospitals, and the police in Scotland.'
      definition_full: 'The devolved unicameral legislature for Scotland, established by the Scotland Act 1998 and operational since 1999. Based at Holyrood in Edinburgh, it comprises 129 Members of the Scottish Parliament (MSPs) elected by the additional member system. It has primary legislative competence over all matters not reserved to Westminster, and since the Scotland Act 2016, has powers to set income tax rates and bands and receives a share of VAT revenue.'
      source_topics:
          - devolution

    - term: 'Secretary of State'
      definition_simple: 'A very important minister chosen by the Prime Minister to be the boss of a government department, like the one in charge of education or health.'
      definition_full: 'A senior minister of the Crown who heads a government department and sits in Cabinet. Secretaries of State exercise statutory and prerogative powers, bear individual ministerial responsibility to Parliament for their department, and are bound by collective Cabinet responsibility.'
      source_topics:
          - ministers-and-departments

    - term: 'Select Committee'
      definition_simple: 'A small group of MPs who check that the government is doing its job properly.'
      definition_full: 'A cross-party committee of MPs appointed to examine the expenditure, administration, and policy of a government department and its associated public bodies. Chairs of departmental select committees are elected by the whole House by secret ballot.'
      source_topics:
          - house-of-commons

    - term: 'Separation of Powers'
      definition_simple: 'The idea that the people who make the laws, the people who carry them out, and the people who judge whether they have been followed should all be kept separate.'
      definition_full: 'The constitutional principle, associated with Montesquieu, that the legislative, executive, and judicial functions of government should be exercised by separate and independent institutions to prevent the concentration and abuse of power. The UK does not observe a strict separation of powers (the executive is drawn from the legislature), but the Constitutional Reform Act 2005 significantly strengthened the separation of the judiciary from the other branches.'
      source_topics:
          - the-supreme-court
          - democratic-safeguards

    - term: 'Sewel Convention'
      definition_simple: 'An agreement that the UK Parliament will not usually make laws about things that have been devolved to Scotland, Wales, or Northern Ireland without asking their permission first.'
      definition_full: "A constitutional convention, originating in a statement by Lord Sewel during the passage of the Scotland Act 1998, holding that the UK Parliament will 'not normally' legislate on devolved matters without the consent of the relevant devolved legislature. The convention was given statutory recognition by the Scotland Act 2016, but the Supreme Court in Miller (2017) held that it remains a political convention rather than a justiciable legal rule, meaning it cannot be enforced by the courts."
      source_topics:
          - devolution

    - term: 'Shadow Cabinet'
      definition_simple: 'A team of senior politicians from the opposition party, each one keeping a close eye on a government minister.'
      definition_full: "The committee of senior members of the Official Opposition appointed by the Leader of the Opposition to mirror the Cabinet. Each shadow secretary of state is responsible for scrutinising their government counterpart, developing alternative policies, and acting as the party's spokesperson in their designated policy area."
      source_topics:
          - political-parties

    - term: 'Short Money'
      definition_simple: 'Money from the government given to opposition parties to help them do their job in Parliament.'
      definition_full: 'Annual public funding provided to opposition parties in the House of Commons to assist with their parliamentary business, introduced in 1975 and named after Edward Short, then Leader of the House. For 2025/26, it provides 22,853.25 pounds per seat won and 45.64 pounds per 200 votes gained at the last general election.'
      source_topics:
          - political-parties

    - term: 'Single Transferable Vote'
      definition_simple: 'A voting system where you rank candidates in order of preference and votes can be transferred between candidates so that fewer votes are wasted.'
      definition_full: 'A preferential voting system used in multi-member constituencies in which voters rank candidates in order of preference. Candidates who reach the Droop quota are elected, and surplus votes or votes from eliminated candidates are transferred according to subsequent preferences. Used for Northern Ireland Assembly elections and Scottish local elections.'
      source_topics:
          - electoral-systems-and-reform

    - term: 'Skeleton Bill'
      definition_simple: 'A law that only sets out the basic idea, leaving almost all the important details to be filled in later by Government ministers through delegated legislation.'
      definition_full: 'Primary legislation that establishes only a broad framework, with substantive policy detail to be determined later through delegated legislation. Skeleton Bills have been criticised by the Delegated Powers and Regulatory Reform Committee and the Constitution Committee as undermining parliamentary sovereignty, since Parliament approves legislation without knowing what the resulting law will actually say.'
      source_topics:
          - delegated-legislation

    - term: 'Social Democracy'
      definition_simple: 'A political belief that the government should help make life fairer for everyone while still allowing people to run businesses and make money.'
      definition_full: 'A centre-left political ideology that seeks to reform capitalism through democratic means, combining a market economy with a comprehensive welfare state, progressive taxation, and strong public services. Social democracy advocates state intervention to reduce inequality while preserving democratic governance and individual rights. Prominent examples include the Nordic model and the post-war British welfare state.'
      source_topics:
          - political-spectrum

    - term: 'Special Adviser'
      definition_simple: 'A person hired by a minister to give them political advice, unlike ordinary civil servants who must not take sides.'
      definition_full: 'A temporary civil servant appointed under the Constitutional Reform and Governance Act 2010 to serve an individual minister, exempt from the normal requirements of political impartiality and merit-based recruitment. SpAds provide partisan political advice, media handling, and policy support that permanent civil servants cannot offer due to their duty of neutrality.'
      source_topics:
          - the-civil-service

    - term: 'Standing Order'
      definition_simple: 'A written rule that tells Parliament how to run its business, such as how debates work, how votes are taken, and what order things happen in.'
      definition_full: "A codified rule of procedure adopted by resolution of a House of Parliament to regulate the conduct of its business. Each House maintains its own body of Standing Orders, which cover matters including the order of business, rules of debate, voting procedures, committee structures, and financial procedures. Standing Orders may be permanent (continuing from session to session) or sessional (expiring at prorogation). They are a manifestation of exclusive cognisance -- Parliament's right to regulate its own proceedings."
      source_topics:
          - standing-orders-and-sessions

    - term: 'State Opening of Parliament'
      definition_simple: 'A grand ceremony at the start of each parliamentary session where the monarch travels to Parliament and reads a speech setting out what the government plans to do.'
      definition_full: "The ceremonial occasion marking the beginning of a new parliamentary session, at which the monarch, seated on the throne in the House of Lords, delivers the King's Speech (or Queen's Speech) outlining the government's legislative programme and policy priorities. The speech is drafted by the Cabinet and approved by the Prime Minister; the monarch's role is ceremonial. The State Opening enacts in physical form the constitutional relationships established by the Glorious Revolution, including the exclusion of the monarch from the Commons chamber."
      source_topics:
          - standing-orders-and-sessions

    - term: 'Statute Law'
      definition_simple: 'Laws that have been officially made by Parliament, also called Acts of Parliament.'
      definition_full: 'Law enacted by Parliament through Acts (primary legislation) or by ministers under powers delegated by Parliament (secondary legislation). Statute law is the supreme source of the UK constitution, as parliamentary sovereignty means that an Act of Parliament can override any other source of law. Constitutional statutes -- such as the Bill of Rights 1689, the Parliament Acts, and the Human Rights Act 1998 -- establish fundamental principles but are not formally entrenched.'
      source_topics:
          - the-uk-constitution

    - term: 'Statutory Instrument'
      definition_simple: 'A detailed rule made by a Government minister using powers given by an Act of Parliament, without needing a whole new law.'
      definition_full: 'The most common form of delegated (secondary) legislation in the UK, governed by the Statutory Instruments Act 1946. SIs are made by ministers under powers conferred by a parent Act and take the form of orders, regulations, or rules. Approximately 3,000 SIs are made each year, subject to parliamentary scrutiny through affirmative or negative procedures.'
      source_topics:
          - delegated-legislation

    - term: 'Sub Judice'
      definition_simple: 'A rule that says MPs should not talk about cases that are currently being decided in court, so they do not affect the outcome.'
      definition_full: "A parliamentary convention requiring members to refrain from referring in debate to matters that are the subject of active proceedings before a court of law. The sub judice rule is designed to prevent parliamentary discussion from prejudicing the administration of justice. It is not a legal rule but a self-imposed restraint, enforced by the Speaker of the House of Commons and the Lord Speaker, and may be relaxed at the Speaker's discretion where a matter of sufficient national importance is at stake."
      source_topics:
          - parliamentary-privilege

    - term: 'Suffragette'
      definition_simple: "A woman who fought for women's right to vote, sometimes using bold and daring methods like protests and marches."
      definition_full: "A member of the militant women's suffrage movement, particularly the Women's Social and Political Union (WSPU) founded by Emmeline Pankhurst in 1903. Suffragettes employed direct action, civil disobedience, and hunger strikes to campaign for women's right to vote, distinguishing themselves from the constitutionalist suffragists of the NUWSS."
      source_topics:
          - history-of-parliament

    - term: 'Supplementary Vote'
      definition_simple: 'A voting system used for some elections where you could pick a first choice and a second choice, and if no one won outright, second choices were counted.'
      definition_full: "A preferential voting system in which voters mark a first and second preference. If no candidate achieves a majority of first preferences, all but the top two candidates are eliminated, and the second preferences of eliminated candidates' voters are redistributed between the remaining two. Formerly used for London mayoral and other directly elected mayoral elections in England, it was replaced by FPTP under the Elections Act 2022."
      source_topics:
          - electoral-systems-and-reform

    - term: 'Supply Day'
      definition_simple: 'A day when the House of Commons can discuss and vote on how much money the Government should be allowed to spend.'
      definition_full: "A day allocated in the parliamentary calendar for the House of Commons to debate the Government's spending Estimates. Formally known as Estimates Days, they allow the House to scrutinise and vote on departmental spending plans. In practice, Supply Days are also used by opposition parties for debates on subjects of their choosing."
      source_topics:
          - financial-scrutiny

    - term: 'Supreme Court'
      definition_simple: 'The highest court in the United Kingdom, where the most important legal cases are decided by twelve senior judges.'
      definition_full: 'The final court of appeal for the United Kingdom, established by the Constitutional Reform Act 2005 and operational from October 2009. It replaced the Appellate Committee of the House of Lords, hearing appeals on points of law of general public importance from the courts of England and Wales, Northern Ireland, and (in civil cases) Scotland, as well as devolution issues. It comprises twelve Justices headed by the President.'
      source_topics:
          - the-supreme-court

    - term: 'Surplus value'
      definition_simple: 'The extra value that workers create through their labour but do not get paid for -- the factory owner keeps it as profit.'
      definition_full: 'A key concept in Marxist economics referring to the difference between the value a worker produces through their labour and the wages they receive. Marx argued that surplus value, appropriated by the capitalist as profit, is the fundamental mechanism of exploitation under capitalism and the source of capital accumulation.'
      source_topics:
          - what-is-communism

    - term: 'Teller'
      definition_simple: 'One of four people who count the MPs as they walk through the voting lobbies.'
      definition_full: "One of four Members appointed to count votes during a division, two from each side. Tellers are typically drawn from the whips' offices. They stand at the exits of the division lobbies, count the Members passing through, and report the result to the Speaker."
      source_topics:
          - parliamentary-voting

    - term: 'The Speaker'
      definition_simple: 'The person in charge of keeping order in the House of Commons and making sure debates are fair.'
      definition_full: 'The presiding officer of the House of Commons, elected by fellow MPs, who chairs debates, maintains order, and acts with strict political impartiality. The Speaker has the casting vote in the event of a tie, exercised by convention to maintain the status quo.'
      source_topics:
          - house-of-commons

    - term: 'Think Tank'
      definition_simple: 'An organisation of experts that studies problems and comes up with ideas for how the Government could solve them.'
      definition_full: 'A research and policy organisation that conducts analysis, develops proposals, and seeks to influence public policy through publications, events, media commentary, and engagement with Government and Parliament. UK think tanks span the political spectrum and vary significantly in their funding transparency.'
      source_topics:
          - lobbying-and-interest-groups

    - term: 'Three-Line Whip'
      definition_simple: 'An instruction to MPs that a vote is so important they absolutely must attend and vote with their party.'
      definition_full: 'The strongest form of party instruction, indicated by a vote being underlined three times in the weekly whip document. Defiance of a three-line whip can result in disciplinary action including removal of the whip, effectively expelling the MP from the parliamentary party.'
      source_topics:
          - political-parties

    - term: 'Totalitarianism'
      definition_simple: "An extreme form of authoritarian rule where the Government tries to control every part of people's lives -- what they think, say, read, and even believe."
      definition_full: 'An extreme form of autocratic governance in which the state seeks to subordinate all aspects of public and private life to its authority through a comprehensive ideology, a single mass party, a terror apparatus, monopolistic control of communication and the economy, and the demand for active political mobilisation of the population. Theorised by Arendt, Friedrich, and Brzezinski, and distinguished from authoritarianism by Linz.'
      source_topics:
          - what-is-authoritarianism
          - what-is-fascism

    - term: 'Trade and Cooperation Agreement'
      definition_simple: 'The agreement between the UK and the European Union that sets the rules for trade, travel, and other matters after Brexit.'
      definition_full: 'The Trade and Cooperation Agreement (TCA) between the United Kingdom and the European Union, provisionally applied from 1 January 2021 and formally ratified in April 2021. The TCA establishes zero-tariff, zero-quota trade in goods (subject to rules of origin), provisions on services trade, fisheries access, law enforcement cooperation, and level playing field commitments. It is governed by a Partnership Council and includes dispute resolution mechanisms with binding arbitration.'
      source_topics:
          - the-uk-and-international-bodies

    - term: 'Treaty'
      definition_simple: 'A formal agreement between countries, setting out rules they agree to follow on things like trade, defence, or human rights.'
      definition_full: "A binding agreement under international law between two or more states (or between states and international organisations). In the UK's dualist legal system, treaties do not automatically become part of domestic law; they require implementing legislation to create rights and obligations enforceable in UK courts. The negotiation and ratification of treaties is a prerogative power exercised by the Crown, subject to parliamentary scrutiny under the Constitutional Reform and Governance Act 2010."
      source_topics:
          - the-uk-and-international-bodies

    - term: 'UK Youth Parliament'
      definition_simple: 'An organisation where young people aged 11 to 18 can be elected to represent other young people and debate important issues.'
      definition_full: 'A national youth democratic body established in 1999, consisting of elected Members of Youth Parliament (MYPs) aged 11 to 18 who represent their peers at local and national level. The UKYP holds an annual debate in the House of Commons chamber and campaigns on issues identified by young people through the Make Your Mark ballot.'
      source_topics:
          - citizen-engagement-beyond-voting

    - term: 'Ultranationalism'
      definition_simple: "An extreme form of pride in one's own country that leads people to believe their nation is better than all others and to treat other countries or groups unfairly."
      definition_full: 'An extreme form of nationalism that goes beyond ordinary patriotism to assert the absolute superiority of one nation or ethnic group over all others, often accompanied by aggressive foreign policy, xenophobia, and the suppression of minority identities within the state.'
      source_topics:
          - what-is-fascism

    - term: 'Uncodified Constitution'
      definition_simple: 'A set of rules for running a country that are not written down in one single document but come from many different places like laws, traditions, and court decisions.'
      definition_full: 'A constitutional order in which the fundamental rules and principles governing the state are not consolidated in a single authoritative document but are derived from multiple sources including statute law, constitutional conventions, common law, royal prerogative, and authoritative works. The UK, Israel, and New Zealand are the principal examples among modern democracies.'
      source_topics:
          - the-uk-constitution

    - term: 'Unitary Authority'
      definition_simple: 'A single council that does everything for its area, instead of having two separate councils (a county council and a district council).'
      definition_full: 'A local authority that combines the functions of both county and district councils, exercising the full range of local government responsibilities within its area. Unitary authorities were introduced from the 1990s onwards as an alternative to the two-tier system, and are found in many urban areas and some rural counties. They are responsible for all local services including education, social care, housing, planning, waste collection, and highways.'
      source_topics:
          - local-government

    - term: 'Universal Suffrage'
      definition_simple: 'The right for all adults to vote, no matter whether they are a man or a woman, rich or poor.'
      definition_full: 'The principle that all adult citizens possess the right to vote in elections without restriction by sex, wealth, race, or social status. The UK achieved universal adult suffrage in 1928 with the Equal Franchise Act, which extended the vote to women on the same terms as men at age 21. The voting age was subsequently lowered to 18 in 1969.'
      source_topics:
          - elections-and-voting
          - what-is-democracy

    - term: 'Urgent Question'
      definition_simple: 'A special question that forces a minister to come to Parliament and answer questions about something important that has just happened.'
      definition_full: "A question granted at the Speaker's discretion that requires a government minister to attend the House of Commons and answer questions on a matter of urgent public importance. Formerly known as Private Notice Questions, their use has increased substantially since 2009."
      source_topics:
          - debates-and-questions

    - term: 'Vote of No Confidence'
      definition_simple: 'A vote in Parliament where MPs decide whether they still trust the government to do its job. If the government loses, it might have to resign.'
      definition_full: "A motion in the House of Commons expressing that the House no longer has confidence in Her Majesty's Government. If passed, the convention requires the government to resign. Following repeal of the Fixed-term Parliaments Act 2011, the specific statutory mechanism (a 14-day window for forming an alternative government) no longer applies, and the prerogative power of dissolution has been restored to the Crown on the PM's advice."
      source_topics:
          - coalition-and-minority-government

    - term: 'Whip'
      definition_simple: 'A person in a political party whose job is to make sure MPs turn up to vote and vote the way their party wants.'
      definition_full: 'A party official responsible for maintaining parliamentary discipline, ensuring attendance at votes, and communicating between the leadership and backbenchers. The term also refers to the weekly written document issued to MPs indicating upcoming business, with the number of underlines (one, two, or three) signifying the expected level of attendance and compliance.'
      source_topics:
          - political-parties

    - term: 'White Paper'
      definition_simple: 'A document where the Government explains its plans for a new law and invites people to give their opinions.'
      definition_full: 'A Government policy document that sets out firm proposals for legislation. White Papers typically follow a period of consultation and precede the introduction of a Bill. They are distinct from Green Papers, which present ideas at an earlier, more open-ended stage of policy development.'
      source_topics:
          - how-laws-are-made

    - term: 'Whitehall'
      definition_simple: 'A street in London where many government offices are located, and also a nickname for the whole central government.'
      definition_full: 'The street in central London running from Trafalgar Square to the Houses of Parliament, along which many government departments are located. The term is used metonymically to refer to the central government and its administrative apparatus, encompassing both ministers and the permanent civil service.'
      source_topics:
          - ministers-and-departments

    - term: 'Witan'
      definition_simple: 'A group of wise advisers who helped Anglo-Saxon kings make important decisions, long before Parliament existed.'
      definition_full: "The Witenagemot (Old English: 'meeting of wise men'), an advisory assembly of Anglo-Saxon England comprising ealdormen, thegns, bishops, and abbots. The Witan advised the king on legislation, taxation, and foreign policy, and participated in the selection of monarchs. While not a parliament in the modern sense, it established a tradition of conciliar governance."
      source_topics:
          - history-of-parliament

    - term: 'Written Question'
      definition_simple: 'A question that an MP writes down and sends to a government minister, who must write back with an answer.'
      definition_full: 'A parliamentary question submitted in writing to a government department, to which a minister must provide a written response. Ordinary written questions should be answered within seven sitting days; named day questions specify a particular date for reply. Answers are published in Hansard.'
      source_topics:
          - debates-and-questions
