explanations:
  child:
    summary: "Parliament has been around for hundreds of years and has changed a lot over time to become what it is today."
    body: |
      A very long time ago, before Parliament existed, English kings and queens made all the big decisions on their own. But they sometimes asked for advice from a group of wise people called the Witan, or Witenagemot. This was like a very early version of Parliament.

      One of the most important moments in history happened in 1215, when a group of powerful lords forced King John to agree to a set of rules called Magna Carta. This said that even the King had to follow the law and could not do whatever he wanted.

      About fifty years later, in 1265, a man called Simon de Montfort brought together not just lords and bishops, but also ordinary people from towns and counties to have a say in how the country was run. Many people think of this as the first real Parliament.

      Over hundreds of years, Parliament grew more powerful. There was even a civil war in the 1640s between King Charles I and Parliament. Parliament won, and the King was put on trial and executed. After that, it was clear that Parliament was very important.

      In the 1800s, new laws called Reform Acts let more and more people vote. Before these laws, only rich men who owned land could vote. Slowly, ordinary working men got the vote too.

      Women had to fight very hard for the right to vote. Brave women called suffragettes campaigned, marched, and even went to prison. Finally, in 1918, some women got the vote, and by 1928, all women over 21 could vote, just like men.

      Today, Parliament is still changing. It keeps finding new ways to make sure everyone in the country has a voice.
    reading_age: 8
  teenager:
    summary: "The UK Parliament evolved over 800 years from an advisory council to the King into the supreme legislative body it is today, shaped by landmark events including Magna Carta, the Civil War, and the Reform Acts."
    body: |
      The origins of Parliament stretch back to the Anglo-Saxon period, when English kings consulted a council of nobles and clergy known as the Witenagemot, or Witan. This body advised the king on matters of law, taxation, and war, and even played a role in selecting new monarchs. Though it was not a parliament in the modern sense, it established the principle that rulers should seek counsel before making major decisions.

      A defining moment came in 1215, when rebellious barons compelled King John to seal Magna Carta at Runnymede. This charter established that the monarch was subject to the law and could not levy taxes without the consent of a council. It laid the constitutional foundations for parliamentary authority.

      In 1265, Simon de Montfort, Earl of Leicester, summoned what is often called the first representative Parliament. For the first time, not only nobles and bishops but also knights from the shires and burgesses from the towns were called to attend. King Edward I later formalised this broader representation in his Model Parliament of 1295, which included commoners alongside the aristocracy and clergy.

      Over the following centuries, Parliament gradually divided into two chambers: the House of Lords (nobles and clergy) and the House of Commons (elected representatives). The power struggle between Crown and Parliament came to a head in the English Civil War (1642-1651). King Charles I attempted to rule without Parliament, provoking armed conflict. Parliament's victory, and the subsequent execution of Charles I in 1649, demonstrated that the monarch could not govern without parliamentary consent.

      The Glorious Revolution of 1688 was another turning point. When King James II was replaced by William III and Mary II, the new monarchs accepted the Bill of Rights 1689, which established parliamentary supremacy over the Crown, guaranteed free elections, and protected freedom of speech in Parliament.

      Despite these advances, the right to vote remained extremely restricted. The Great Reform Act of 1832 began to address this by extending the franchise and eliminating rotten boroughs -- constituencies with very few voters that were controlled by wealthy patrons. Further Reform Acts in 1867 and 1884 progressively widened the electorate to include most working men.

      The struggle for women's suffrage was long and hard-fought. The suffragist movement, led by organisations such as the NUWSS, campaigned peacefully, while the suffragettes of the WSPU, led by Emmeline Pankhurst, adopted more militant tactics. The Representation of the People Act 1918 granted the vote to women over 30 who met property qualifications, and the Equal Franchise Act 1928 finally achieved equal voting rights.

      In the 20th century, the Parliament Acts of 1911 and 1949 curtailed the power of the House of Lords, ensuring the elected Commons could ultimately prevail. The House of Lords Act 1999 removed most hereditary peers, and the House of Lords (Hereditary Peers) Act 2025 completed this reform by removing the remaining hereditary peers' right to sit and vote.
    reading_age: 14
  adult:
    summary: "The history of the UK Parliament traces a centuries-long transfer of power from the Crown to an elected legislature, driven by constitutional crises, reform movements, and evolving conceptions of democratic representation."
    body: |
      The institutional ancestry of Parliament can be traced to the Anglo-Saxon Witenagemot, an assembly of nobles, bishops, and other magnates that advised the king on legislation, taxation, and the selection of monarchs. While the Witan was not a legislative body in the modern sense, it embedded the constitutional expectation that governance required counsel and consent -- a principle that would prove enduring.

      The sealing of Magna Carta by King John at Runnymede in 1215 marked a foundational moment in constitutional history. Clauses 12 and 14 required the king to obtain the common consent of the realm before levying scutage or other extraordinary taxation, effectively establishing that the Crown could not raise revenue without baronial approval. Though many of Magna Carta's provisions were specific to feudal grievances, its broader principles -- that the monarch was subject to law and that governance required consent -- became cornerstones of constitutional development.

      Simon de Montfort's Parliament of 1265 is conventionally regarded as the first representative assembly in English history, summoning knights of the shire and burgesses from selected towns alongside the magnates. Edward I's Model Parliament of 1295 institutionalised this broader representation, and by the 14th century, Parliament had separated into two distinct chambers: the House of Lords and the House of Commons.

      The relationship between Crown and Parliament reached crisis point in the 17th century. Charles I's attempts to govern without Parliament from 1629 to 1640 (the period of Personal Rule), his imposition of Ship Money without parliamentary consent, and his attempted arrest of five members of the Commons in 1642 precipitated the English Civil War. The defeat of Royalist forces, the trial and execution of Charles I in 1649, and the brief republican Commonwealth under Oliver Cromwell demonstrated conclusively that sovereignty could not rest with the Crown alone.

      The Restoration of Charles II in 1660 did not resolve the fundamental constitutional tension. It was the Glorious Revolution of 1688 -- in which James II was deposed in favour of William III and Mary II -- and the subsequent Bill of Rights 1689 that established the constitutional settlement still operative today. The Bill of Rights affirmed parliamentary sovereignty, prohibited the Crown from suspending laws or levying taxes without parliamentary consent, guaranteed free elections and freedom of speech in Parliament, and prohibited excessive bail and cruel and unusual punishment.

      The franchise, however, remained severely restricted. By the early 19th century, only approximately 3% of the population could vote. The Great Reform Act of 1832 eliminated the most egregious rotten and pocket boroughs and extended the vote to middle-class men meeting property qualifications. The Second Reform Act of 1867, passed under Disraeli's Conservative government, nearly doubled the electorate by enfranchising urban working men. The Third Reform Act of 1884, under Gladstone, extended similar rights to rural working men, bringing the electorate to approximately 5.5 million.

      The women's suffrage movement, encompassing both the constitutionalist National Union of Women's Suffrage Societies (NUWSS) led by Millicent Fawcett and the militant Women's Social and Political Union (WSPU) led by Emmeline Pankhurst, campaigned for decades. The Representation of the People Act 1918 enfranchised women over 30 who met property qualifications and all men over 21, while the Equal Franchise Act 1928 achieved full equal suffrage.

      The 20th century saw major structural reforms. The Parliament Act 1911, precipitated by the Lords' rejection of Lloyd George's "People's Budget" of 1909, removed the Lords' power to veto money Bills and limited their delaying power over other legislation to two years. The Parliament Act 1949 reduced this to one year. The Life Peerages Act 1958 introduced appointed life peers, diversifying the Lords' composition. The House of Lords Act 1999 removed all but 92 hereditary peers, and the House of Lords (Hereditary Peers) Act 2025 removed the remaining hereditary element entirely.

      Modern reforms have continued to reshape Parliament's relationship with the public and with devolved institutions. The creation of the Scottish Parliament, Welsh Senedd, and Northern Ireland Assembly through devolution legislation in 1998 introduced a quasi-federal dimension to the UK's constitutional architecture, raising questions about the future evolution of Westminster's role.
