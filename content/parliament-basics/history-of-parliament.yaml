glossary:
  - term: "Magna Carta"
    definition_simple: "A very important document from 1215 that said even the King had to follow the law."
    definition_full: "A charter of liberties sealed by King John at Runnymede on 15 June 1215, under baronial coercion. Though many of its provisions addressed specific feudal grievances, its broader principles -- that the monarch was subject to law and that taxation required consent -- became foundational to the development of parliamentary authority and constitutional government."
  - term: "Reform Act"
    definition_simple: "A law that changed the rules about who was allowed to vote, letting more people have a say in elections."
    definition_full: "One of several Acts of Parliament in the 19th century (principally 1832, 1867, and 1884) that progressively extended the electoral franchise and reformed the distribution of parliamentary seats, eliminating rotten boroughs and enfranchising successively wider sections of the male population."
  - term: "Suffragette"
    definition_simple: "A woman who fought for women's right to vote, sometimes using bold and daring methods like protests and marches."
    definition_full: "A member of the militant women's suffrage movement, particularly the Women's Social and Political Union (WSPU) founded by Emmeline Pankhurst in 1903. Suffragettes employed direct action, civil disobedience, and hunger strikes to campaign for women's right to vote, distinguishing themselves from the constitutionalist suffragists of the NUWSS."
  - term: "Model Parliament"
    definition_simple: "A parliament called by King Edward I in 1295 that included ordinary people from towns as well as lords and bishops."
    definition_full: "The Parliament summoned by Edward I in 1295, which included representatives from the clergy, nobility, knights of the shire, and burgesses from the boroughs. Later historians termed it the 'Model Parliament' because its broad composition set a template for future parliamentary assemblies, though the degree to which it directly influenced subsequent practice is debated."
  - term: "Glorious Revolution"
    definition_simple: "When King James II was replaced by William and Mary in 1688, which made Parliament more powerful than the King."
    definition_full: "The events of 1688-1689 in which King James II was deposed and replaced by William III and Mary II. The subsequent Bill of Rights 1689 and the constitutional settlement it embodied established parliamentary sovereignty, prohibited the Crown from suspending laws or levying taxes without parliamentary consent, and guaranteed free elections and freedom of speech in Parliament."
  - term: "Witan"
    definition_simple: "A group of wise advisers who helped Anglo-Saxon kings make important decisions, long before Parliament existed."
    definition_full: "The Witenagemot (Old English: 'meeting of wise men'), an advisory assembly of Anglo-Saxon England comprising ealdormen, thegns, bishops, and abbots. The Witan advised the king on legislation, taxation, and foreign policy, and participated in the selection of monarchs. While not a parliament in the modern sense, it established a tradition of conciliar governance."

did_you_know:
  - fact: "Magna Carta was sealed in 1215, but Pope Innocent III annulled it just a few weeks later! It had to be reissued several times before it stuck."
    level: [child, teenager]
  - fact: "Before the Reform Act of 1832, the constituency of Old Sarum in Wiltshire had two Members of Parliament but only seven voters -- and no actual residents. It was one of the most famous 'rotten boroughs.'"
    level: [teenager, adult, researcher]
  - fact: "King Charles I is the only English monarch to have been put on trial and publicly executed. He was beheaded outside the Banqueting House in Whitehall on 30 January 1649."
    level: [child, teenager, adult]
  - fact: "The word 'parliament' comes from the French word 'parler,' meaning 'to talk.' Parliament is, at its core, a talking shop -- a place for debate and discussion."
    level: [child, teenager]
  - fact: "When the Suffragette Emily Wilding Davison stepped in front of the King's horse at the Epsom Derby in 1913, she was carrying the WSPU flag in the movement's colours of purple, white, and green. She died from her injuries four days later."
    level: [teenager, adult, researcher]

