key_figures:
  - name: "Simon de Montfort"
    role: "Earl of Leicester and baronial leader"
    description: "Led a baronial revolt against Henry III and in January 1265 summoned the first Parliament to include knights of the shire and burgesses from selected towns alongside the magnates and prelates. Though he was killed at the Battle of Evesham later that year, his parliamentary innovation endured and is regarded as a foundational moment in the history of representative government."
    levels: [teenager, adult, researcher]
  - name: "Emmeline Pankhurst"
    role: "Suffragette leader and founder of the WSPU"
    description: "Founded the Women's Social and Political Union in 1903 and led the militant campaign for women's suffrage in the United Kingdom. Her activism, including hunger strikes and imprisonment, was instrumental in securing the Representation of the People Act 1918, which granted the vote to women over 30."
    levels: [child, teenager, adult]
  - name: "Oliver Cromwell"
    role: "Parliamentary general and Lord Protector"
    description: "Commanded the New Model Army to victory in the English Civil War, signed the death warrant of Charles I, and served as Lord Protector of the Commonwealth of England from 1653 until his death in 1658. His rule demonstrated both the possibilities and the limitations of parliamentary governance without a constitutional monarchy."
    levels: [teenager, adult, researcher]
  - name: "Millicent Fawcett"
    role: "Suffragist leader and president of the NUWSS"
    description: "Led the National Union of Women's Suffrage Societies (NUWSS) and campaigned for women's suffrage through constitutional and peaceful means for over fifty years. Her patient, strategic approach complemented the militant tactics of the suffragettes and was recognised when her statue was unveiled in Parliament Square in 2018."
    levels: [teenager, adult, researcher]

quizzes:
  child:
    - question: "What was Magna Carta?"
      type: multiple_choice
      options:
        - "A type of old map"
        - "A document that said even the King had to follow the law"
        - "The name of a castle"
      correct_answer: "A document that said even the King had to follow the law"
      explanation: "Magna Carta was an important document from 1215 that said the King could not do whatever he wanted -- he had to follow the rules too."
    - question: "True or false: Women have always been allowed to vote in the UK."
      type: true_false
      correct_answer: "False"
      explanation: "Women were not allowed to vote for most of history. Some women got the vote in 1918, and all women over 21 could vote from 1928, after the suffragettes and suffragists campaigned for many years."
    - question: "What was the name of the group of wise advisers who helped Anglo-Saxon kings?"
      type: multiple_choice
      options:
        - "The Witenagemot"
        - "The Round Table"
        - "The Privy Council"
      correct_answer: "The Witenagemot"
      explanation: "The Witenagemot, or Witan, was a group of wise people who advised Anglo-Saxon kings. It was like a very early version of Parliament."
  teenager:
    - question: "Why was Simon de Montfort's Parliament of 1265 historically significant?"
      type: short_answer
      correct_answer: "It was the first Parliament to include elected representatives from towns and counties alongside nobles and clergy, establishing the principle of broader representation."
      explanation: "De Montfort summoned knights from the shires and burgesses from the towns to sit alongside nobles and prelates, creating a more representative assembly than any that had come before."
    - question: "What did the Bill of Rights 1689 establish?"
      type: multiple_choice
      options:
        - "The right of the King to rule without Parliament"
        - "Parliamentary supremacy over the Crown, free elections, and freedom of speech in Parliament"
        - "Universal suffrage for all adults"
      correct_answer: "Parliamentary supremacy over the Crown, free elections, and freedom of speech in Parliament"
      explanation: "The Bill of Rights 1689, enacted after the Glorious Revolution, established that Parliament was supreme over the Crown and guaranteed key rights including free elections and freedom of speech in parliamentary debate."
    - question: "What were 'rotten boroughs' and why were they a problem?"
      type: short_answer
      correct_answer: "Rotten boroughs were constituencies with very few voters that were often controlled by wealthy patrons. They were a problem because they gave disproportionate representation to tiny populations while large industrial cities had no MPs at all."
      explanation: "Before the Great Reform Act of 1832, some constituencies like Old Sarum had almost no residents but still returned two MPs, while growing cities like Manchester and Birmingham had no representation in Parliament."
  adult:
    - question: "How did the three Reform Acts of 1832, 1867, and 1884 progressively expand the franchise?"
      type: short_answer
      correct_answer: "The 1832 Act extended the vote to middle-class men and eliminated rotten boroughs. The 1867 Act enfranchised urban working men meeting a household qualification. The 1884 Act extended the household franchise to rural areas, bringing the electorate to approximately 5.5 million."
      explanation: "Each Reform Act expanded the electorate to a broader section of the male population while also reforming the distribution of seats to better reflect population distribution."
    - question: "What constitutional principles were established by the Bill of Rights 1689?"
      type: short_answer
      correct_answer: "The Bill of Rights established parliamentary sovereignty, prohibited the Crown from suspending laws or levying taxes without parliamentary consent, guaranteed free elections and freedom of speech in Parliament, and prohibited excessive bail and cruel and unusual punishment."
      explanation: "The Bill of Rights 1689 codified the constitutional settlement following the Glorious Revolution and remains one of the foundational documents of the UK's uncodified constitution."
    - question: "What was the constitutional significance of the Parliament Acts of 1911 and 1949?"
      type: multiple_choice
      options:
        - "They abolished the House of Lords entirely"
        - "They removed the Lords' veto over money Bills and limited their delaying power over other legislation"
        - "They gave the Monarch the power to override Parliament"
      correct_answer: "They removed the Lords' veto over money Bills and limited their delaying power over other legislation"
      explanation: "The Parliament Act 1911 removed the Lords' veto over money Bills and limited their delaying power to two years. The 1949 Act reduced this to one year, ensuring the primacy of the elected House of Commons."
  researcher:
    - question: "Evaluate the historiographical debate over the degree of institutional continuity between the Anglo-Saxon Witenagemot and the post-Conquest Parliament."
      type: essay
      correct_answer: "Historians are divided. H.R. Loyn and others have cautioned against drawing direct institutional continuity, noting significant discontinuities following the Norman Conquest. J.R. Maddicott, however, has argued for greater continuity, tracing the roots of parliamentary representation to earlier assemblies. The debate centres on whether Parliament emerged from a continuous English tradition of conciliar governance or was primarily a post-Conquest innovation shaped by Norman and Angevin administrative needs."
      explanation: "This debate reflects broader questions about the nature of constitutional development -- whether it proceeds by gradual evolution or through discontinuous innovation. Maddicott's 2010 work pushed the origins of Parliament back further than previous scholarship, while acknowledging the transformative impact of the Norman Conquest."
    - question: "Assess the significance of the Glorious Revolution and the 1689 settlement in establishing the constitutional framework of parliamentary sovereignty."
      type: essay
      correct_answer: "The Glorious Revolution established parliamentary sovereignty as the organising principle of the British constitution. The Bill of Rights 1689 prohibited the Crown from suspending or dispensing with laws, levying taxes, or maintaining a standing army without parliamentary consent. The Act of Settlement 1701 secured the Protestant succession and judicial independence. Together, these statutes resolved the 17th-century constitutional crisis in favour of Parliament, creating a framework that endures in essential respects today."
      explanation: "The 1689 settlement was not merely a transfer of power from one monarch to another but a fundamental reconstitution of the relationship between Crown and Parliament. It established that sovereignty resided in the Crown-in-Parliament, not in the Crown alone."
    - question: "How did Sir Edward Coke's 17th-century interpretation of Magna Carta shape its subsequent constitutional significance?"
      type: short_answer
      correct_answer: "Coke deployed Magna Carta as a weapon against Stuart absolutism, interpreting its provisions -- particularly Clause 39 on due process -- as establishing fundamental constitutional rights that limited royal prerogative. His interpretation, though historically anachronistic, profoundly influenced the development of constitutional law and the assertion of parliamentary authority."
      explanation: "Coke's reading of Magna Carta in his Institutes and in parliamentary debates transformed a feudal document into a constitutional charter. His interpretation was instrumental in the constitutional struggles of the 17th century, even though modern historians recognise that it attributed to the 1215 charter principles that its drafters did not intend."
