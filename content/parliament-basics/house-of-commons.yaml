quizzes:
  child:
    - question: "How many MPs are there in the House of Commons?"
      type: multiple_choice
      options: ["100", "450", "650", "1000"]
      answer: "650"
      explanation: "There are 650 MPs in the House of Commons, one for each constituency (local area) in the United Kingdom."
    - question: "True or false: The Queen or King is allowed to go into the House of Commons."
      type: true_false
      answer: false
      explanation: "The monarch is not allowed to enter the House of Commons. The last king to do so was Charles I in 1642, and it caused a lot of trouble!"
    - question: "What is the name of the person who keeps order in the House of Commons?"
      type: short_answer
      answer: "The Speaker"
      explanation: "The Speaker is in charge of making sure everyone follows the rules and takes turns to speak during debates."
  teenager:
    - question: "What is the name of the voting system used to elect MPs to the House of Commons?"
      type: multiple_choice
      options: ["Proportional Representation", "First Past the Post", "Single Transferable Vote", "Alternative Vote"]
      answer: "First Past the Post"
      explanation: "The UK uses First Past the Post, where the candidate with the most votes in each constituency wins the seat, even without a majority of total votes."
    - question: "True or false: Select committee chairs are appointed by the Prime Minister."
      type: true_false
      answer: false
      explanation: "Since reforms following the Wright Committee report in 2009, most departmental select committee chairs are elected by the whole House of Commons through a secret ballot, giving them greater independence from government."
    - question: "In which year did women gain the right to vote on equal terms with men?"
      type: short_answer
      answer: "1928"
      explanation: "The Equal Franchise Act 1928 gave women the vote at age 21, the same as men, adding about five million women to the electoral roll."
  adult:
    - question: "Which legislation established the supremacy of the House of Commons over the House of Lords in financial matters?"
      type: multiple_choice
      options: ["The Bill of Rights 1689", "The Parliament Act 1911", "The Reform Act 1832", "The Representation of the People Act 1918"]
      answer: "The Parliament Act 1911"
      explanation: "The Parliament Act 1911 removed the Lords' veto over Money Bills entirely and replaced it with a suspensory veto (later reduced to one year by the 1949 Act) over other public Bills, formally establishing Commons supremacy."
    - question: "True or false: The Speaker of the House of Commons exercises the casting vote to decide the outcome of close divisions according to personal political preference."
      type: true_false
      answer: false
      explanation: "The Speaker exercises the casting vote according to Speaker Denison's Rule, which seeks to maintain the status quo and avoid deciding substantive issues on a casting vote."
    - question: "Explain how the Wright Committee reforms of 2009 changed the way select committees operate in the House of Commons."
      type: short_answer
      answer: "The Wright Committee recommended that chairs of departmental select committees be elected by the whole House through secret ballot using the alternative vote, rather than being appointed through party whips. Committee members are elected by their respective parliamentary parties. These changes strengthened the independence and democratic legitimacy of select committees."
      explanation: "Before these reforms, the appointment of select committee chairs and members was heavily influenced by party whips, which could compromise their independence in scrutinising the government."
  researcher:
    - question: "Analyse the constitutional significance of the Parliament Acts 1911 and 1949 in relation to the legislative supremacy of the House of Commons, with reference to the Salisbury Convention."
      type: essay
      answer: "A strong answer would discuss: the removal of the Lords' absolute veto and its replacement with a suspensory veto (two years in 1911, reduced to one year in 1949); the special status of Money Bills under the 1911 Act; the Salisbury Convention's complementary role in constraining the Lords from rejecting manifesto commitments at second reading; the democratic mandate argument underpinning Commons supremacy; and the limited use of the Parliament Acts in practice (only seven times), suggesting that their constitutional significance lies as much in their deterrent effect as their direct application."
      explanation: "This question assesses understanding of the interplay between statutory provisions and constitutional conventions in establishing the primacy of the elected chamber."
    - question: "Critically evaluate the effectiveness of the departmental select committee system as a mechanism for holding the executive to account, considering reforms since 2010."
      type: essay
      answer: "A comprehensive response should consider: the post-Wright Committee reforms including elected chairs and members; the enhanced democratic mandate and independence of committees; the scope of committee powers (to send for persons, papers, and records); limitations such as the inability to compel ministers to act on recommendations, the 60-day response convention, and resource constraints; the role of the Liaison Committee in strategic oversight; comparative analysis with committee systems in other legislatures; and empirical evidence of committee impact on government policy."
      explanation: "This question requires critical analysis of institutional design and its practical effectiveness in the context of executive accountability."
    - question: "To what extent did the Representation of the People Act 1918 represent a break with the property-based franchise that had characterised parliamentary elections since the fifteenth century?"
      type: essay
      answer: "An excellent answer would trace the franchise from the 1432 Forty Shilling Freeholder qualification through the incremental reforms of 1832, 1867, and 1884, demonstrating the persistent link between property and voting rights. It should analyse the 1918 Act's shift to a residential qualification for men, effectively severing the property link for male suffrage, while noting the retention of a property qualification for women voters. The answer should contextualise the reform within the broader social and political upheaval of the First World War and assess the degree of continuity versus rupture in franchise history."
      explanation: "This question examines the evolution of democratic participation and the transition from a property-based to a residence-based franchise."
