glossary:
  - term: "Constituency"
    definition_simple: "A local area that elects one MP to represent it in Parliament."
    definition_full: "A geographically defined electoral district, each returning a single Member of Parliament to the House of Commons. The United Kingdom is divided into 650 constituencies, with boundaries periodically reviewed by independent Boundary Commissions."
  - term: "First Past the Post"
    definition_simple: "The voting system where the person who gets the most votes wins, like a race."
    definition_full: "A plurality voting system in which the candidate receiving the highest number of votes in a constituency is elected, regardless of whether they obtain an absolute majority. Also known as simple plurality or single-member plurality."
  - term: "The Speaker"
    definition_simple: "The person in charge of keeping order in the House of Commons and making sure debates are fair."
    definition_full: "The presiding officer of the House of Commons, elected by fellow MPs, who chairs debates, maintains order, and acts with strict political impartiality. The Speaker has the casting vote in the event of a tie, exercised by convention to maintain the status quo."
  - term: "Select Committee"
    definition_simple: "A small group of MPs who check that the government is doing its job properly."
    definition_full: "A cross-party committee of MPs appointed to examine the expenditure, administration, and policy of a government department and its associated public bodies. Chairs of departmental select committees are elected by the whole House by secret ballot."
  - term: "Prime Minister's Questions (PMQs)"
    definition_simple: "A time every Wednesday when MPs get to ask the Prime Minister questions in the House of Commons."
    definition_full: "A weekly session held each Wednesday at noon in which the Prime Minister answers questions from Members of Parliament for at least 30 minutes. The Leader of the Opposition is permitted up to six questions, and the format centres on open engagements questions allowing supplementary queries on any topic."
  - term: "Hansard"
    definition_simple: "The written record of everything that is said in Parliament."
    definition_full: "The official verbatim report of proceedings in both Houses of Parliament. Named after Thomas Curson Hansard, who published early editions, it provides a substantially verbatim account of debates, questions, and statements."

did_you_know:
  - fact: "The green benches in the House of Commons are placed two sword-lengths apart, so that opposing MPs could never reach each other with their swords during heated debates!"
    level: [child, teenager]
  - fact: "The House of Commons Chamber was destroyed by a German bomb in 1941 during the Blitz and was rebuilt by 1950. Winston Churchill insisted the new Chamber should be the same size as the old one, even though it cannot seat all 650 MPs at once."
    level: [teenager, adult]
  - fact: "The Speaker of the House of Commons is traditionally dragged to the Chair upon election, a custom recalling the days when Speakers risked the monarch's displeasure and even execution for delivering unwelcome news."
    level: [child, teenager, adult]
  - fact: "The monarch is not permitted to enter the House of Commons. The last monarch to do so was Charles I in 1642, when he attempted to arrest five MPs, provoking the English Civil War."
    level: [teenager, adult, researcher]
  - fact: "Before 1832, some constituencies known as rotten boroughs had almost no voters at all. Old Sarum in Wiltshire had just 7 voters but returned two MPs to Parliament."
    level: [adult, researcher]

key_dates:
  - year: 1265
    event: "Simon de Montfort's Parliament"
    significance: "Often regarded as the first English Parliament to include elected representatives from towns and shires alongside the nobility, establishing the precedent for a representative commons."
    levels: [teenager, adult, researcher]
  - year: 1689
    event: "The Bill of Rights"
    significance: "Established the supremacy of Parliament over the Crown, guaranteeing free speech in parliamentary debates and regular Parliaments, laying the constitutional foundation for modern parliamentary democracy."
    levels: [teenager, adult, researcher]
  - year: 1832
    event: "The Great Reform Act"
    significance: "Abolished rotten boroughs, redistributed seats to industrial cities, and standardised voting qualifications, nearly doubling the electorate and beginning the modern era of representative democracy."
    levels: [teenager, adult, researcher]
  - year: 1918
    event: "Representation of the People Act"
    significance: "Granted the vote to nearly all men over 21 and to women over 30 meeting a property qualification, tripling the electorate to approximately 21 million and marking the most significant single expansion of the franchise."
    levels: [teenager, adult, researcher]
  - year: 1928
    event: "Equal Franchise Act"
    significance: "Gave women the vote on equal terms with men at age 21, adding approximately five million women to the electoral roll and establishing full universal adult suffrage."
    levels: [child, teenager, adult, researcher]
  - year: 1969
    event: "Voting age lowered to 18"
    significance: "The Representation of the People Act 1969 reduced the minimum voting age from 21 to 18, recognising the political maturity of younger adults."
    levels: [teenager, adult, researcher]
  - year: 2024
    event: "General election of 4 July 2024"
    significance: "Labour won 411 seats, ending 14 years of Conservative-led government. The election demonstrated the amplifying effects of the FPTP system, with significant seat changes not always proportional to vote share shifts."
    levels: [teenager, adult, researcher]

key_figures:
  - name: "Sir Lindsay Hoyle"
    role: "Speaker of the House of Commons (2019-present)"
    description: "The current Speaker, MP for Chorley in Lancashire. First elected Speaker on 4 November 2019, he has been re-elected three times. He maintains impartiality and ensures fair and orderly debate in the Chamber."
    levels: [child, teenager, adult]
  - name: "Emmeline Pankhurst"
    role: "Suffragette leader"
    description: "Founder of the Women's Social and Political Union (WSPU) in 1903, Pankhurst led the militant campaign for women's suffrage. Her activism was instrumental in securing women's right to vote, first achieved partially in 1918 and fully in 1928."
    levels: [child, teenager, adult, researcher]
  - name: "Simon de Montfort"
    role: "Earl of Leicester and pioneer of parliamentary representation"
    description: "In 1265, de Montfort summoned a Parliament that included not only barons and clergy but also elected knights from the shires and burgesses from the towns, establishing the principle of broader representation that evolved into the House of Commons."
    levels: [teenager, adult, researcher]
  - name: "Charles I"
    role: "King of England (1625-1649)"
    description: "His attempt to arrest five MPs in the House of Commons in January 1642 was a pivotal moment in establishing parliamentary independence from the Crown. No monarch has entered the Commons Chamber since."
    levels: [teenager, adult, researcher]
  - name: "Tony Blair"
    role: "Prime Minister (1997-2007)"
    description: "Modernised the format of Prime Minister's Questions by consolidating the twice-weekly 15-minute sessions into a single 30-minute session every Wednesday at noon, the format still in use today."
    levels: [adult, researcher]

