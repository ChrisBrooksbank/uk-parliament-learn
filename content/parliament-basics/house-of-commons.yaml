explanations:
  child:
    summary: "The House of Commons is where elected people called MPs meet to discuss and decide the rules for our country."
    body: |
      The House of Commons is a very important place in London where people called Members of Parliament, or MPs for short, meet to talk about how the country should be run.

      There are 650 MPs in the House of Commons. Each one is chosen by the people who live in their local area, called a constituency. When there is an election, grown-ups go to a polling station and vote for the person they want to be their MP. The person who gets the most votes wins. This is called First Past the Post, a bit like winning a race.

      The MPs sit on green benches in a big room called the Chamber. The government sits on one side, and the opposition sits on the other side. They talk about new laws, ask questions, and try to make the country a better place.

      There is a person called the Speaker who is in charge of the Chamber. The Speaker makes sure everyone takes turns to talk and follows the rules. The current Speaker is Sir Lindsay Hoyle. MPs choose the Speaker by voting. Once someone becomes Speaker, they have to stop being part of any political party so they can be fair to everyone.

      The Chamber itself is quite small. The government sits on one side and the opposition sits on the other. In between them, on the table, sits a big golden stick called the Mace. The Mace is very important because it shows that Parliament has the power to make laws. Without the Mace in the Chamber, Parliament cannot meet.

      MPs who are ministers sit on the front benches, closest to the middle. They are called frontbenchers. The MPs who sit behind them are called backbenchers. Backbenchers do not have a job in the government, but they still vote on laws and speak up for the people in their area.

      Every Wednesday at noon, something exciting happens called Prime Minister's Questions, or PMQs. This is when MPs get to ask the Prime Minister questions about what the government is doing. It can get quite noisy!
    reading_age: 8
  teenager:
    summary: "The House of Commons is the elected chamber of the UK Parliament, made up of 650 MPs who represent constituencies across the country."
    body: |
      The House of Commons is the elected chamber of the UK Parliament and is the primary law-making body in the country. It is made up of 650 Members of Parliament (MPs), each representing a geographical area known as a constituency. The UK uses the First Past the Post (FPTP) voting system, meaning that in each constituency the candidate with the most votes wins the seat, even if they do not receive a majority of the total votes cast.

      The most recent general election was held on 4 July 2024. Labour won 411 seats, the Conservatives won 121, the Liberal Democrats won 72, the Scottish National Party won 9, Reform UK won 5, and the Green Party won 4.

      The House of Commons has several key functions. It debates and votes on new legislation (Bills), scrutinises the work of the government, controls taxation and government spending, and represents the views of constituents. MPs debate in the Chamber, which has a distinctive layout with the government and opposition benches facing each other.

      The Speaker of the House, currently Sir Lindsay Hoyle (elected in November 2019), chairs debates, maintains order, and ensures fair representation of all parties and viewpoints. The Speaker must remain politically impartial and gives up all party ties upon election to the role. When a new Speaker is needed, any MP can stand for election. MPs vote by secret ballot, and candidates are eliminated one by one until someone wins more than half the votes. Three Deputy Speakers assist the Speaker in chairing debates; they come from different parties to ensure balance.

      The layout of the Chamber reflects the adversarial nature of UK politics. Government MPs sit on the benches to the Speaker's right, with opposition MPs facing them on the left. Ministers and shadow ministers sit on the front benches, while MPs without a government or shadow role sit behind them and are known as backbenchers. The ceremonial Mace, a gilded staff resting on the Table of the House, symbolises the authority of the Crown in Parliament. The House cannot sit or pass laws without the Mace present.

      Select Committees play a crucial role in holding the government to account. There is a select committee for each government department, with up to 11 members each. These committees examine government spending, policies, and administration. Most select committee chairs are now elected by MPs, which strengthens their independence. Committees gather written and oral evidence, publish reports, and the government normally has 60 days to respond.

      Prime Minister's Questions (PMQs) takes place every Wednesday at noon and lasts at least 30 minutes. It is an opportunity for MPs to directly question the Prime Minister. The Leader of the Opposition is allowed up to six questions. PMQs begins with an "open question" about the PM's engagements, which allows follow-up questions on any subject.

      The right to vote for MPs has expanded significantly over the centuries. The Great Reform Act of 1832 extended the vote beyond wealthy landowners. The 1867 Reform Act gave urban working-class men the vote. Women over 30 gained the vote in 1918, and equal voting rights for men and women at age 21 came in 1928. The voting age was lowered to 18 in 1969.
    reading_age: 14
  adult:
    summary: "The House of Commons is the democratically elected lower chamber of the UK Parliament, comprising 650 MPs elected via First Past the Post, responsible for legislation, government scrutiny, and representing constituents."
    body: |
      The House of Commons is the lower house of the Parliament of the United Kingdom and the pre-eminent chamber in the country's legislative process. Comprising 650 Members of Parliament, each elected to represent a single parliamentary constituency, the Commons derives its authority from being the only directly elected component of Parliament. Members are elected using the First Past the Post (FPTP) system, a plurality voting method in which the candidate receiving the highest number of votes in each constituency is returned, irrespective of whether they secure an absolute majority.

      The most recent general election took place on 4 July 2024, resulting in a Labour government with 411 seats. The Conservatives were reduced to 121 seats (down 244 from their 2019 total of 365), while the Liberal Democrats won 72 seats, the SNP 9, Reform UK 5, and the Green Party 4.

      The House of Commons performs several constitutional functions. Primarily, it is the principal legislative chamber: Bills must pass through multiple readings, a committee stage, and a report stage in the Commons before proceeding to the House of Lords. The Commons controls the power of the purse through Supply, meaning only the Commons can authorise taxation and approve government expenditure. Under the Parliament Acts of 1911 and 1949, the Commons can ultimately pass legislation without the Lords' consent, establishing its legislative supremacy.

      The Speaker of the House of Commons presides over the Chamber and is the highest authority within it. The current Speaker, the Rt Hon Sir Lindsay Hoyle MP (Member for Chorley, Lancashire), was first elected to the role on 4 November 2019 and has been re-elected three times. The Speaker is elected by secret ballot under Standing Order No. 1B, using an exhaustive ballot system in which the candidate with the fewest votes is eliminated in each round until one candidate secures an absolute majority. Upon election, the Speaker renounces all party-political affiliations and is expected to act with complete impartiality. The Speaker determines which members may speak, rules on points of order, and has the casting vote in the event of a tie, which by convention is exercised to maintain the status quo. Three Deputy Speakers — the Chairman and two Deputy Chairmen of Ways and Means — assist the Speaker and are drawn from more than one party to maintain balance.

      The physical layout of the Commons Chamber is constitutionally significant. The rectangular, opposing-benches design (unlike the semicircular arrangements common in continental legislatures) reinforces the adversarial two-party dynamic. Ministers and shadow ministers occupy the front benches, while backbenchers — MPs who hold no ministerial or shadow ministerial office — sit behind them. The ceremonial Mace, a gilded staff placed on the Table of the House during sittings, symbolises royal authority delegated to Parliament. The House cannot conduct business without the Mace present; its removal by an MP (as occurred notably in 1930 and 2018) is treated as a serious breach of order.

      The select committee system is a vital mechanism of parliamentary scrutiny. Departmental select committees shadow each government department, examining spending, policies, and administration. Each committee typically has up to 11 members. Since reforms recommended by the Wright Committee in 2010, most select committee chairs are elected by the whole House through a secret ballot, enhancing their democratic mandate and independence. The Liaison Committee, composed of all select committee chairs, provides strategic oversight and occasionally takes direct evidence from the Prime Minister. Committees publish reports containing findings and recommendations, to which the government customarily responds within 60 days.

      Prime Minister's Questions (PMQs) takes place every Wednesday at noon and lasts at least 30 minutes. It evolved into its current weekly format in 1997 under Tony Blair, replacing the twice-weekly 15-minute sessions that had existed since 1961. The Leader of the Opposition is permitted up to six questions, while other opposition party leaders and backbenchers may also be called. Questions typically begin as "open" engagements questions, enabling supplementary questions on any topic of the member's choosing.

      The expansion of the parliamentary franchise is central to understanding the democratic legitimacy of the Commons. Before 1832, fewer than one in ten adults could vote. The Great Reform Act of 1832 standardised property qualifications and extended representation to industrial cities. The 1867 Reform Act enfranchised urban working-class men, roughly doubling the electorate. The Third Reform Act of 1884 extended household suffrage to the counties. The Representation of the People Act 1918 was transformational: it established near-universal male suffrage based on residence rather than property and granted the vote to women over 30 who met a property qualification. The Equal Franchise Act of 1928 equalised the voting age at 21 for both sexes. The Representation of the People Act 1969 lowered the voting age to 18, and overseas voters were enfranchised in 1985.
    reading_age: 18
  researcher:
    summary: "The House of Commons is the elected lower chamber of the bicameral Parliament of the United Kingdom, exercising legislative supremacy, budgetary control, and executive scrutiny through 650 constituency MPs returned under plurality voting."
    body: |
      The House of Commons constitutes the elected lower house of the bicameral Parliament of the United Kingdom, sitting at the Palace of Westminster. Its 650 members are returned from single-member constituencies across England (543), Scotland (57), Wales (32), and Northern Ireland (18) using the simple plurality (First Past the Post) electoral system. The chamber's democratic mandate, rooted in direct election, underpins the conventions of responsible government: the Prime Minister and Cabinet must command the confidence of the Commons, and the loss of a vote of no confidence conventionally triggers resignation or dissolution.

      Legislative supremacy of the Commons over the Lords was formalised by the Parliament Act 1911, which removed the Lords' veto over Money Bills and replaced it with a two-year (subsequently reduced to one year by the Parliament Act 1949) suspensory veto over other public Bills. The Salisbury Convention further constrains the upper house from rejecting at second reading any legislation that gives effect to a manifesto commitment of the governing party. The Commons' exclusive control over Supply (taxation and expenditure) dates from the late seventeenth century and is enshrined in Standing Order No. 48 (formerly S.O. No. 46), which reserves financial initiative to the Crown acting through Ministers.

      The Speakership of the House of Commons is one of the oldest offices in the English constitutional tradition, traceable to Sir Thomas Hungerford in 1377 (the first to bear the title). The current Speaker, the Rt Hon Sir Lindsay Hoyle MP, was elected on 4 November 2019 following the resignation of John Bercow. The election procedure, codified in Standing Order No. 1B following the 2001 reforms and further amended in 2009, employs an exhaustive ballot: candidates who receive fewer than 5% of votes cast are eliminated, the lowest-placed remaining candidate drops out, and voting continues until one candidate achieves an absolute majority. By convention, the Speaker severs all party affiliations, stands unopposed in their constituency at general elections (though this convention has not always been observed), and exercises the casting vote according to Speaker Denison's Rule, which seeks to preserve the status quo and avoid deciding issues on a casting vote wherever possible. The three Deputy Speakers (the Chairman of Ways and Means and two deputies) chair proceedings when the Speaker is absent and preside over Committees of the Whole House; by convention they are drawn from more than one party.

      The rectangular chamber layout, a feature preserved by Churchill's insistence after the 1941 Blitz destruction, is constitutionally significant. As Churchill argued in the 1943 rebuilding debate, the opposing-benches arrangement sustains the two-party system and prevents the "group" politics characteristic of semicircular chambers. The front benches are occupied by ministers (Government front bench) and shadow ministers (Opposition front bench), while backbenchers — a term first recorded in the 1870s — sit behind. The Mace, a gilded staff symbolising the authority of the Crown in Parliament, must be on the Table for the House to sit; when the House resolves into Committee of the Whole House, the Mace is placed on brackets below the Table to signify that the Speaker is not presiding.

      The departmental select committee system was established in its modern form in 1979, following a motion by Norman St John-Stevas, Leader of the House. The system was substantially reformed following the report of the Select Committee on Reform of the House of Commons (the Wright Committee) in 2009. Since the 2010 Parliament, chairs of most departmental select committees have been elected by the whole House by secret ballot using the alternative vote, while committee members are elected by their respective parliamentary parties. Each departmental committee typically comprises 11 members and examines the expenditure, administration, and policy of its corresponding department and associated public bodies. The Liaison Committee, comprising all select committee chairs, takes oral evidence from the Prime Minister approximately twice per session.

      Prime Minister's Questions evolved from a convention of the mid-twentieth century. From 1961, the Prime Minister answered oral questions twice weekly (Tuesdays and Thursdays) for approximately 15 minutes. In 1997, Tony Blair consolidated PMQs into a single weekly session each Wednesday at noon, lasting approximately 30 minutes. The format centres on "open" engagements questions (formally asking the Prime Minister to list their official engagements for the day), allowing supplementary questions on any topic. The Leader of the Opposition is permitted up to six questions, and leaders of the third largest party are typically called for two.

      The history of the parliamentary franchise illustrates the incremental democratisation of the Commons. The Forty Shilling Freeholder franchise, established by statute in 1432 (10 Hen. VI c. 2), confined the county electorate to owners of freehold land valued at forty shillings or above. Borough franchises were diverse, ranging from scot and lot boroughs to potwalloper and burgage franchises, creating a patchwork of widely varying electorates. The Representation of the People Act 1832 disfranchised rotten boroughs, redistributed seats to industrial centres, and standardised borough qualifications around the ten-pound householder franchise, increasing the electorate from approximately 400,000 to 650,000. The 1867 Act extended household suffrage to boroughs, enfranchising significant numbers of urban working-class men and approximately doubling the electorate to some 2.5 million. The 1884 Act applied equivalent household qualifications to the counties. The Representation of the People Act 1918 was the single most transformative measure: it enfranchised virtually all men aged 21 and over on a residential qualification and, for the first time, granted the parliamentary vote to women aged 30 and over who met a property qualification (or whose husbands did), tripling the electorate to approximately 21 million. The Equal Franchise Act 1928 equalised the franchise at age 21 regardless of sex, adding approximately five million women. The Representation of the People Act 1969 lowered the voting age to 18. Subsequent legislation, including the Representation of the People Act 1985, extended the franchise to British citizens resident overseas.
