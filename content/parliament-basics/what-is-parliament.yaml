explanations:
  child:
    summary: "Parliament is where people go to make the rules that everyone in the country follows."
    body: |
      Parliament is a very important place in London where decisions are made about how our country is run. It is made up of three parts: the House of Commons, the House of Lords, and the King.

      The House of Commons is filled with people called Members of Parliament, or MPs. There are 650 of them, and they are chosen by grown-ups in elections. Each MP speaks up for the people who live near them.

      The House of Lords is the second part. The people there are called Lords. They help check the work that MPs do and suggest ways to make new rules better.

      The King is the third part. When Parliament agrees on a new rule, the King gives it the final stamp of approval. This is called Royal Assent.

      Parliament meets in a big, old building called the Palace of Westminster, right next to the River Thames in London. You might know it because of its famous clock tower, which has a giant bell called Big Ben.

      Parliament is not the same as the Government. The Government is a smaller group of MPs who are in charge of running the country day to day. Parliament's job is to make laws, check that the Government is doing a good job, and decide how taxes are spent.
    reading_age: 8
  teenager:
    summary: "Parliament is the UK's supreme law-making body, composed of the House of Commons, the House of Lords, and the Monarch."
    body: |
      The UK Parliament is the highest law-making authority in the United Kingdom. It sits at the Palace of Westminster in London and is made up of three distinct parts: the House of Commons, the House of Lords, and the Monarch.

      The House of Commons is the elected chamber. It has 650 Members of Parliament (MPs), each representing a constituency across the UK. General elections must be held at least every five years, and voters in each constituency choose one MP to represent them. The Commons is the more powerful of the two Houses. It alone has the authority to approve taxes and government spending.

      The House of Lords is the unelected second chamber. Its members include life peers appointed for their expertise, hereditary peers, and bishops of the Church of England. The Lords scrutinise legislation passed by the Commons, propose amendments, and conduct detailed investigations into public policy. While the Lords can delay most legislation, they cannot permanently block it.

      The Monarch is the third component. The King formally opens each new session of Parliament and must give Royal Assent to all Bills before they become Acts of Parliament. In practice, Royal Assent has not been refused since 1708. The concept of the "Crown-in-Parliament" means that legal sovereignty rests in all three parts acting together.

      It is important to understand that Parliament and the Government are separate. Parliament is the legislature -- it makes and passes laws. The Government is the executive -- it runs the country and puts laws into practice. The Government is formed by the political party that wins the most seats in the House of Commons, and the Prime Minister and around 120 ministers make up the Government. Parliament's role is to hold the Government to account through debates, questions, and committee inquiries.

      The principle of parliamentary sovereignty means that Parliament is the supreme legal authority. It can create or abolish any law, and no other body, including the courts, can override or set aside an Act of Parliament.
    reading_age: 14
  adult:
    summary: "Parliament is the bicameral legislature of the United Kingdom, comprising the House of Commons, the House of Lords, and the Monarch, exercising supreme legal authority through the doctrine of parliamentary sovereignty."
    body: |
      The Parliament of the United Kingdom is the supreme legislative body of the country, sitting at the Palace of Westminster in London. It is a bicameral institution consisting of three component parts: the House of Commons, the House of Lords, and the Monarch (collectively referred to as the "Crown-in-Parliament" or "King-in-Parliament").

      The House of Commons is the democratically elected lower chamber, composed of 650 Members of Parliament, each elected by the first-past-the-post system to represent a single constituency. The Commons holds primacy in financial matters: all money Bills must originate there, and the Lords cannot amend or reject them. By convention, the Government is formed from the party or coalition commanding a majority in the Commons, making it the dominant chamber in practice.

      The House of Lords is the appointed upper chamber. Its membership includes life peers (appointed under the Life Peerages Act 1958), 92 hereditary peers (retained under the House of Lords Act 1999), and 26 Lords Spiritual (senior bishops of the Church of England). The Lords serve as a revising chamber, scrutinising legislation, proposing amendments, and conducting in-depth inquiries. Under the Parliament Acts of 1911 and 1949, the Lords can delay non-money Bills for up to one year but cannot veto them indefinitely.

      The Monarch's role is largely ceremonial but constitutionally essential. The King opens each session of Parliament with the King's Speech (written by the Government), and Royal Assent is required before any Bill becomes an Act of Parliament. The last refusal of Royal Assent was by Queen Anne in 1708 regarding the Scottish Militia Bill.

      The doctrine of parliamentary sovereignty, as articulated by the constitutional scholar A.V. Dicey, holds that Parliament has the right to make or unmake any law whatsoever, that no Parliament can bind a future Parliament, and that no body (including the courts) may override or set aside Parliament's legislation. This remains a foundational principle of the UK's uncodified constitution, though its absoluteness has been debated in light of EU membership (1973-2020), devolution, and the Human Rights Act 1998.

      Parliament is distinct from the Government. Parliament is the legislature: it debates, amends, and passes laws, approves taxation, and scrutinises the executive. The Government is the executive: led by the Prime Minister and Cabinet, it proposes legislation, sets policy, and administers public services. Ministers are drawn from both Houses but must regularly appear before Parliament to answer questions and justify their decisions. This separation ensures democratic accountability.

      The Palace of Westminster itself is a UNESCO World Heritage Site (since 1987), with over 1,100 rooms, 100 staircases, and 11 courtyards. Much of the current building was designed by Charles Barry and Augustus Pugin following the devastating fire of 1834, which destroyed most of the medieval palace. Westminster Hall, dating from 1097, survived the fire and remains one of the finest medieval halls in Europe. The Elizabeth Tower, housing the Great Bell known as Big Ben, stands at 96 metres and has become an internationally recognised symbol of British democracy.
    reading_age: 18
  researcher:
    summary: "An analysis of the Parliament of the United Kingdom as a tripartite institution exercising sovereign legislative authority through the Crown-in-Parliament, its constitutional evolution, and its contemporary relationship with executive power."
    body: |
      The Parliament of the United Kingdom of Great Britain and Northern Ireland is the supreme legislative authority within the British constitutional framework, operating under the doctrine of parliamentary sovereignty. Constitutionally, Parliament is a tripartite institution comprising the House of Commons, the House of Lords, and the Monarch acting as the Crown-in-Parliament -- a formulation established through centuries of constitutional evolution and codified in the scholarship of A.V. Dicey's "Introduction to the Study of the Law of the Constitution" (1885).

      Dicey's articulation of parliamentary sovereignty rests upon three interconnected propositions: that Parliament may make or unmake any law; that no Parliament may bind its successors; and that no institution may question the validity of an Act of Parliament. This orthodox formulation has been subject to significant scholarly critique and practical qualification. Sir Ivor Jennings challenged Dicey's positivist approach, arguing that sovereignty must be understood within a broader political and conventional context. More recently, the relationship between parliamentary sovereignty and the rule of law has been explored in judicial dicta, notably in R (Jackson) v Attorney General [2005] UKHL 56, where several Law Lords suggested that parliamentary sovereignty might itself be a construct of the common law, potentially subject to judicial limitation in extreme circumstances.

      The House of Commons, with its 650 elected members returned by single-member plurality (first-past-the-post) voting, derives its democratic legitimacy from the Representation of the People Acts and universal adult suffrage achieved progressively through the Reform Acts of 1832, 1867, and 1884, the Representation of the People Act 1918 (extending the vote to women over 30 and all men over 21), and the Equal Franchise Act 1928. The Commons exercises financial privilege: under the Parliament Act 1911, money Bills certified by the Speaker may receive Royal Assent without Lords consent after one month. The Parliament Acts of 1911 and 1949 further curtailed Lords' power over other public Bills to a maximum delay of one year.

      The House of Lords has undergone substantial reform. The Life Peerages Act 1958 introduced life peers, diversifying the chamber's composition. The House of Lords Act 1999 removed all but 92 hereditary peers, fundamentally altering the chamber's character from a predominantly hereditary body to one dominated by appointed life peers. As of 2025, the Lords numbers approximately 780 members, including life peers, excepted hereditary peers, and 26 Lords Spiritual. The House of Lords (Hereditary Peers) Act 2025 removes the right of the remaining hereditary peers to sit and vote.

      The Monarch's constitutional role is governed primarily by convention rather than statute. Royal Assent has not been refused since Queen Anne withheld it from the Scottish Militia Bill in 1708. The King's Speech at the State Opening of Parliament is written by the Government and sets out the legislative programme. The royal prerogative -- historically a source of executive power -- has been progressively curtailed and is now exercised almost entirely on ministerial advice.

      The distinction between Parliament and Government is fundamental to the British constitution. Parliament (the legislature) makes law and holds the executive to account; the Government (the executive) formulates policy, introduces the majority of legislation, and administers the state. The fusion of powers -- whereby Government ministers must sit in Parliament -- creates a system of responsible government, but it is the separation of institutional roles that provides the mechanism for democratic accountability through parliamentary questions, select committee inquiries, debates, and votes of confidence.

      The physical seat of Parliament, the Palace of Westminster, is itself of constitutional and historical significance. The original palace served as a royal residence from the reign of Canute (1016-1035) until the fire of 1512. Westminster Hall, constructed by William Rufus in 1097 and remodelled with its famous hammerbeam roof by Richard II in the 1390s, has hosted significant state trials, including those of William Wallace (1305), Thomas More (1535), and Charles I (1649). Following the fire of 16 October 1834 -- caused by the over-zealous burning of Exchequer tally sticks -- the palace was rebuilt in the Perpendicular Gothic style by Sir Charles Barry (architect) and Augustus Welby Northmore Pugin (interior design), completed substantially by 1870. The complex was designated a UNESCO World Heritage Site in 1987 alongside Westminster Abbey and St Margaret's Church.
