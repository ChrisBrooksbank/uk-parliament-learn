quizzes:
  child:
    - question: "How many parts make up Parliament?"
      type: multiple_choice
      options:
        - "Two"
        - "Three"
        - "Four"
      correct_answer: "Three"
      explanation: "Parliament is made up of three parts: the House of Commons, the House of Lords, and the King."
    - question: "What is the name of the building where Parliament meets?"
      type: multiple_choice
      options:
        - "Buckingham Palace"
        - "The Palace of Westminster"
        - "The Tower of London"
      correct_answer: "The Palace of Westminster"
      explanation: "Parliament meets in the Palace of Westminster, next to the River Thames in London."
    - question: "True or false: Big Ben is the name of the clock tower at Parliament."
      type: true_false
      correct_answer: "False"
      explanation: "Big Ben is actually the nickname for the Great Bell inside the tower. The tower itself is called the Elizabeth Tower."
  teenager:
    - question: "What does 'parliamentary sovereignty' mean?"
      type: multiple_choice
      options:
        - "The Prime Minister has the final say on all laws"
        - "Parliament is the supreme legal authority and can make or unmake any law"
        - "The King can overrule any decision made by Parliament"
      correct_answer: "Parliament is the supreme legal authority and can make or unmake any law"
      explanation: "Parliamentary sovereignty means Parliament is the highest legal authority in the UK. No other body can override an Act of Parliament."
    - question: "What is the key difference between Parliament and the Government?"
      type: multiple_choice
      options:
        - "They are the same thing"
        - "Parliament makes laws and scrutinises the Government; the Government runs the country day to day"
        - "The Government makes laws and Parliament runs the country"
      correct_answer: "Parliament makes laws and scrutinises the Government; the Government runs the country day to day"
      explanation: "Parliament is the legislature that passes laws and holds the executive to account. The Government is the executive that sets policy and administers public services."
    - question: "Why is Simon de Montfort's Parliament of 1265 considered historically significant?"
      type: short_answer
      correct_answer: "It was the first Parliament to include elected representatives from towns and shires alongside nobles, making it the first representative Parliament."
      explanation: "De Montfort summoned knights from the shires and burgesses from the towns to sit alongside nobles and clergy, establishing the principle of broader representation that became the foundation of the House of Commons."
  adult:
    - question: "Under the Parliament Acts of 1911 and 1949, for how long can the House of Lords delay a non-money public Bill?"
      type: multiple_choice
      options:
        - "Six months"
        - "One year"
        - "Two years"
        - "Indefinitely"
      correct_answer: "One year"
      explanation: "The Parliament Act 1911 initially set the delay at two years. The Parliament Act 1949 reduced this to one year, ensuring that the elected House of Commons can ultimately prevail."
    - question: "What caused the 1834 fire that destroyed most of the Palace of Westminster?"
      type: short_answer
      correct_answer: "The careless burning of old wooden Exchequer tally sticks in furnaces beneath the House of Lords."
      explanation: "Wooden tally sticks, used for accounting until 1826, were disposed of by being burned in the furnaces under the House of Lords. The excessive heat set fire to the chimney flues, which spread rapidly throughout the palace."
    - question: "Which constitutional scholar articulated the orthodox doctrine of parliamentary sovereignty, and in which work?"
      type: short_answer
      correct_answer: "A.V. Dicey, in 'Introduction to the Study of the Law of the Constitution' (1885)."
      explanation: "Albert Venn Dicey, Vinerian Professor of English Law at Oxford, set out the classic formulation: Parliament can make or unmake any law, no Parliament can bind its successor, and no court can override an Act of Parliament."
  researcher:
    - question: "In R (Jackson) v Attorney General [2005], what significant proposition regarding parliamentary sovereignty did several Law Lords advance?"
      type: short_answer
      correct_answer: "Several Law Lords suggested that parliamentary sovereignty might itself be a common law construct, and could theoretically be subject to judicial limitation in extreme circumstances."
      explanation: "In obiter dicta, Lords Steyn, Hope, and Baroness Hale questioned the absoluteness of parliamentary sovereignty, suggesting that if Parliament attempted to abolish fundamental constitutional rights, the courts might refuse to give effect to such legislation -- a radical departure from Diceyan orthodoxy."
    - question: "How did the House of Lords Act 1999 and the House of Lords (Hereditary Peers) Act 2025 transform the composition of the upper chamber?"
      type: short_answer
      correct_answer: "The 1999 Act removed all but 92 hereditary peers, transforming the Lords from a predominantly hereditary to a predominantly appointed chamber. The 2025 Act removes the right of the remaining hereditary peers to sit and vote, completing the transition."
      explanation: "Before 1999, the Lords was dominated by over 750 hereditary peers. The 1999 reform retained 92 as a transitional compromise. The 2025 Act ends even this residual hereditary element, leaving the chamber composed entirely of life peers and Lords Spiritual."
    - question: "Contrast Dicey's and Jennings's conceptions of parliamentary sovereignty."
      type: essay
      correct_answer: "Dicey advanced a positivist, legalistic conception in which sovereignty was unlimited and absolute. Jennings challenged this by arguing sovereignty must be understood within a broader political and conventional context, noting that legal rules about sovereignty are themselves dependent on political facts."
      explanation: "Dicey treated sovereignty as a matter of strict legal analysis -- Parliament's legal power is unlimited. Jennings, in 'The Law and the Constitution' (1933/1959), argued that Dicey's approach was artificially narrow, that constitutional conventions shape and constrain legal sovereignty, and that the 'rules of recognition' that establish Parliament's authority are themselves extra-legal, grounded in political practice rather than pure law."
