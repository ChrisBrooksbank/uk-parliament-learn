glossary:
  - term: "Parliamentary Sovereignty"
    definition_simple: "The idea that Parliament is the most powerful law-making body in the country and no one can overrule it."
    definition_full: "The constitutional doctrine, as articulated by A.V. Dicey, that Parliament possesses the supreme legal authority to make or unmake any law, that no Parliament may bind a future Parliament, and that no body -- including the courts -- may override or set aside an Act of Parliament."
  - term: "Royal Assent"
    definition_simple: "The King's agreement that a new law can go ahead. It is the final step before a Bill becomes a law."
    definition_full: "The formal approval by the Monarch of a Bill passed by both Houses of Parliament, upon which it becomes an Act of Parliament and part of the law of the land. Royal Assent is granted as a matter of constitutional convention and has not been refused since 1708."
  - term: "Constituency"
    definition_simple: "An area of the country that chooses one MP to speak for the people who live there."
    definition_full: "A geographically defined electoral district, each represented by one Member of Parliament in the House of Commons. The UK is divided into 650 constituencies, with boundaries periodically reviewed by the Boundary Commissions."
  - term: "Bicameral"
    definition_simple: "A word meaning that Parliament has two separate groups, or chambers, that work together to make laws."
    definition_full: "A legislative system consisting of two separate chambers or houses. In the UK, the bicameral Parliament comprises the elected House of Commons (the lower house) and the appointed House of Lords (the upper house), each with distinct roles in the legislative process."
  - term: "Act of Parliament"
    definition_simple: "A rule that has been agreed by the House of Commons, the House of Lords, and the King, and has become an official law."
    definition_full: "A statute formally enacted by all three components of Parliament -- the House of Commons, the House of Lords, and the Monarch through Royal Assent. Acts of Parliament are primary legislation and represent the highest form of law in the UK legal system."

did_you_know:
  - fact: "The Palace of Westminster has over 1,100 rooms, 100 staircases, and 11 courtyards. You could get lost exploring it for days!"
    level: [child, teenager]
  - fact: "Big Ben is actually the nickname for the Great Bell inside the Elizabeth Tower, not the tower itself. The bell weighs nearly 14 tonnes -- about as heavy as two African elephants!"
    level: [child, teenager]
  - fact: "The fire that destroyed most of the old Palace of Westminster in 1834 was started by burning old wooden tally sticks that had been used for keeping accounts. They were stuffed into furnaces under the House of Lords and set the chimney flues ablaze."
    level: [teenager, adult, researcher]
  - fact: "The last time a monarch refused Royal Assent was in 1708, when Queen Anne rejected the Scottish Militia Bill. Every monarch since then has approved every law passed by both Houses."
    level: [teenager, adult]
  - fact: "Westminster Hall, built in 1097, has one of the largest medieval hammerbeam roofs in Europe, spanning 20.7 metres without a single supporting column."
    level: [adult, researcher]

key_dates:
  - year: 1215
    event: "Magna Carta sealed by King John"
    significance: "Established the principle that the King was subject to the law and laid the groundwork for parliamentary authority and the limitation of royal power."
    levels: [teenager, adult, researcher]
  - year: 1265
    event: "Simon de Montfort's Parliament"
    significance: "Often regarded as the first representative English Parliament, because for the first time both knights from the shires and burgesses from the towns were summoned alongside nobles and clergy to discuss national affairs."
    levels: [teenager, adult, researcher]
  - year: 1689
    event: "Bill of Rights enacted"
    significance: "Established key constitutional principles including the supremacy of Parliament over the Crown, the right to free elections, freedom of speech in parliamentary debate, and the prohibition of cruel and unusual punishment."
    levels: [teenager, adult, researcher]
  - year: 1834
    event: "Palace of Westminster destroyed by fire"
    significance: "The accidental burning of Exchequer tally sticks destroyed most of the medieval palace, leading to the construction of the current Gothic Revival building designed by Charles Barry and Augustus Pugin."
    levels: [child, teenager, adult, researcher]
  - year: 1911
    event: "Parliament Act 1911 passed"
    significance: "Removed the House of Lords' power to veto money Bills and limited its ability to delay other legislation to two years (later reduced to one year by the Parliament Act 1949), establishing the primacy of the elected House of Commons."
    levels: [adult, researcher]
  - year: 1928
    event: "Equal Franchise Act"
    significance: "Granted women the right to vote on the same terms as men (at age 21), achieving universal adult suffrage and completing a century-long struggle for equal democratic representation."
    levels: [teenager, adult, researcher]

key_figures:
  - name: "Simon de Montfort"
    role: "Earl of Leicester and rebel leader"
    description: "Led a baronial revolt against Henry III and in 1265 summoned what is widely considered the first representative Parliament in English history, including knights and burgesses alongside nobles. He is often credited as the founder of the House of Commons."
    levels: [teenager, adult, researcher]
  - name: "Sir Charles Barry"
    role: "Architect of the Palace of Westminster"
    description: "Won the competition to design the new Palace of Westminster after the 1834 fire. Working with Augustus Pugin on the interiors and detailing, he created the iconic Gothic Revival building that serves as the home of Parliament today."
    levels: [child, teenager, adult]
  - name: "Augustus Welby Northmore Pugin"
    role: "Interior designer of the Palace of Westminster"
    description: "One of the foremost architects of the Gothic Revival, Pugin designed the elaborate interiors, furnishings, and decorative details of the new Palace of Westminster, including the Elizabeth Tower (Big Ben's clock tower). He died in 1852, aged just 40, before the building was completed."
    levels: [teenager, adult, researcher]
  - name: "A.V. Dicey"
    role: "Constitutional scholar"
    description: "Albert Venn Dicey was a Vinerian Professor of English Law at Oxford whose 1885 work 'Introduction to the Study of the Law of the Constitution' defined the orthodox doctrine of parliamentary sovereignty that remains central to British constitutional law."
    levels: [adult, researcher]

