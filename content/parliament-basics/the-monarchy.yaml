explanations:
    child:
        reading_age: 8
        summary: 'The King or Queen is part of Parliament, but Parliament makes the rules.'
        body: |
            The United Kingdom has a King. Right now, the King is called King Charles III.

            The King is part of Parliament, along with the House of Commons and the House of Lords.
            But the King does not make the laws himself. That is Parliament's job.

            When Parliament agrees on a new law, the King gives it his approval. This is called
            Royal Assent. It means the King says "yes" to the new law. The King always says yes —
            it would be very unusual for a King or Queen to say no.

            Once a year, the King visits Parliament for a special ceremony called the State Opening
            of Parliament. He sits on a golden throne in the House of Lords and reads out a speech.
            The speech tells everyone what the government plans to do. The King does not write the
            speech himself — the government writes it for him.

            The King also meets with the Prime Minister every week. They have a private chat about
            what is happening in the country.

            The King must not take sides in politics. He cannot say which political party he likes
            best. His job is to be fair to everyone and to represent the whole country.

    teenager:
        reading_age: 14
        summary: 'The UK is a constitutional monarchy where the monarch plays a formal but essential role in Parliament.'
        body: |
            The United Kingdom is a constitutional monarchy. This means the country has a King or
            Queen as head of state, but their powers are limited by law and convention. The real
            power to govern belongs to Parliament and the elected government.

            King Charles III became King in September 2022, following the death of Queen Elizabeth II.
            As monarch, he is one of the three parts of Parliament, alongside the House of Commons
            and the House of Lords.

            The monarch has several key roles in relation to Parliament:

            **Royal Assent** — Every bill that passes through both Houses of Parliament must receive
            Royal Assent before it becomes law. This is the monarch's formal approval. In practice,
            Royal Assent is always given. The last time a monarch refused was in 1708, when Queen
            Anne withheld assent from the Scottish Militia Bill.

            **The King's Speech** — At the State Opening of Parliament, the monarch travels from
            Buckingham Palace to the Palace of Westminster in a grand procession. Seated on the
            throne in the House of Lords, the King reads out a speech written by the government.
            This speech sets out the government's plans and proposed legislation for the coming
            parliamentary session. It is the only regular occasion when all three parts of
            Parliament — the monarch, the Lords, and the Commons — come together.

            **Appointing the Prime Minister** — After a general election, the monarch formally
            appoints the leader of the party that can command a majority in the House of Commons
            as Prime Minister.

            **Weekly audiences** — The monarch meets the Prime Minister weekly for a private
            audience. No record is kept of what is discussed.

            A crucial convention is that the monarch must remain politically neutral. The King
            cannot publicly express political opinions or show favour to any political party.
            This neutrality is what allows the monarch to serve as a unifying figurehead for the
            whole nation.

    adult:
        reading_age: 18
        summary: "The monarch exercises constitutionally significant but convention-bound powers within the UK's uncodified constitutional framework."
        body: |
            The United Kingdom operates as a constitutional monarchy within a parliamentary
            democracy. The monarch — currently King Charles III, who acceded to the throne on
            8 September 2022 — serves as head of state and is formally one of the three
            constituent elements of Parliament (alongside the House of Commons and the House
            of Lords). However, the monarch's role is overwhelmingly governed by constitutional
            conventions rather than statute, making it largely ceremonial in practice.

            **Royal Prerogative Powers**

            The royal prerogative is a body of customary authority, privilege, and immunity
            recognised in common law as belonging to the Crown. These powers originated in the
            medieval period but have been progressively constrained. Key prerogative powers
            exercised in relation to Parliament and government include:

            - Appointing and dismissing the Prime Minister and other ministers
            - Summoning, proroguing, and dissolving Parliament (dissolution is now governed by
              the Dissolution and Calling of Parliament Act 2022, which restored the prerogative
              power after the Fixed-term Parliaments Act 2011 was repealed)
            - Granting Royal Assent to bills passed by both Houses
            - Creating peers (on the advice of the Prime Minister)

            In practice, these powers are exercised on ministerial advice. The "Cardinal
            Convention" requires the monarch to act on the advice of ministers, transferring
            substantive decision-making to democratically accountable officeholders.

            **Royal Assent**

            Royal Assent is the final stage in the legislative process. It has not been refused
            since Queen Anne withheld assent from the Scottish Militia Bill on 11 March 1708,
            acting on the advice of her ministers who feared the proposed militia might prove
            disloyal amid a Franco-Jacobite invasion threat. Today, Royal Assent is considered
            an automatic formality.

            Distinct from Royal Assent is King's Consent (formerly Queen's Consent), which must
            be obtained before Parliament debates bills that would affect the monarch's prerogative
            or personal interests. This too is a formality, but it has attracted scrutiny as a
            potential mechanism for monarchical influence over legislation.

            **The State Opening and the King's Speech**

            The State Opening of Parliament is the most visible expression of the relationship
            between Crown and Parliament. The monarch processes from Buckingham Palace to the
            Palace of Westminster, dons the Imperial State Crown, and delivers the King's Speech
            from the throne in the House of Lords. The speech, written entirely by the government,
            outlines the legislative programme for the session.

            The ceremony includes the symbolic ritual of Black Rod being sent to summon MPs from
            the Commons. The door of the Commons chamber is slammed shut in Black Rod's face —
            a tradition dating from the English Civil War, symbolising the Commons' independence
            from the Crown.

            **Political Neutrality**

            The convention of monarchical political neutrality is considered fundamental to the
            constitutional settlement. The monarch must not publicly express political views,
            must accept ministerial advice, and must be seen to be impartial. This convention
            enables the monarch to function as a unifying national figurehead above partisan
            politics.

            King Charles III, who as Prince of Wales was known for his correspondence with
            government ministers (the so-called "black spider memos"), has fully embraced this
            convention since his accession, operating strictly within constitutional parameters.

            **The Tripartite Convention**

            Walter Bagehot, in *The English Constitution* (1867), identified three rights of the
            constitutional monarch: "the right to be consulted, the right to encourage, the right
            to warn." These rights are exercised during the monarch's weekly private audience with
            the Prime Minister, of which no official record is kept. This framework remains the
            most widely cited description of the monarch's residual political function.

    researcher:
        reading_age: null
        summary: "An analysis of the Crown-in-Parliament doctrine, prerogative powers, and the evolving constitutional conventions governing the British monarchy's role within the legislative and executive framework."
        body: |
            The constitutional position of the British monarchy rests on the doctrine of the
            Crown-in-Parliament: the legal fiction that legislative sovereignty is vested not in
            Parliament alone but in the "King-in-Parliament" — the tripartite body comprising
            the Sovereign, the House of Lords, and the House of Commons. This doctrine, rooted
            in medieval constitutional theory, persists as a formal feature of UK public law
            even as the substantive locus of political power has shifted decisively to the
            elected chamber and the executive.

            **Bagehot's Analytical Framework**

            Walter Bagehot's *The English Constitution* (1867) remains the foundational text for
            understanding the monarchy's constitutional role. Bagehot distinguished between the
            "dignified" parts of the constitution — those which "excite and preserve the reverence
            of the population" — and the "efficient" parts — "those by which it, in fact, works
            and rules." The monarchy, he argued, belonged firmly to the dignified sphere, serving
            as a "disguise" that lent legitimacy and emotional resonance to government while the
            real work of governance was conducted by the Cabinet and Commons.

            Bagehot's tripartite formulation of the monarch's rights — "the right to be consulted,
            the right to encourage, the right to warn" — has proved remarkably durable, remaining
            the standard characterisation of the monarch's residual political function. However,
            scholars including Vernon Bogdanor (*The Monarchy and the Constitution*, 1995) have
            argued that Bagehot underestimated the potential significance of these rights,
            particularly in circumstances of constitutional ambiguity such as a hung parliament
            or a prime ministerial resignation without a clear successor.

            **The Royal Prerogative: Legal Framework and Constitutional Constraints**

            The royal prerogative comprises those common-law powers, privileges, and immunities
            inherent to the Crown. Following the constitutional settlement of 1689, prerogative
            powers have been progressively circumscribed by statute and convention. The Case of
            Proclamations (1611) established that the monarch could not create new prerogative
            powers; the Bill of Rights 1689 prohibited the suspension or dispensation of laws
            without parliamentary consent.

            In modern practice, prerogative powers fall into two categories: those exercised
            personally by the monarch (the "personal prerogatives") and those exercised by
            ministers on behalf of the Crown. The personal prerogatives — appointing the Prime
            Minister, granting Royal Assent, and dissolving Parliament — are subject to binding
            constitutional conventions. The Cardinal Convention, as articulated by Jennings and
            subsequent constitutional scholars, requires the monarch to act on ministerial advice
            in virtually all circumstances.

            The prorogation controversy of 2019, in which the Supreme Court ruled in *R (Miller)
            v The Prime Minister* [2019] UKSC 41 that the advice tendered to the Queen to prorogue
            Parliament was unlawful, demonstrated that even prerogative powers exercised on
            ministerial advice are subject to judicial review. This decision marked a significant
            extension of the court's supervisory jurisdiction over prerogative acts.

            **Royal Assent and King's Consent**

            Royal Assent, governed by the Royal Assent Act 1967, is the final step in the
            legislative process. The last refusal — Queen Anne's withholding of assent to the
            Scottish Militia Bill on 11 March 1708 — is generally regarded as the definitive
            precedent establishing that assent will not be refused. Constitutional convention
            now treats Royal Assent as an irrevocable formality.

            King's Consent (distinct from Royal Assent) requires the monarch's consent to be
            signified before Parliament may debate bills affecting the royal prerogative or the
            personal property and interests of the Crown. Research by *The Guardian* in 2021
            revealed that consent had been sought on over 1,000 bills, raising concerns about
            the opacity of the process and its potential for undue monarchical influence. The
            House of Commons Procedure Committee has examined the practice but no substantive
            reform has been enacted.

            **Political Neutrality and the "Public Service Monarchy"**

            The convention of political neutrality — termed by some scholars the "cardinal
            convention" — is the cornerstone of the modern constitutional monarchy. It requires
            the monarch to refrain from public political expression and to act exclusively on
            ministerial advice in the exercise of governmental functions.

            King Charles III's accession in 2022 tested this convention given his extensive prior
            advocacy on environmental and architectural matters. His correspondence with ministers
            (the "black spider memos," disclosed following the *R (Evans) v Attorney General*
            [2015] UKSC 21 ruling) had raised questions about the boundary between legitimate
            private counsel and improper political influence. Since acceding, Charles has adhered
            strictly to the convention, notably accepting Prime Minister Sunak's advice not to
            attend COP27 in 2022 despite his personal commitment to climate advocacy.

            **Reserve Powers and Constitutional Crisis**

            The monarch's reserve powers — the theoretical capacity to act without or against
            ministerial advice — remain a contested area of constitutional theory. While these
            powers are dormant in normal circumstances, scholars such as Rodney Brazier
            (*Constitutional Practice*, 3rd ed., 1999) and Robert Blackburn have argued that
            they could become operative in exceptional situations: a prime minister refusing to
            resign after losing a vote of confidence, a request for dissolution designed to
            frustrate parliamentary accountability, or a bill fundamentally subverting the
            democratic constitution.

            The Lascelles Principles, articulated in a 1950 letter to *The Times* by King
            George VI's Private Secretary Sir Alan Lascelles, set out three circumstances in
            which a monarch might legitimately refuse a dissolution: if the existing Parliament
            was still vital, if an election would be detrimental to the national economy, and
            if the monarch could find another Prime Minister who could command a majority. While
            the Dissolution and Calling of Parliament Act 2022 has restored the prerogative of
            dissolution, the Lascelles Principles continue to inform scholarly debate about the
            limits of the convention.
