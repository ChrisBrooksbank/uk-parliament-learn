quizzes:
    child:
        - question: 'What is it called when the King says yes to a new law?'
          type: multiple_choice
          options:
              - 'Royal Assent'
              - 'Royal Permission'
              - "King's Order"
              - 'Royal Stamp'
          correct_answer: 'Royal Assent'
          explanation: "Royal Assent is the King's formal approval that turns a bill into a law. The King always gives this approval."

        - question: 'True or false: The King writes his own speech for the State Opening of Parliament.'
          type: true_false
          correct_answer: 'False'
          explanation: "The government writes the King's Speech. The King reads it out, but the words are the government's plans, not the King's own ideas."

        - question: 'The King must not take sides in politics. Why do you think this is important?'
          type: short_answer
          correct_answer: 'The King represents the whole country, not just one group. If the King took sides, some people might feel he did not represent them.'
          explanation: 'The King is meant to be a figurehead for everyone in the country. Staying neutral means all people can feel represented by the monarchy, no matter which political party they support.'

    teenager:
        - question: 'When was Royal Assent last refused by a British monarch?'
          type: multiple_choice
          options:
              - '1649'
              - '1689'
              - '1708'
              - '1867'
          correct_answer: '1708'
          explanation: 'Queen Anne withheld Royal Assent from the Scottish Militia Bill in 1708. No monarch has refused since, making it a constitutional convention that assent is always given.'

        - question: 'True or false: The State Opening of Parliament is the only regular occasion when the monarch, the House of Lords, and the House of Commons all meet together.'
          type: true_false
          correct_answer: 'True'
          explanation: 'The State Opening is the one regular event that brings together all three constituent parts of Parliament: the Sovereign, the Lords, and the Commons.'

        - question: 'Explain why the door of the House of Commons is shut in the face of Black Rod during the State Opening of Parliament.'
          type: short_answer
          correct_answer: 'It symbolises the independence of the House of Commons from the Crown. The tradition dates back to the English Civil War and represents the right of the Commons to debate without royal interference.'
          explanation: 'This centuries-old tradition is a powerful symbol of parliamentary independence. It reminds everyone that the elected House of Commons has the right to conduct its business free from monarchical control.'

    adult:
        - question: "Which of the following best describes the 'Cardinal Convention' in relation to the monarchy?"
          type: multiple_choice
          options:
              - 'The monarch must open each session of Parliament in person'
              - 'The monarch must act on the advice of ministers'
              - 'The monarch must grant Royal Assent within 30 days'
              - 'The monarch must remain resident in the United Kingdom'
          correct_answer: 'The monarch must act on the advice of ministers'
          explanation: 'The Cardinal Convention is the fundamental constitutional convention requiring the monarch to act on ministerial advice, thereby ensuring that substantive political power rests with democratically accountable officeholders rather than the hereditary sovereign.'

        - question: "How did the Supreme Court's decision in R (Miller) v The Prime Minister [2019] change the constitutional understanding of prerogative powers?"
          type: short_answer
          correct_answer: 'The Court ruled that prerogative powers exercised on ministerial advice — specifically the prorogation of Parliament — are justiciable and subject to judicial review. This established that the courts can examine the lawfulness of advice given to the monarch.'
          explanation: 'The Miller/Cherry prorogation case was a landmark ruling that extended the principle of judicial review to prerogative acts carried out on ministerial advice, reinforcing parliamentary sovereignty and constraining executive use of the royal prerogative.'

        - question: "True or false: King's Consent and Royal Assent are the same thing."
          type: true_false
          correct_answer: 'False'
          explanation: "They are distinct. Royal Assent is given after a bill has passed both Houses, enacting it as law. King's Consent must be obtained before Parliament debates bills affecting the monarch's prerogative or personal interests. Both are formalities, but they operate at different stages of the legislative process."

    researcher:
        - question: "Critically assess Bagehot's classification of the monarchy as belonging to the 'dignified' rather than the 'efficient' part of the constitution. To what extent does this distinction remain analytically useful?"
          type: essay
          correct_answer: "A strong answer would argue that while the dignified/efficient distinction captures the monarchy's primarily symbolic and ceremonial function, it understates the monarch's residual political significance in moments of constitutional ambiguity (e.g., hung parliaments, disputed dissolutions). Scholars such as Bogdanor have argued that the reserve powers, though dormant, represent a latent 'efficient' capacity. The 2019 prorogation crisis further complicated the distinction by demonstrating that formally 'dignified' acts can have profoundly 'efficient' consequences."
          explanation: "Bagehot's framework has proved remarkably durable but requires qualification. The boundary between dignified and efficient is more permeable than Bagehot suggested, particularly in constitutional crises where the monarch's reserve powers could become operative."

        - question: "Evaluate the constitutional significance of the distinction between Royal Assent and King's Consent. Does the latter represent a meaningful check on parliamentary sovereignty?"
          type: essay
          correct_answer: "An effective response would note that Royal Assent is a post-legislative formality with no discretionary element, while King's Consent operates pre-legislatively and has been sought on over 1,000 bills. The opacity of the consent process — conducted through private channels — raises questions about accountability. However, consent has never been refused in modern times and is given on ministerial advice, suggesting it functions as a convention-bound formality rather than a substantive veto. The scholarly debate centres on whether the process could theoretically be used to influence the drafting of legislation before it reaches Parliament."
          explanation: "The distinction matters because King's Consent operates at an earlier, less transparent stage of the legislative process. While both are conventional formalities, the consent mechanism's opacity has led constitutional scholars and journalists to question whether it provides a channel for monarchical influence that sits uneasily with parliamentary sovereignty."

        - question: 'Analyse the Lascelles Principles in light of the Dissolution and Calling of Parliament Act 2022. Do these principles retain constitutional relevance?'
          type: short_answer
          correct_answer: 'The 2022 Act restored the prerogative of dissolution, making the Lascelles Principles potentially relevant again. The Principles — articulated in 1950 — set out circumstances in which a monarch might refuse a dissolution request. While no monarch has tested them, they remain the most cited framework for analysing the limits of the dissolution prerogative and the circumstances in which the monarch might legitimately exercise independent judgment.'
          explanation: "The repeal of the Fixed-term Parliaments Act 2011 and the restoration of the dissolution prerogative by the 2022 Act revived scholarly interest in the Lascelles Principles, which had seemed academic during the fixed-term parliament era. They remain the leading authority on the theoretical limits of the monarch's obligation to accept dissolution advice."
