explanations:
  child:
    summary: "The House of Lords is a group of people who help check the laws that the House of Commons wants to make."
    body: |
      The House of Lords is one of the two parts of Parliament. The other part is the House of Commons.

      The people who sit in the House of Lords are called peers or Lords. They are not chosen by voting like MPs are. Instead, most of them are picked because they know a lot about important subjects like medicine, science, law, or education.

      There are also 26 bishops from the Church of England who sit in the House of Lords. They are called the Lords Spiritual.

      The main job of the House of Lords is to look carefully at new laws. When the House of Commons writes a new law, the Lords read it and suggest changes to make it better. They cannot stop a law forever, but they can ask the Commons to think again.

      The House of Lords meets in a big room with red seats in the Palace of Westminster. The House of Commons has green seats, so the red seats help you tell them apart.
    reading_age: 8
  teenager:
    summary: "The House of Lords is the upper chamber of the UK Parliament, responsible for scrutinising legislation, holding the government to account, and drawing on members' specialist expertise."
    body: |
      The House of Lords is the second chamber of the UK Parliament. Unlike the House of Commons, its members are not elected by the public. As of early 2026, it has around 800 sitting members.

      There are several types of Lords. Life peers make up the largest group. They are appointed by the monarch on the advice of the Prime Minister and hold their title for life, but cannot pass it on to their children. Many life peers are experts in fields such as law, medicine, business, or the arts. There are also 26 bishops of the Church of England, known as the Lords Spiritual, who sit in the chamber.

      Until 1999, hundreds of hereditary peers — people who inherited their titles from their parents — sat in the Lords. The House of Lords Act 1999 removed most of them, keeping only 92 as a temporary compromise. In 2024, the Labour government introduced a bill to remove those remaining hereditary peers entirely. That bill, the House of Lords (Hereditary Peers) Bill, passed through both chambers and was in its final stages as of early 2026.

      The Lords cannot block most legislation permanently. Under the Parliament Acts of 1911 and 1949, the Lords can only delay a bill for up to one year. There is also the Salisbury Convention, an agreement that the Lords will not vote against any legislation that was promised in the governing party's election manifesto.

      The House of Lords plays an important role in improving legislation. Because many peers are specialists in particular areas, they often spot problems in bills that MPs might miss. The Lords also hold debates on important issues, question government ministers, and conduct detailed investigations through their select committees, such as the Constitution Committee, which checks whether new laws fit with the UK's constitutional principles, and the Delegated Powers Committee, which examines whether bills give too much power to ministers.

      Reforming the Lords has been debated for over a century. In 2012, the coalition government proposed making the Lords 80% elected, but the plan was dropped due to opposition. Now, even after hereditary peers are removed, questions remain about the chamber's size, how members are appointed, and whether peers should be required to retire at a certain age.

      The Lords works differently from the Commons in its day-to-day patterns. There are no "whips" as strict as in the Commons, debates are often less confrontational, and peers tend to focus on the technical detail of legislation rather than party-political battles.
    reading_age: 14
  adult:
    summary: "The House of Lords is the unelected upper chamber of the UK Parliament, performing legislative scrutiny, holding government to account, and contributing specialist expertise to the law-making process."
    body: |
      The House of Lords is the upper house of the Parliament of the United Kingdom. It shares the Palace of Westminster with the House of Commons but differs fundamentally in composition: its members are not elected. As of March 2026, the House has approximately 844 sitting members, making it one of the largest legislative chambers in the world.

      Members fall into several categories. The majority are life peers, created under the Life Peerages Act 1958, who are appointed by the monarch on the advice of the Prime Minister. The House of Lords Appointments Commission, established in 2000, recommends crossbench (non-party-political) life peers and vets all nominations for propriety, though its recommendations are advisory and the Prime Minister retains the final say. Twenty-six bishops of the Church of England, the Lords Spiritual, hold seats ex officio; this includes the Archbishops of Canterbury and York, the Bishops of London, Durham, and Winchester, and the 21 next most senior diocesan bishops.

      The hereditary element of the Lords has undergone dramatic change. The House of Lords Act 1999 removed all but 92 hereditary peers, who were retained as part of a compromise brokered during the Blair government's reforms. In September 2024, the Labour government introduced the House of Lords (Hereditary Peers) Bill, which passed the House of Commons in November 2024 and completed Lords stages in July 2025. As of early 2026, the bill was in its final parliamentary stages and would, upon enactment, remove the remaining hereditary peers entirely.

      The legislative powers of the Lords are constrained. The Parliament Act 1911 replaced the Lords' absolute veto with a delaying power, originally of two years, which the Parliament Act 1949 reduced to one year. Money bills, certified by the Speaker of the House of Commons, can be delayed for only one month. The Salisbury Convention, established in the 1940s, dictates that the Lords will not oppose the second or third reading of legislation implementing a manifesto commitment of the elected government.

      Despite these constraints, the Lords exerts significant influence. It regularly amends bills, with the government frequently accepting Lords amendments. Its select committees — including the Constitution Committee, the International Agreements Committee, the Delegated Powers and Regulatory Reform Committee, and the Secondary Legislation Scrutiny Committee — produce reports that shape policy debate. The Constitution Committee examines all public bills for constitutional implications and has established itself as a significant constitutional watchdog. The Delegated Powers Committee scrutinises the breadth of powers sought by ministers in primary legislation, frequently recommending enhanced parliamentary oversight. The chamber also serves as a forum for debates on matters of public concern, and peers may question ministers and hold the executive to account through oral and written questions.

      The working patterns of the Lords differ from the Commons. Sitting times are self-regulated, and the chamber typically sits in the afternoon and into the evening. There are no programme or guillotine motions, meaning that any peer may speak at any stage of a bill's passage. Business is managed through "the usual channels" — informal negotiations between the party whips and the crossbench convenor — rather than by procedural constraint. While the whip system operates in the Lords, party discipline is less rigid than in the Commons, and crossbench peers (who owe allegiance to no party) often hold the balance in divisions.

      Current reform debates extend beyond hereditary peers. The House of Lords Reform Bill 2012, introduced by the coalition government, proposed an 80% elected, 20% appointed chamber of 450 members with 15-year non-renewable terms. It was abandoned after 91 Conservative backbenchers voted against the programme motion. A Lords committee appointed in December 2025 was tasked with considering a mandatory retirement age and minimum participation requirements for members, with a reporting deadline of July 2026. Broader questions about the size of the chamber, the appointments process, and whether the Lords should be wholly or partly elected remain subjects of active discussion.
    reading_age: 18
  researcher:
    summary: "The House of Lords is the unelected upper chamber of the bicameral Parliament of the United Kingdom, exercising legislative revision, executive scrutiny, and deliberative functions within a constitutional framework shaped by statute, convention, and ongoing reform."
    body: |
      The House of Lords constitutes the upper house of the Parliament of the United Kingdom. Its constitutional role is defined not by a single codified instrument but by an accumulation of statute, convention, and practice. As of March 2026, the chamber comprises approximately 844 sitting members, drawn from life peers created under the Life Peerages Act 1958, Lords Spiritual (26 senior bishops of the Church of England), and, until the completion of current legislative reform, a residual cohort of hereditary peers.

      The composition of the Lords has been subject to iterative reform. The Parliament Act 1911 curtailed the chamber's absolute veto, substituting a suspensory power of two parliamentary sessions over a maximum of two years — a constraint further tightened by the Parliament Act 1949, which reduced the delaying power to one session and one year. The House of Lords Act 1999 removed all but 92 hereditary peers, retained through the Weatherill amendment as a transitional measure during the Blair government's reform programme. The House of Lords (Hereditary Peers) Bill, introduced in the House of Commons on 5 September 2024 and passed by a vote of 435 to 73 on 12 November 2024, seeks to remove the remaining hereditary peers entirely. The bill completed Lords committee stage over five sittings from March 2025, received its third reading on 21 July 2025, and entered ping-pong between the chambers in September 2025. As of early 2026, the bill was in its final stages. Its substantive provisions are designed to take effect at the end of the parliamentary session in which Royal Assent is granted.

      Appointment to life peerages operates through a process that is formally a Crown prerogative exercised on prime ministerial advice. The House of Lords Appointments Commission (HOLAC), a non-statutory advisory body established in May 2000, performs two functions: recommending individuals for crossbench peerages and vetting all nominations — including party-political and prime ministerial nominations — for propriety. Since its establishment, HOLAC has recommended 67 crossbench peers across 16 rounds. However, the Commission's advisory status means the Prime Minister is not bound by its recommendations, a feature that has attracted persistent criticism regarding the transparency and accountability of the appointments process.

      The Salisbury Convention, also known as the Salisbury-Addison Convention, emerged from the post-1945 political settlement between the then predominantly Conservative Lords and the Attlee Labour government. It holds that the Lords should not oppose at second or third reading any legislation that gives effect to a manifesto commitment of the governing party. While the convention has generally been respected, its precise scope — particularly in relation to coalition governments or manifesto commitments of ambiguous specificity — has been a matter of academic and political debate.

      The Lords' scrutiny functions operate through multiple mechanisms. The chamber routinely amends legislation, with data from the House of Lords Library indicating that government defeats in the Lords are considerably more frequent than in the Commons. Select committees of the Lords — notably the Constitution Committee, the Delegated Powers and Regulatory Reform Committee, the Secondary Legislation Scrutiny Committee, and the International Agreements Committee — exercise oversight functions that have no direct equivalent in the lower house. The Delegated Powers Committee, established in 1992-93 and generally regarded as one of the most effective scrutiny innovations of recent decades, examines every bill for inappropriate delegations of power and has been particularly assertive in challenging skeleton bills and Henry VIII clauses. The Constitution Committee, established in 2001, examines all public bills for constitutional implications and has produced influential reports on topics from the rule of law to the legislative process.

      The working patterns of the Lords are distinctive. The chamber's self-regulatory model, in which business management relies on negotiation through "the usual channels" rather than procedural constraint, means that any peer may speak at any stage. The absence of programme motions (which timetable debates in the Commons) allows for more extensive legislative scrutiny but can create unpredictability. While whipping operates in the Lords, its force is attenuated by the presence of crossbench peers (typically 150-180 in number) who owe allegiance to no party and frequently hold the balance in divisions. Attendance patterns vary significantly: average daily attendance has historically been around 450-500, but participation varies by peer and by the nature of business.

      Post-hereditary reform debates continue to evolve. On 16 December 2025, the Lords agreed to establish a committee to consider a mandatory retirement age and minimum participation requirements for members, with a reporting deadline of 31 July 2026. Broader proposals — including an elected or partly elected upper house, a reduction in chamber size, statutory regulation of the appointments process, and regional or national representation models — remain in political and academic discourse. The 2012 House of Lords Reform Bill, introduced by the coalition government, proposed an 80% elected, 20% appointed chamber of 450 members serving 15-year non-renewable terms. It was abandoned after 91 Conservative MPs voted against the programme motion on 10 July 2012, and the Deputy Prime Minister Nick Clegg acknowledged there was insufficient support to secure its passage. No comparable legislative proposal has since been brought forward by government, though the issue remains a recurring feature of constitutional reform discourse.
