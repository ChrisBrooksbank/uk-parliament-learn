glossary:
  - term: "Life peer"
    definition_simple: "A person chosen to sit in the House of Lords for the rest of their life, but who cannot pass the title to their children."
    definition_full: "A member of the House of Lords appointed under the Life Peerages Act 1958, holding a barony for their lifetime only. Life peerages are created by the monarch on the advice of the Prime Minister."
  - term: "Hereditary peer"
    definition_simple: "A Lord whose title was passed down from a parent. Most hereditary peers were removed from the Lords in 1999."
    definition_full: "A member of the peerage who inherits their title through descent. The House of Lords Act 1999 removed all but 92 hereditary peers from the chamber, and subsequent legislation aims to remove the remaining hereditary element entirely."
  - term: "Lords Spiritual"
    definition_simple: "The 26 bishops from the Church of England who sit in the House of Lords."
    definition_full: "The 26 senior bishops of the Church of England who hold ex officio seats in the House of Lords, comprising the Archbishops of Canterbury and York, the Bishops of London, Durham, and Winchester, and the 21 next most senior diocesan bishops by date of appointment."
  - term: "Crossbencher"
    definition_simple: "A member of the House of Lords who does not belong to any political party."
    definition_full: "An independent member of the House of Lords who sits on the crossbenches, affiliated with no political party. Crossbench peers are often appointed on the recommendation of the House of Lords Appointments Commission."
  - term: "Parliament Acts"
    definition_simple: "Laws from 1911 and 1949 that stopped the House of Lords from blocking bills forever. Now the Lords can only delay a bill for one year."
    definition_full: "The Parliament Acts of 1911 and 1949 are statutes that curtail the legislative power of the House of Lords. The 1911 Act replaced the Lords' absolute veto with a suspensory power of two years; the 1949 Act reduced this to one year. Money bills may be delayed for one month only."
  - term: "Salisbury Convention"
    definition_simple: "An agreement that the House of Lords will not vote down laws that the government promised in its election manifesto."
    definition_full: "A constitutional convention, also known as the Salisbury-Addison Convention, under which the House of Lords does not oppose at second or third reading any legislation implementing a manifesto commitment of the governing party. It originated in the post-1945 political settlement."

