quizzes:
  child:
    - question: "What colour are the seats in the House of Lords?"
      type: multiple_choice
      options: ["Green", "Blue", "Red", "Yellow"]
      correct_answer: "Red"
      explanation: "The House of Lords has red seats. The House of Commons has green seats."
    - question: "True or false: People vote to choose who sits in the House of Lords."
      type: true_false
      correct_answer: "False"
      explanation: "Members of the House of Lords are not elected by the public. Most are appointed by the monarch on the advice of the Prime Minister."
    - question: "What are the bishops who sit in the House of Lords called?"
      type: short_answer
      correct_answer: "Lords Spiritual"
      explanation: "The 26 bishops of the Church of England who sit in the House of Lords are known as the Lords Spiritual."
  teenager:
    - question: "What did the House of Lords Act 1999 do?"
      type: multiple_choice
      options:
        - "Abolished the House of Lords entirely"
        - "Removed most hereditary peers, keeping 92"
        - "Made the House of Lords fully elected"
        - "Gave the Lords the power to veto any bill"
      correct_answer: "Removed most hereditary peers, keeping 92"
      explanation: "The House of Lords Act 1999 removed the right of most hereditary peers to sit in the Lords, but retained 92 as part of a compromise."
    - question: "What is the Salisbury Convention?"
      type: short_answer
      correct_answer: "An agreement that the House of Lords will not vote against legislation promised in the governing party's election manifesto."
      explanation: "The Salisbury Convention is a constitutional convention stating that the Lords should not oppose at second or third reading any bill that delivers a manifesto commitment."
    - question: "True or false: The House of Lords can permanently block a bill passed by the House of Commons."
      type: true_false
      correct_answer: "False"
      explanation: "Under the Parliament Acts of 1911 and 1949, the House of Lords can only delay most bills for up to one year, not block them permanently."
  adult:
    - question: "How long can the House of Lords delay a public bill under the Parliament Acts?"
      type: multiple_choice
      options:
        - "Three months"
        - "Six months"
        - "One year"
        - "Two years"
      correct_answer: "One year"
      explanation: "The Parliament Act 1949 reduced the Lords' delaying power to one session and one year. Money bills can be delayed for only one month."
    - question: "What role does the House of Lords Appointments Commission play in the creation of life peers?"
      type: short_answer
      correct_answer: "It recommends crossbench life peers and vets all nominations for propriety, but its advice is not binding on the Prime Minister."
      explanation: "HOLAC is a non-statutory advisory body. It recommends non-party-political peers and checks propriety, but the Prime Minister retains the final say on appointments."
    - question: "Which body took over the judicial functions previously exercised by the House of Lords?"
      type: multiple_choice
      options:
        - "The High Court"
        - "The Court of Appeal"
        - "The Supreme Court of the United Kingdom"
        - "The Judicial Committee of the Privy Council"
      correct_answer: "The Supreme Court of the United Kingdom"
      explanation: "In 2009, the Supreme Court of the United Kingdom was established, taking over the appellate jurisdiction formerly held by the Law Lords sitting in the House of Lords."
  researcher:
    - question: "Analyse the constitutional significance of the Weatherill amendment to the House of Lords Act 1999 and its implications for the pace of Lords reform."
      type: essay
      correct_answer: "The Weatherill amendment retained 92 hereditary peers as a transitional measure, creating a political compromise that facilitated passage of the 1999 Act but entrenched a partially reformed chamber for over two decades."
      explanation: "The amendment was intended as temporary, but the retention of 92 hereditary peers persisted until the introduction of the House of Lords (Hereditary Peers) Bill in 2024, illustrating how transitional constitutional arrangements can become semi-permanent."
    - question: "True or false: The House of Lords Appointments Commission is established by statute and its recommendations are legally binding."
      type: true_false
      correct_answer: "False"
      explanation: "HOLAC is a non-statutory advisory body established by executive action in 2000. Its recommendations are advisory only, and the Prime Minister is not legally bound to follow them."
    - question: "Evaluate the effectiveness of the Parliament Acts as a mechanism for resolving disputes between the two chambers, considering that they have been invoked only seven times since 1911."
      type: essay
      correct_answer: "The Parliament Acts function primarily as a deterrent rather than a routinely used mechanism; their mere existence shapes Lords behaviour by establishing the ultimate supremacy of the Commons, with most disputes resolved through negotiation during legislative ping-pong."
      explanation: "The rarity of invocation suggests that the Acts' significance lies in their constitutional backdrop effect. The Lords typically concede rather than force invocation, meaning the Acts shape outcomes without being formally used."
