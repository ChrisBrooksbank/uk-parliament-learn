quizzes:
    child:
        - question: 'In First Past the Post, does the winner need to get more than half of all the votes?'
          type: true_false
          correct_answer: 'False'
          explanation: 'In First Past the Post, the person who gets the most votes wins, even if that is less than half of all the votes. They just need more votes than anyone else.'
        - question: 'In Northern Ireland, how do people vote in Assembly elections?'
          type: multiple_choice
          options:
              - 'They put a cross next to one name'
              - 'They rank candidates by putting numbers next to names'
              - 'They vote for a party, not a person'
          correct_answer: 'They rank candidates by putting numbers next to names'
          explanation: 'Northern Ireland uses the Single Transferable Vote, where voters write 1 next to their favourite candidate, 2 next to their second choice, and so on.'
        - question: 'How many votes do people get in Scottish Parliament elections?'
          type: multiple_choice
          options:
              - 'One'
              - 'Two'
              - 'Three'
          correct_answer: 'Two'
          explanation: 'In Scotland, voters get two votes -- one for a local candidate and one for a political party. This is called the Additional Member System.'
    teenager:
        - question: 'What was the result of the 2011 UK referendum on the Alternative Vote?'
          type: multiple_choice
          options:
              - 'AV was adopted by a narrow margin'
              - 'Voters rejected AV by 67.9 per cent to 32.1 per cent'
              - 'The referendum was abandoned due to low turnout'
          correct_answer: 'Voters rejected AV by 67.9 per cent to 32.1 per cent'
          explanation: 'The 2011 referendum resulted in a decisive vote to keep First Past the Post, with 67.9 per cent voting No on a turnout of 42.2 per cent.'
        - question: 'True or false: The Additional Member System is used for elections to both the Scottish Parliament and the Senedd Cymru.'
          type: true_false
          correct_answer: 'True'
          explanation: 'Both the Scottish Parliament and the Senedd Cymru (Welsh Parliament) use the Additional Member System, where voters have two votes -- one for a constituency candidate and one for a regional party list.'
        - question: 'What is the main criticism of First Past the Post?'
          type: short_answer
          correct_answer: "It can produce results where a party's share of seats does not match its share of the national vote, meaning many votes are effectively wasted."
          explanation: "FPTP's main criticism is disproportionality -- parties can win large majorities of seats on a minority of votes, while other parties with significant support spread across the country win very few seats."
    adult:
        - question: 'What electoral system did the Jenkins Commission recommend for Westminster elections?'
          type: short_answer
          correct_answer: 'AV Plus -- a hybrid system combining the Alternative Vote for constituency seats with a proportional top-up of 15 to 20 per cent of seats allocated from open regional lists.'
          explanation: "The Jenkins Commission reported in 1998 and recommended AV Plus as a compromise that would retain constituency representation while correcting FPTP's most significant disproportionalities. The recommendation was never implemented."
        - question: 'Which electoral system was replaced by FPTP for English mayoral elections under the Elections Act 2022?'
          type: multiple_choice
          options:
              - 'The Additional Member System'
              - 'The Single Transferable Vote'
              - 'The Supplementary Vote'
              - 'The Alternative Vote'
          correct_answer: 'The Supplementary Vote'
          explanation: 'The Supplementary Vote, which allowed voters to mark a first and second preference, was used for London mayoral elections and other directly elected mayors. The Elections Act 2022 replaced it with FPTP.'
        - question: "How does the D'Hondt method work in the context of the Additional Member System?"
          type: short_answer
          correct_answer: "The D'Hondt method is a mathematical formula used to allocate the regional list seats in AMS. Each party's total vote is divided by the number of seats it has already won (constituency seats plus any list seats already allocated) plus one. The party with the highest resulting figure wins the next list seat, and the process repeats until all list seats are filled."
          explanation: "The D'Hondt method ensures that the list seats compensate for disproportionality in the constituency results, making the overall outcome more proportional while still rewarding parties that win constituency seats."
    researcher:
        - question: "Evaluate the Jenkins Commission's decision to recommend AV Plus over STV or pure list PR for Westminster elections, considering the trade-offs between proportionality, constituency representation, and political feasibility."
          type: essay
          correct_answer: "Jenkins rejected pure list PR as incompatible with the British tradition of constituency representation, and STV as requiring impractically large constituencies outside urban areas. AV Plus was designed as a compromise: the AV element ensured constituency winners had broad support, while the 15-20 per cent proportional top-up from open regional lists would correct the most extreme disproportionalities. Critics argued this was neither proportional enough to satisfy reformers nor simple enough to win public support. The recommendation's failure to be implemented reflects the political difficulty of electoral reform when the beneficiaries of the current system control the legislative agenda."
          explanation: "This question requires engagement with the commission's reasoning, comparative electoral system design, and the political economy of reform."
        - question: 'Assess the constitutional implications of the UK operating multiple electoral systems for different legislatures, with particular reference to democratic legitimacy and the Salisbury Convention.'
          type: essay
          correct_answer: "The coexistence of FPTP at Westminster with proportional systems in the devolved legislatures creates an asymmetry in democratic legitimacy. Devolved governments typically rest on broader electoral support than UK governments, raising questions about the relative mandates of different levels of government. The Salisbury Convention assumes that a Government's manifesto has democratic authority, but this assumption is weakened when a Government can command a supermajority of seats on a minority of votes. Bogdanor (2009) argues that electoral reform is a prerequisite for meaningful constitutional reform, as FPTP sustains the executive dominance that characterises the Westminster model."
          explanation: "This question connects electoral system design to broader constitutional theory, requiring analysis of how institutional design affects democratic legitimacy across the UK's multi-level governance structure."
        - question: 'How does the experience of STV in Northern Ireland inform the broader debate about electoral system choice in divided societies?'
