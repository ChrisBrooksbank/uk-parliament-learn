key_figures:
  - name: "Emmeline Pankhurst"
    role: "Founder of the Women's Social and Political Union"
    description: "Emmeline Pankhurst (1858-1928) founded the WSPU in 1903 and led the militant suffragette campaign for women's voting rights. Her tactics of direct action, including window-smashing, arson, and hunger strikes, generated enormous public attention and controversy. She lived to see the Equal Franchise Act passed in 1928, dying just weeks before it became law."
    levels: [child, teenager, adult, researcher]
  - name: "Millicent Fawcett"
    role: "Leader of the National Union of Women's Suffrage Societies"
    description: "Dame Millicent Fawcett (1847-1929) led the NUWSS from 1897, campaigning peacefully for women's suffrage through lobbying, petitions, and public persuasion. Her constitutionalist approach, running in parallel with the Pankhursts' militancy, built broad support for the cause over decades. A statue of Fawcett was unveiled in Parliament Square in 2018."
    levels: [teenager, adult, researcher]
  - name: "Emily Wilding Davison"
    role: "Suffragette"
    description: "Emily Wilding Davison (1872-1913) was a committed suffragette who was arrested nine times, went on hunger strike seven times, and was force-fed 49 times. She died from injuries sustained when she stepped onto the racecourse at the 1913 Epsom Derby and was struck by King George V's horse Anmer. Her death became a defining moment of the suffrage movement."
    levels: [teenager, adult, researcher]
  - name: "Maurice Duverger"
    role: "French political scientist"
    description: "Maurice Duverger (1917-2014) was the author of 'Les Partis Politiques' (1951), in which he formulated what became known as Duverger's law: the proposition that single-ballot plurality electoral systems tend to produce two-party competition through mechanical and psychological effects. His work remains a foundational reference in comparative electoral studies, though its applicability to the UK's multi-party reality is actively debated."
    levels: [researcher]
  - name: "Earl Grey"
    role: "Prime Minister who passed the Great Reform Act"
    description: "Charles Grey, 2nd Earl Grey (1764-1845), served as Prime Minister from 1830 to 1834 and oversaw the passage of the Great Reform Act 1832, which began the process of modernising parliamentary representation by abolishing rotten boroughs and extending the franchise. The act is considered the starting point of Britain's journey toward democratic government."
    levels: [adult, researcher]

quizzes:
  child:
    - question: "What do you do on a ballot paper to vote for someone?"
      type: multiple_choice
      options:
        - "Write their name"
        - "Put a cross next to their name"
        - "Draw a circle around their name"
      correct_answer: "Put a cross next to their name"
      explanation: "When you vote, you put a cross (X) next to the name of the person you want to be your MP."
    - question: "True or false: In the UK, every adult has always been allowed to vote."
      type: true_false
      correct_answer: "False"
      explanation: "A long time ago, only rich men could vote. Women were not allowed to vote at all until 1918, and it took until 1928 for all adults to get equal voting rights."
    - question: "What is a general election?"
      type: multiple_choice
      options:
        - "When one area votes for a new MP"
        - "When the whole country votes to choose all MPs on the same day"
        - "When people vote for a new King"
      correct_answer: "When the whole country votes to choose all MPs on the same day"
      explanation: "A general election is when every constituency in the country votes on the same day to choose their MP. The party that wins the most seats usually forms the Government."
  teenager:
    - question: "What does First Past the Post mean?"
      type: multiple_choice
      options:
        - "A candidate must win more than half of all votes to be elected"
        - "The candidate with the most votes wins, even without a majority"
        - "Candidates are ranked in order of preference by voters"
      correct_answer: "The candidate with the most votes wins, even without a majority"
      explanation: "Under First Past the Post, the candidate who gets the most votes in a constituency wins the seat. They do not need to get more than 50 per cent -- they just need more votes than any other single candidate."
    - question: "What was the voter turnout at the 2024 UK general election?"
      type: multiple_choice
      options:
        - "72.0 per cent"
        - "60.0 per cent"
        - "45.5 per cent"
      correct_answer: "60.0 per cent"
      explanation: "Turnout at the 2024 general election was 60.0 per cent, the second lowest since universal suffrage was achieved in 1928."
    - question: "True or false: The suffragettes used only peaceful protest to campaign for women's right to vote."
      type: true_false
      correct_answer: "False"
      explanation: "While the NUWSS under Millicent Fawcett used peaceful methods, the suffragettes of the WSPU under Emmeline Pankhurst used militant tactics including window-smashing, arson, hunger strikes, and chaining themselves to railings."
  adult:
    - question: "What is the role of the Boundary Commissions in UK elections?"
      type: multiple_choice
      options:
        - "Counting votes on election night"
        - "Periodically reviewing and redrawing constituency boundaries to ensure roughly equal electorates"
        - "Registering voters on the electoral roll"
        - "Regulating campaign spending by political parties"
      correct_answer: "Periodically reviewing and redrawing constituency boundaries to ensure roughly equal electorates"
      explanation: "The four Boundary Commissions (for England, Scotland, Wales, and Northern Ireland) review constituency boundaries every eight years to ensure each constituency has roughly the same number of voters, within 5 per cent of the electoral quota."
    - question: "Which piece of legislation established the Electoral Commission?"
      type: multiple_choice
      options:
        - "Representation of the People Act 1983"
        - "Political Parties, Elections and Referendums Act 2000"
        - "Elections Act 2022"
        - "Electoral Registration and Administration Act 2013"
      correct_answer: "Political Parties, Elections and Referendums Act 2000"
      explanation: "The Electoral Commission was established by the Political Parties, Elections and Referendums Act 2000 (PPERA) as an independent body to oversee elections and regulate political finance in the UK."
    - question: "What requirement did the Elections Act 2022 introduce for voters in Great Britain?"
      type: short_answer
      correct_answer: "Photographic voter identification (photo ID) is now required to vote at polling stations."
      explanation: "The Elections Act 2022 introduced a requirement for voters in Great Britain to show an approved form of photographic identification before being issued a ballot paper at a polling station, a measure that proved controversial during the 2024 general election."
  researcher:
    - question: "Explain the mechanical and psychological effects described in Duverger's law and evaluate their applicability to the modern UK party system."
      type: essay
      correct_answer: "The mechanical effect refers to the systematic underrepresentation of smaller parties whose vote is geographically dispersed, as FPTP converts votes to seats non-proportionally. The psychological effect describes strategic voting and elite coordination as voters and party organisers anticipate the mechanical effect. In the UK, Duverger's law is partially contradicted by the persistence of multi-party competition, sustained by geographically concentrated parties such as the SNP."
      explanation: "Duverger's law predicts two-party dominance under plurality voting. The UK partially confirms this at constituency level but deviates nationally, with scholars like Dunleavy arguing that the law is effectively 'dead' in the UK context. The 2024 election -- with five parties winning seats and extreme disproportionality -- provides rich evidence for this debate."
    - question: "How does the Gallagher index of disproportionality apply to the 2024 UK general election, and what does this imply for democratic legitimacy?"
      type: essay
      correct_answer: "The Gallagher index measures the deviation between parties' vote shares and seat shares. The 2024 election produced one of the highest Gallagher index scores in UK history, with Labour winning 63 per cent of seats on 34 per cent of the vote. This raises significant questions about the representational legitimacy of FPTP governments, particularly when combined with historically low turnout."
      explanation: "The Gallagher (or least-squares) index provides a single numerical measure of electoral disproportionality. The 2024 result -- a governing supermajority built on barely a third of votes cast, themselves cast by only 60 per cent of eligible voters -- means Labour's mandate rests on approximately 20 per cent of the eligible electorate, an empirical reality that feeds directly into normative debates about electoral reform."
    - question: "Assess the constitutional implications of the Elections Act 2022 strategy and policy statement for the Electoral Commission's independence."
      type: short_answer
      correct_answer: "The strategy and policy statement, authored by the Government, allows ministers to set priorities for an ostensibly independent regulator. Critics, including the Electoral Commission itself and the Committee on Standards in Public Life, argued this represented an inappropriate erosion of regulatory independence, as the body tasked with overseeing elections should not be subject to Government direction."
      explanation: "The tension between executive direction and regulatory independence is a fundamental constitutional question. The Commission's reporting line to the Speaker's Committee (a parliamentary body) was designed to insulate it from Government influence, making the 2022 Act's provision for a ministerial strategy statement a significant constitutional departure."
