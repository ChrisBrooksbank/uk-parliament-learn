quizzes:
    child:
        - question: 'What are the two biggest political parties in the UK?'
          type: multiple_choice
          options:
              [
                  'Labour and Liberal Democrats',
                  'Conservative and Labour',
                  'Green Party and SNP',
                  'Reform UK and Plaid Cymru',
              ]
          answer: 'Conservative and Labour'
          explanation: 'The Conservative Party (blue) and the Labour Party (red) are the two biggest parties. They have taken turns running the country for about 100 years.'
        - question: "True or false: The Official Opposition's job is to agree with everything the government does."
          type: true_false
          answer: false
          explanation: "The Official Opposition's job is actually to challenge the government, ask tough questions, and suggest different ideas. This helps make sure the government makes good decisions."
    teenager:
        - question: 'Which political party was formed in 1988 from a merger of the Liberal Party and the Social Democratic Party?'
          type: multiple_choice
          options: ['The Green Party', 'Reform UK', 'The Liberal Democrats', 'The SNP']
          answer: 'The Liberal Democrats'
          explanation: 'The Liberal Democrats were created in 1988 when the historic Liberal Party merged with the newer Social Democratic Party (founded 1981), forming a centrist party that champions civil liberties and constitutional reform.'
        - question: 'What is the role of the Shadow Cabinet?'
          type: short_answer
          answer: "The Shadow Cabinet is a team of senior opposition politicians who each mirror a government minister. Their role is to scrutinise and challenge their government counterpart, develop alternative policies, and act as the opposition's spokespeople in specific policy areas."
          explanation: "The Shadow Cabinet allows the opposition to function as a 'government in waiting' and ensures that every area of government policy faces organised scrutiny."
        - question: 'True or false: In the 2024 general election, the percentage of seats a party won always closely matched the percentage of votes it received.'
          type: true_false
          answer: false
          explanation: 'The First Past the Post system can produce very unequal results. For example, Reform UK won 14.3% of the vote but only 0.8% of seats, while the Liberal Democrats won 12.2% of the vote and 11.1% of seats.'
    adult:
        - question: 'What is a three-line whip and what are the consequences of defying one?'
          type: short_answer
          answer: 'A three-line whip is the strongest instruction a party can issue to its MPs, indicated by three underlines in the weekly whip document, requiring essential attendance and compliance. Defiance can result in disciplinary action including being denied promotion, assignment to unpopular parliamentary duties, or removal of the whip, which effectively expels the MP from the parliamentary party.'
          explanation: 'The whip system is central to party discipline in the Westminster system. While MPs technically retain their seat if the whip is removed, they lose access to party resources and support, making re-election more difficult.'
        - question: 'Under PPERA 2000, what are the key regulations governing political party donations in the UK?'
          type: short_answer
          answer: "Donations exceeding 500 pounds must come from permissible donors (individuals on the UK electoral register, UK-registered companies, trade unions, and certain other organisations). Donations above 7,500 pounds to a party's central body must be reported quarterly (weekly during elections). There is no cap on individual donation amounts, though campaign spending is limited during regulated periods before elections."
          explanation: "The UK's party funding regime emphasises transparency rather than donation caps. This approach has been criticised by bodies including the Committee on Standards in Public Life, which has recommended introducing caps, but no government has implemented them."
        - question: 'What is Short Money and why is it constitutionally significant?'
          type: multiple_choice
          options:
              [
                  'A fine imposed on MPs who miss votes',
