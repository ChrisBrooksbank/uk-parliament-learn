explanations:
    child:
        summary: 'Political parties are groups of people who share similar ideas about how the country should be run. They work together to try to win elections and make their ideas happen.'
        body: |
            A political party is a team of people who agree on how they think the country should be run. They work together to try to win elections so they can be in charge and put their ideas into action.

            In the United Kingdom, the two biggest parties are the Conservative Party and the Labour Party. The Conservative Party is sometimes called the Tories. Their colour is blue. The Labour Party's colour is red. These two parties have taken turns being in charge of the country for about 100 years.

            There are other important parties too. The Liberal Democrats use the colour orange and gold. The Scottish National Party, or SNP, is a big party in Scotland. Plaid Cymru is a party in Wales. The Green Party cares a lot about looking after the environment.

            After a general election, the party that wins the most seats in the House of Commons gets to form the government. The leader of that party becomes the Prime Minister. Right now, the Labour Party is in government and their leader, Keir Starmer, is the Prime Minister.

            The party that comes second becomes the Official Opposition. Their job is to ask the government tough questions and make sure the government is doing a good job. The leader of this party is called the Leader of the Opposition. Right now, the Conservative Party leader Kemi Badenoch is the Leader of the Opposition.

            People join political parties because they believe in the party's ideas. Some people join because they care about helping poorer people, others because they want to keep things the way they are, and others because they care about the environment. Being in a party means you can work with other people who share your ideas to try to make a difference.
        reading_age: 8
    teenager:
        summary: 'Political parties are organised groups that compete for power by contesting elections. The UK has a multi-party system dominated by Labour and the Conservatives, with the Official Opposition playing a crucial constitutional role.'
        body: |
            Political parties are organised groups of people who share a broad set of political beliefs and policy goals. They select candidates, fight elections, and seek to form a government or influence legislation. Parties are essential to how UK democracy works: they give voters a clear choice between different visions for the country.

            The UK has several major parties. The Conservative Party, founded in 1834 from the earlier Tory faction, traditionally supports free markets, lower taxes, and a cautious approach to social change. It sits on the centre-right of the political spectrum. The Labour Party was founded in 1900 by trade unions and socialist societies. It traditionally supports workers' rights, public services, and greater economic equality, sitting on the centre-left. Between them, these two parties have formed every government since 1922.

            The Liberal Democrats were formed in 1988 from a merger of the Liberal Party and the Social Democratic Party. They occupy the political centre and champion civil liberties, constitutional reform, and internationalism. They currently hold 72 seats in the House of Commons.

            Several other parties play significant roles. The Scottish National Party (SNP), founded in 1934, campaigns for Scottish independence and holds 9 seats. Reform UK, founded in 2018 as the Brexit Party and renamed in 2021, positions itself on the right and holds 8 seats. The Green Party of England and Wales, which traces its origins to the PEOPLE Party founded in 1973, focuses on environmental and social justice issues and holds 5 seats. Plaid Cymru, founded in 1925, advocates for Welsh self-governance and holds 4 seats.

            People sometimes describe parties using a left-right spectrum. Parties on the left, like Labour and the Greens, generally favour more government intervention in the economy, stronger public services, and greater wealth redistribution. Parties on the right, like the Conservatives and Reform UK, tend to favour lower taxes, less regulation, and more individual economic freedom. The Liberal Democrats and SNP sit at different points depending on the issue. It is worth noting that this is a simplification, and parties hold a range of views on different topics.

            After a general election, the largest party in the House of Commons normally forms the government. The second-largest party becomes His Majesty's Official Opposition. The Leader of the Opposition receives a salary paid by the state, recognising the constitutional importance of this role. The Opposition appoints a Shadow Cabinet, where each shadow minister mirrors a government minister and is responsible for scrutinising and challenging them on their policy area.

            Following the 2024 general election, Labour holds 404 seats and forms the government under Keir Starmer. The Conservatives, with 116 seats, form the Official Opposition under Kemi Badenoch.
        reading_age: 14
    adult:
        summary: 'The UK operates a multi-party system within a plurality electoral framework. Party organisation, funding, discipline through the whip system, and the constitutional role of the Official Opposition are central to parliamentary democracy.'
        body: |
            Political parties are the organising structures of UK parliamentary democracy. They recruit and select candidates, develop policy platforms, mobilise voters, and provide the framework through which governments and oppositions operate. All parties contesting elections must be registered with the Electoral Commission under the Political Parties, Elections and Referendums Act 2000 (PPERA).

            The current House of Commons, elected on 4 July 2024 with subsequent by-election changes, comprises: Labour 404 seats, Conservative 116, Liberal Democrats 72, SNP 9, Reform UK 8, Sinn Fein 7, Democratic Unionist Party 5, Green Party 5, Plaid Cymru 4, with the remainder held by smaller parties and independents. There are 650 seats in total.

            The Conservative Party, formally the Conservative and Unionist Party, traces its origins to the Tory faction of the 17th century and was formally established under Sir Robert Peel in 1834, when the Tamworth Manifesto set out its founding principles of pragmatic reform and institutional stability. The Labour Party was established in 1900 as the Labour Representation Committee by trade unions and socialist societies, becoming the Labour Party in 1906. It first formed a government under Ramsay MacDonald in 1924 and replaced the Liberals as the main alternative to the Conservatives by the late 1920s. The Liberal Democrats were formed in 1988 from the merger of the Liberal Party (dating to 1859) and the Social Democratic Party (founded 1981). Among smaller parties, the SNP (1934) campaigns for Scottish independence; Plaid Cymru (1925) advocates Welsh self-governance; the Green Party of England and Wales (established 1990, succeeding the Ecology Party of 1975 and the PEOPLE Party of 1973) focuses on environmental and social justice policy; and Reform UK (founded 2018 as the Brexit Party, renamed 2021) positions itself as a right-wing populist party.

            Party funding is regulated by PPERA and overseen by the Electoral Commission. Donations exceeding 500 pounds must come from permissible donors, which include individuals registered on a UK electoral register, UK-registered companies, trade unions, and certain other organisations. Donations above 7,500 pounds to a party's central organisation (or 1,500 pounds to a local accounting unit) must be reported quarterly, or weekly during election periods. There is no cap on individual donations, which remains a subject of ongoing political debate. Campaign spending is limited in the regulated period before a general election, with the national spending limit for a party contesting all 650 seats being approximately 35 million pounds.

            Opposition parties receive public funding to support their parliamentary work. Short Money, introduced in 1975 and named after Edward Short, provides funding to opposition parties in the House of Commons. For 2025/26, parties receive 22,853.25 pounds per seat won at the last election plus 45.64 pounds per 200 votes gained. The Leader of the Opposition's Office receives 1,064,739.30 pounds. Cranborne Money, the equivalent scheme in the House of Lords, allocated 887,939 pounds to the Conservatives for 2025/26.

            The whip system is fundamental to party discipline. Each major party appoints a Chief Whip and a team of whips whose role is to ensure MPs attend and vote in line with the party position. The term derives from fox-hunting's "whipper-in." Each week, the whips' office issues a written document, also called "the whip," listing upcoming parliamentary business. Votes are underlined one, two, or three times to indicate their importance. A one-line whip is a request to attend. A two-line whip requires attendance unless permission to be absent is granted. A three-line whip is an instruction that attendance is essential, and defiance can result in serious consequences including removal of the whip, effectively expelling the MP from the parliamentary party. Whips also serve as a two-way communication channel, relaying backbench concerns to the leadership and reporting on the mood of the parliamentary party.

            The internal structure of parties varies considerably. The Conservative Party's backbench MPs organise through the 1922 Committee (formally the Conservative Private Members' Committee), which serves as a forum for backbench opinion and plays a critical role in leadership contests — its executive committee sets the rules for leadership elections and can receive letters of no confidence in the leader. Labour's governance is overseen by the National Executive Committee (NEC), which sets party policy between conferences, manages the party's finances, and oversees candidate selections. The Liberal Democrats' Federal Board manages party affairs, with a strong emphasis on internal democracy through their Federal Conference.

            Party conferences are annual gatherings that serve multiple functions: they debate and set party policy (particularly in Labour and the Liberal Democrats, where conference votes can be binding), provide a platform for leadership speeches, and act as networking events for members, activists, and the media. The Conservatives have historically treated their conference as a rally rather than a policy-making body, though fringe events host substantive policy debate. Labour's conference operates through a system of composite motions and contemporary motions, with trade unions and constituency parties holding votes.

            The internal structure of parties also affects leadership elections. The Conservative Party's process involves a ballot of MPs to select two finalists, followed by a vote of the party membership. Labour's leadership elections use a one-member-one-vote system among party members, registered supporters, and affiliated supporters. The Liberal Democrats elect their leader by one-member-one-vote among party members. Candidate selection processes also differ: Labour uses a system involving local party members and, in some cases, national party involvement, while the Conservatives use local association selection meetings.

            The Official Opposition holds a formal constitutional position. The Leader of the Opposition is a salaried office recognised by the Ministerial and other Salaries Act 1975. The Shadow Cabinet mirrors the government's Cabinet, with each shadow secretary of state responsible for scrutinising their government counterpart, developing alternative policies, and acting as the party's spokesperson in their policy area. The Opposition is expected to function as a "government in waiting," ready to take office if the government loses the confidence of the House or loses a general election.
        reading_age: 18
    researcher:
        summary: 'UK political parties operate within a first-past-the-post electoral system that structurally favours a two-party dominant configuration, though multi-party competition, partisan dealignment, and the rise of nationalist and insurgent parties have complicated classical Duvergerian predictions.'
        body: |
            The study of political parties in the United Kingdom engages several major theoretical frameworks in comparative politics: Duverger's law and its critiques, cleavage theory, partisan dealignment, and cartel party theory. The UK's single-member plurality (SMP) electoral system provides a canonical case study, yet the empirical reality has consistently defied simple Duvergerian predictions.

            Maurice Duverger's seminal proposition in "Les Partis Politiques" (1951) held that plurality voting systems tend to produce two-party competition through two mechanisms: the mechanical effect (small parties win fewer seats than their vote share warrants) and the psychological effect (voters engage in strategic voting to avoid "wasting" their ballots). The UK has frequently been cited as the exemplary case. However, as Patrick Dunleavy and others at the LSE have argued, Duverger's law is effectively "a dead parrot" outside the United States. Three-party competition persisted in Britain from 1918 to 1929 as Labour displaced the Liberals, and re-emerged after the SDP-Liberal Alliance in 1983. The effective number of parliamentary parties (ENPP), calculated using the Laakso-Taagepera index, rose from approximately 2.0 in the 1950s to above 2.5 by the 2000s, and the effective number of electoral parties (ENEP) has been consistently higher, reaching above 3.5 in 2015 when UKIP won 12.6% of the national vote but only one seat.

            The 2024 general election starkly illustrated the disproportionality inherent in SMP. Labour won 411 seats (63.2% of the total) with 33.7% of the vote, while Reform UK won 5 seats (0.8%) with 14.3% of the vote. The Gallagher index of disproportionality for 2024 was among the highest recorded for a UK election. This has renewed academic and political debate about electoral reform, with the Electoral Reform Society and other bodies advocating for proportional representation.

            Cleavage theory, originating with Lipset and Rokkan (1967), provides a structural explanation for party system formation. The UK party system was historically organised around a class cleavage: the Conservatives representing the propertied and professional classes, Labour representing the industrial working class. However, the class-party nexus has weakened substantially since the 1970s. Ivor Crewe and Bo Sarlvik's "Decade of Dealignment" (1983) documented the decline of class-based voting and the weakening of partisan identification in Britain. More recent scholarship by Geoffrey Evans and James Tilley ("The New Politics of Class," 2017) has argued that class still matters but operates through new mechanisms, including education and cultural values rather than traditional occupational categories.

            The concept of partisan dealignment refers to the weakening of long-term attachments between voters and parties. British Election Study data shows that the proportion of voters with a "very strong" party identification declined from over 40% in the 1960s to below 15% by the 2010s. This dealignment has facilitated electoral volatility and the rise of insurgent parties. UKIP's surge in 2014-2015, the Brexit Party's dominance in the 2019 European elections, and Reform UK's breakthrough in 2024 all reflect the capacity of new political forces to mobilise dealigned voters around issues, particularly immigration and national sovereignty, that cut across the traditional left-right economic axis.

            The territorial dimension has become increasingly salient. The SNP's dominance in Scotland since 2015 represents a territorial cleavage that Duverger's framework struggles to accommodate. The party won 56 of Scotland's 59 seats in 2015 on the basis of the independence movement catalysed by the 2014 referendum. Although its support has declined since its 2019 peak of 48 seats (falling to 9 in 2024), it has fundamentally restructured Scottish electoral politics. Similarly, Plaid Cymru's presence in Wales and the distinct party system in Northern Ireland (where none of the major GB parties contest seats) demonstrate that the UK contains multiple overlapping party systems rather than a single uniform one.

            Party organisation has evolved significantly. Richard Katz and Peter Mair's cartel party thesis (1995) posited that major parties increasingly rely on state resources and collude to exclude challengers. The UK's Short Money system (introduced 1975, providing opposition parties with 22,853.25 pounds per seat plus 45.64 pounds per 200 votes for 2025/26) and Cranborne Money (the Lords equivalent) represent limited forms of state funding. However, UK parties remain heavily dependent on private donations, with no cap on individual contributions, only requirements for transparency above certain thresholds under PPERA 2000. The 2007 Hayden Phillips review and the 2011 Committee on Standards in Public Life report both recommended donation caps, but no government has implemented them.

            The whip system represents a distinctive feature of Westminster party discipline. The office of Chief Whip originated in the 18th century, with the term borrowed from fox-hunting. The three-line whip system, in which the importance of a vote is indicated by the number of times it is underlined in the weekly whip document, creates a hierarchy of party discipline. Research by Philip Cowley and Mark Stuart has documented increasing backbench rebellion since the 1990s, suggesting that party discipline, while still strong by comparative standards, is not absolute. The removal of the whip, effectively expelling an MP from the parliamentary party while they retain their seat, represents the ultimate sanction. Notable instances include the withdrawal of the whip from 21 Conservative MPs who voted against the government on Brexit in September 2019.

            The internal democratisation of parties has been uneven. Labour's leadership elections have shifted from a parliamentary-only franchise (pre-1981) to an electoral college (1981-2014) to one-member-one-vote (2015 onwards), a change that facilitated Jeremy Corbyn's election. The Conservative Party adopted membership ballots for leadership elections in 1998 under the Hague reforms. The Liberal Democrats have used one-member-one-vote since their founding. These changes reflect broader trends toward intra-party democracy documented by Susan Scarrow and others, though tensions between participatory ideals and electoral pragmatism persist.

            Contemporary analysis must also address party system fragmentation and the question of whether the UK is transitioning from a two-party to a multi-party system. While the SMP electoral system continues to manufacture parliamentary majorities for single parties, the vote share of the two largest parties has declined from over 96% in 1951 to 57.4% in 2024. This gap between electoral fragmentation and parliamentary concentration represents a structural tension that shapes debates about democratic legitimacy and electoral reform.
