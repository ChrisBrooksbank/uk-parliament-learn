glossary:
    - term: 'Political Party'
      definition_simple: 'A group of people who share similar ideas about how the country should be run and work together to try to win elections.'
      definition_full: 'An organised group of individuals who share a broad set of political beliefs and policy goals, registered with the Electoral Commission under PPERA 2000, that selects candidates for public office, contests elections, and seeks to form or influence government.'
    - term: 'Official Opposition'
      definition_simple: 'The second-biggest party in the House of Commons, whose job it is to challenge the government and ask tough questions.'
      definition_full: "His Majesty's Most Loyal Opposition, formally recognised as the largest party in the House of Commons not in government. The Leader of the Opposition is a salaried office under the Ministerial and other Salaries Act 1975, and the Opposition maintains a Shadow Cabinet to scrutinise government departments."
    - term: 'Shadow Cabinet'
      definition_simple: 'A team of senior politicians from the opposition party, each one keeping a close eye on a government minister.'
      definition_full: "The committee of senior members of the Official Opposition appointed by the Leader of the Opposition to mirror the Cabinet. Each shadow secretary of state is responsible for scrutinising their government counterpart, developing alternative policies, and acting as the party's spokesperson in their designated policy area."
    - term: 'Whip'
      definition_simple: 'A person in a political party whose job is to make sure MPs turn up to vote and vote the way their party wants.'
      definition_full: 'A party official responsible for maintaining parliamentary discipline, ensuring attendance at votes, and communicating between the leadership and backbenchers. The term also refers to the weekly written document issued to MPs indicating upcoming business, with the number of underlines (one, two, or three) signifying the expected level of attendance and compliance.'
    - term: 'Three-Line Whip'
      definition_simple: 'An instruction to MPs that a vote is so important they absolutely must attend and vote with their party.'
      definition_full: 'The strongest form of party instruction, indicated by a vote being underlined three times in the weekly whip document. Defiance of a three-line whip can result in disciplinary action including removal of the whip, effectively expelling the MP from the parliamentary party.'
    - term: 'Short Money'
      definition_simple: 'Money from the government given to opposition parties to help them do their job in Parliament.'
      definition_full: 'Annual public funding provided to opposition parties in the House of Commons to assist with their parliamentary business, introduced in 1975 and named after Edward Short, then Leader of the House. For 2025/26, it provides 22,853.25 pounds per seat won and 45.64 pounds per 200 votes gained at the last general election.'

did_you_know:
    - fact: 'The Conservative Party is one of the oldest political parties in the world. It began as the Tory faction over 340 years ago in the 1680s!'
      level: [child, teenager]
    - fact: 'The Labour Party was created by trade unions in 1900 to give working people a voice in Parliament. Before Labour existed, most MPs came from wealthy backgrounds.'
      level: [child, teenager]
    - fact: 'In the 2024 general election, Reform UK won 14.3% of the national vote but only 5 seats (0.8% of the total), while the Liberal Democrats won 12.2% of the vote and got 72 seats (11.1%). This shows how the First Past the Post voting system can produce very different results from the share of votes cast.'
      level: [teenager, adult, researcher]
    - fact: 'In September 2019, Prime Minister Boris Johnson had the whip removed from 21 of his own Conservative MPs in a single night because they voted against the government on Brexit. It was the largest mass removal of the whip in modern British political history.'
      level: [adult, researcher]
    - fact: 'In the 1951 general election, the combined vote share of the Conservative and Labour parties was over 96%. By the 2024 election, their combined share had fallen to just 57.4%, yet between them they still held over 80% of the seats in the House of Commons.'
      level: [teenager, adult, researcher]

key_dates:
    - year: 1834
      event: 'Conservative Party formally established'
      significance: "Sir Robert Peel's Tamworth Manifesto set out the principles of the modern Conservative Party, transforming the old Tory faction into an organised political party committed to pragmatic reform."
      levels: [teenager, adult, researcher]
    - year: 1900
      event: 'Labour Representation Committee founded'
      significance: 'Trade unions and socialist societies founded the Labour Representation Committee, which became the Labour Party in 1906, establishing a political party to represent working-class interests directly in Parliament.'
      levels: [teenager, adult, researcher]
    - year: 1924
      event: 'First Labour government'
      significance: 'Ramsay MacDonald formed the first Labour government, a minority administration, demonstrating that a party founded just 24 years earlier by trade unions could attain power and breaking the Liberal-Conservative duopoly.'
      levels: [teenager, adult, researcher]
    - year: 1975
      event: 'Short Money introduced'
      significance: 'Public funding for opposition parties in the House of Commons was established, formally recognising the constitutional importance of an effective opposition and providing resources for scrutiny of government.'
      levels: [adult, researcher]
    - year: 1988
      event: 'Liberal Democrats formed'
      significance: 'The merger of the Liberal Party and the Social Democratic Party created the Liberal Democrats, establishing a centrist third party that would go on to win significant parliamentary representation and enter coalition government in 2010.'
      levels: [teenager, adult, researcher]
    - year: 2000
      event: 'Political Parties, Elections and Referendums Act (PPERA)'
      significance: 'Established the Electoral Commission, introduced requirements for party registration, regulated donations and campaign spending, and created the modern framework for party finance transparency in the UK.'
      levels: [adult, researcher]
    - year: 2024
      event: 'General election of 4 July 2024'
      significance: "Labour won 411 seats with 33.7% of the vote, ending 14 years of Conservative-led government. The election highlighted extreme disproportionality, with Reform UK's 14.3% vote share yielding only 5 seats, intensifying debate about electoral reform."
      levels: [teenager, adult, researcher]

key_figures:
    - name: 'Sir Robert Peel'
      role: 'Founder of the modern Conservative Party and Prime Minister (1834-35, 1841-46)'
      description: 'His Tamworth Manifesto of 1834 is considered the founding document of the modern Conservative Party, establishing principles of pragmatic reform and institutional continuity that distinguish conservatism from mere reaction.'
      levels: [teenager, adult, researcher]
    - name: 'Keir Hardie'
      role: 'First leader of the Labour Party in Parliament'
      description: 'A Scottish trade unionist and socialist who became the first independent Labour MP in 1892. He was instrumental in founding the Labour Representation Committee in 1900 and became the first chairman of the Parliamentary Labour Party in 1906.'
      levels: [teenager, adult, researcher]
    - name: 'Keir Starmer'
      role: 'Prime Minister (2024-present) and Leader of the Labour Party'
      description: 'Elected Labour leader in 2020, he repositioned the party toward the political centre and led it to a landslide victory in the 2024 general election with 411 seats, forming the current government.'
      levels: [child, teenager, adult]
    - name: 'Kemi Badenoch'
      role: 'Leader of the Opposition and Leader of the Conservative Party (2024-present)'
      description: "Elected Conservative leader in November 2024 following the party's historic defeat at the general election. As Leader of the Opposition, she heads the Shadow Cabinet and leads the scrutiny of the Labour government."
      levels: [teenager, adult]
    - name: 'Nigel Farage'
      role: 'Leader of Reform UK (2024-present) and MP for Clacton'
      description: 'A long-standing figure in Eurosceptic and right-wing populist politics, Farage led UKIP and the Brexit Party before becoming leader of Reform UK. He was first elected to Parliament in 2024, having previously served as a Member of the European Parliament.'
      levels: [teenager, adult, researcher]

