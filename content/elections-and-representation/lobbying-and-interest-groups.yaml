  researcher:
    - question: "Evaluate the adequacy of the UK's lobbying regulation in comparison with the EU Transparency Register and the US Lobbying Disclosure Act, with reference to the scope of registration requirements and disclosure obligations."
      type: essay
      correct_answer: "The UK's Lobbying Act 2014 is significantly narrower than comparable regimes. The EU Transparency Register covers all organisations seeking to influence EU institutions, including in-house lobbyists, and requires disclosure of lobbying expenditure and policy areas. The US Lobbying Disclosure Act requires registration by anyone who spends more than 20 per cent of their time lobbying federal officials and mandates quarterly disclosure of activities, expenditure, and specific issues lobbied on. By contrast, the UK register covers only consultant lobbyists communicating with ministers or permanent secretaries and requires only client disclosure, not activity or expenditure details. This narrow scope means the UK regime captures only a fraction of lobbying activity and provides limited transparency compared to international peers."
      explanation: "Comparative analysis reveals the UK's regulatory framework as among the weakest in the democratic world, a finding consistently highlighted by the CSPL, academic commentators, and transparency organisations."
    - question: "Assess Olson's 'Logic of Collective Action' as a framework for understanding the structural advantages of business interests in UK lobbying, drawing on empirical evidence from APPG funding patterns and think tank transparency."
      type: essay
      correct_answer: "Olson's theory explains why small, well-resourced groups with concentrated interests (such as industry associations) are more effective at organising for political influence than large, diffuse groups (such as consumers or taxpayers). In the UK context, this is illustrated by the disproportionate corporate funding of APPGs, the provision of APPG secretariats by lobbying firms, and the undisclosed corporate funding of think tanks. The structural advantage of business interests is compounded by the revolving door, which provides corporate lobbyists with insider knowledge and access networks. Olson's framework suggests that regulatory reform alone is insufficient; structural changes to reduce asymmetries of access and resources are needed."
      explanation: "This question requires integration of theoretical and empirical analysis, connecting Olson's collective action problem to observable patterns of influence in UK politics."
    - question: "How do the Nolan Principles interact with the formal regulatory framework for lobbying in the UK, and what gaps exist between ethical aspirations and enforcement mechanisms?"
      type: short_answer
      correct_answer: "The Nolan Principles provide the ethical foundation for public conduct but are largely aspirational. Their enforcement depends on a fragmented landscape of regulators with limited powers: the Parliamentary Commissioner for Standards can investigate MPs but has no jurisdiction over lobbyists; ACOBA's recommendations on post-employment appointments are advisory; the ORCL enforces the narrow register but cannot regulate unregistered lobbying. The gap between the Nolan Principles' comprehensive ethical vision and the weak, fragmented enforcement mechanisms means that compliance often depends on voluntary adherence rather than institutional sanction."
      explanation: "The Nolan framework illustrates the tension between principle-based regulation and the practical challenges of enforcement in a system that relies heavily on convention and self-regulation."
