glossary:
  - term: "Lobbying"
    definition_simple: "Trying to persuade MPs, Lords, or Government ministers to make decisions or laws that you agree with."
    definition_full: "The process by which individuals, organisations, or their representatives seek to influence the decisions of legislators, ministers, and public officials through direct communication, research, campaigning, or other means. In the UK, consultant lobbying of ministers and permanent secretaries is regulated by the Transparency of Lobbying Act 2014."
  - term: "All-Party Parliamentary Group"
    definition_simple: "An informal group of MPs and Lords from different political parties who share an interest in a particular subject, like sport, health, or a country."
    definition_full: "An informal cross-party group of parliamentarians registered with the Parliamentary Commissioner for Standards. APPGs have no official parliamentary status or legislative power but serve as forums for discussion, inquiry, and awareness-raising on specific policy areas. They must declare external funding and benefits in kind."
  - term: "Think Tank"
    definition_simple: "An organisation of experts that studies problems and comes up with ideas for how the Government could solve them."
    definition_full: "A research and policy organisation that conducts analysis, develops proposals, and seeks to influence public policy through publications, events, media commentary, and engagement with Government and Parliament. UK think tanks span the political spectrum and vary significantly in their funding transparency."
  - term: "Pressure Group"
    definition_simple: "An organisation that campaigns to change something it cares about, like protecting the environment or improving workers' rights, without trying to win elections."
    definition_full: "An organised group that seeks to influence public policy without contesting elections. Categorised as either sectional groups (representing the interests of a specific section of society, such as trade unions or professional associations) or cause groups (campaigning for a particular principle or policy objective, such as environmental protection or civil liberties)."
  - term: "Register of Consultant Lobbyists"
    definition_simple: "A public list of people and companies who are paid to lobby Government ministers on behalf of someone else."
    definition_full: "A statutory register established by the Transparency of Lobbying Act 2014, maintained by the Office of the Registrar of Consultant Lobbyists. Consultant lobbyists who make personal oral or written communications to ministers or permanent secretaries on behalf of third-party clients must register, disclose their clients, and update entries quarterly. The register does not cover in-house lobbyists or lobbying of other officials."
  - term: "Nolan Principles"
    definition_simple: "Seven rules for people in public life, including being honest, open, and putting the public first rather than their own interests."
    definition_full: "The Seven Principles of Public Life articulated by the Committee on Standards in Public Life (the Nolan Committee) in 1995: selflessness, integrity, objectivity, accountability, openness, honesty, and leadership. These principles apply to all holders of public office, including ministers, MPs, peers, civil servants, and local councillors, and provide the ethical framework for public conduct in the UK."

