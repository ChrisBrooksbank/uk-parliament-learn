glossary:
  - term: "MP Surgery"
    definition_simple: "A special meeting time when you can go and talk to your local MP about things that matter to you."
    definition_full: "A scheduled constituency session in which a Member of Parliament meets constituents in person to hear their concerns, provide advice, and take up individual cases. Surgeries are a key mechanism of direct representation, enabling citizens to engage with their elected representative on a face-to-face basis."
  - term: "Citizens' Assembly"
    definition_simple: "A group of ordinary people chosen at random who come together to learn about and discuss an important issue, then suggest what should be done."
    definition_full: "A deliberative democratic forum in which a randomly selected, demographically representative group of citizens is convened to learn about, discuss, and make recommendations on a specific policy issue. Citizens' assemblies draw on the theoretical work of James Fishkin and others and have been used in the UK (e.g., Climate Assembly UK, 2020), Ireland, and elsewhere."
  - term: "UK Youth Parliament"
    definition_simple: "An organisation where young people aged 11 to 18 can be elected to represent other young people and debate important issues."
    definition_full: "A national youth democratic body established in 1999, consisting of elected Members of Youth Parliament (MYPs) aged 11 to 18 who represent their peers at local and national level. The UKYP holds an annual debate in the House of Commons chamber and campaigns on issues identified by young people through the Make Your Mark ballot."
  - term: "Freedom of Assembly"
    definition_simple: "The right of people to gather together peacefully, for example to protest or march about something they care about."
    definition_full: "The fundamental democratic right of individuals to gather peacefully for the purposes of protest, demonstration, or collective expression. Protected by Article 11 of the European Convention on Human Rights and incorporated into UK law through the Human Rights Act 1998, freedom of assembly is subject to proportionate restrictions in the interests of public safety or the prevention of disorder."
  - term: "Civic Participation"
    definition_simple: "All the different ways people get involved in their community and help shape how things are run, from volunteering to campaigning."
    definition_full: "The broad range of activities through which citizens engage with public life and democratic governance beyond the act of voting. Civic participation encompasses contacting elected representatives, campaigning, protesting, volunteering, serving on juries, participating in deliberative forums, and contributing to community organisations."

