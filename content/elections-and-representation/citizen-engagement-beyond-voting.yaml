key_figures:
  - name: "Saul Alinsky"
    role: "Community organiser and author"
    description: "American community organiser whose methods, articulated in 'Rules for Radicals' (1971), influenced the development of community organising in the UK through organisations such as Citizens UK. His relational approach to building grassroots power through local institutions has shaped civic engagement practice internationally."
    levels: [adult, researcher]
  - name: "James Fishkin"
    role: "Political scientist and pioneer of deliberative polling"
    description: "Stanford University professor who developed the concept and methodology of deliberative polling, in which randomly selected groups of citizens deliberate on policy issues after receiving balanced information and expert testimony. His work has provided the theoretical and practical foundation for citizens' assemblies worldwide."
    levels: [adult, researcher]
  - name: "Emmeline Pankhurst"
    role: "Suffragette leader and campaigner"
    description: "Founder of the Women's Social and Political Union (WSPU) in 1903, Pankhurst led the militant campaign for women's suffrage through protests, civil disobedience, and hunger strikes. Her activism demonstrated the power of sustained citizen engagement in achieving democratic reform."
    levels: [child, teenager, adult]

quizzes:
  child:
    - question: "What is an MP surgery?"
      type: multiple_choice
      options:
        - "A hospital where MPs go when they are unwell"
        - "A meeting where people can talk to their MP about things that matter to them"
        - "A place where MPs learn how to give speeches"
      correct_answer: "A meeting where people can talk to their MP about things that matter to them"
      explanation: "An MP surgery is a special meeting time when people in an area can meet their Member of Parliament and talk about their concerns or ideas."
    - question: "True or false: Only adults can get involved in making their community better."
      type: true_false
      correct_answer: "False"
      explanation: "Young people can get involved too! They can join school councils, the UK Youth Parliament, volunteer in their community, and campaign on issues they care about."
    - question: "What is one way people can make their voice heard without voting?"
      type: multiple_choice
      options:
        - "Writing to their MP"
        - "Moving to another country"
        - "Ignoring the news"
      correct_answer: "Writing to their MP"
      explanation: "Writing a letter or email to your MP is a great way to share your views. MPs have a duty to listen to the people they represent."
  teenager:
    - question: "How many signatures does a UK Parliament petition need before it is considered for debate in the House of Commons?"
      type: multiple_choice
      options:
        - "1,000"
        - "10,000"
        - "100,000"
        - "1,000,000"
      correct_answer: "100,000"
      explanation: "Petitions on the UK Parliament website that receive over 100,000 signatures are considered for debate in Westminster Hall. Those over 10,000 receive a Government response."
    - question: "What is a citizens' assembly?"
      type: short_answer
      correct_answer: "A randomly selected, representative group of citizens brought together to learn about, discuss, and make recommendations on a specific policy issue."
      explanation: "Citizens' assemblies use random selection (sortition) to create a group that reflects the wider population. Participants hear expert evidence and deliberate to produce informed recommendations."
    - question: "Which human rights article protects the right to protest in the UK?"
      type: multiple_choice
      options:
        - "Article 5 -- Right to Liberty"
        - "Article 8 -- Right to Privacy"
        - "Article 11 -- Freedom of Assembly"
      correct_answer: "Article 11 -- Freedom of Assembly"
      explanation: "Article 11 of the European Convention on Human Rights, incorporated into UK law through the Human Rights Act 1998, protects the right to freedom of peaceful assembly and association."
  adult:
    - question: "What evidence does the Hansard Society's Audit of Political Engagement provide about the prevalence of non-electoral participation in the UK?"
      type: short_answer
      correct_answer: "The final Audit (2019) found that while 58% of respondents said they were certain to vote, only 26% had contacted an elected representative and only 11% had attended a political meeting in the previous year, indicating that active non-electoral participation is practised by a minority."
      explanation: "The Hansard Society data demonstrate a significant gap between electoral participation and other forms of civic engagement, consistent with patterns observed across established democracies."
    - question: "How did the Public Order Act 2023 change the legal framework governing protest in the UK?"
      type: short_answer
      correct_answer: "It created new criminal offences including locking on, tunnelling, and being equipped for locking on, and authorised Serious Disruption Prevention Orders, expanding police powers to restrict protest tactics."
      explanation: "The Public Order Act 2023, building on the Police, Crime, Sentencing and Courts Act 2022, significantly expanded the legal restrictions on protest, prompting concern from civil liberties organisations about the proportionality of these measures."
    - question: "What role does the voluntary sector play in UK democratic life?"
      type: multiple_choice
      options:
        - "It has no connection to democracy"
        - "It replaces the need for elected representatives"
        - "It fosters social capital, civic skills, and community resilience, complementing formal political participation"
      correct_answer: "It fosters social capital, civic skills, and community resilience, complementing formal political participation"
      explanation: "With approximately 170,000 registered charities and millions of active volunteers, the voluntary sector strengthens communities, addresses local needs, and develops the civic skills that underpin democratic engagement."
  researcher:
    - question: "Evaluate the effectiveness of the UK Parliament's e-petitions system as a mechanism for citizen-initiated agenda-setting, drawing on the research of Leston-Bandeira and others."
      type: essay
      correct_answer: "Research indicates that while the e-petitions system has successfully raised the salience of specific issues and lowered the transaction costs of collective action, its policy impact is often limited. The relationship between signature counts and substantive political outcomes is indirect. Petitions may be debated without leading to legislative or policy change, raising questions about whether the system generates genuine democratic responsiveness or merely the appearance of engagement."
      explanation: "Leston-Bandeira's research highlights both the democratic potential and the limitations of e-petitions. The system democratises agenda-setting but does not guarantee policy responsiveness, and its effectiveness depends on the willingness of Government and Parliament to act on the issues raised."
    - question: "How do the theoretical foundations of deliberative democracy, as articulated by Habermas and Fishkin, inform the design and evaluation of citizens' assemblies such as Climate Assembly UK?"
      type: essay
      correct_answer: "Habermas's discourse theory holds that democratic legitimacy derives from rational deliberation among free and equal citizens. Fishkin's deliberative polling translates this into practice by providing randomly selected citizens with balanced information and facilitated deliberation. Climate Assembly UK embodied these principles through random selection, expert testimony, facilitated discussion, and the production of informed recommendations. Evaluation of the assembly has focused on whether the quality of deliberation met theoretical standards and whether recommendations influenced policy outcomes."
      explanation: "The deliberative democratic tradition provides both the normative justification and the practical methodology for citizens' assemblies. The challenge lies in ensuring that deliberative exercises produce genuinely informed and representative recommendations and that these recommendations are taken seriously by policymakers."
    - question: "Assess the tension between the right to protest and the expansion of police powers under the Public Order Act 2023 in light of Article 11 ECHR jurisprudence."
      type: short_answer
      correct_answer: "Article 11 ECHR protects freedom of peaceful assembly, subject to proportionate restrictions. The Public Order Act 2023 creates new offences targeting protest tactics and authorises preventive orders, raising concerns that the restrictions may exceed the margin of proportionality permitted under ECHR case law. The Joint Committee on Human Rights and civil liberties organisations have argued that several provisions risk incompatibility with Convention rights."
      explanation: "The tension reflects a broader debate about the balance between public order and democratic freedom. ECHR case law requires that restrictions on assembly be prescribed by law, necessary in a democratic society, and proportionate to a legitimate aim. Critics argue that the breadth and severity of the 2023 Act's provisions may fail these tests."
