glossary:
  - term: "Direct Democracy"
    definition_simple: "A type of democracy where people vote on decisions themselves, instead of choosing someone else to decide for them."
    definition_full: "A form of democracy in which citizens exercise legislative power directly through personal participation in deliberation and voting on policy and legislation, rather than delegating authority to elected representatives. Historical examples include the Athenian Ecclesia; modern examples include Swiss referendums and citizens' initiatives."
  - term: "Representative Democracy"
    definition_simple: "A type of democracy where people vote for representatives, like MPs, who then make decisions on their behalf."
    definition_full: "A form of democracy in which citizens elect representatives to a legislature or executive office, delegating decision-making authority while retaining the power to hold those representatives accountable through periodic elections. It is the dominant form of democratic governance in modern nation-states, addressing the impracticality of direct participation at scale."
  - term: "Referendum"
    definition_simple: "A special vote where everyone in the country gets to decide on one important question, answering yes or no."
    definition_full: "A direct vote by the electorate on a specific political question or proposed piece of legislation. In the UK, referendums are not constitutionally required but may be called by Act of Parliament. They can be advisory or binding, though this distinction has been a source of constitutional debate, particularly following the 2016 EU referendum."
  - term: "Citizens' Assembly"
    definition_simple: "A group of ordinary people, chosen at random, who come together to learn about a topic and recommend what should happen."
    definition_full: "A deliberative body composed of randomly selected citizens, designed to be demographically representative of the wider population. Participants receive balanced briefing materials, hear from experts and stakeholders, engage in facilitated small-group deliberation, and produce recommendations on specific policy questions. Notable examples include the Irish Citizens' Assembly (2016-2018) and Climate Assembly UK (2020)."
  - term: "Deliberative Democracy"
    definition_simple: "A way of making decisions where people carefully discuss and think about an issue together before making up their minds."
    definition_full: "A normative model of democracy emphasising the role of reasoned public deliberation in producing legitimate and epistemically sound collective decisions. Drawing on Habermas's discourse theory and developed practically through Fishkin's Deliberative Polling, it holds that democratic legitimacy derives from the quality of public reasoning among free and equal citizens, not merely from the aggregation of pre-formed preferences through voting."

did_you_know:
  - fact: "In ancient Athens, many government officials were chosen by lottery -- picking names at random -- rather than by election. The Athenians thought elections favoured the rich and famous, while lottery was fairer!"
    level: [child, teenager]
  - fact: "Swiss citizens vote in referendums roughly four times a year, on about fifteen different issues. No other country gives its people so many direct votes on national policy."
    level: [child, teenager, adult]
  - fact: "The 2014 Scottish independence referendum had a turnout of 84.6% -- the highest of any referendum ever held in the United Kingdom, higher even than most general elections."
    level: [teenager, adult]
  - fact: "Ireland's Citizens' Assembly of 99 randomly selected people recommended liberalising abortion law in a historically conservative country. The subsequent 2018 referendum passed by 66.4% to 33.6%, a result that surprised many commentators."
    level: [adult, researcher]
  - fact: "James Fishkin's Deliberative Polling method has been used over 100 times in 28 countries, and has led to real policy changes -- including a major expansion of wind power in Texas and the construction of sewage treatment plants in China."
    level: [adult, researcher]

