quizzes:
  child:
    - question: "What is the main difference between direct democracy and representative democracy?"
      type: multiple_choice
      options:
        - "In direct democracy, only the king decides; in representative democracy, everyone votes"
        - "In direct democracy, everyone votes on decisions themselves; in representative democracy, people choose someone to make decisions for them"
        - "There is no difference between them"
      correct_answer: "In direct democracy, everyone votes on decisions themselves; in representative democracy, people choose someone to make decisions for them"
      explanation: "In direct democracy, every citizen gets to vote on each issue. In representative democracy, citizens vote for representatives (like MPs) who then make decisions on their behalf."
    - question: "True or false: The United Kingdom is a direct democracy where everyone votes on every law."
      type: true_false
      correct_answer: "False"
      explanation: "The UK is a representative democracy. People vote for Members of Parliament (MPs) who make decisions in Parliament. Sometimes there are referendums on very big questions, but most decisions are made by MPs."
    - question: "What is a referendum?"
      type: multiple_choice
      options:
        - "A vote to choose a new Prime Minister"
        - "A special vote where everyone in the country answers one important question"
        - "A meeting where MPs discuss new laws"
      correct_answer: "A special vote where everyone in the country answers one important question"
      explanation: "A referendum is when everyone gets to vote on one big question, like whether to stay in or leave the European Union. It is a bit of direct democracy happening inside a representative democracy."
  teenager:
    - question: "Which country is the best-known modern example of semi-direct democracy, holding national referendums roughly four times per year?"
      type: multiple_choice
      options:
        - "United States"
        - "France"
        - "Switzerland"
        - "Germany"
      correct_answer: "Switzerland"
      explanation: "Switzerland operates a semi-direct democracy where citizens vote in referendums approximately four times a year on about fifteen issues. Citizens can also launch popular initiatives by collecting 100,000 signatures."
    - question: "In ancient Athens, how were most government officials selected?"
      type: multiple_choice
      options:
        - "By hereditary succession"
        - "By election"
        - "By sortition (random lottery)"
        - "By the king"
      correct_answer: "By sortition (random lottery)"
      explanation: "The Athenians used sortition (selection by lot) for most government positions, including the Boule (council of 500) and jury service. They considered this more democratic than elections, which they believed favoured the wealthy and well-known."
    - question: "What was the result of the 2014 Scottish independence referendum?"
      type: multiple_choice
      options:
        - "55.3% voted against independence"
        - "51.9% voted for independence"
        - "67.2% voted against independence"
      correct_answer: "55.3% voted against independence"
      explanation: "55.3% of voters chose to remain in the United Kingdom, while 44.7% voted for independence. The referendum had an exceptionally high turnout of 84.6%, the highest for any referendum in UK history."
  adult:
    - question: "How does the Swiss popular initiative mechanism work?"
      type: short_answer
      correct_answer: "Citizens can propose a constitutional amendment by collecting 100,000 valid signatures within 18 months. The proposal is then debated by parliament and put to a nationwide vote, where it must secure a double majority -- a majority of voters nationally and a majority of cantons."
      explanation: "The popular initiative is one of three instruments of Swiss direct democracy. Unlike optional referendums (which challenge existing legislation), initiatives propose new constitutional provisions. The double majority requirement gives smaller cantons disproportionate influence, reflecting Switzerland's federalist structure."
    - question: "What was Climate Assembly UK, and what distinguished it from a referendum?"
      type: short_answer
      correct_answer: "Climate Assembly UK (2020) was a citizens' assembly of 108 randomly selected, demographically representative citizens who deliberated on how the UK should reach net-zero emissions by 2050. Unlike a referendum, which asks a mass electorate a binary question, the assembly involved sustained deliberation over six weekends, with expert briefings and facilitated discussion, producing detailed policy recommendations rather than a yes/no vote."
      explanation: "Citizens' assemblies represent a deliberative approach that aims to combine the legitimacy of citizen participation with the depth of informed deliberation. They address critiques of both referendums (which may oversimplify complex issues) and purely representative decision-making (which may lack direct citizen input)."
    - question: "Explain the constitutional tension that UK referendums create with the principle of parliamentary sovereignty."
      type: short_answer
      correct_answer: "Parliamentary sovereignty holds that Parliament is the supreme legal authority and no body can override its decisions. Since referendums are called by Act of Parliament, they are technically advisory -- Parliament could legally disregard the result. However, the political reality is that a clear referendum result is treated as a binding mandate, creating a tension between legal sovereignty and democratic legitimacy."
      explanation: "This tension was most acutely felt after the 2016 EU referendum. The European Union Referendum Act 2015 did not specify whether the result was legally binding, yet the Government and Parliament treated the Leave vote as a mandate to withdraw. Vernon Bogdanor identified this as a fundamental unresolved question in the UK constitution."
  researcher:
    - question: "Critically assess Fishkin's trilemma among political equality, deliberation, and mass participation, and evaluate whether citizens' assemblies resolve it."
      type: essay
      correct_answer: "Fishkin argues that conventional democratic mechanisms can achieve at most two of three values: elections secure equality and participation but not deliberation; elite bodies achieve deliberation but not equality or mass participation; referendums achieve equality and participation but not deliberation. Deliberative Polling and citizens' assemblies aim to achieve all three through representative random sampling, structured deliberation, and political equality among participants. However, assemblies involve only a small sample of the population (e.g., 108 in Climate Assembly UK), raising questions about whether statistical representativeness substitutes adequately for mass participation. The recommendations of assemblies are also non-binding, dependent on political uptake -- as the mixed implementation of the French Convention Citoyenne demonstrated."
      explanation: "Fishkin's trilemma provides a useful analytical framework but also reveals the inherent tensions in democratic design. Citizens' assemblies approximate all three values more closely than any single alternative mechanism, but they do not fully resolve the trilemma. The gap between assembly deliberation and mass democratic mandate remains theoretically and practically significant."
    - question: "Compare Landemore's epistemic case for inclusive democracy with Brennan's critique in 'Against Democracy.' How does Estlund's epistemic proceduralism attempt to navigate between them?"
      type: essay
      correct_answer: "Landemore draws on the Condorcet Jury Theorem and Hong-Page diversity theorem to argue that cognitively diverse democratic groups outperform smaller expert panels in complex problem-solving, providing an epistemic justification for inclusive democracy. Brennan counters that empirical evidence of voter ignorance, systematic cognitive biases, and the corrupting effects of partisan identity undermine the premises Landemore requires -- particularly the assumption that voters' judgements are independent and better than random. Estlund's epistemic proceduralism navigates between these positions by arguing that democracy has a modest epistemic advantage (better than random at producing just outcomes) without claiming it reliably produces optimal outcomes, and crucially, by arguing that epistocracy fails not empirically but normatively: even if experts know better, their authority cannot be justified to all reasonable citizens within the terms of public reason."
      explanation: "This debate lies at the heart of contemporary democratic theory. Landemore offers the strongest epistemic case for mass democracy; Brennan the most sustained challenge. Estlund's contribution is to shift the argument from the empirical question (does democracy produce good decisions?) to the normative question (can any alternative be legitimately imposed?), arguing that the burden of proof falls on those who would restrict political power to a knowledgeable few."
    - question: "Evaluate Pateman's argument that participatory democracy in non-state institutions is a prerequisite for effective state-level democracy."
      type: essay
      correct_answer: "Pateman argued in 'Participation and Democratic Theory' (1970) that participation in workplace and social institutions develops the political efficacy, civic competence, and sense of collective responsibility necessary for effective democratic participation at the state level. Drawing on Rousseau, J. S. Mill, and G. D. H. Cole, she challenged the Schumpeterian model that treated voter apathy as natural rather than as a consequence of institutional exclusion. Empirical evidence from workers' cooperatives and participatory budgeting partially supports her thesis, showing that participatory experiences increase political engagement and self-efficacy. However, critics note that the causal mechanism is difficult to isolate, and that scaling participatory workplace governance has proven challenging in complex economies. Her later feminist critique identified a further limitation: participatory democracy theory had neglected gender-based exclusion within the very institutions it sought to democratise."
      explanation: "Pateman's work remains foundational for participatory and deliberative democratic theory. Her insight that democratic capacities are learned through practice -- not innate -- has influenced the design of citizens' assemblies, participatory budgeting, and other institutional innovations. The feminist critique she later added demonstrated the reflexive potential of participatory theory to identify and address its own blind spots."
