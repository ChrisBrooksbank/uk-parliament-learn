explanations:
    child:
        summary: 'Authoritarianism is when one person or a small group runs a country and does not let the people have a real say in how things work.'
        body: |
            In some countries, the people in charge do not let ordinary people help decide how the country is run. This is called authoritarianism. It is the opposite of democracy, where everyone gets a vote.

            In an authoritarian country, one person or a small group holds all the power. They make the rules, and people are not allowed to argue or say they disagree. If people do speak up, they can get into serious trouble -- they might be arrested or punished.

            Authoritarian leaders often control what people can see on the news and the Internet. They do not want people to hear ideas that might make them question the leader. They might shut down newspapers or block websites that say things they do not like.

            There are no fair elections in an authoritarian country. Sometimes there are no elections at all. Other times, the leader holds elections but cheats to make sure they always win. The leader might lock up anyone who tries to run against them, or change the rules so only they can be on the ballot.

            People living under authoritarian rule often cannot do things that people in democracies take for granted, like joining a club that disagrees with the Government, or writing a letter to a newspaper to complain about something.

            Throughout history, many countries have been ruled this way. Some still are today. That is why people in democracies work hard to protect their right to vote, speak freely, and hold their leaders to account.
        reading_age: 8
    teenager:
        summary: 'Authoritarianism is a system of government where power is concentrated in the hands of a leader or small elite who are not accountable to the people, and who maintain control through repression, censorship, and the suppression of political opposition.'
        body: |
            Authoritarianism is a form of government in which political power is concentrated in a single leader, a ruling party, or a small elite group. Unlike democracy, where leaders are chosen through free and fair elections and must answer to the people, authoritarian rulers face few checks on their power and little meaningful accountability.

            Authoritarian regimes share several key characteristics. Political opposition is suppressed -- rival parties may be banned, opposition leaders may be imprisoned or forced into exile, and protests are often met with force. The media is tightly controlled or censored, with the Government dictating what information reaches the public. Civil liberties such as freedom of speech, freedom of assembly, and freedom of the press are restricted. The judiciary is not independent but serves the interests of those in power.

            It is important to understand that authoritarianism exists on a spectrum. At one end is "soft authoritarianism," where a Government maintains some democratic appearances -- it might hold elections and allow limited criticism -- but the playing field is so tilted that the ruling party cannot realistically be voted out. Modern Russia under Vladimir Putin is often cited as an example: elections take place, but opposition candidates face harassment, imprisonment, or worse, and state-controlled media dominates the information landscape.

            At the extreme end of the spectrum is totalitarianism, where the state seeks to control every aspect of people's lives -- not just politics but also the economy, education, religion, art, and even family life. North Korea under the Kim dynasty is the most commonly cited contemporary example: citizens have virtually no personal freedoms, the state controls all media and education, and a cult of personality surrounds the ruling family.

            History offers many examples of authoritarian rule. General Francisco Franco ruled Spain as a military dictator from 1939 to 1975, suppressing regional identities, banning political parties, and using the Catholic Church and the military to legitimise his rule. In the Soviet Union, Joseph Stalin exercised totalitarian control from the late 1920s until 1953, using mass surveillance, purges, and state terror. In more recent history, Alexander Lukashenko has ruled Belarus since 1994, rigging elections and violently suppressing the mass protests that erupted in 2020.

            Authoritarian regimes maintain power through several mechanisms: coercion (the threat or use of force against opponents), co-optation (buying the loyalty of key groups with money, jobs, or privileges), control of information (censorship and propaganda), and sometimes through genuine economic performance that creates a degree of public support. China's Communist Party, for example, has maintained its grip on power partly by delivering rapid economic growth and lifting hundreds of millions out of poverty, even as it tightly controls political expression and suppresses dissent.

            The transition from authoritarianism to democracy -- and the reverse -- is one of the most important themes in modern political history. Spain made its transition to democracy after Franco's death in 1975. Many countries in Eastern Europe became democracies after the fall of the Berlin Wall in 1989. But today, Freedom House reports that global freedom has been in decline for 19 consecutive years, with some formerly democratic countries sliding back toward authoritarian rule.
        reading_age: 14
    adult:
        summary: 'Authoritarianism denotes a mode of governance characterised by concentrated executive power, limited political pluralism, weak accountability mechanisms, and the suppression of opposition, existing on a spectrum from competitive authoritarianism to closed autocracies and totalitarian states.'
        body: |
            Authoritarianism, in political science, refers to a system of government in which power is concentrated in a leader or a small elite not constitutionally responsible to the people. The most influential academic definition was provided by the Spanish political scientist Juan Linz in his 1964 study "An Authoritarian Regime: Spain." Linz identified four defining characteristics of authoritarian regimes: limited political pluralism, with constraints on the legislature, political parties, and interest groups; political legitimacy based on emotional appeals and the identification of the regime as a necessary response to societal problems such as underdevelopment or insurgency; minimal political mobilisation, with suppression of anti-regime activities; and ill-defined executive powers that are often vague and shifting, used to extend the authority of the ruler.

            Linz's framework was groundbreaking because it drew a clear analytical distinction between authoritarianism and totalitarianism. While both are non-democratic, totalitarian regimes -- as theorised by Hannah Arendt and Carl Friedrich -- seek to exercise total control over all aspects of public and private life through a comprehensive ideology, mass mobilisation, a single party led by a dictator, a terror apparatus, and a monopoly on communication and the economy. Authoritarian regimes, by contrast, tolerate limited social pluralism (such as the Catholic Church in Franco's Spain or private enterprise in some military dictatorships), lack a fully elaborated guiding ideology (relying instead on diffuse "mentalities" rather than systematic doctrine), and generally seek compliance rather than enthusiastic participation from their populations.

            This distinction maps onto a spectrum of state control. At the milder end sits what Steven Levitsky and Lucan Way termed "competitive authoritarianism" in their influential 2002 article and 2010 book "Competitive Authoritarianism: Hybrid Regimes After the Cold War." In competitive authoritarian regimes, meaningful democratic institutions exist alongside serious incumbent abuse. Multiparty elections are held and genuinely contested, but the playing field is systematically tilted: incumbents exploit control of the media, abuse state resources, engage in selective legal repression of opponents, and sometimes resort to limited fraud. Crucially, however, the democratic institutions are real enough that opposition forces can occasionally win. Post-Cold War examples include Russia under Putin (particularly in the 2000s), Ukraine under Kuchma, Serbia under Milosevic, Peru under Fujimori, and Malaysia under Mahathir.

            Further along the spectrum are "electoral authoritarian" or "hegemonic authoritarian" regimes, where elections are held but are so controlled that no genuine competition exists -- the ruling party's victory is a foregone conclusion. Beyond these lie fully closed autocracies, where no elections take place or they are entirely perfunctory, and totalitarian states, which represent the extreme end of the continuum.

            Authoritarian regimes sustain themselves through three principal mechanisms. First, coercion: the use of security forces, secret police, arbitrary detention, torture, and in extreme cases extrajudicial killing to suppress dissent. Franco's Spain maintained order through the Guardia Civil and the Policía Armada, while modern authoritarian states increasingly deploy sophisticated digital surveillance technologies. Second, co-optation: the selective distribution of resources, privileges, and patronage to key supporters -- the military, business elites, ethnic or religious groups -- whose loyalty is essential to the regime's survival. Third, legitimation: the cultivation of public support through ideological appeals, nationalism, economic performance, or the portrayal of the regime as a guarantor of stability against chaos. China's Communist Party has relied heavily on performance legitimacy, delivering sustained economic growth that has lifted hundreds of millions out of poverty.

            Contemporary data paint a sobering picture. The V-Dem Institute's Democracy Report 2025 documented that the number of autocracies (91 countries) has surpassed the number of democracies (88 countries) for the first time in two decades, with 56 electoral autocracies and 35 closed autocracies. Freedom of expression is deteriorating in 44 countries -- a quarter of all countries globally and a new record. Freedom House's "Freedom in the World 2025" report recorded the 19th consecutive year of decline in global freedom, with violence, repression of political opponents, armed conflicts, and the spread of authoritarian practices all contributing to the trend.

            Understanding authoritarianism matters not only for comprehending conditions in non-democratic states but also for recognising the warning signs of democratic backsliding. The mechanisms of authoritarian consolidation -- the weakening of judicial independence, the concentration of executive power, the delegitimisation of opposition, and the curtailment of press freedom -- can emerge incrementally within ostensibly democratic systems, a phenomenon that has become a central concern in comparative politics.
        reading_age: 18
    researcher:
        summary: "A theoretical and empirical examination of authoritarianism as a regime type, encompassing Linz's foundational typology, the competitive authoritarianism framework of Levitsky and Way, contemporary measurement through V-Dem and Freedom House indices, and the evolving scholarship on authoritarian resilience and hybrid regimes."
        body: |
            The scholarly study of authoritarianism as a distinct regime type has its origins in Juan Linz's seminal 1964 essay "An Authoritarian Regime: Spain," later expanded in "Totalitarian and Authoritarian Regimes" (1975, revised 2000). Linz defined authoritarian regimes as "political systems with limited, not responsible, political pluralism, without elaborate and guiding ideology, but with distinctive mentalities, without extensive nor intensive political mobilization, except at some points in their development, and in which a leader or occasionally a small group exercises power within formally ill-defined limits but actually quite predictable ones." This four-part definition -- limited pluralism, mentality rather than ideology, constrained mobilisation, and ill-defined but predictable executive power -- provided the analytical foundation for distinguishing authoritarianism from both democratic and totalitarian systems.

            Linz's distinction between authoritarian and totalitarian regimes drew on and refined the earlier totalitarianism literature of Hannah Arendt ("The Origins of Totalitarianism," 1951) and Carl Friedrich and Zbigniew Brzezinski ("Totalitarian Dictatorship and Autocracy," 1956). Friedrich and Brzezinski identified six characteristics of totalitarian systems: an elaborate guiding ideology, a single mass party led by a dictator, a system of terror, monopolistic control of communication, monopolistic control of armed forces, and central direction of the economy. Linz argued that most non-democratic regimes lacked the ideological elaboration, mass mobilisation, and totalising ambition of genuine totalitarian states and therefore required a distinct conceptual category. His analysis of Francoist Spain demonstrated that the regime tolerated limited social pluralism (the Catholic Church, the military, the Movimiento Nacional, and the technocratic Opus Dei faction operated as semi-autonomous "families" within the system), relied on diffuse conservative-Catholic "mentalities" rather than a systematic ideology, and sought political demobilisation rather than the mass mobilisation characteristic of fascist Italy or Nazi Germany.

            The post-Cold War proliferation of hybrid regimes -- states combining democratic institutions with authoritarian practices -- generated a rich subfield. Larry Diamond's concept of "electoral authoritarianism" (2002) and Andreas Schedler's edited volume "The Politics of Uncertainty: Sustaining and Subverting Electoral Authoritarianism" (2013) examined regimes that hold multiparty elections while systematically undermining their integrity. Steven Levitsky and Lucan Way's "Competitive Authoritarianism: Hybrid Regimes After the Cold War" (2010) offered a more precisely specified framework, defining competitive authoritarian regimes as those in which "formal democratic institutions are widely viewed as the principal means of obtaining and exercising political authority" but where "incumbents violate those rules so often and to such an extent that the regime fails to meet conventional minimum standards for democracy." They identified four arenas of democratic contestation -- the electoral arena, the legislative arena, the judicial arena, and the media -- and argued that competition remained meaningful (opposition could win) even as it was systematically unfair. Their comparative analysis of 35 regimes traced divergent trajectories (democratisation, stable competitive authoritarianism, and full authoritarianism) and attributed outcomes to two variables: linkage to the West (density of economic, social, institutional, and information ties) and organisational power of the incumbent (party and state capacity).

            The literature on authoritarian durability has challenged earlier assumptions that non-democratic regimes are inherently fragile. Barbara Geddes's typological approach ("What Do We Know About Democratization After Twenty Years?" 1999) distinguished between military, single-party, and personalist authoritarian regimes, finding that single-party regimes are significantly more durable than military or personalist ones. Milan Svolik ("The Politics of Authoritarian Rule," 2012) formalised the "twin problems" facing all dictators: the problem of authoritarian control (how to prevent popular revolt) and the problem of authoritarian power-sharing (how to prevent elite defection, particularly coups). Svolik showed that roughly two-thirds of authoritarian leaders are removed by regime insiders rather than popular uprisings, underscoring the centrality of intra-elite dynamics.

            Contemporary empirical measurement has reached considerable sophistication. The Varieties of Democracy (V-Dem) project, based at the University of Gothenburg, measures over 470 indicators across five dimensions of democracy (electoral, liberal, participatory, deliberative, and egalitarian). V-Dem's Regimes of the World (RoW) classification system distinguishes four regime types: closed autocracy, electoral autocracy, electoral democracy, and liberal democracy. The V-Dem Democracy Report 2025 (using dataset v15) documented that 91 countries qualify as autocracies (56 electoral, 35 closed), now outnumbering the 88 democracies (52 electoral, 36 liberal) for the first time in 20 years. Some 45 countries are experiencing ongoing autocratisation, while only 19 are in episodes of democratisation. Freedom of expression is worsening in 44 countries -- a quarter of all countries globally and a new absolute record in the 25-year period studied. Freedom House's "Freedom in the World 2025" index documented the 19th consecutive year of global democratic decline, with approximately 40% of the world's population living in countries rated "Not Free."

            The digital transformation of authoritarian governance has attracted growing scholarly attention. Sergei Guriev and Daniel Treisman ("Spin Dictators: The Changing Face of Tyranny in the 21st Century," 2022) distinguished between "fear dictators" who rely primarily on violent repression and "spin dictators" who maintain power through information manipulation, co-optation, and the simulation of democratic legitimacy while keeping overt repression to a minimum. They argued that globalisation and increased access to information have incentivised a shift toward the "spin" model, as visible repression carries higher international and domestic costs. China's social credit system, Russia's sophisticated media manipulation, and the global proliferation of digital surveillance technologies exemplify this trend. Steven Feldstein ("The Rise of Digital Repression," 2021) documented how authoritarian and semi-authoritarian governments have adopted artificial intelligence, social media monitoring, and internet shutdowns as tools of political control, with at least 40 countries deploying Chinese-manufactured surveillance systems.

            The question of authoritarian resilience versus fragility remains contested. Authoritarian regimes that maintain economic growth, effectively co-opt potential opponents, and adapt their institutions to manage succession and policy challenges have proven remarkably durable -- China and Singapore being paradigmatic cases. Yet the "authoritarian dilemma" persists: the information asymmetries and accountability deficits that protect authoritarian leaders also impede effective governance, and the absence of institutionalised succession mechanisms creates periodic crises of regime continuity. The Arab Spring (2010-12) demonstrated both the fragility and resilience of authoritarian rule: some regimes (Tunisia, Egypt, Libya) fell rapidly, while others (Syria, Bahrain, Saudi Arabia) survived through a combination of coercion, co-optation, and external support.
