quizzes:
    child:
        - question: 'In an authoritarian country, what happens if people try to speak out against the leader?'
          type: multiple_choice
          options:
              - 'The leader listens carefully to what they have to say'
              - 'They can get into serious trouble, like being arrested'
              - 'They get to vote on whether the leader should change'
          correct_answer: 'They can get into serious trouble, like being arrested'
          explanation: 'In an authoritarian country, people are not free to disagree with the leader. If they speak out, they can be punished, arrested, or worse. That is very different from a democracy, where people are allowed to say what they think.'
        - question: 'True or false: In an authoritarian country, elections are always completely fair.'
          type: true_false
          correct_answer: 'False'
          explanation: 'In authoritarian countries, elections are either not held at all, or they are unfair. The leader might cheat, lock up opponents, or control what people see on the news so they cannot make a real choice.'
        - question: 'What is the main difference between a democracy and an authoritarian country?'
          type: multiple_choice
          options:
              - 'Democracies are bigger countries'
              - 'In a democracy, people get to choose their leaders and have a say; in an authoritarian country, they do not'
              - 'Authoritarian countries have more people'
          correct_answer: 'In a democracy, people get to choose their leaders and have a say; in an authoritarian country, they do not'
          explanation: 'The biggest difference is about who gets to decide. In a democracy, the people choose their leaders through fair elections and can speak freely. In an authoritarian country, the leaders are not chosen by the people and do not have to listen to them.'
    teenager:
        - question: 'Which of the following is NOT a typical characteristic of an authoritarian regime?'
          type: multiple_choice
          options:
              - 'Censorship of the media'
              - 'An independent judiciary that holds the Government to account'
              - 'Suppression of political opposition'
              - 'Concentration of power in a single leader or small group'
          correct_answer: 'An independent judiciary that holds the Government to account'
          explanation: 'An independent judiciary is a feature of democracy, not authoritarianism. Authoritarian regimes typically ensure that courts serve the interests of those in power rather than acting as an independent check on Government authority.'
        - question: 'What is the key difference between authoritarianism and totalitarianism?'
          type: short_answer
          correct_answer: "Totalitarianism seeks to control every aspect of people's lives (political, social, cultural, economic, and private), while authoritarianism typically focuses on maintaining political power and tolerates some limited social pluralism."
          explanation: 'Authoritarianism is primarily concerned with keeping political control and suppressing opposition, but it often allows some degree of social freedom -- such as private religious practice or limited economic activity. Totalitarianism goes further, attempting to dominate all areas of life through a comprehensive ideology and mass mobilisation.'
        - question: 'Name one historical example of an authoritarian regime and one way it maintained power.'
          type: short_answer
          correct_answer: "Acceptable examples include Franco's Spain (military force and the Catholic Church), the Soviet Union under Stalin (secret police and mass purges), Belarus under Lukashenko (rigged elections and violent suppression of protests), or similar."
          explanation: 'Authoritarian regimes use different combinations of coercion, propaganda, and co-optation to maintain power. Franco used military force and allied with the Catholic Church; Stalin used the secret police (NKVD) and purges; Lukashenko has relied on rigged elections and the violent dispersal of pro-democracy protests.'
    adult:
        - question: 'What are the four defining characteristics of authoritarianism according to Juan Linz?'
          type: short_answer
          correct_answer: "Limited political pluralism; political legitimacy based on emotional appeals and the portrayal of the regime as a necessary response to societal problems; minimal political mobilisation with suppression of anti-regime activities; and ill-defined, vague executive powers used to extend the ruler's authority."
          explanation: "Linz's 1964 definition distinguished authoritarianism from both democracy and totalitarianism. The emphasis on limited (rather than zero) pluralism, mentalities (rather than ideology), demobilisation (rather than mobilisation), and ill-defined (rather than totalising) power set authoritarian regimes apart as a distinct category."
        - question: "How does Levitsky and Way's concept of 'competitive authoritarianism' differ from fully closed authoritarian regimes?"
          type: short_answer
          correct_answer: 'In competitive authoritarian regimes, democratic institutions exist and elections are genuinely contested, but the playing field is systematically tilted in favour of incumbents through media control, state resource abuse, harassment of opposition, and limited fraud. In closed authoritarian regimes, no meaningful political competition exists.'
          explanation: 'Competitive authoritarianism occupies a middle ground between democracy and full authoritarianism. The key insight is that democratic institutions are real enough that opposition can occasionally win, but incumbent manipulation makes competition fundamentally unfair. This distinguishes it from both genuine democracy and regimes where elections are entirely performative.'
        - question: 'What are the three principal mechanisms through which authoritarian regimes sustain themselves?'
          type: multiple_choice
          options:
              - 'Elections, legislation, and judicial review'
              - 'Coercion, co-optation, and legitimation'
              - 'Diplomacy, trade agreements, and military alliances'
          correct_answer: 'Coercion, co-optation, and legitimation'
          explanation: 'Authoritarian regimes maintain power through coercion (the threat or use of force), co-optation (distributing resources and privileges to key supporters), and legitimation (cultivating public support through ideology, nationalism, or economic performance). The balance among these three mechanisms varies across regimes and over time.'
    researcher:
        - question: "Critically evaluate Linz's distinction between 'mentalities' and 'ideologies' as a criterion for differentiating authoritarian from totalitarian regimes. What are the analytical strengths and limitations of this distinction?"
          type: essay
          correct_answer: "Linz argued that authoritarian regimes are characterised by diffuse 'mentalities' -- emotional, reactive, and unsystematic attitudes -- rather than the elaborate, codified 'ideologies' of totalitarian states. This distinction usefully captures the pragmatic, ad hoc nature of many authoritarian regimes (e.g., military juntas, personalist dictatorships) that lack the doctrinal coherence of Nazism or Stalinism. However, critics note that the boundary between mentality and ideology is often blurred in practice, and that some authoritarian regimes (e.g., Ba'athist Iraq, Islamist theocracies) possess quite elaborated ideological frameworks without meeting other criteria for totalitarianism."
          explanation: "The mentality/ideology distinction is one of Linz's most original and most contested contributions. Its analytical strength lies in capturing a genuine empirical pattern: many authoritarian regimes govern through vague appeals to order, nationalism, or tradition rather than systematic doctrine. Its limitation is the difficulty of operationalising the distinction, particularly in regimes that fall between the ideal types."
        - question: "Assess Levitsky and Way's claim that 'linkage to the West' and 'organisational power' are the primary determinants of competitive authoritarian regime trajectories. What does their framework explain well, and what does it leave out?"
          type: essay
          correct_answer: 'Levitsky and Way argued that competitive authoritarian regimes with high Western linkage (dense economic, social, institutional, and information ties) were more likely to democratise, while those with high incumbent organisational power (strong ruling parties and state capacity) were more likely to remain stable. The framework successfully explains divergent outcomes in their 35-case sample (e.g., democratisation in Slovakia vs. stable authoritarianism in Russia). However, critics have noted that the framework underemphasises domestic civil society, agency of opposition actors, the role of economic crises as triggers for transition, and the growing influence of non-Western authoritarian powers (China, Russia, Gulf states) as alternative sources of linkage and leverage.'
          explanation: 'The competitive authoritarianism framework represents one of the most systematic comparative analyses of hybrid regime dynamics. Its structural-comparative approach provides powerful explanatory leverage but, as with any parsimonious theory, inevitably simplifies complex causal processes. The growing role of authoritarian linkage (Chinese investment, Russian security assistance) as a counterweight to Western leverage is a particularly significant development that the original 2010 framework did not fully anticipate.'
        - question: "How does Svolik's formal model of the 'two fundamental problems of authoritarian politics' advance our understanding of authoritarian durability and vulnerability beyond earlier typological approaches such as Geddes's?"
          type: essay
          correct_answer: "Geddes's typological approach (military, single-party, personalist) identified important empirical regularities in regime duration and mode of collapse but did not provide a unified theoretical mechanism. Svolik's formal model identifies two fundamental problems facing all dictators: authoritarian control (preventing popular revolt through repression and co-optation) and authoritarian power-sharing (preventing elite defection, especially coups). By formalising these as strategic interactions with information asymmetries and commitment problems, Svolik explains why most authoritarian leaders fall to insiders (the power-sharing problem) rather than popular uprisings, and why institutions like ruling parties and legislatures can serve as credible commitment devices that stabilise authoritarian rule."
          explanation: "Svolik's contribution lies in moving from descriptive typology to analytical mechanism. By modelling authoritarian politics as a series of strategic dilemmas, he generates testable predictions about when and how authoritarian regimes fail. His finding that the power-sharing problem (elite coups) is the more frequent cause of leader removal than the control problem (popular revolt) has significant implications for both theory and policy."
