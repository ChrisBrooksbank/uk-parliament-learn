key_dates:
    - year: 1939
      event: 'Francisco Franco establishes authoritarian rule in Spain'
      significance: "Following the Spanish Civil War, Franco created a military dictatorship that became Juan Linz's paradigmatic case for defining authoritarianism. The regime lasted until Franco's death in 1975 and was characterised by limited pluralism, political repression, and the suppression of regional identities."
      levels: [teenager, adult, researcher]
    - year: 1951
      event: "Hannah Arendt publishes 'The Origins of Totalitarianism'"
      significance: "Provided the foundational theoretical analysis of totalitarianism as a novel form of government, distinguishing it from earlier forms of tyranny and autocracy. Arendt's work shaped all subsequent scholarship on the relationship between authoritarianism and totalitarianism."
      levels: [adult, researcher]
    - year: 1964
      event: "Juan Linz publishes 'An Authoritarian Regime: Spain'"
      significance: "Established authoritarianism as a distinct analytical category in political science, separate from both democracy and totalitarianism. Linz's four-part definition became the standard framework for classifying non-democratic regimes."
      levels: [adult, researcher]
    - year: 1975
      event: 'Death of Francisco Franco; Spain begins democratic transition'
      significance: "Spain's peaceful transition to democracy after 36 years of authoritarian rule became a model for subsequent transitions in Latin America and Eastern Europe, demonstrating that authoritarian regimes can give way to stable democracies."
      levels: [teenager, adult, researcher]
    - year: 1989
      event: 'Fall of the Berlin Wall and collapse of Soviet-bloc authoritarian regimes'
      significance: 'Triggered the most extensive wave of democratic transitions in modern history, as communist authoritarian regimes across Eastern Europe collapsed. Some countries consolidated democracy; others transitioned to competitive or electoral authoritarianism.'
      levels: [child, teenager, adult, researcher]
    - year: 2002
      event: "Levitsky and Way publish 'The Rise of Competitive Authoritarianism'"
      significance: 'Introduced the concept of competitive authoritarianism to political science, providing a framework for understanding hybrid regimes that combine meaningful democratic institutions with systematic incumbent abuse -- a regime type that proliferated after the Cold War.'
      levels: [adult, researcher]
    - year: 2025
      event: 'V-Dem reports autocracies outnumber democracies for the first time in 20 years'
      significance: 'The V-Dem Democracy Report 2025 documented that 91 countries are classified as autocracies compared to 88 democracies, marking a symbolic threshold in the ongoing global trend of autocratisation that has now continued for 25 years.'
      levels: [teenager, adult, researcher]

key_figures:
    - name: 'Juan Linz'
      role: 'Political scientist and theorist of authoritarianism'
      description: "Sterling Professor of Political and Social Science at Yale University, Linz was born in Germany and raised in Spain, which gave him first-hand experience of Franco's regime. His 1964 essay 'An Authoritarian Regime: Spain' and subsequent book 'Totalitarian and Authoritarian Regimes' (1975/2000) established the foundational typology for classifying non-democratic regimes, distinguishing authoritarianism from totalitarianism through four defining characteristics: limited pluralism, mentality rather than ideology, political demobilisation, and ill-defined executive powers."
      levels: [adult, researcher]
    - name: 'Steven Levitsky'
      role: 'Political scientist and scholar of hybrid regimes'
      description: "Professor of Government at Harvard University, Levitsky (with Lucan Way) developed the concept of 'competitive authoritarianism' to describe regimes where democratic institutions exist but incumbent abuse renders competition real but unfair. Their 2010 book traced the post-Cold War trajectories of 35 such regimes. Levitsky also co-authored 'How Democracies Die' (2018) with Daniel Ziblatt, examining how elected leaders can incrementally subvert democratic norms."
      levels: [adult, researcher]
    - name: 'Francisco Franco'
      role: 'Military dictator of Spain (1939-1975)'
      description: "Led the Nationalist forces to victory in the Spanish Civil War and established an authoritarian regime that ruled Spain for 36 years. Franco's regime suppressed political opposition, banned rival parties, controlled the media, and used the Guardia Civil to enforce order. His rule became the paradigmatic case study for Linz's theory of authoritarianism, exemplifying limited pluralism, conservative-Catholic 'mentalities,' and political demobilisation."
      levels: [teenager, adult, researcher]
    - name: 'Hannah Arendt'
      role: 'Political theorist'
      description: "German-born political philosopher whose 'The Origins of Totalitarianism' (1951) provided the seminal analysis of totalitarian rule as a distinctly modern phenomenon. Arendt's work on the nature of totalitarian ideology, terror, and the destruction of the public sphere informed all subsequent efforts -- including Linz's -- to distinguish between different forms of non-democratic governance."
      levels: [adult, researcher]

