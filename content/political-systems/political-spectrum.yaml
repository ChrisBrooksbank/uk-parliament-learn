quizzes:
  child:
    - question: "Where do the words 'left' and 'right' in politics come from?"
      type: multiple_choice
      options:
        - "From the way people write -- left-handed or right-handed"
        - "From the seating arrangement in the French parliament during the French Revolution"
        - "From a book about politics"
      correct_answer: "From the seating arrangement in the French parliament during the French Revolution"
      explanation: "In 1789, people who wanted change sat on the left side of the French parliament, and people who supported the King sat on the right. That is where the names come from!"
    - question: "True or false: Everyone fits neatly into either 'left' or 'right' on the political spectrum."
      type: true_false
      correct_answer: "False"
      explanation: "Most people have a mix of views. Someone might agree with some left-wing ideas and some right-wing ideas. The spectrum is a simple way of grouping ideas, but real life is much more complicated."
    - question: "What is a centrist?"
      type: multiple_choice
      options:
        - "Someone who only cares about money"
        - "Someone whose views are in the middle, with ideas from both left and right"
        - "Someone who does not care about politics at all"
      correct_answer: "Someone whose views are in the middle, with ideas from both left and right"
      explanation: "Centrists try to find a balance between left-wing and right-wing ideas, taking the best from both sides."
  teenager:
    - question: "What are the two axes of the Political Compass model?"
      type: multiple_choice
      options:
        - "Rich-poor and young-old"
        - "Economic left-right and social authoritarian-libertarian"
        - "Urban-rural and religious-secular"
      correct_answer: "Economic left-right and social authoritarian-libertarian"
      explanation: "The Political Compass maps political views on two axes: an economic axis (left-right) covering views on the economy, and a social axis (authoritarian-libertarian) covering views on personal freedom and government control."
    - question: "Why is the one-dimensional left-right spectrum considered limited?"
      type: short_answer
      correct_answer: "It cannot capture the full range of political beliefs because people may be economically left but socially conservative, or vice versa. Issues like environmentalism and nationalism do not fit neatly on a single axis."
      explanation: "A single left-right line oversimplifies politics. Someone might support strong public services (left) but also strict immigration controls (often associated with the right). Two-dimensional models like the Political Compass try to address this limitation."
    - question: "Where do the major UK parties generally sit on the left-right spectrum?"
      type: short_answer
      correct_answer: "The Conservative Party is generally on the centre-right, the Labour Party on the centre-left, and the Liberal Democrats in the centre or centre-left."
      explanation: "While party positions shift over time, the Conservatives generally emphasise free enterprise and tradition, Labour advocates social equality and public services, and the Liberal Democrats focus on civil liberties and constitutional reform."
  adult:
    - question: "How does the authoritarian-libertarian axis complement the traditional left-right economic spectrum?"
      type: short_answer
      correct_answer: "The authoritarian-libertarian axis captures differences in attitudes towards personal freedom, social control, and the role of the state in regulating individual behaviour, which the economic left-right axis alone cannot distinguish. This explains why, for example, authoritarian socialists and libertarian socialists hold fundamentally different views despite sharing economic positions."
      explanation: "By adding a social dimension, two-axis models reveal political distinctions that the one-dimensional spectrum obscures. An economic conservative who supports civil liberties occupies very different political territory from an economic conservative who favours authoritarian social policies."
    - question: "What is Norberto Bobbio's argument for the enduring relevance of the left-right distinction?"
      type: short_answer
      correct_answer: "Bobbio argued that the core of the left-right distinction is the attitude towards equality: the left is defined by a commitment to reducing inequality, while the right accepts or justifies inequality as natural, inevitable, or desirable."
      explanation: "Bobbio's 1996 work provided a philosophical defence of the left-right framework at a time when many commentators were declaring it obsolete. By identifying equality as the essential dividing line, he offered a criterion that transcends specific policy debates."
    - question: "How did the Brexit vote in 2016 challenge traditional left-right political classifications in the UK?"
      type: multiple_choice
      options:
        - "It proved that left-right is the only meaningful political division"
        - "It revealed a cleavage between open/cosmopolitan and closed/communitarian values that cut across left-right lines"
        - "It showed that all Leave voters were right-wing and all Remain voters were left-wing"
      correct_answer: "It revealed a cleavage between open/cosmopolitan and closed/communitarian values that cut across left-right lines"
      explanation: "The Brexit referendum demonstrated that attitudes towards globalisation, immigration, and national sovereignty did not align neatly with the left-right spectrum. Both left-wing and right-wing voters were found on each side of the debate, prompting scholars to argue for new dimensions of political analysis."
  researcher:
    - question: "Evaluate Inglehart's postmaterialist thesis and its implications for the adequacy of the left-right spectrum as a framework for comparative political analysis."
      type: essay
      correct_answer: "Inglehart argued that economic development produces an intergenerational value shift from materialist to postmaterialist priorities. This shift creates a new dimension of political conflict (materialism vs. postmaterialism) that cuts across the traditional left-right economic divide. His World Values Survey data demonstrated cross-cultural variation along axes (traditional vs. secular-rational, survival vs. self-expression) that do not map onto the left-right spectrum, suggesting that the spectrum is culturally specific and increasingly inadequate for comparative analysis."
      explanation: "Inglehart's thesis has profound implications for spectrum models. If the salience of economic redistribution declines relative to postmaterialist concerns (environmentalism, gender equality, multiculturalism), the left-right spectrum loses its explanatory power. However, critics have argued that materialist concerns have not disappeared and that Inglehart's thesis overstates the extent and permanence of value change."
    - question: "How does the British Election Study evidence on the economic and social dimensions of political competition complicate the use of a one-dimensional spectrum to describe UK party politics?"
      type: essay
      correct_answer: "BES data consistently identify two principal dimensions: an economic left-right dimension and a social liberal-authoritarian dimension. Evans and Tilley's research demonstrates that the relationship between class and party support has weakened, while the social liberal-authoritarian dimension has become increasingly salient, particularly post-Brexit. This two-dimensional structure means that a one-dimensional spectrum systematically misrepresents the political landscape by collapsing distinct dimensions of competition into a single axis."
      explanation: "The BES evidence reveals that UK voters' political preferences are structured along at least two independent dimensions, and that the relative salience of these dimensions has shifted over time. The rise of social-cultural issues as drivers of political alignment challenges the assumption that left-right economics is the primary dimension of political competition."
    - question: "Assess the epistemological status of the left-right spectrum: is it an objective mapping of ideological space or a socially constructed cognitive shortcut?"
      type: short_answer
      correct_answer: "Research suggests it functions primarily as a cognitive shortcut or 'folk political theory' rather than an objective mapping. While citizens and parties continue to use left-right self-placement as an organising framework, the substantive content of 'left' and 'right' varies across countries and time periods. Jost and colleagues have linked left-right orientation to underlying psychological dispositions rather than coherent ideological positions, further complicating the assumption that spectral positions represent rationally chosen policy packages."
      explanation: "The persistence of the left-right framework despite its analytical limitations suggests that its value is communicative and heuristic rather than descriptive. It structures political discourse and simplifies electoral choice, but it should not be mistaken for a scientifically precise representation of ideological reality."
