explanations:
  child:
    summary: "Democracy means that everyone gets a say in how things are run, usually by voting to choose leaders."
    body: |
      Democracy is a way of running a country where the people get to choose who is in charge. The word "democracy" comes from two ancient Greek words: "demos" meaning "people" and "kratos" meaning "power." So democracy really means "people power."

      In a democracy, grown-ups vote in elections to pick the people who will make decisions for everyone. These leaders have to listen to what people want, and if they do not do a good job, the people can choose someone else next time.

      Democracy started a very long time ago in a place called Athens, in Greece, more than 2,500 years ago. Back then, the people of Athens would all gather together in one big group and vote on important decisions by raising their hands. Only some people were allowed to vote though -- women and enslaved people were left out.

      Today, most democracies work differently. Instead of everyone voting on every single decision, people vote for representatives -- like Members of Parliament in the UK -- who make decisions on their behalf. This is called representative democracy.

      In a democracy, there are some very important rules. Leaders must follow the law, just like everyone else. People are free to say what they think, even if they disagree with the Government. And everyone should be treated fairly, no matter who they are.

      Not every country in the world is a democracy. In some countries, one person or a small group makes all the decisions and people do not get to vote. That is why democracy is something many people work hard to protect.
    reading_age: 8
  teenager:
    summary: "Democracy is a system of government in which power is held by the people, exercised through free elections and protected by the rule of law and fundamental rights."
    body: |
      Democracy is a system of government where political power ultimately belongs to the people. Citizens participate in decision-making, most commonly by voting in free and fair elections to choose representatives who govern on their behalf.

      The idea of democracy originated in ancient Athens around 508 BC, when a statesman called Cleisthenes introduced a series of reforms that gave ordinary citizens a direct role in governing their city. Athenian democracy was a direct democracy: citizens gathered in an assembly called the Ecclesia to debate and vote on laws and policies in person. However, this system excluded women, enslaved people, and foreigners -- only free adult men born in Athens could participate, which was roughly 10-15% of the total population.

      Today, most democracies are representative democracies. Citizens vote for Members of Parliament, senators, or other representatives who make laws and decisions on their behalf. The UK, for example, is a representative democracy where 650 MPs are elected to the House of Commons. A few countries, such as Switzerland, still use elements of direct democracy, where citizens vote directly on specific issues through referendums.

      Several core principles define a healthy democracy. Free and fair elections allow citizens to choose and replace their leaders peacefully. The rule of law means that everyone, including the Government, must obey the law and no one is above it. Human rights and civil liberties -- such as freedom of speech, freedom of the press, and freedom of assembly -- are protected so that people can express their views and hold the Government to account. An independent judiciary ensures that laws are applied fairly.

      Democracy has spread significantly over the centuries. The Magna Carta of 1215 established that even the King was subject to the law. The English Bill of Rights of 1689 strengthened Parliament's power over the Crown. In the 19th and 20th centuries, the right to vote was gradually extended -- first to more men, then to women. New Zealand became the first self-governing country to grant women the vote in 1893, and the UK achieved equal voting rights for men and women in 1928.

      Democracy matters because it gives people a peaceful way to shape the rules they live under, holds leaders accountable, and protects individual freedoms. But democracy requires active participation -- it only works well when citizens engage, stay informed, and hold their representatives to account.
    reading_age: 14
  adult:
    summary: "Democracy is a system of governance predicated on popular sovereignty, political equality, and the protection of fundamental rights, exercised primarily through free competitive elections and constrained by the rule of law and institutional checks on power."
    body: |
      Democracy, derived from the Greek "demokratia" (demos, people; kratos, power), denotes a system of government in which sovereign authority resides in the people, exercised either directly or through elected representatives. While the concept has evolved substantially since its origins, its core commitment -- that political power must be accountable to those it governs -- remains constant.

      The earliest known democratic system emerged in Athens around 508 BC following the reforms of Cleisthenes, who reorganised Athenian society into ten tribes based on geography rather than kinship, breaking the power of the aristocratic families. The Athenian model was a direct democracy: citizens debated and voted on legislation in the Ecclesia (assembly), served on juries in the Heliaia (people's court), and could be selected by lot to serve on the Boule (council of 500), which set the assembly's agenda. This system reached its fullest expression under Pericles in the mid-5th century BC. However, participation was restricted to free adult male citizens -- excluding women, metics (resident foreigners), and enslaved people, who together constituted the majority of the population.

      Modern democracy is overwhelmingly representative in form. Citizens elect legislators and executives through competitive, periodic elections conducted under universal adult suffrage. Representative democracy addresses the practical impossibility of direct participation in large nation-states, but it introduces the principal-agent problem: elected officials may not always act in the interests of their constituents. Democratic systems address this through institutional mechanisms including separation of powers, judicial review, free media, and regular elections that allow voters to remove unsatisfactory representatives.

      Democratic theory identifies several essential principles. Popular sovereignty holds that the authority of the state derives from the consent of the governed. Political equality ensures that each citizen's vote carries equal weight. The rule of law requires that all individuals and institutions, including the Government, are subject to and accountable under the law. The protection of fundamental rights -- freedom of expression, assembly, religion, and the press -- creates the conditions necessary for meaningful political participation and prevents the tyranny of the majority.

      The global spread of democracy has been neither linear nor inevitable. Samuel Huntington identified three "waves" of democratisation: the first beginning in the early 19th century with the expansion of suffrage in Western Europe and North America; the second following the Second World War with decolonisation; and the third beginning in 1974 with the fall of authoritarian regimes in Southern Europe, Latin America, and eventually Eastern Europe after 1989. Each wave was followed by periods of reversal.

      Contemporary data reveal a troubling picture. Freedom House's "Freedom in the World 2025" report documented the 19th consecutive year of decline in global freedom. Of 195 assessed countries, approximately 20% of the world's population lives in countries rated "Free," 40% in "Partly Free" nations, and 40% in countries rated "Not Free." Sixty countries experienced declines in political rights and civil liberties in 2024, while only 34 registered improvements. The Varieties of Democracy (V-Dem) Institute's data show that the average level of liberal democracy has declined to levels not seen since the mid-1980s by population-weighted measures, and 45 countries are currently in ongoing episodes of autocratisation.

      Democratic backsliding -- the gradual erosion of democratic norms and institutions -- has emerged as a defining challenge. Unlike the military coups of earlier eras, contemporary backsliding typically occurs through legal and incremental means: the weakening of judicial independence, restrictions on press freedom, the manipulation of electoral rules, and the concentration of executive power. This pattern has been observed across diverse contexts, from Hungary and Turkey to more established democracies.

      The tension between democracy and other values -- efficiency, security, economic equality -- remains a subject of ongoing debate. Winston Churchill's observation that democracy is "the worst form of Government except all those other forms that have been tried" captures a pragmatic defence: democracy may be imperfect, but its mechanisms of accountability, peaceful power transfer, and rights protection have proven more durable and humane than the alternatives.
    reading_age: 18
  researcher:
    summary: "An analytical examination of democracy as a contested concept in political theory, encompassing its Athenian origins, competing theoretical frameworks from Schumpeter to Dahl, the empirical measurement of democratisation and autocratisation, and contemporary scholarship on democratic resilience and backsliding."
    body: |
      The concept of democracy has been subject to continuous theoretical contestation since its emergence in 5th-century BC Athens. Far from a settled or unitary idea, democracy encompasses a spectrum of normative commitments, institutional arrangements, and empirical realities that resist simple definition. This analysis examines the concept through four lenses: historical origins, theoretical frameworks, empirical measurement, and contemporary challenges.

      Athenian democracy, established through the reforms of Cleisthenes in 508/7 BC and developed under Ephialtes (462 BC) and Pericles, was characterised by direct citizen participation in legislative, judicial, and executive functions. The Ecclesia (assembly), open to all male citizens over 18, exercised sovereign legislative power. The Boule (council of 500), selected by sortition, prepared the assembly's agenda. Magistrates were largely chosen by lot rather than election -- a practice the Athenians considered more democratic than voting, which they associated with oligarchy. The system's exclusions (women, metics, enslaved people) meant that the "demos" comprised approximately 30,000-50,000 adult males out of a total population of 250,000-300,000. Thucydides records Pericles' Funeral Oration (431 BC) as a defining articulation of Athenian democratic ideals, though scholars including Mogens Herman Hansen have debated the extent to which Athenian practice matched its rhetoric.

      Democratic theory in the modern period has produced several competing frameworks. Joseph Schumpeter's "Capitalism, Socialism and Democracy" (1942) advanced a minimalist, procedural definition: democracy is "that institutional arrangement for arriving at political decisions in which individuals acquire the power to decide by means of a competitive struggle for the people's vote." This "competitive elitism" model deliberately stripped democracy of its participatory and egalitarian connotations, reducing it to a method of leadership selection.

      Robert Dahl's concept of "polyarchy," developed in "A Preface to Democratic Theory" (1956) and elaborated in "Polyarchy: Participation and Opposition" (1971), offered a more demanding framework. Dahl argued that no real-world system fully achieves the democratic ideal, and used "polyarchy" to describe the closest approximations. Polyarchy requires not merely competitive elections but also guarantees of civil liberties, freedom of expression, alternative sources of information, associational autonomy, inclusive citizenship, and institutional responsiveness to citizen preferences. Dahl identified two critical dimensions -- contestation (the extent of political competition) and inclusiveness (the breadth of participation) -- along which regimes could be measured.

      Juergen Habermas's deliberative democratic theory, articulated in "Between Facts and Norms" (1992), shifted attention from aggregative mechanisms (voting, elections) to the quality of public reasoning. For Habermas, democratic legitimacy derives not from majority rule alone but from the process of rational deliberation among free and equal citizens in the public sphere. This framework has influenced scholarship on citizen assemblies, participatory budgeting, and deliberative polling.

      Empirical measurement of democracy has become increasingly sophisticated. Freedom House's "Freedom in the World" index, published annually since 1973, assesses political rights and civil liberties on a 1-7 scale, categorising countries as Free, Partly Free, or Not Free. The Economist Intelligence Unit's Democracy Index classifies regimes as full democracies, flawed democracies, hybrid regimes, or authoritarian regimes. The Varieties of Democracy (V-Dem) project, based at the University of Gothenburg, offers the most granular dataset, measuring over 470 indicators across multiple dimensions of democracy (electoral, liberal, participatory, deliberative, and egalitarian). V-Dem's 2024 report (using dataset v15) documented that the average level of liberal democracy has declined to 1985 levels by population-weighted averages, with 45 countries in ongoing episodes of autocratisation and 19 in episodes of democratisation. Freedom of expression is worsening in nearly a quarter of all countries, setting a new record in the 25-year period studied.

      The scholarship on democratic backsliding has burgeoned since the mid-2010s. Steven Levitsky and Daniel Ziblatt's "How Democracies Die" (2018) argued that contemporary democratic erosion occurs not through coups but through the incremental subversion of norms by elected leaders -- the weakening of judicial independence, the delegitimisation of opponents, the toleration of political violence, and the curtailment of civil liberties. Anna Grzymala-Busse identified "politicised" backsliding, whereby incumbents exploit formal legal channels to consolidate power. Tom Ginsburg and Aziz Huq, in "How to Save a Constitutional Democracy" (2018), distinguished between "authoritarian reversion" (sudden collapse) and "constitutional retrogression" (gradual erosion), arguing the latter is now the predominant threat. Licia Cianetti, James Dawson, and Sean Hanley extended the analysis to Central and Eastern Europe, demonstrating that backsliding can occur even in states that appeared to have consolidated democracy.

      The Freedom House "Freedom in the World 2025" report documented the 19th consecutive year of decline in global freedom. The UK's own Liberal Democracy Index (V-Dem) dropped from 0.81 in 2018 to 0.75 in 2025, reflecting concerns about electoral aggrandizement, weakened accountability mechanisms, and limitations on civil and political liberties. These findings underscore that democratic backsliding is not confined to newer or less consolidated democracies.

      The normative question -- why democracy? -- has been addressed through multiple frameworks. Instrumental arguments emphasise Amartya Sen's finding that no functioning democracy with a free press has experienced a major famine, and the broader correlation between democratic governance and human development outcomes. Intrinsic arguments, following Dahl, hold that democracy is required by the principle of political equality: if no person's interests are inherently superior, then each must have an equal voice in collective decisions. Epistemic arguments, drawing on Condorcet's jury theorem and developed by Helene Landemore in "Democratic Reason" (2012), suggest that inclusive deliberation among cognitively diverse citizens produces better decisions than expert rule.

      Contemporary democratic theory grapples with challenges including the relationship between democracy and populism, the democratic legitimacy of technocratic and supranational governance, the impact of digital technologies and disinformation on public deliberation, and the question of whether liberal democratic institutions are adequate to address long-term, intergenerational challenges such as climate change.
