quizzes:
  child:
    - question: "What does the word 'democracy' mean?"
      type: multiple_choice
      options:
        - "King's power"
        - "People power"
        - "Army power"
      correct_answer: "People power"
      explanation: "Democracy comes from the Greek words 'demos' (people) and 'kratos' (power), so it means 'people power' -- the idea that the people get to decide how things are run."
    - question: "In a democracy, how do people choose their leaders?"
      type: multiple_choice
      options:
        - "Leaders are born into the job"
        - "The strongest person becomes leader"
        - "People vote in elections"
      correct_answer: "People vote in elections"
      explanation: "In a democracy, grown-ups vote in elections to choose the people who will be in charge and make decisions for everyone."
    - question: "True or false: Democracy was invented about 100 years ago."
      type: true_false
      correct_answer: "False"
      explanation: "Democracy is much older than that! It started over 2,500 years ago in ancient Athens, Greece."
  teenager:
    - question: "What type of democracy did ancient Athens practise?"
      type: multiple_choice
      options:
        - "Representative democracy"
        - "Direct democracy"
        - "Constitutional monarchy"
      correct_answer: "Direct democracy"
      explanation: "Athens practised direct democracy, where citizens gathered in the Ecclesia (assembly) to debate and vote on laws and policies themselves, rather than electing representatives."
    - question: "Which country was the first self-governing nation to grant women the right to vote?"
      type: multiple_choice
      options:
        - "United Kingdom"
        - "United States"
        - "New Zealand"
        - "France"
      correct_answer: "New Zealand"
      explanation: "New Zealand granted women the right to vote in 1893, more than 25 years before the UK (1918/1928) or the United States (1920)."
    - question: "Name two core principles that are essential for a healthy democracy."
      type: short_answer
      correct_answer: "Any two of: free and fair elections, the rule of law, protection of human rights and civil liberties, an independent judiciary, freedom of speech, freedom of the press."
      explanation: "A healthy democracy depends on multiple reinforcing principles. Free elections allow citizens to choose leaders; the rule of law ensures no one is above the law; human rights protect individual freedoms; and an independent judiciary applies laws fairly."
  adult:
    - question: "What three 'waves' of democratisation did Samuel Huntington identify?"
      type: short_answer
      correct_answer: "The first wave began in the early 19th century with suffrage expansion in Western Europe and North America; the second followed the Second World War with decolonisation; the third began in 1974 with the fall of authoritarian regimes in Southern Europe, spreading to Latin America and Eastern Europe."
      explanation: "Huntington's 'wave' theory describes how democratisation has occurred in clusters, with each wave followed by a period of reversal. The third wave, beginning with Portugal's Carnation Revolution in 1974, was the most extensive."
    - question: "According to Freedom House's 2025 report, for how many consecutive years has global freedom declined?"
      type: multiple_choice
      options:
        - "9 years"
        - "14 years"
        - "19 years"
        - "25 years"
      correct_answer: "19 years"
      explanation: "Freedom House's Freedom in the World 2025 report documented the 19th consecutive year of decline in global freedom, with 60 countries experiencing declines in political rights and civil liberties compared to only 34 showing improvements."
    - question: "What distinguishes contemporary democratic backsliding from earlier forms of democratic breakdown?"
      type: short_answer
      correct_answer: "Contemporary backsliding typically occurs through legal, incremental means -- such as weakening judicial independence, restricting press freedom, and manipulating electoral rules -- rather than through sudden military coups or revolutions."
      explanation: "Unlike the coups and revolutions of earlier eras, modern democratic erosion tends to happen gradually and within the existing legal framework, making it harder to identify and resist. Elected leaders use legal tools to concentrate power incrementally."
  researcher:
    - question: "Contrast Schumpeter's procedural definition of democracy with Dahl's concept of polyarchy."
      type: essay
      correct_answer: "Schumpeter defined democracy minimally as a competitive struggle for the people's vote -- an institutional method of leadership selection stripped of normative content. Dahl's polyarchy is more demanding, requiring not only competitive elections but also civil liberties, freedom of expression, alternative information sources, associational autonomy, and inclusive citizenship. Dahl treated democracy as an ideal that real-world polyarchies only approximate."
      explanation: "Schumpeter's 1942 formulation deliberately narrowed democracy to an electoral procedure, rejecting classical ideals of self-governance. Dahl, while also empirical in orientation, insisted that meaningful democracy required substantive guarantees beyond elections. His two-dimensional framework (contestation and inclusiveness) allowed for graduated measurement rather than Schumpeter's binary classification."
    - question: "How do Levitsky and Ziblatt's analysis of democratic erosion and Ginsburg and Huq's distinction between 'authoritarian reversion' and 'constitutional retrogression' complement each other?"
      type: essay
      correct_answer: "Levitsky and Ziblatt emphasise the role of democratic norms (mutual toleration and institutional forbearance) whose erosion by elected leaders enables incremental democratic decay. Ginsburg and Huq provide an analytical distinction between sudden authoritarian reversion and gradual constitutional retrogression, arguing the latter is now the predominant threat. Together, they show that democratic breakdown is increasingly a process rather than an event, driven by incumbents exploiting legal channels."
      explanation: "Both works, published in 2018, contributed to the burgeoning literature on democratic backsliding. Levitsky and Ziblatt focused on the behavioural norms that sustain democracy, while Ginsburg and Huq provided a constitutional-institutional framework. Their complementary analyses explain why contemporary democratic erosion is difficult to detect and resist: it proceeds gradually, through formally legal means, and often with popular support."
    - question: "Evaluate the epistemological foundations of Landemore's argument in 'Democratic Reason' for the epistemic superiority of inclusive deliberation over expert rule."
      type: essay
      correct_answer: "Landemore draws on the Condorcet Jury Theorem and Hong-Page diversity theorem to argue that cognitively diverse groups of non-experts can outperform smaller groups of experts in problem-solving and prediction. She contends that inclusive democratic deliberation harnesses cognitive diversity, producing epistemically superior outcomes. Critics, including David Estlund, question whether the conditions required by these theorems (independent judgement, competence above random chance) reliably obtain in real-world democratic deliberation."
      explanation: "Landemore's 2012 work represents a significant contribution to epistemic democratic theory. By grounding the case for democracy in the cognitive diversity of large, inclusive groups rather than in procedural fairness alone, she offers a novel justification. However, the argument depends on specific mathematical conditions that may not hold in practice, particularly in the presence of polarisation, misinformation, and herd behaviour."
