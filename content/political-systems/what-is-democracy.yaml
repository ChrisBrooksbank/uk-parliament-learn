key_dates:
  - year: -508
    event: "Cleisthenes introduces democratic reforms in Athens"
    significance: "Established the world's first known democratic system by reorganising Athenian citizens into ten tribes based on geography, creating the Boule (council of 500), and empowering the Ecclesia (citizens' assembly) to make binding decisions."
    levels: [teenager, adult, researcher]
  - year: 1215
    event: "Magna Carta sealed by King John"
    significance: "Established the foundational principle that the monarch was subject to the rule of law, and that the rights of subjects could not be arbitrarily overridden -- a cornerstone of constitutional democracy."
    levels: [child, teenager, adult, researcher]
  - year: 1689
    event: "English Bill of Rights enacted"
    significance: "Codified the supremacy of Parliament over the Crown, established the right to free elections, prohibited excessive bail and cruel punishments, and guaranteed freedom of speech in parliamentary proceedings."
    levels: [teenager, adult, researcher]
  - year: 1893
    event: "New Zealand grants women the right to vote"
    significance: "Became the first self-governing country to enact universal female suffrage, setting a precedent that inspired suffrage movements worldwide."
    levels: [teenager, adult, researcher]
  - year: 1928
    event: "Equal Franchise Act extends equal voting rights to women in the UK"
    significance: "Granted women the right to vote on the same terms as men (at age 21), completing the long struggle for universal adult suffrage in the United Kingdom."
    levels: [teenager, adult, researcher]
  - year: 1948
    event: "Universal Declaration of Human Rights adopted"
    significance: "Article 21 declared that the will of the people shall be the basis of the authority of government, expressed through periodic and genuine elections by universal and equal suffrage, establishing democracy as an international norm."
    levels: [adult, researcher]
  - year: 1989
    event: "Fall of the Berlin Wall"
    significance: "Marked the beginning of the third wave of democratisation in Eastern Europe and the end of the Cold War, leading to the establishment of democratic governments across the former Soviet bloc."
    levels: [child, teenager, adult, researcher]

key_figures:
  - name: "Cleisthenes"
    role: "Athenian statesman and reformer"
    description: "Known as the 'father of Athenian democracy,' Cleisthenes introduced constitutional reforms around 508 BC that broke the power of the aristocratic families by reorganising citizens into ten new tribes based on geography. His reforms established the Boule (council of 500) and empowered the Ecclesia (citizens' assembly), creating the institutional framework for direct democratic governance."
    levels: [teenager, adult, researcher]
  - name: "Emmeline Pankhurst"
    role: "Suffragette leader"
    description: "Founded the Women's Social and Political Union (WSPU) in 1903 and led the militant campaign for women's suffrage in the United Kingdom. Her activism, including hunger strikes and civil disobedience, was instrumental in securing the Representation of the People Act 1918, which granted the vote to women over 30, and ultimately the Equal Franchise Act 1928."
    levels: [child, teenager, adult]
  - name: "Robert Dahl"
    role: "Political scientist and democratic theorist"
    description: "Sterling Professor of Political Science at Yale University, Dahl developed the concept of 'polyarchy' to describe real-world approximations of the democratic ideal. His works 'A Preface to Democratic Theory' (1956) and 'Polyarchy: Participation and Opposition' (1971) established a framework for measuring democracy along two dimensions -- contestation and inclusiveness -- and remain foundational texts in comparative politics."
    levels: [adult, researcher]
  - name: "Pericles"
    role: "Athenian statesman and general"
    description: "Led Athens during its Golden Age in the mid-5th century BC, when Athenian democracy reached its fullest expression. His Funeral Oration, as recorded by Thucydides, articulated the ideals of democratic citizenship, civic participation, and political equality that influenced democratic thought for millennia."
    levels: [teenager, adult, researcher]

