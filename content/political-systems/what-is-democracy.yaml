glossary:
  - term: "Democracy"
    definition_simple: "A way of running a country where the people choose their leaders by voting and everyone has a say."
    definition_full: "A system of government in which sovereign authority is vested in the people and exercised directly or through elected representatives, characterised by free and fair elections, the rule of law, the protection of fundamental rights and civil liberties, and political equality among citizens."
  - term: "Direct Democracy"
    definition_simple: "A type of democracy where people vote on decisions themselves instead of choosing someone else to decide for them."
    definition_full: "A form of democracy in which citizens participate personally in deliberation and decision-making on policy and legislation, rather than delegating authority to elected representatives. The Athenian Ecclesia and modern Swiss referendums are prominent examples."
  - term: "Representative Democracy"
    definition_simple: "A type of democracy where people vote for representatives, like MPs, who then make decisions on their behalf."
    definition_full: "A form of democracy in which citizens elect representatives to a legislature or executive office, delegating decision-making authority while retaining the power to hold representatives accountable through periodic elections. It is the dominant form of democratic governance in modern nation-states."
  - term: "Rule of Law"
    definition_simple: "The idea that everyone, including the Government and the most powerful people, must follow the same rules."
    definition_full: "The constitutional principle that all persons and institutions, including the state itself, are accountable to laws that are publicly promulgated, equally enforced, independently adjudicated, and consistent with international human rights norms. It ensures that governmental power is exercised within a legal framework rather than arbitrarily."
  - term: "Universal Suffrage"
    definition_simple: "The right for all adults to vote, no matter whether they are men or women, rich or poor."
    definition_full: "The extension of the right to vote to all adult citizens without restriction based on sex, race, property ownership, income, or social status. In the UK, universal adult suffrage was achieved progressively through the Reform Acts and the Equal Franchise Act 1928."

