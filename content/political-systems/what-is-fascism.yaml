quizzes:
  child:
    - question: "What happens to people's choices in a fascist country?"
      type: multiple_choice
      options:
        - "People get more choices than usual"
        - "People's choices are taken away by the leader"
        - "People vote every week"
      correct_answer: "People's choices are taken away by the leader"
      explanation: "In a fascist country, one powerful leader takes control and stops people from voting freely or speaking up about what they think."
    - question: "True or false: In a fascist country, everyone is allowed to say what they think."
      type: true_false
      correct_answer: "False"
      explanation: "Under fascism, people are not allowed to disagree with the leader. Free speech is taken away, and people who speak out can be punished."
    - question: "What is the opposite of fascism?"
      type: multiple_choice
      options:
        - "Democracy"
        - "Another kind of fascism"
        - "Having no government at all"
      correct_answer: "Democracy"
      explanation: "Democracy is the opposite of fascism because in a democracy, people get to choose their leaders, speak freely, and have a say in how things are run."
  teenager:
    - question: "What event brought Mussolini to power in Italy in 1922?"
      type: multiple_choice
      options:
        - "A general election victory"
        - "The March on Rome"
        - "A military invasion from another country"
      correct_answer: "The March on Rome"
      explanation: "Thousands of fascist Blackshirts marched on Rome in October 1922, and King Victor Emmanuel III appointed Mussolini as Prime Minister rather than risk conflict."
    - question: "Which of the following is NOT a characteristic of fascism?"
      type: multiple_choice
      options:
        - "Extreme nationalism"
        - "Free and fair elections"
        - "Suppression of political opposition"
        - "Scapegoating of minority groups"
      correct_answer: "Free and fair elections"
      explanation: "Fascism rejects free and fair elections. It is characterised by extreme nationalism, violent suppression of opposition, and the scapegoating of minorities."
    - question: "Name two conditions that helped fascism rise in Europe after the First World War."
      type: short_answer
      correct_answer: "Severe economic hardship (such as hyperinflation and mass unemployment) and widespread disillusionment with democratic governments."
      explanation: "Fascism exploited economic crises and a sense that democratic institutions had failed. In both Italy and Germany, post-war economic instability, national humiliation, and political polarisation created the conditions fascist leaders used to gain support."
  adult:
    - question: "How does Roger Griffin's definition of fascism as 'palingenetic ultranationalism' distinguish it from other forms of authoritarianism?"
      type: short_answer
      correct_answer: "Griffin argues that the myth of national rebirth (palingenesis) combined with populist ultranationalism constitutes the 'fascist minimum' -- the revolutionary, regenerative impulse that distinguishes fascism from conservative authoritarianism, which seeks to preserve existing hierarchies rather than radically transform society."
      explanation: "Conservative authoritarian regimes aim to maintain the status quo and existing social order. Fascism, by contrast, is revolutionary: it promises to sweep away the old, decadent order and create a reborn nation. This palingenetic myth is what makes fascism uniquely dangerous and mobilising."
    - question: "How did the Enabling Act of 1933 effectively end democracy in Germany?"
      type: short_answer
      correct_answer: "The Enabling Act allowed Hitler to enact laws without the approval of the Reichstag (Parliament), bypassing the legislative process and concentrating legislative and executive power in the hands of the Chancellor and his government."
      explanation: "Passed on 23 March 1933 with the support of conservative and centrist parties (only the Social Democrats voted against it), the Enabling Act removed the constitutional requirement for parliamentary consent to legislation, allowing Hitler to legally dismantle all remaining democratic institutions."
    - question: "What distinguishes fascism from communism as a political ideology?"
      type: multiple_choice
      options:
        - "Fascism is internationalist while communism is nationalist"
        - "Fascism is fundamentally nationalist and typically preserves capitalist structures under state direction, while communism is rooted in class struggle and internationalism"
        - "There is no meaningful difference between the two"
        - "Fascism abolishes private property while communism preserves it"
      correct_answer: "Fascism is fundamentally nationalist and typically preserves capitalist structures under state direction, while communism is rooted in class struggle and internationalism"
      explanation: "While both systems can be authoritarian, fascism is defined by ultranationalism, racial or national identity, and the preservation of private property under state control. Communism is based on class analysis, internationalism, and the collective ownership of the means of production."
  researcher:
    - question: "Compare and contrast Paxton's functional, stage-based approach to defining fascism with Griffin's ideological approach centred on palingenetic ultranationalism. What are the strengths and limitations of each framework?"
      type: essay
      correct_answer: "Griffin's ideological approach provides a parsimonious 'fascist minimum' that enables cross-national comparison and identification of fascist movements by their core mythic content, but risks being too abstract and detached from historical context. Paxton's functional approach captures how fascist movements actually develop, gain power, and radicalise, avoiding the circularity of ideological definitions, but may be less useful for identifying incipient fascism before it reaches later stages."
      explanation: "Griffin's strength lies in analytical precision: by identifying the palingenetic ultranationalist core, he provides a clear criterion for distinguishing fascism from other authoritarian forms. However, critics argue this privileges ideology over practice. Paxton's stage model captures fascism as a dynamic process and emphasises the collaboration between fascist movements and traditional elites, but its retrospective orientation may limit its predictive utility. Contemporary scholarship increasingly seeks to synthesise these approaches."
    - question: "Analyse how Eco's fourteen properties of Ur-Fascism function as a diagnostic tool. Why did Eco insist that the presence of any single feature could allow fascism to 'coagulate' around it?"
      type: essay
      correct_answer: "Eco conceived Ur-Fascism as a family of resemblances (in the Wittgensteinian sense) rather than a systematic ideology. Because fascism is ideologically incoherent and syncretic by nature, it cannot be reduced to a single doctrinal checklist. Each of the fourteen features represents an entry point -- a cultural or political tendency that, if left unchecked, can attract and organise other fascist tendencies into a coherent political movement."
      explanation: "Eco's approach reflects his broader semiotic and philosophical training. By treating fascism as a fuzzy set of properties rather than a rigid definition, he accounts for its protean adaptability across different national and historical contexts. This makes his framework particularly useful for identifying fascist tendencies in their early stages, before they consolidate into a full programme -- though critics note that the framework's breadth may risk over-identification."
    - question: "Evaluate the role of conservative elites in facilitating fascism's arrival to power in both Italy and Germany. How does Paxton's third stage illuminate this dynamic?"
      type: essay
      correct_answer: "In both cases, conservative elites invited fascist leaders into government believing they could be controlled and used to suppress the left. In Italy, King Victor Emmanuel III appointed Mussolini to avoid potential civil conflict. In Germany, Franz von Papen and conservative politicians persuaded President Hindenburg to appoint Hitler as Chancellor. Paxton's third stage highlights that fascism typically arrives to power not through revolution but through negotiated coalition with establishment conservatives who fatally underestimate the fascist movement's radicalism."
      explanation: "This pattern is one of fascism's most instructive lessons. Traditional elites provided the institutional legitimacy and access to state power that fascist movements could not seize alone. In both cases, conservatives believed they could use fascist energy for their own ends while containing fascist extremism -- a catastrophic miscalculation that resulted in the destruction of the very institutions they sought to preserve."
