glossary:
  - term: "Fascism"
    definition_simple: "A type of government where one powerful leader takes total control of a country, stops people having a say, and often blames certain groups for the country's problems."
    definition_full: "A far-right, authoritarian, ultranationalist political ideology and system of government characterised by dictatorial power, the forcible suppression of opposition, rigid social regimentation, and the subordination of individual interests to the perceived needs of the nation or race. The term originates from the Italian 'fascio littorio,' the bundle of rods symbolising authority in ancient Rome."
  - term: "Ultranationalism"
    definition_simple: "An extreme form of pride in one's own country that leads people to believe their nation is better than all others and to treat other countries or groups unfairly."
    definition_full: "An extreme form of nationalism that goes beyond ordinary patriotism to assert the absolute superiority of one nation or ethnic group over all others, often accompanied by aggressive foreign policy, xenophobia, and the suppression of minority identities within the state."
  - term: "Totalitarianism"
    definition_simple: "A system where the government tries to control absolutely everything in people's lives -- what they say, think, read, and do."
    definition_full: "A system of government in which the state recognises no limits to its authority and seeks to regulate and control every aspect of public and private life. Distinguished from ordinary authoritarianism by the scope of its ambitions, totalitarian regimes employ mass surveillance, propaganda, and political terror to achieve ideological conformity."
  - term: "Scapegoating"
    definition_simple: "Unfairly blaming a particular group of people for problems they did not cause."
    definition_full: "The political strategy of directing popular frustration and hostility toward a targeted minority group, falsely attributing national problems to that group in order to deflect attention from structural causes and to build political support through manufactured grievance. Fascist regimes systematically scapegoated ethnic, religious, and political minorities."
  - term: "Palingenesis"
    definition_simple: "The idea of a country being 'born again' or made completely new -- fascist leaders promised this kind of national rebirth."
    definition_full: "From the Greek 'palin' (again) and 'genesis' (birth), the concept of national rebirth or regeneration. In Roger Griffin's scholarly framework, palingenetic myth -- the narrative that a nation must undergo revolutionary transformation to be reborn from a period of perceived decadence -- constitutes the ideological core that distinguishes fascism from other forms of authoritarianism."

did_you_know:
  - fact: "The word 'fascism' comes from the Italian word 'fascio,' meaning a bundle. It refers to a bundle of sticks tied around an axe, which was a symbol of power in ancient Rome."
    level: [child, teenager]
  - fact: "Mussolini was originally a socialist newspaper editor before he broke with socialism and founded the fascist movement. He was expelled from the Italian Socialist Party in 1914 for supporting Italy's entry into the First World War."
    level: [teenager, adult, researcher]
  - fact: "The Reichstag (German Parliament) fire of February 1933 was used by the Nazis as a pretext to suspend civil liberties. Historians still debate whether the Nazis themselves were involved in setting the fire or simply exploited it."
    level: [teenager, adult, researcher]
  - fact: "Umberto Eco, who wrote one of the most influential analyses of fascism, grew up in Mussolini's Italy and was a teenager when the regime fell. His childhood experiences directly informed his scholarly work decades later."
    level: [adult, researcher]

key_dates:
  - year: 1919
    event: "Mussolini founds the Fasci Italiani di Combattimento in Milan"
    significance: "Marked the birth of organised fascism as a political movement. The group combined ex-soldiers, nationalists, and disaffected syndicalists, and would evolve into the National Fascist Party in 1921."
    levels: [teenager, adult, researcher]
  - year: 1922
    event: "The March on Rome"
    significance: "Thousands of fascist Blackshirts marched on the Italian capital on 28 October. Rather than order the army to stop them, King Victor Emmanuel III appointed Mussolini as Prime Minister, effectively handing power to the fascists without a true revolution."
    levels: [teenager, adult, researcher]
  - year: 1933
    event: "Hitler appointed Chancellor and the Enabling Act passed"
    significance: "Adolf Hitler was appointed German Chancellor on 30 January. The Enabling Act, passed on 23 March, allowed him to enact laws without parliamentary approval, dismantling the Weimar Republic's democracy and establishing the Nazi dictatorship."
    levels: [teenager, adult, researcher]
  - year: 1935
    event: "Nuremberg Laws enacted in Germany"
    significance: "These antisemitic laws stripped German Jews of citizenship and prohibited marriage and relations between Jews and non-Jewish Germans, institutionalising racial persecution as state policy and foreshadowing the Holocaust."
    levels: [adult, researcher]
  - year: 1938
    event: "Kristallnacht (Night of Broken Glass)"
    significance: "A coordinated pogrom across Nazi Germany and Austria on 9-10 November in which synagogues were burned, Jewish businesses destroyed, and approximately 30,000 Jewish men arrested and sent to concentration camps. It marked a dramatic escalation of state-sponsored violence against Jews."
    levels: [teenager, adult, researcher]
  - year: 1943
    event: "Fall of Mussolini's regime"
    significance: "On 25 July, the Fascist Grand Council voted against Mussolini, and King Victor Emmanuel III dismissed and arrested him, ending over two decades of fascist rule in Italy. The collapse demonstrated that fascist power, while seemingly total, depended on elite consent."
    levels: [adult, researcher]
  - year: 1945
    event: "End of the Second World War and defeat of Nazi Germany"
    significance: "The Allied victory ended the Nazi regime and exposed the full horror of the Holocaust, in which six million Jews and millions of others were murdered. The Nuremberg Trials (1945-1946) established the principle that individuals could be held accountable for crimes against humanity."
    levels: [child, teenager, adult, researcher]

key_figures:
  - name: "Benito Mussolini"
    role: "Founder of Italian Fascism and dictator of Italy (1922-1943)"
    description: "A former socialist journalist who founded the fascist movement in Italy in 1919. He became Prime Minister in 1922 after the March on Rome and progressively dismantled democratic institutions, ruling as dictator until deposed by his own Grand Council in 1943. He was captured and executed by Italian partisans in April 1945."
    levels: [teenager, adult, researcher]
  - name: "Adolf Hitler"
    role: "Leader of the Nazi Party and dictator of Germany (1933-1945)"
    description: "Rose to power through a combination of political agitation, propaganda, and collaboration with conservative elites. As Fuhrer, he established a totalitarian state, pursued aggressive territorial expansion, and orchestrated the Holocaust. His regime caused the deaths of tens of millions of people."
    levels: [teenager, adult, researcher]
  - name: "Robert O. Paxton"
    role: "American historian and leading scholar of fascism"
    description: "Professor Emeritus at Columbia University, Paxton's 'The Anatomy of Fascism' (2004) and his influential 1998 essay 'The Five Stages of Fascism' shifted scholarly analysis from ideology to political behaviour, providing a functional framework for understanding how fascist movements develop, gain power, and exercise it."
    levels: [adult, researcher]
  - name: "Umberto Eco"
    role: "Italian philosopher, novelist, and cultural critic"
    description: "In his 1995 essay 'Ur-Fascism,' Eco drew on his childhood under Mussolini's regime to identify fourteen properties of 'Eternal Fascism,' arguing that these features form a family of resemblances rather than a systematic doctrine, and that any single feature can serve as a nucleus for fascism to coalesce around."
    levels: [adult, researcher]

