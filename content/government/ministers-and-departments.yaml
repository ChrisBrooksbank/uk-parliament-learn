quizzes:
    child:
        - question: 'What is a Secretary of State?'
          type: multiple_choice
          options:
              - 'A person who writes letters for the Prime Minister'
              - 'The boss of a government department chosen by the Prime Minister'
              - 'A judge in the courts'
          correct_answer: 'The boss of a government department chosen by the Prime Minister'
          explanation: 'A Secretary of State is a senior minister put in charge of a government department, like education or health, by the Prime Minister.'
        - question: 'True or false: Most government departments have their offices in an area of London called Whitehall.'
          type: true_false
          correct_answer: 'True'
          explanation: 'Whitehall is a street in London near the Houses of Parliament where many government department offices are located.'
        - question: 'What does ministerial responsibility mean?'
          type: multiple_choice
          options:
              - 'Ministers are responsible for cleaning their offices'
              - 'Ministers must answer to Parliament for what their department does'
              - 'Ministers choose which laws to follow'
          correct_answer: 'Ministers must answer to Parliament for what their department does'
          explanation: 'Ministerial responsibility means that if something goes wrong in a department, the minister in charge has to explain to Parliament what happened and what they are doing about it.'
    teenager:
        - question: 'What are the three tiers of minister within a government department?'
          type: short_answer
          correct_answer: 'Secretary of State, Minister of State, and Parliamentary Under-Secretary of State.'
          explanation: 'Each department is headed by a Secretary of State, with Ministers of State handling significant policy areas and Parliamentary Under-Secretaries of State dealing with more specific briefs.'
        - question: 'How does the Prime Minister have the power to reorganise government departments?'
          type: multiple_choice
          options:
              - 'By passing a new Act of Parliament each time'
              - 'By using the royal prerogative and Transfer of Functions Orders'
              - 'By holding a public referendum'
          correct_answer: 'By using the royal prerogative and Transfer of Functions Orders'
          explanation: 'The PM can create, merge, or abolish departments using prerogative powers, with functions formally transferred through Orders under the Ministers of the Crown Act 1975, without needing Parliament to pass a new law.'
        - question: 'True or false: Individual ministerial responsibility means a minister must always resign if their department makes a mistake.'
          type: true_false
          correct_answer: 'False'
          explanation: 'While the convention holds ministers accountable for their departments, in modern practice resignations for departmental failures are rare. Ministers are expected to account to Parliament and correct errors, but resignation is typically reserved for serious personal failings or knowingly misleading Parliament.'
    adult:
        - question: 'Explain the distinction Sir David Maxwell Fyfe drew during the Crichel Down debate regarding ministerial responsibility.'
          type: short_answer
          correct_answer: 'Maxwell Fyfe distinguished between matters where the minister had given direction (and should bear full responsibility) and matters where officials acted without ministerial knowledge (where the minister should account to Parliament but should not necessarily resign).'
          explanation: 'This distinction effectively weakened the resignation convention while preserving the obligation to be accountable. It shifted the emphasis from automatic resignation to providing accurate information and correcting errors, shaping the modern understanding of individual ministerial responsibility.'
        - question: 'What legal mechanism allows the Prime Minister to transfer functions between departments?'
          type: multiple_choice
          options:
              - 'The Parliament Acts 1911 and 1949'
              - 'Transfer of Functions Orders under the Ministers of the Crown Act 1975'
              - 'Secondary legislation under the European Communities Act 1972'
              - 'Royal Proclamation'
          correct_answer: 'Transfer of Functions Orders under the Ministers of the Crown Act 1975'
          explanation: 'The Ministers of the Crown Act 1975 provides for the transfer of ministerial functions through Orders in Council, allowing the PM to reorganise departments without primary legislation.'
        - question: 'What is the maximum number of paid ministers permitted to sit in the House of Commons, and under which statute?'
          type: short_answer
          correct_answer: '95, under the House of Commons Disqualification Act 1975.'
          explanation: "This statutory ceiling limits the size of the 'payroll vote' in the Commons -- the number of MPs who hold ministerial office and are therefore bound by collective responsibility to support Government policy."
    researcher:
        - question: 'Critically assess whether the convention of individual ministerial responsibility remains a meaningful accountability mechanism in contemporary British government.'
          type: essay
          correct_answer: 'The convention has evolved significantly from its nineteenth-century origins. While ministers remain formally accountable to Parliament, resignations for departmental failures have become rare. The Maxwell Fyfe doctrine, select committee scrutiny, and the distinction between policy and operational responsibility have transformed the convention into one of accountability (answering to Parliament) rather than culpability (automatic resignation). Woodhouse (1994) argues the convention retains value as a framework for parliamentary questioning and scrutiny, even if the resignation element has atrophied.'
          explanation: "The analysis should consider the historical evolution of the convention, the impact of the Crichel Down precedent and Maxwell Fyfe's reformulation, the role of select committees and the Ministerial Code, and the political factors that determine whether resignation occurs. Contemporary examples -- both of resignations and of ministers surviving -- should be used to support the argument."
        - question: "Evaluate the constitutional implications of the Prime Minister's prerogative power to reorganise the machinery of government without parliamentary approval."
          type: essay
          correct_answer: "The PM's power to create, merge, and abolish departments through machinery-of-government changes and Transfer of Functions Orders under the Ministers of the Crown Act 1975 gives the executive significant flexibility but raises accountability concerns. Parliament has no formal role in approving departmental structures, meaning that changes affecting the allocation of billions of pounds in public expenditure and the organisation of the state can occur without legislative scrutiny. Critics argue this undermines parliamentary sovereignty; defenders contend that executive flexibility is necessary for effective governance."
          explanation: 'The essay should explore the legal basis (prerogative and the 1975 Act), the practical frequency of reorganisations, academic critiques (e.g., Hood and Lodge on reorganisation as political signalling), and the accountability gap created by excluding Parliament from these decisions.'
