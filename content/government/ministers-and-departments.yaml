      level: [child, teenager, adult]

key_dates:
    - year: 1782
      event: 'Creation of the Home Office and Foreign Office'
      significance: "The old Secretary of State's Office was divided into the Home Office (domestic affairs) and the Foreign Office (international affairs), establishing the pattern of separate departments for distinct policy areas."
      levels: [teenager, adult, researcher]
    - year: 1854
      event: 'Northcote-Trevelyan Report'
      significance: 'Recommended replacing patronage with merit-based recruitment of civil servants, transforming the staffing of government departments and laying the foundation for a professional, permanent civil service.'
      levels: [adult, researcher]
    - year: 1954
      event: 'Crichel Down affair and Dugdale resignation'
      significance: 'Agriculture Minister Sir Thomas Dugdale resigned over civil service errors in his department, becoming the most cited example of individual ministerial responsibility, though subsequent analysis has complicated its interpretation.'
      levels: [adult, researcher]
    - year: 1975
      event: 'Ministers of the Crown Act consolidates transfer of functions'
      significance: 'Provided the legal mechanism for transferring functions between ministers through Orders in Council, enabling Prime Ministers to reorganise the machinery of government without primary legislation.'
      levels: [researcher]
    - year: 2010
      event: 'Wright Committee reforms strengthen select committees'
      significance: 'The introduction of elections for select committee chairs by the whole House of Commons enhanced the independence and authority of departmental scrutiny committees, improving accountability of ministers and their departments.'
      levels: [teenager, adult, researcher]

key_figures:
