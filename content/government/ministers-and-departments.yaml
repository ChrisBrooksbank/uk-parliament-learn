      role: 'Minister of Agriculture (1951-1954)'
      description: "Resigned over the Crichel Down affair, in which civil servants in his department mishandled the disposal of requisitioned land. His resignation became the most discussed case study of individual ministerial responsibility, though the convention's application has evolved significantly since."
      levels: [adult, researcher]
    - name: 'Sir David Maxwell Fyfe'
      role: 'Home Secretary (1951-1954)'
      description: 'During the Crichel Down debate, articulated the distinction between ministerial responsibility for policy decisions and responsibility for operational actions by officials, a framework that has shaped the modern understanding of individual ministerial responsibility.'
