glossary:
  - term: "Constitutional Convention"
    definition_simple: "An unwritten rule about how the government should behave that everyone agrees to follow, even though it is not an actual law."
    definition_full: "A non-legal rule of constitutional practice that is regarded as binding by those to whom it applies, but which is not enforceable by the courts. Key conventions include the PM's obligation to command the confidence of the Commons, collective Cabinet responsibility, and the Monarch acting on ministerial advice."
  - term: "Collective Responsibility"
    definition_simple: "The rule that all members of the Cabinet must agree in public with every decision the group makes, even if they disagreed in private."
    definition_full: "The constitutional convention requiring that all members of the Government publicly support Cabinet decisions. It has three elements: unanimity (all ministers defend agreed policy), confidence (the Government must retain the confidence of the House of Commons), and confidentiality (Cabinet deliberations remain secret). Ministers who cannot support a policy are expected to resign."
  - term: "Ministerial Code"
    definition_simple: "A set of rules written by the Prime Minister that tells ministers how they should behave."
    definition_full: "A document issued by the Prime Minister setting out the rules and standards of conduct for ministers of the Crown. It has no statutory basis and is enforced solely by the PM. It covers duties including not misleading Parliament, managing conflicts of interest, and upholding collective responsibility."
  - term: "Royal Prerogative"
    definition_simple: "Special powers that originally belonged to the King or Queen but are now mostly used by the Prime Minister and ministers on their behalf."
    definition_full: "The residue of discretionary powers legally vested in the Crown, now exercised almost entirely on the advice of ministers. Prerogative powers relevant to the PM include the appointment and dismissal of ministers, the dissolution of Parliament, the deployment of armed forces, and the conduct of foreign affairs."
  - term: "Cabinet Committee"
    definition_simple: "A smaller group of ministers that meets to make decisions on a particular topic, so the full Cabinet does not have to discuss everything."
    definition_full: "A formally constituted sub-group of the Cabinet established by the Prime Minister to consider specific policy areas or issues. Cabinet committees may be standing or ad hoc. Their decisions carry the same authority as full Cabinet decisions and are subject to collective responsibility."
  - term: "First Lord of the Treasury"
    definition_simple: "An old title that has always gone with the job of Prime Minister since the very first PM."
    definition_full: "A historic office of state held concurrently by the Prime Minister since Robert Walpole. The title is displayed on the door of 10 Downing Street and is the formal basis upon which the PM occupies the residence, which was granted to the office of First Lord of the Treasury in 1735."

did_you_know:
  - fact: "The words 'Prime Minister' do not appear in any law that creates the job. The role exists only because of tradition!"
    level: [child, teenager]
  - fact: "10 Downing Street was given to Robert Walpole by King George II in 1735, but Walpole insisted the gift went to the office, not to him personally -- so every PM since has been able to live there."
    level: [child, teenager, adult]
  - fact: "The door of 10 Downing Street actually says 'First Lord of the Treasury', not 'Prime Minister', because that is the PM's official title."
    level: [teenager, adult]
  - fact: "During the 2016 EU referendum, the convention of collective responsibility was formally suspended so that Cabinet ministers could campaign on opposite sides of the question."
    level: [teenager, adult, researcher]
  - fact: "Rachel Reeves, appointed by Keir Starmer in July 2024, became the first female Chancellor of the Exchequer in the office's 700-year history."
    level: [teenager, adult, researcher]

key_dates:
  - year: 1721
    event: "Robert Walpole becomes First Lord of the Treasury"
    significance: "Walpole is generally regarded as the first de facto Prime Minister, establishing many of the conventions of the office during his 21-year tenure -- the longest in British history."
    levels: [teenager, adult, researcher]
  - year: 1735
    event: "10 Downing Street becomes the PM's official residence"
    significance: "King George II offered the house to Walpole, who accepted on behalf of the office of First Lord of the Treasury, establishing it as the permanent official residence of future Prime Ministers."
    levels: [child, teenager, adult, researcher]
  - year: 1917
    event: "Chequers Estate Act -- first statutory mention of 'Prime Minister'"
    significance: "The Act gifted the Chequers country estate to the nation for use by the PM, and was the first time the title 'Prime Minister' appeared in statute, more than 190 years after the role had effectively been established."
    levels: [adult, researcher]
  - year: 1937
    event: "Ministers of the Crown Act provides the PM a dedicated salary"
    significance: "For the first time, the PM received a salary specifically for being PM, rather than being paid solely as First Lord of the Treasury. This gave further statutory recognition to the office."
    levels: [adult, researcher]
  - year: 1945
    event: "Clement Attlee issues 'Questions of Procedure for Ministers'"
    significance: "The precursor to the modern Ministerial Code, this document formalised the rules governing ministerial conduct, Cabinet procedure, and collective responsibility for the first time in a single written text."
    levels: [adult, researcher]
  - year: 2010
    event: "National Security Council established"
    significance: "David Cameron created the NSC as a standing Cabinet committee to coordinate national security policy across government, institutionalising decision-making that had previously been more ad hoc."
    levels: [teenager, adult, researcher]
  - year: 2024
    event: "Keir Starmer becomes Prime Minister"
    significance: "Following the Labour Party's landslide victory in the general election with 411 seats, Starmer was invited by King Charles III to form a government on 5 July 2024, appointing a Cabinet with a record number of women in senior positions."
    levels: [child, teenager, adult, researcher]

key_figures:
  - name: "Sir Robert Walpole"
    role: "First de facto Prime Minister (1721-1742)"
    description: "Served as First Lord of the Treasury for 21 years, the longest tenure in British history. He established key conventions of the premiership, including the principle that the PM should command a majority in the Commons and should resign if they lose it."
    levels: [teenager, adult, researcher]
  - name: "Margaret Thatcher"
    role: "Prime Minister (1979-1990)"
    description: "The first female Prime Minister and the longest-serving PM of the twentieth century. Her assertive leadership style reignited the academic debate about whether the UK had shifted from Cabinet government to prime-ministerial government."
    levels: [teenager, adult, researcher]
  - name: "Tony Blair"
    role: "Prime Minister (1997-2007)"
    description: "Modernised the Labour Party and won three consecutive general elections. His premiership was characterised by a strong central operation at No. 10, the use of 'sofa government' bypassing formal Cabinet structures, and the renaming of the Ministerial Code in 1997."
    levels: [teenager, adult, researcher]
  - name: "Keir Starmer"
    role: "Prime Minister (2024-present)"
    description: "A former Director of Public Prosecutions and human rights lawyer who became Labour leader in 2020 and PM in July 2024. His Cabinet included Rachel Reeves as the first female Chancellor and Angela Rayner as Deputy Prime Minister."
    levels: [child, teenager, adult, researcher]
  - name: "Peter Hennessy"
    role: "Constitutional historian and crossbench peer"
    description: "Baron Hennessy of Nympsfield is one of the leading scholars of the British premiership and Whitehall. His work 'The Prime Minister: The Office and Its Holders Since 1945' is a foundational text on the evolution of the office and the spectrum between 'command' and 'collegiate' styles of premiership."
    levels: [adult, researcher]

quizzes:
  child:
    - question: "Where does the Prime Minister live and work?"
      type: multiple_choice
      options:
        - "Buckingham Palace"
        - "10 Downing Street"
        - "The Palace of Westminster"
      correct_answer: "10 Downing Street"
      explanation: "The Prime Minister lives and works at 10 Downing Street in London. It has been the PM's home since 1735."
    - question: "True or false: People vote directly for who they want to be Prime Minister."
      type: true_false
      correct_answer: "False"
      explanation: "People vote for their local MP. The leader of the party that wins the most seats in Parliament becomes Prime Minister."
    - question: "What is the Cabinet?"
      type: multiple_choice
      options:
        - "A piece of furniture in 10 Downing Street"
        - "The team of senior ministers who help the PM run the country"
        - "A group of judges"
      correct_answer: "The team of senior ministers who help the PM run the country"
      explanation: "The Cabinet is the group of important ministers chosen by the PM. Each one is in charge of a big area like health, education, or defence."
  teenager:
    - question: "What is the convention of collective responsibility?"
      type: multiple_choice
      options:
        - "All ministers must vote the same way as their constituents"
        - "Ministers can publicly disagree with Government policy whenever they wish"
        - "All ministers must publicly support Cabinet decisions, or resign"
      correct_answer: "All ministers must publicly support Cabinet decisions, or resign"
      explanation: "Collective responsibility means that once the Cabinet reaches a decision, every Government minister must support it publicly. If a minister cannot do so, they are expected to resign."
    - question: "Why is it significant that the PM's role is based on convention rather than statute?"
      type: short_answer
      correct_answer: "It means the role is not defined or limited by any Act of Parliament, making its powers flexible and dependent on political circumstances rather than legal rules."
      explanation: "Because the PM's powers are not set out in law, they can expand or contract depending on the personality of the PM, the political situation, and the willingness of the Cabinet and Parliament to accept their leadership."
    - question: "True or false: Cabinet committees can make decisions that are binding across the whole Government."
      type: true_false
      correct_answer: "True"
      explanation: "Cabinet committee decisions carry the same weight as decisions made by the full Cabinet and are subject to the same convention of collective responsibility."
  adult:
    - question: "What is the Ministerial Code and what is its legal status?"
      type: short_answer
      correct_answer: "The Ministerial Code is a document issued by the PM setting out standards of conduct for ministers. It has no statutory basis and is enforced solely by the PM."
      explanation: "The Ministerial Code is the PM's personal document. It is not an Act of Parliament or statutory instrument. The PM decides whether it has been breached and what consequences follow, which has led to criticism about the lack of independent enforcement."
    - question: "Which Act first provided the Prime Minister with a salary specifically for the role?"
      type: multiple_choice
      options:
        - "Chequers Estate Act 1917"
        - "Ministers of the Crown Act 1937"
        - "Ministerial and other Salaries Act 1975"
        - "Fixed-term Parliaments Act 2011"
      correct_answer: "Ministers of the Crown Act 1937"
      explanation: "Before 1937, the PM was paid only as First Lord of the Treasury. The Ministers of the Crown Act 1937 provided a distinct PM's salary for the first time, giving further statutory recognition to the office."
    - question: "On what occasions has collective responsibility been formally suspended?"
      type: short_answer
      correct_answer: "It was suspended in 1932 over imperial tariffs, in 1975 for the EEC referendum, and in 2016 for the EU referendum."
      explanation: "These rare 'agreements to differ' allowed ministers to publicly take opposing positions on a specific issue without being required to resign, while collective responsibility continued to apply to all other Government business."
  researcher:
    - question: "Evaluate the Crossman-Mackintosh thesis that Cabinet government has been replaced by prime-ministerial government, with reference to subsequent scholarship."
      type: essay
      correct_answer: "Crossman (1963) and Mackintosh (1962) argued that the Cabinet had become a rubber stamp for PM decisions. Foley (2000) extended this with his 'British presidency' thesis. However, Jones, Rhodes, and Hennessy have argued that even dominant PMs face structural constraints from Cabinet, party, Parliament, and the civil service, and that the reality oscillates between 'command' and 'collegiate' modes of premiership."
      explanation: "The debate remains central to British constitutional scholarship. Evidence from different premierships supports different conclusions: Thatcher and Blair appeared to confirm the prime-ministerial government thesis, while Major and May illustrated its limits. Hennessy's spectrum between command and collegiate premiership offers a more nuanced framework than the binary choice posed by earlier scholars."
    - question: "Assess the constitutional implications of the Ministerial Code lacking statutory basis and independent enforcement."
      type: essay
      correct_answer: "The Code's non-statutory status means ministerial standards depend on the PM's willingness to enforce them, creating a potential conflict of interest when the PM or close allies are accused of breaches. The Committee on Standards in Public Life and others have called for statutory underpinning and a truly independent investigator with the power to initiate inquiries and determine breaches."
      explanation: "The PM is simultaneously the author of the Code, the person who decides whether to refer allegations for investigation, and the final arbiter of whether a breach has occurred. This concentration of authority undermines accountability, particularly when allegations involve the PM personally. Placing the Code on a statutory footing would represent a significant constitutional shift, formalising what is currently a matter of prime-ministerial discretion."
    - question: "How does the Cabinet Manual (2011) interact with constitutional conventions on the appointment of a Prime Minister, and what are its limitations?"
      type: short_answer
      correct_answer: "The Cabinet Manual describes existing conventions for PM appointment, including the process in a hung parliament, but it is descriptive and non-binding. It cannot create new conventions, and its provisions have no legal force, leaving the Monarch's role ultimately dependent on political practice."
      explanation: "The Manual was published partly to clarify the process following the 2010 hung parliament. While it provides a useful reference point, its authority derives from accurately describing existing conventions rather than prescribing them. It cannot override political reality, and its descriptions may become outdated as conventions evolve."
