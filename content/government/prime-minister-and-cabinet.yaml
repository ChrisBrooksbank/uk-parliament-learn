explanations:
  child:
    summary: "The Prime Minister is the person in charge of running the country, and the Cabinet is the team of ministers who help them."
    body: |
      The Prime Minister, or PM for short, is the leader of the country. They live and work at a famous house in London called 10 Downing Street. The PM decides how the country should be run and speaks for the United Kingdom to the rest of the world.

      The PM is not chosen directly by the public. Instead, they become PM because they are the leader of the political party that wins the most seats in a general election. The King then asks them to form a government.

      The PM picks a team of important ministers to help run different parts of the country. This team is called the Cabinet. Each Cabinet minister is in charge of a big area, like schools, hospitals, or keeping people safe. For example, the Chancellor of the Exchequer looks after the country's money, and the Home Secretary helps keep people safe.

      The Cabinet meets around a big table at 10 Downing Street, usually once a week, to talk about important decisions. They have to agree together on what to do -- this means that once a decision is made, everyone on the team has to support it, even if they were not sure about it at first.

      The current Prime Minister is Keir Starmer. He became PM in July 2024 after his party, the Labour Party, won the general election.
    reading_age: 8
  teenager:
    summary: "The Prime Minister leads the Government and chairs the Cabinet, whose members are bound by the convention of collective responsibility."
    body: |
      The Prime Minister is the head of the UK Government. Unusually, the role is not created by any law -- it exists because of tradition and convention. The PM is the leader of the political party (or coalition) that can command a majority in the House of Commons. After a general election, the Monarch invites the person most likely to hold the confidence of the Commons to form a government.

      The PM has wide-ranging powers. They appoint and dismiss ministers, set the Government's agenda, chair Cabinet meetings, and represent the UK internationally. They also advise the King on important matters, including the appointment of bishops, senior judges, and peers.

      The Cabinet is the senior decision-making body of the Government, typically made up of around 20-25 senior ministers, each heading a major government department. It usually meets weekly in the Cabinet Room at 10 Downing Street. Key members include the Chancellor of the Exchequer (finance), the Home Secretary (domestic affairs and security), the Foreign Secretary (international relations), and the Defence Secretary.

      A crucial principle governing the Cabinet is collective responsibility. This means that all Cabinet decisions are binding on every minister. Ministers can argue their views freely in private Cabinet discussions, but once a decision is reached, every member of the Government must publicly support it. A minister who cannot support a policy is expected to resign. This convention was notably set aside during the 1975 and 2016 EU referendums, when ministers were allowed to campaign on opposite sides.

      Much of the Government's detailed work is done through Cabinet committees -- smaller groups of ministers that focus on specific areas like national security, economic policy, or home affairs. Their decisions carry the same weight as full Cabinet decisions.

      Keir Starmer became Prime Minister on 5 July 2024, after the Labour Party won 411 seats in the general election. His Cabinet included Rachel Reeves as the first female Chancellor of the Exchequer in British history, and Angela Rayner as Deputy Prime Minister.
    reading_age: 14
  adult:
    summary: "The Prime Minister is a convention-based role at the apex of executive power, leading a Cabinet governed by collective responsibility and the Ministerial Code, with no single statute defining the office."
    body: |
      The office of Prime Minister is one of the most powerful in the British constitution, yet it rests almost entirely on convention rather than statute. No single law creates the role, defines its powers, or sets out its responsibilities. The PM's authority derives from a combination of royal prerogative powers (exercised on their behalf), constitutional conventions, and their position as leader of the party commanding a majority in the House of Commons.

      The first statutory recognition of the office came only in the Chequers Estate Act 1917, which referred to the "Prime Minister" in a schedule. Subsequent Acts -- such as the Ministers of the Crown Act 1937 (which first provided the PM with a salary distinct from their role as First Lord of the Treasury) and the Ministerial and other Salaries Act 1975 -- have acknowledged the office, but none establishes it or codifies its powers.

      The PM exercises a formidable range of powers. Through the royal prerogative (now largely exercised on ministerial advice), the PM advises the Monarch on the appointment and dismissal of ministers, the dissolution of Parliament (subject to the constraints that existed under the Fixed-term Parliaments Act 2011, now repealed by the Dissolution and Calling of Parliament Act 2022), the granting of honours, and the deployment of armed forces. The PM chairs the Cabinet, sets its agenda, controls the machinery of government (including the power to create, merge, or abolish departments), and appoints the chairs and members of Cabinet committees.

      The Cabinet, typically comprising 20-25 Secretaries of State and other senior ministers, is the supreme decision-making body of the executive. Its proceedings are governed by the convention of collective responsibility, which has two limbs: first, that discussions within Cabinet are confidential, enabling free and frank deliberation; second, that once a decision is reached, all ministers must publicly support it or resign. The convention extends to all members of the Government, not just the Cabinet. Formal suspensions of collective responsibility are rare -- the most notable instances being the 1975 EEC referendum under Harold Wilson and the 2016 EU referendum under David Cameron.

      The Ministerial Code sets out the standards of conduct expected of ministers. It is issued by the Prime Minister personally, not by Parliament, and has no statutory basis. It covers matters including the duty not to mislead Parliament, the management of conflicts of interest, the relationship between ministers and civil servants, and the process for Cabinet committee decision-making. The PM is the sole arbiter of the Code, deciding whether a breach has occurred and what sanction, if any, to impose -- a feature that has attracted significant criticism for lacking independent enforcement.

      The infrastructure supporting the PM includes the Prime Minister's Office at 10 Downing Street (which houses policy advisers, the press office, and private secretaries), the Cabinet Office (which supports collective government, coordinates policy across departments, and houses the Cabinet Secretary -- the most senior civil servant), and Chequers (the PM's official country residence in Buckinghamshire, gifted to the nation in 1917).

      Cabinet committees are a central mechanism of modern government. They are established by the PM, who determines their terms of reference, membership, and chairs. Committees may be standing (lasting for the life of the Government) or ad hoc (convened for a specific issue). Their decisions carry the same authority as full Cabinet decisions and are subject to collective responsibility. Under the Starmer Government, committees include the National Security Council, and, since November 2025, the Growth and Living Standards Committee, the Public Services Committee, and the Domestic and Border Security Committee.
    reading_age: 18
  researcher:
    summary: "A constitutional analysis of the Prime Minister as a convention-based office operating within the framework of prerogative power, collective Cabinet responsibility, and evolving accountability mechanisms."
    body: |
      The office of Prime Minister occupies a paradoxical position at the heart of the British constitution: it is the most powerful political role in the state, yet it has no comprehensive statutory foundation. The PM's authority is an accretion of royal prerogative powers exercised on ministerial advice, constitutional conventions developed since the early eighteenth century, and the political reality of party leadership in the House of Commons. As Peter Hennessy observed in "The Prime Minister: The Office and Its Holders Since 1945" (2000), the office is "what its holder makes of it, within the constraints of circumstance and convention."

      The historical evolution of the premiership is conventionally traced to Sir Robert Walpole's tenure as First Lord of the Treasury (1721-1742), though the title "Prime Minister" was initially used as a term of abuse and Walpole himself rejected it. The role developed organically as monarchical power waned and parliamentary government ascended. The first statutory mention came in the Chequers Estate Act 1917, and the Ministers of the Crown Act 1937 first provided a dedicated salary, but the office remains fundamentally conventional in character. This stands in sharp contrast to, for example, the codified constitutional provisions for heads of government in most other parliamentary democracies.

      The academic debate over whether the UK has moved from "Cabinet government" to "prime-ministerial government" has been central to constitutional scholarship since Richard Crossman's introduction to Bagehot's "The English Constitution" (1963), in which he argued that the Cabinet had become a dignified rather than efficient part of the constitution. This thesis was developed by John Mackintosh in "The British Cabinet" (1962) and has been periodically reinvigorated by analyses of strong premiers -- notably Thatcher and Blair. Michael Foley's "The Rise of the British Presidency" (2000) argued that the premiership had acquired quasi-presidential characteristics through spatial leadership, public rhetoric, and the bypassing of Cabinet. However, scholars such as George Jones and Rod Rhodes have defended the Cabinet government model, arguing that even dominant PMs remain constrained by Cabinet, party, Parliament, and the civil service. Hennessy's framework of a "command premiership" versus a "collegiate premiership" offers a useful analytical spectrum.

      Collective Cabinet responsibility is a tripartite convention comprising: (i) unanimity -- all ministers must publicly support Government policy; (ii) confidence -- the Government must retain the confidence of the House of Commons; and (iii) confidentiality -- Cabinet discussions remain secret to enable candid deliberation. The convention's origins are typically traced to the development of party government in the eighteenth and nineteenth centuries. Its formal articulation appears in the Ministerial Code, but as a constitutional convention it is politically rather than legally enforceable. The "agreement to differ" mechanism, first used in 1932 over imperial tariffs in the National Government, has been deployed sparingly: in 1975 (EEC referendum), 2016 (EU referendum), and on limited other occasions. Lord Salisbury's doctrine (the Salisbury convention) -- that the Lords should not reject legislation foreshadowed in the governing party's manifesto -- represents a related but distinct convention governing inter-chamber relations.

      The Ministerial Code, first published in its modern form as "Questions of Procedure for Ministers" by Clement Attlee in 1945 and renamed the Ministerial Code by Tony Blair in 1997, is the PM's personal document. It has no statutory footing, though there have been persistent calls -- from the Committee on Standards in Public Life, the Institute for Government, and parliamentary committees -- for it to be placed on a statutory basis and for investigations of breaches to be conducted by a genuinely independent figure. The appointment of an Independent Adviser on Ministers' Interests (a role created in 2006) has not fully resolved concerns, as the Adviser can investigate only at the PM's request and the PM retains final decision-making authority.

      The machinery of government supporting the PM has expanded significantly. The Cabinet Office, established in 1916 under Maurice Hankey as the first Cabinet Secretary, provides the institutional infrastructure for collective government. The Prime Minister's Office (formally part of the Cabinet Office) has grown from a small private office to a substantial policy and communications operation. The National Security Council, established by David Cameron in 2010, institutionalised national security decision-making at the Cabinet committee level. The tension between the PM's personal office and the Cabinet Office -- and between special advisers and the permanent civil service -- remains a recurrent theme in analyses of the "centre of government."

      The appointment process is itself governed by convention rather than statute. Following a general election, the Monarch invites the person best able to command the confidence of the House of Commons to form a government. In cases of ambiguity -- such as a hung parliament -- the Cabinet Manual (first published in 2011) sets out the conventions and processes, but its provisions are descriptive and non-binding. The Fixed-term Parliaments Act 2011 temporarily altered the dissolution power before its repeal by the Dissolution and Calling of Parliament Act 2022, which restored the prerogative power of dissolution to the Crown (exercised on the PM's advice). The question of whether the Monarch retains a genuine personal prerogative in appointing a PM, or whether the role is now entirely determined by parliamentary arithmetic and party processes, continues to generate scholarly discussion.
