quizzes:
    child:
        - question: 'What is a hung parliament?'
          type: multiple_choice
          options:
              - 'When Parliament is closed for repairs'
              - 'When no party wins enough seats to have more than half the MPs'
              - 'When the Prime Minister resigns'
          correct_answer: 'When no party wins enough seats to have more than half the MPs'
          explanation: 'A hung parliament happens when no single party wins enough seats to have a majority. The parties then have to work out who will form the government.'
        - question: 'True or false: In the 2010 coalition, the Conservatives and Liberal Democrats shared out the ministerial jobs between them.'
          type: true_false
          correct_answer: 'True'
          explanation: 'In the 2010 coalition, ministers came from both the Conservative Party and the Liberal Democrats. Nick Clegg, the Liberal Democrat leader, became Deputy Prime Minister.'
        - question: 'What happens if the government loses a vote of no confidence?'
          type: multiple_choice
          options:
              - 'Nothing changes'
              - 'The government might have to resign and there could be a new election'
              - 'The Prime Minister gets a pay rise'
          correct_answer: 'The government might have to resign and there could be a new election'
          explanation: 'If Parliament votes that it no longer has confidence in the government, the government is expected to resign, which could lead to a new election or a different government being formed.'
    teenager:
        - question: 'What is the difference between a coalition government and a confidence-and-supply arrangement?'
          type: short_answer
          correct_answer: 'In a coalition, two or more parties formally join to govern together and share ministerial posts. In a confidence-and-supply arrangement, a smaller party agrees to support the government on confidence votes and budgets but does not join the government or receive ministerial positions.'
          explanation: 'Coalition involves shared executive power with ministers from multiple parties; confidence and supply is a looser arrangement where the supporting party retains independence on non-budgetary votes.'
        - question: 'Why was the Fixed-term Parliaments Act 2011 passed, and why was it later repealed?'
          type: short_answer
          correct_answer: 'It was passed to prevent either coalition partner from calling a snap election for political advantage, by fixing terms at five years. It was repealed by the Dissolution and Calling of Parliament Act 2022 because it was widely criticised for creating rigidity and confusion, particularly during the Brexit parliamentary deadlocks of 2019.'
          explanation: "The FTPA was a product of coalition politics, specifically a Liberal Democrat demand. Its repeal restored the PM's prerogative to advise dissolution, which supporters argued was essential for effective governance."
        - question: 'True or false: A coalition agreement is legally binding on the parties that sign it.'
          type: true_false
          correct_answer: 'False'
          explanation: 'A coalition agreement is a political document, not a legal contract. It binds the parties politically but has no legal enforceability. Its effectiveness depends on trust, institutional structures, and political incentives.'
    adult:
        - question: 'How did the Cabinet Manual (2011) seek to clarify the conventions governing government formation after a hung parliament?'
          type: short_answer
          correct_answer: 'The Cabinet Manual set out that the incumbent PM has the right and duty to remain in office until it is clear they cannot command the confidence of the Commons; that political parties are expected to resolve the situation without involving the Monarch; and that the caretaker convention constrains the incumbent government from making major decisions during the interregnum.'
          explanation: 'The Manual was published partly in response to the 2010 experience, aiming to provide transparency about conventions that had previously been poorly documented. However, it is descriptive and non-binding.'
        - question: 'Explain the Lascelles Principles and their relevance to the dissolution power.'
          type: short_answer
          correct_answer: "The Lascelles Principles, articulated in a 1950 letter to The Times, suggested the Monarch could refuse a dissolution if the existing Parliament was still viable, an alternative government could be formed, and an election would be detrimental to the national economy. They are relevant because they suggest the Monarch retains a residual discretion to refuse a PM's request for dissolution, though this has never been tested in modern practice."
          explanation: "Named after Sir Alan Lascelles, the King's Private Secretary, who wrote pseudonymously, the Principles represent the most detailed articulation of potential limits on the PM's dissolution power. The Dissolution and Calling of Parliament Act 2022 sought to restore the prerogative but included an ouster clause limiting judicial review."
        - question: 'What constitutional difficulties did the 2017-2019 Parliament reveal about minority government under the FTPA?'
          type: multiple_choice
          options:
              - 'The government could not raise taxes without a supermajority'
              - 'The government could not govern effectively but could not secure an early election, creating parliamentary deadlock'
              - 'The opposition was able to form an alternative government within the 14-day window'
              - 'The Speaker was able to dissolve Parliament unilaterally'
          correct_answer: 'The government could not govern effectively but could not secure an early election, creating parliamentary deadlock'
          explanation: "The FTPA's requirement for a two-thirds supermajority for early dissolution trapped a government that could not pass its central legislation but could not call an election. The opposition declined to support either a no-confidence motion or an early election motion, creating a prolonged impasse resolved only by the ad hoc Early Parliamentary General Election Act 2019."
    researcher:
        - question: "Analyse the constitutional implications of the Dissolution and Calling of Parliament Act 2022's ouster clause for the relationship between the executive, the judiciary, and the Crown."
          type: essay
          correct_answer: "Section 3 of the 2022 Act attempts to place the exercise of the dissolution power beyond judicial review, reviving a prerogative power while seeking to insulate it from judicial scrutiny. This raises fundamental questions about parliamentary sovereignty (can Parliament effectively prevent the courts from reviewing executive action?), the rule of law (is there a constitutional limit on ouster clauses, as suggested by the Supreme Court in Privacy International [2019]?), and the Monarch's role (does the restoration of the prerogative revive any genuine royal discretion, or is dissolution now entirely a matter for the PM?)."
          explanation: 'The essay should engage with the constitutional debate over ouster clauses, the Miller/Cherry prorogation case (2019), the academic literature on the prerogative, and the practical implications for coalition and minority governments of the PM holding an unrestricted dissolution power.'
        - question: 'Evaluate the 2010 coalition as a constitutional experiment, considering its institutional innovations, its impact on collective responsibility, and its lessons for future multi-party government in the UK.'
          type: essay
          correct_answer: "The 2010 coalition introduced institutional innovations (the coalition agreement, the Coalition Committee, the 'quad') that adapted single-party conventions to multi-party governance. Collective responsibility was maintained but modified by agreed 'agreements to differ.' Bogdanor (2011) argued it demonstrated the constitution's adaptability; critics noted the political costs for the junior partner and the democratic deficit of a government programme not endorsed by voters. The coalition's full five-year term, facilitated by the FTPA, suggests that institutional architecture matters more than ideological proximity."
          explanation: "The analysis should draw on Bogdanor, Hazell and Paun, and the empirical record to assess the coalition's constitutional legacy, including its impact on conventions, party politics, and public attitudes towards multi-party government."
