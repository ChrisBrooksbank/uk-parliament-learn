glossary:
    - term: 'Coalition Government'
      definition_simple: 'When two or more political parties join together to run the country because no single party won enough seats on its own.'
      definition_full: "A government formed by two or more political parties that agree to share executive power, typically following a general election in which no single party has won an overall majority. Coalition governments are governed by a coalition agreement and by the convention of collective Cabinet responsibility, though the latter may be modified by agreed 'agreements to differ' on specific issues."
    - term: 'Confidence and Supply'
      definition_simple: 'When a smaller party agrees to support the government on important votes like the budget without actually joining the government.'
      definition_full: 'An arrangement whereby a party outside government agrees to support the government on votes of confidence (which determine whether the government remains in office) and supply (the budget and financial legislation), while retaining freedom to vote independently on other matters. Unlike a coalition, the supporting party does not receive ministerial positions.'
    - term: 'Hung Parliament'
      definition_simple: 'When no single political party wins enough seats in a general election to have more than half the MPs in the House of Commons.'
      definition_full: 'A parliamentary situation in which no single party commands an overall majority of seats in the House of Commons (currently 326 of 650). A hung parliament requires political negotiation to determine the formation of government, whether through coalition, confidence-and-supply, or minority administration.'
    - term: 'Coalition Agreement'
      definition_simple: 'A written plan that parties in a coalition agree to follow, setting out what policies they will work on together.'
      definition_full: 'A political document negotiated between coalition partners setting out their agreed programme for government, the allocation of ministerial portfolios, and the mechanisms for managing the relationship. Coalition agreements are politically binding but have no legal enforceability; their effectiveness depends on trust, institutional structures, and political incentives.'
    - term: 'Vote of No Confidence'
      definition_simple: 'A vote in Parliament where MPs decide whether they still trust the government to do its job. If the government loses, it might have to resign.'
      definition_full: "A motion in the House of Commons expressing that the House no longer has confidence in Her Majesty's Government. If passed, the convention requires the government to resign. Following repeal of the Fixed-term Parliaments Act 2011, the specific statutory mechanism (a 14-day window for forming an alternative government) no longer applies, and the prerogative power of dissolution has been restored to the Crown on the PM's advice."

