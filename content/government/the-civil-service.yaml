quizzes:
  child:
    - question: "What happens to civil servants when a new government is elected?"
      type: multiple_choice
      options:
        - "They all lose their jobs"
        - "They stay in their jobs and work for the new government"
        - "They join the new Prime Minister's political party"
      correct_answer: "They stay in their jobs and work for the new government"
      explanation: "Civil servants are permanent, which means they keep their jobs no matter which party wins an election. They serve whichever government the people vote for."
    - question: "True or false: Civil servants are allowed to support one political party over another in their work."
      type: true_false
      correct_answer: "False"
      explanation: "Civil servants must be impartial, which means they do not favour any political party. They give honest advice and carry out the decisions of whatever government is in charge."
  teenager:
    - question: "What were the main recommendations of the Northcote-Trevelyan Report of 1854?"
      type: short_answer
      correct_answer: "It recommended replacing political patronage with recruitment by open competitive examination, dividing civil servants into intellectual and mechanical classes, and promotion based on merit."
      explanation: "The report transformed the Civil Service from a system where jobs were given to political allies into a professional body where people were recruited and promoted based on ability."
    - question: "What is a special adviser (SpAd)?"
      type: multiple_choice
      options:
        - "A senior permanent civil servant who leads a department"
        - "A temporary political appointee who gives partisan advice to a minister"
        - "A member of Parliament who advises the PM"
      correct_answer: "A temporary political appointee who gives partisan advice to a minister"
      explanation: "SpAds are appointed by ministers to provide political advice that permanent civil servants cannot give because of their duty of impartiality. They are temporary and leave when their minister leaves office."
    - question: "True or false: The Civil Service existed under the royal prerogative with no statutory basis until 2010."
      type: true_false
      correct_answer: "True"
      explanation: "The Constitutional Reform and Governance Act 2010 placed the Civil Service on a statutory footing for the first time, enshrining its core values and the role of the Civil Service Commission in law."
  adult:
    - question: "What is a ministerial direction and when is it used?"
      type: short_answer
      correct_answer: "A ministerial direction is a formal written instruction from a minister to a Permanent Secretary to proceed with expenditure that the Permanent Secretary has advised against on grounds of propriety, regularity, value for money, or feasibility. It transfers accountability to the minister and is reported to the Comptroller and Auditor General and the Public Accounts Committee."
      explanation: "The ministerial direction procedure is a critical accountability safeguard. It creates a paper trail showing that the Permanent Secretary raised concerns and the minister chose to override them, ensuring parliamentary scrutiny of the decision."
    - question: "How did the Constitutional Reform and Governance Act 2010 change the constitutional position of the Civil Service?"
      type: short_answer
      correct_answer: "CRAG 2010 placed the Civil Service on a statutory footing for the first time, gave legal force to the Civil Service Code and its core values, enshrined the Civil Service Commission's role in merit-based recruitment, created a statutory right of appeal for civil servants asked to breach the Code, and formalised the position of special advisers."
      explanation: "Before CRAG 2010, the Civil Service existed entirely under the royal prerogative, meaning its existence, values, and governance could theoretically have been altered by ministers without parliamentary approval."
    - question: "What is the Armstrong Memorandum and why has it been criticised?"
      type: multiple_choice
      options:
        - "A memorandum establishing the four Civil Service values, criticised for being too vague"
        - "A memorandum stating that the Civil Service has no constitutional personality separate from the government, criticised for subordinating civil service independence to ministerial control"
        - "A memorandum creating the role of Cabinet Secretary, criticised for concentrating too much power"
      correct_answer: "A memorandum stating that the Civil Service has no constitutional personality separate from the government, criticised for subordinating civil service independence to ministerial control"
      explanation: "Issued by Sir Robert Armstrong in 1985, the memorandum clarified the chain of accountability but was criticised for providing inadequate protection for civil servants asked to act improperly, effectively making the Service an instrument of ministerial will rather than a constitutional body with independent obligations."
  researcher:
    - question: "Analyse the tension between the Northcote-Trevelyan model of a permanent, impartial civil service and the growing role of special advisers in British government."
      type: essay
      correct_answer: "The Northcote-Trevelyan settlement rests on the principle that permanent, impartial officials provide frank, evidence-based advice to transient political ministers. Special advisers, by providing partisan political advice within the ministerial team, create a potential tension with this model. Yong and Hazell (2014) argue SpAds can enhance the system by filling a legitimate political advisory gap; Blick (2004) documents cases where they have undermined civil service neutrality. The Wicks Committee (2003) recommended clearer boundaries, and CRAG 2010 provided a statutory framework, but the fundamental tension between political responsiveness and administrative neutrality remains unresolved."
      explanation: "The analysis should consider the historical growth of SpAds, their constitutional position under CRAG 2010, specific controversies, and the broader question of whether the Northcote-Trevelyan model can accommodate a growing political layer without compromising the principles of permanence and impartiality."
    - question: "Evaluate the effectiveness of the accounting officer role and ministerial direction procedure as mechanisms for ensuring the proper use of public funds."
      type: essay
      correct_answer: "The accounting officer role gives Permanent Secretaries personal responsibility for departmental expenditure, enforceable through the Public Accounts Committee. The ministerial direction procedure allows Permanent Secretaries to protect their position when ministers wish to proceed with expenditure the official considers improper. While the system provides transparency and creates a paper trail, critics argue it is reactive rather than preventive, depends on the willingness of Permanent Secretaries to challenge ministers, and has limited sanctions for ministers who proceed despite official objections."
      explanation: "The essay should examine the legal basis of the accounting officer role, the frequency and outcomes of ministerial directions, the PAC's role in scrutinising them, and whether the procedure adequately protects public funds or merely documents disagreements after the fact."
