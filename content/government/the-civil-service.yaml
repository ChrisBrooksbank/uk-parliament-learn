    event: "Constitutional Reform and Governance Act"
    significance: "Placed the Civil Service on a statutory footing for the first time, enshrining the Civil Service Code values in law, formalising the role of the Civil Service Commission, and providing a statutory basis for special advisers."
    levels: [teenager, adult, researcher]

