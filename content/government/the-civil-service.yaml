    significance: "Recommended replacing patronage with merit-based recruitment through open competitive examination, creating the foundation for the modern professional Civil Service."
    levels: [teenager, adult, researcher]
  - year: 1855
    event: "Civil Service Commission established"
    significance: "Created by Order in Council to oversee examinations for civil service appointments, marking the beginning of institutional reform though patronage continued alongside competitive entry."
    levels: [adult, researcher]
  - year: 1870
    event: "Gladstone's Order in Council mandates open competition"
    significance: "Made open competitive examination the standard route of entry to the Civil Service, completing the transition from patronage to meritocracy that Northcote-Trevelyan had envisaged."
    levels: [adult, researcher]
